<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>💣 踩地雷</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:sans-serif;background:#0a0e14;color:#eee;display:flex;justify-content:center;padding:1rem;min-height:100vh;touch-action:manipulation}
.app{width:100%;max-width:520px}
.btn{font-size:13px;padding:6px 16px;border-radius:8px;border:0.5px solid #444;background:transparent;color:#eee;cursor:pointer}
.btn:hover{background:#12192a}.btn:active{transform:scale(0.97)}
.screen{display:none}.screen.active{display:block}

/* difficulty select */
.diff-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:.75rem}
.diff-card{background:#10161f;border:1.5px solid #1e3a5a;border-radius:14px;padding:1rem .75rem;cursor:pointer;text-align:center;transition:all .15s}
.diff-card:hover{border-color:#38bdf8;transform:translateY(-2px)}
.diff-card h3{font-size:15px;font-weight:600;margin-bottom:4px}
.diff-card p{font-size:11px;color:#7ab;line-height:1.5}
.diff-card .mines{font-size:20px;margin-bottom:.3rem}

/* game top */
.game-top{display:flex;align-items:center;justify-content:space-between;background:#10161f;border:0.5px solid #1e3a5a;border-radius:12px;padding:.5rem .75rem;margin-bottom:.6rem}
.mine-counter{font-size:18px;font-weight:700;color:#f87171;font-family:monospace;min-width:48px}
.reset-btn{font-size:24px;cursor:pointer;user-select:none;transition:transform .1s}
.reset-btn:active{transform:scale(0.85)}
.timer-disp{font-size:18px;font-weight:700;color:#38bdf8;font-family:monospace;min-width:48px;text-align:right}

/* grid */
.grid-wrap{display:flex;justify-content:center;margin-bottom:.6rem;overflow:auto}
#mine-grid{display:inline-grid;gap:2px;border:2px solid #1e3a5a;border-radius:8px;padding:4px;background:#0a0e14}
.cell{display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;font-weight:700;user-select:none;transition:background .1s;position:relative;border:0.5px solid #1e3a5a}
.cell.hidden{background:#1a2535;border-color:#243548}
.cell.hidden:hover{background:#1f2e42}
.cell.hidden:active{background:#253547}
.cell.revealed{background:#0d1520;border-color:#0a1220;cursor:default}
.cell.flagged{background:#1a2535;border-color:#243548}
.cell.mine-hit{background:#5a1010!important;border-color:#8a2020!important}
.cell.mine-reveal{background:#1a1020}

/* number colors */
.n1{color:#38bdf8}.n2{color:#4ade80}.n3{color:#f87171}.n4{color:#a78bfa}
.n5{color:#fb923c}.n6{color:#2dd4bf}.n7{color:#f0abfc}.n8{color:#94a3b8}

/* overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
.overlay.show{display:flex}
.ov-card{background:#10161f;border:2px solid #1e3a5a;border-radius:20px;padding:2rem;text-align:center;max-width:320px;width:90%;animation:popIn .35s}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.ov-icon{font-size:60px;margin-bottom:.5rem}
.ov-title{font-size:22px;font-weight:700;margin-bottom:.3rem}
.ov-sub{font-size:14px;color:#7ab;margin-bottom:1rem}
.big-btn{width:100%;padding:11px;border-radius:12px;border:none;color:#fff;font-size:15px;font-weight:500;cursor:pointer;margin-bottom:.4rem}

.hint{font-size:11px;color:#4a6a8a;text-align:center;margin-bottom:.5rem}


  /* 防長按選單 */
  canvas, img {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  /* iOS 安全區域：避免被工具列或 Home 條遮住 */
  body {
    padding-bottom: env(safe-area-inset-bottom, 16px);
    min-height: 100dvh;
  }
</style></head><body>
<div class="app">
<button class="btn" style="margin-bottom:.5rem" onclick="window.location.href='/'">← 大廳</button>
<h1 style="font-size:21px;font-weight:500;text-align:center;margin-bottom:.75rem">💣 踩地雷</h1>

<!-- SELECT -->
<div class="screen active" id="screen-select">
  <div class="diff-grid">
    <div class="diff-card" onclick="startGame('easy')">
      <div class="mines">😊</div>
      <h3>初級</h3>
      <p>9×9<br>10 地雷</p>
    </div>
    <div class="diff-card" onclick="startGame('medium')">
      <div class="mines">😐</div>
      <h3>中級</h3>
      <p>12×12<br>25 地雷</p>
    </div>
    <div class="diff-card" onclick="startGame('hard')">
      <div class="mines">😰</div>
      <h3>高級</h3>
      <p>16×16<br>50 地雷</p>
    </div>
  </div>
  <p style="font-size:12px;color:#4a6a8a;text-align:center">點擊翻開格子，長按旗標地雷 🚩</p>
</div>

<!-- GAME -->
<div class="screen" id="screen-game">
  <div class="game-top">
    <div class="mine-counter" id="mine-counter">💣10</div>
    <div class="reset-btn" id="reset-btn" onclick="resetGame()">🙂</div>
    <div class="timer-disp" id="timer-disp">000</div>
  </div>
  <p class="hint">長按 / 右鍵 = 插旗 🚩　點擊 = 翻開</p>
  <div class="grid-wrap"><div id="mine-grid"></div></div>
  <div style="display:flex;gap:8px;justify-content:center">
    <button class="btn" onclick="showScreen('screen-select')">← 選難度</button>
    <button class="btn" onclick="resetGame()">重新開始</button>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="ov-card">
    <div class="ov-icon" id="ov-icon"></div>
    <div class="ov-title" id="ov-title"></div>
    <div class="ov-sub" id="ov-sub"></div>
    <button class="big-btn" id="ov-again-btn" style="background:linear-gradient(135deg,#0c4a6e,#0ea5e9)">再玩一局</button>
    <button class="btn" style="width:100%;padding:9px" onclick="showScreen('screen-select');hideOverlay()">更換難度</button>
  </div>
</div>

<script>
const DIFF={
  easy:{rows:9,cols:9,mines:10,name:'初級'},
  medium:{rows:12,cols:12,mines:25,name:'中級'},
  hard:{rows:16,cols:16,mines:50,name:'高級'},
};

let rows,cols,totalMines,diff;
let grid=[],revealed=[],flagged=[],mineSet=new Set();
let gameState='idle'; // idle playing won lost
let timerVal=0,timerInt=null,firstClick=true,flagCount=0;
let longPressTimer=null;

function startGame(d){
  diff=d;
  const cfg=DIFF[d];
  rows=cfg.rows; cols=cfg.cols; totalMines=cfg.mines;
  showScreen('screen-game');
  initGrid();
  renderGrid();
  setFace('🙂');
  document.getElementById('overlay').classList.remove('show');
}

function resetGame(){
  if(diff)startGame(diff);
}

function initGrid(){
  clearInterval(timerInt);
  timerVal=0; firstClick=true; flagCount=0; gameState='idle';
  grid=Array.from({length:rows},()=>Array(cols).fill(0));
  revealed=Array.from({length:rows},()=>Array(cols).fill(false));
  flagged=Array.from({length:rows},()=>Array(cols).fill(false));
  mineSet=new Set();
  updateMineCounter();
  updateTimer();
}

function placeMines(safeR,safeC){
  const safe=new Set();
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const nr=safeR+dr,nc=safeC+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols)safe.add(nr*cols+nc);
  }
  const pool=[];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(!safe.has(r*cols+c))pool.push(r*cols+c);
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  pool.slice(0,totalMines).forEach(idx=>{
    mineSet.add(idx);
    grid[Math.floor(idx/cols)][idx%cols]=-1;
  });
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(grid[r][c]===-1)continue;
    let cnt=0;
    neighbors(r,c).forEach(([nr,nc])=>{if(grid[nr][nc]===-1)cnt++;});
    grid[r][c]=cnt;
  }
}

function neighbors(r,c){
  const res=[];
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    if(!dr&&!dc)continue;
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols)res.push([nr,nc]);
  }
  return res;
}

function renderGrid(){
  const availW=Math.min(window.innerWidth-40,500);
  const cellSize=Math.max(24,Math.min(40,Math.floor((availW-8-cols*2)/cols)));
  const fontSize=Math.floor(cellSize*0.5);
  const g=document.getElementById('mine-grid');
  g.style.gridTemplateColumns=`repeat(${cols},${cellSize}px)`;
  g.innerHTML='';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const el=document.createElement('div');
    el.className='cell hidden';
    el.style.width=el.style.height=cellSize+'px';
    el.style.fontSize=fontSize+'px';
    el.dataset.r=r; el.dataset.c=c;
    el.addEventListener('click',handleClick);
    el.addEventListener('contextmenu',handleRightClick);
    el.addEventListener('touchstart',handleTouchStart,{passive:false});
    el.addEventListener('touchend',handleTouchEnd);
    el.addEventListener('touchmove',handleTouchMove,{passive:true});
    g.appendChild(el);
  }
}

function handleClick(e){
  const r=+e.currentTarget.dataset.r, c=+e.currentTarget.dataset.c;
  if(gameState==='won'||gameState==='lost')return;
  if(flagged[r][c])return;
  if(revealed[r][c]){
    // chord: if flagged neighbors == cell number, reveal neighbors
    chordReveal(r,c);
    return;
  }
  if(firstClick){
    firstClick=false;
    placeMines(r,c);
    gameState='playing';
    timerInt=setInterval(()=>{timerVal++;updateTimer();},1000);
  }
  revealCell(r,c);
  updateBoard();
  checkWin();
}

function chordReveal(r,c){
  if(!revealed[r][c]||grid[r][c]<=0)return;
  const nb=neighbors(r,c);
  const flagNb=nb.filter(([nr,nc])=>flagged[nr][nc]).length;
  if(flagNb!==grid[r][c])return;
  nb.forEach(([nr,nc])=>{if(!flagged[nr][nc]&&!revealed[nr][nc])revealCell(nr,nc);});
  updateBoard();
  checkWin();
}

function handleRightClick(e){
  e.preventDefault();
  const r=+e.currentTarget.dataset.r, c=+e.currentTarget.dataset.c;
  toggleFlag(r,c);
}

function handleTouchStart(e){
  const el=e.currentTarget;
  const r=+el.dataset.r, c=+el.dataset.c;
  longPressTimer=setTimeout(()=>{longPressTimer=null;toggleFlag(r,c);},450);
}
function handleTouchEnd(e){
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
  else e.preventDefault();
}
function handleTouchMove(){if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}}

function toggleFlag(r,c){
  if(gameState==='won'||gameState==='lost')return;
  if(revealed[r][c])return;
  if(!flagged[r][c]&&gameState==='idle'){
    // can flag before first click
  }
  flagged[r][c]=!flagged[r][c];
  flagCount+=flagged[r][c]?1:-1;
  updateMineCounter();
  updateBoard();
}

function revealCell(r,c){
  if(revealed[r][c]||flagged[r][c])return;
  revealed[r][c]=true;
  if(grid[r][c]===-1){
    gameState='lost';
    showAllMines(r,c);
    clearInterval(timerInt);
    setFace('😵');
    setTimeout(()=>showOverlay(false),600);
    return;
  }
  if(grid[r][c]===0){
    neighbors(r,c).forEach(([nr,nc])=>{if(!revealed[nr][nc])revealCell(nr,nc);});
  }
}

function showAllMines(hitR,hitC){
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(mineSet.has(r*cols+c)&&!(flagged[r][c])){revealed[r][c]=true;}
  }
  updateBoard();
  const g=document.getElementById('mine-grid');
  const hitEl=g.children[hitR*cols+hitC];
  if(hitEl)hitEl.classList.add('mine-hit');
}

function checkWin(){
  if(gameState==='lost')return;
  let unrevealed=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(!revealed[r][c]&&!mineSet.has(r*cols+c))unrevealed++;
  if(unrevealed===0){
    gameState='won';
    clearInterval(timerInt);
    setFace('😎');
    // auto-flag remaining
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(mineSet.has(r*cols+c))flagged[r][c]=true;
    flagCount=totalMines;
    updateMineCounter();
    updateBoard();
    setTimeout(()=>showOverlay(true),400);
    saveBestTime();
  }
}

function saveBestTime(){
  try{
    const d=JSON.parse(localStorage.getItem('game_lobby_v2')||'{}');
    if(d.name){
      localStorage.setItem('game_pending_score',JSON.stringify({game:'mine',score:timerVal,detail:DIFF[diff].name}));
    }
  }catch(e){}
}

function updateBoard(){
  const g=document.getElementById('mine-grid');
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const el=g.children[r*cols+c];
    if(!el)continue;
    el.className='cell';
    el.textContent='';
    if(flagged[r][c]&&!revealed[r][c]){
      el.classList.add('hidden');
      el.textContent='🚩';
    } else if(!revealed[r][c]){
      el.classList.add('hidden');
    } else if(grid[r][c]===-1){
      el.classList.add('mine-reveal');
      el.textContent='💣';
    } else {
      el.classList.add('revealed');
      if(grid[r][c]>0){
        el.textContent=grid[r][c];
        el.classList.add('n'+grid[r][c]);
      }
    }
  }
}

function updateMineCounter(){
  document.getElementById('mine-counter').textContent='💣'+(totalMines-flagCount);
}
function updateTimer(){
  const t=Math.min(timerVal,999);
  document.getElementById('timer-disp').textContent=String(t).padStart(3,'0');
}
function setFace(f){document.getElementById('reset-btn').textContent=f;}

function showOverlay(won){
  const ov=document.getElementById('overlay');
  document.getElementById('ov-icon').textContent=won?'🎉':'💥';
  document.getElementById('ov-title').textContent=won?'成功排雷！':'踩到地雷了！';
  const cfg=DIFF[diff];
  if(won){
    document.getElementById('ov-sub').textContent=cfg.name+' · 用時 '+timerVal+' 秒';
  } else {
    document.getElementById('ov-sub').textContent=cfg.name+' · 再試一次吧！';
  }
  document.getElementById('ov-again-btn').onclick=()=>{hideOverlay();resetGame();};
  ov.classList.add('show');
}

function hideOverlay(){document.getElementById('overlay').classList.remove('show');}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='screen-select'){clearInterval(timerInt);gameState='idle';}
}
</script>
</body></html>
