<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1a1a1a;color:#eee;display:flex;justify-content:center;padding:1rem}
.app{width:100%;max-width:500px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.topbar h1{font-size:20px;font-weight:500}
.meta{display:flex;gap:8px;align-items:center}
.pill{font-size:12px;padding:3px 10px;border-radius:20px;background:#2a2a2a;color:#aaa;border:0.5px solid #444}
.btn{font-size:13px;padding:5px 14px;border-radius:8px;border:0.5px solid #555;background:transparent;color:#eee;cursor:pointer}
.btn:hover{background:#2a2a2a}
.btn:active{transform:scale(0.97)}
.stats{display:flex;gap:16px;justify-content:center;margin-bottom:.6rem}
.stat{font-size:13px;color:#aaa}.stat span{font-weight:500;color:#eee;font-variant-numeric:tabular-nums}
.maze-wrap{display:flex;justify-content:center;margin-bottom:.6rem}
canvas{display:block;border-radius:10px;border:0.5px solid #444;touch-action:none;background:#111}
.msg{text-align:center;font-size:14px;color:#aaa;min-height:22px;margin-bottom:6px}
.win{display:none;text-align:center;padding:.6rem;background:#1a3a1a;border-radius:10px;color:#6c6;font-size:15px;font-weight:500;margin-bottom:8px}
.controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:.6rem}
.dpad{display:grid;grid-template-columns:repeat(3,48px);grid-template-rows:repeat(2,48px);gap:6px;justify-content:center;margin-top:.4rem}
.db{width:48px;height:48px;border-radius:10px;border:0.5px solid #555;background:#2a2a2a;color:#eee;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.db:active{background:#3a3a3a;transform:scale(0.93)}
.empty{width:48px;height:48px}


  /* 防長按選單 */
  canvas, img {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  /* iOS 安全區域：避免被工具列或 Home 條遮住 */
  body {
    padding-bottom: env(safe-area-inset-bottom, 16px);
    min-height: 100dvh;
  }
</style></head><body>
<div class="app">
  <div class="topbar">
    <button class="btn" onclick="window.location.href='/'">← 大廳</button>
    <h1>🌀 逃出迷宮</h1>
    <div class="meta">
      <span class="pill" id="lvl-badge">第 1 關</span>
      <button class="btn" id="hint-btn">💡 提示</button>
    </div>
  </div>
  <div class="stats">
    <div class="stat">時間：<span id="timer">00:00</span></div>
    <div class="stat">步數：<span id="steps">0</span></div>
    <div class="stat">大小：<span id="sz">9×9</span></div>
  </div>
  <div class="maze-wrap"><canvas id="mc"></canvas></div>
  <div class="msg" id="msg">找到出口逃出去！🏃</div>
  <div class="win" id="win"></div>
  <div class="controls">
    <button class="btn" id="retry-btn">重新開始</button>
    <button class="btn" id="new-btn">新迷宮</button>
    <button class="btn" id="next-btn" style="display:none">下一關 ➜</button>
  </div>
  <div class="dpad">
    <div class="empty"></div><button class="db" id="du">↑</button><div class="empty"></div>
    <button class="db" id="dl">←</button><button class="db" id="dd">↓</button><button class="db" id="dr">→</button>
  </div>
</div>
<script>
const NW=1,S=2,E=4,W=8;
const OPP={1:2,2:1,4:8,8:4};
const DR={1:-1,2:1,4:0,8:0};
const DC={1:0,2:0,4:1,8:-1};
const LEVELS=[
  {r:9,c:9},{r:9,c:9},{r:11,c:11},{r:11,c:11},{r:13,c:13},
  {r:15,c:15},{r:15,c:15},{r:17,c:17},{r:19,c:19},{r:21,c:21},
  {r:21,c:21},{r:23,c:23},{r:25,c:25},{r:27,c:27},{r:29,c:29},
];

let lvl=0,maze=[],R=0,C=0,pr=0,pc=0,steps=0,won=false;
let t0=0,elapsed=0,raf=null,hintPath=[],showHint=false;
let tx0=0,ty0=0;

const cv=document.getElementById('mc');
const cx=cv.getContext('2d');

function gen(r,c){
  const g=Array.from({length:r},()=>new Array(c).fill(0));
  const vis=Array.from({length:r},()=>new Array(c).fill(false));
  function carve(cr,cc){
    vis[cr][cc]=true;
    const dirs=[NW,S,E,W].sort(()=>Math.random()-.5);
    for(const d of dirs){
      const nr=cr+DR[d],nc=cc+DC[d];
      if(nr>=0&&nr<r&&nc>=0&&nc<c&&!vis[nr][nc]){
        g[cr][cc]|=d; g[nr][nc]|=OPP[d]; carve(nr,nc);
      }
    }
  }
  carve(0,0); return g;
}

function bfs(sr,sc,er,ec){
  const vis=Array.from({length:R},()=>new Array(C).fill(false));
  const par=Array.from({length:R},()=>new Array(C).fill(null));
  const q=[[sr,sc]]; vis[sr][sc]=true;
  while(q.length){
    const[cr,cc]=q.shift();
    if(cr===er&&cc===ec){
      const p=[];let cur=[cr,cc];
      while(cur){p.push(cur);cur=par[cur[0]][cur[1]];}
      return p.reverse();
    }
    for(const d of[NW,S,E,W]){
      if(!(maze[cr][cc]&d))continue;
      const nr=cr+DR[d],nc=cc+DC[d];
      if(!vis[nr][nc]){vis[nr][nc]=true;par[nr][nc]=[cr,cc];q.push([nr,nc]);}
    }
  }
  return[];
}

function load(idx,fresh=true){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  lvl=idx;
  const lv=LEVELS[Math.min(idx,LEVELS.length-1)];
  R=lv.r; C=lv.c;
  if(fresh) maze=gen(R,C);
  const maxW=Math.min(460,window.innerWidth-32);
  const cell=Math.floor(maxW/C);
  cv.width=cell*C; cv.height=cell*R;
  cv.dataset.cell=cell;
  pr=0;pc=0;steps=0;won=false;showHint=false;hintPath=[];
  t0=Date.now();elapsed=0;
  document.getElementById('lvl-badge').textContent='第'+(idx+1)+'關';
  document.getElementById('sz').textContent=C+'×'+R;
  document.getElementById('steps').textContent=0;
  document.getElementById('timer').textContent='00:00';
  document.getElementById('win').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('msg').textContent='找到出口逃出去！🏃';
  raf=requestAnimationFrame(tick);
  draw();
}

function tick(){
  if(won)return;
  elapsed=Date.now()-t0;
  const s=Math.floor(elapsed/1000);
  document.getElementById('timer').textContent=
    String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  raf=requestAnimationFrame(tick);
}

function mv(dr,dc){
  if(won)return;
  const nr=pr+dr,nc=pc+dc;
  if(nr<0||nr>=R||nc<0||nc>=C)return;
  const d=dr===-1?NW:dr===1?S:dc===1?E:W;
  if(!(maze[pr][pc]&d))return;
  pr=nr;pc=nc;steps++;
  document.getElementById('steps').textContent=steps;
  showHint=false;
  draw();
  if(pr===R-1&&pc===C-1)finish();
}

function finish(){
  won=true;
  if(raf){cancelAnimationFrame(raf);raf=null;}
  const s=Math.floor(elapsed/1000);
  const m=Math.floor(s/60),sec=s%60;
  document.getElementById('win').style.display='block';
  document.getElementById('win').textContent='🎉 逃出來了！'+m+'分'+sec+'秒，共'+steps+'步！';
  document.getElementById('next-btn').style.display='inline-block';
  document.getElementById('msg').textContent='';
}

function draw(){
  const cell=parseInt(cv.dataset.cell)||16;
  const lw=Math.max(1,Math.round(cell*0.07));
  cx.clearRect(0,0,cv.width,cv.height);
  cx.fillStyle='#111';cx.fillRect(0,0,cv.width,cv.height);

  // hint
  if(showHint&&hintPath.length){
    cx.fillStyle='rgba(239,159,39,0.22)';
    for(const[hr,hc] of hintPath){
      cx.fillRect(hc*cell+lw,hr*cell+lw,cell-lw*2,cell-lw*2);
    }
  }

  // walls
  cx.strokeStyle='#888';cx.lineWidth=lw;cx.lineCap='square';
  for(let r=0;r<R;r++){
    for(let c=0;c<C;c++){
      const x=c*cell,y=r*cell;
      if(!(maze[r][c]&NW)){cx.beginPath();cx.moveTo(x,y);cx.lineTo(x+cell,y);cx.stroke();}
      if(!(maze[r][c]&S)){cx.beginPath();cx.moveTo(x,y+cell);cx.lineTo(x+cell,y+cell);cx.stroke();}
      if(!(maze[r][c]&W)){cx.beginPath();cx.moveTo(x,y);cx.lineTo(x,y+cell);cx.stroke();}
      if(!(maze[r][c]&E)){cx.beginPath();cx.moveTo(x+cell,y);cx.lineTo(x+cell,y+cell);cx.stroke();}
    }
  }

  // start
  cx.font=Math.floor(cell*.65)+'px serif';
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('🚪',cell*.5,cell*.52);

  // goal
  cx.fillText('🏁',(C-.5)*cell,(R-.5)*cell);

  // player
  cx.fillStyle='rgba(212,83,126,0.3)';
  cx.beginPath();cx.arc((pc+.5)*cell,(pr+.5)*cell,cell*.36,0,Math.PI*2);cx.fill();
  cx.fillText('🐰',(pc+.5)*cell,(pr+.5)*cell+1);
}

// keyboard
document.addEventListener('keydown',e=>{
  const map={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1],
    w:[-1,0],s:[1,0],a:[0,-1],d:[0,1]};
  if(map[e.key]){e.preventDefault();mv(...map[e.key]);}
});

// dpad
document.getElementById('du').onclick=()=>mv(-1,0);
document.getElementById('dd').onclick=()=>mv(1,0);
document.getElementById('dl').onclick=()=>mv(0,-1);
document.getElementById('dr').onclick=()=>mv(0,1);

// swipe
cv.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:true});
cv.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0,dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)<8&&Math.abs(dy)<8)return;
  Math.abs(dx)>Math.abs(dy)?(dx>0?mv(0,1):mv(0,-1)):(dy>0?mv(1,0):mv(-1,0));
},{passive:true});

document.getElementById('hint-btn').onclick=()=>{
  hintPath=bfs(pr,pc,R-1,C-1);showHint=true;draw();
  setTimeout(()=>{showHint=false;draw();},2500);
};
document.getElementById('retry-btn').onclick=()=>load(lvl,false);
document.getElementById('new-btn').onclick=()=>load(lvl,true);
document.getElementById('next-btn').onclick=()=>load(lvl+1,true);

load(0);
</script>
<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body></html>
