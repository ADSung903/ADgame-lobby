<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>🔢 2048</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0a0a14;color:#eee;display:flex;justify-content:center;min-height:100dvh;min-height:100vh;padding-bottom:env(safe-area-inset-bottom,16px)}
.app{width:100%;max-width:420px;padding:1rem;display:flex;flex-direction:column;min-height:100dvh;min-height:100vh}

/* topbar */
.topbar{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem}
.back-btn{font-size:13px;padding:5px 12px;border-radius:8px;border:.5px solid #333;background:transparent;color:#aaa;cursor:pointer;flex-shrink:0}
h1{font-size:20px;font-weight:700;color:#f5c842;flex:1;text-align:center}

/* score row */
.score-row{display:flex;gap:8px;margin-bottom:.75rem}
.score-box{flex:1;background:#12122a;border:.5px solid #2a2a4a;border-radius:12px;padding:.5rem;text-align:center}
.score-box .lbl{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px}
.score-box .val{font-size:20px;font-weight:800;color:#f5c842;line-height:1.2}
.score-box.best .val{color:#a78bfa}

/* board */
.board-wrap{background:#1a1a2e;border-radius:16px;padding:8px;margin-bottom:.75rem;position:relative}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.cell{border-radius:8px;background:#0d0d20;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,5vw,26px);font-weight:800;transition:transform .08s ease;position:relative}
.cell.pop{animation:pop .12s ease}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.08)}100%{transform:scale(1)}}
.cell.merge{animation:merge .15s ease}
@keyframes merge{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}

/* tile colors */
.t2{background:#1e2a1e;color:#6ee7b7}
.t4{background:#1a2a3a;color:#7dd3fc}
.t8{background:#1e1a3a;color:#a78bfa}
.t16{background:#2a1a3a;color:#c084fc}
.t32{background:#3a1a2a;color:#f472b6}
.t64{background:#3a1a1a;color:#f87171}
.t128{background:#3a2a10;color:#fb923c;font-size:clamp(12px,4vw,22px)}
.t256{background:#2a3a10;color:#a3e635;font-size:clamp(12px,4vw,22px)}
.t512{background:#103a3a;color:#34d399;font-size:clamp(11px,3.5vw,20px)}
.t1024{background:#10203a;color:#38bdf8;font-size:clamp(10px,3vw,18px)}
.t2048{background:linear-gradient(135deg,#7c3aed,#f5c842);color:#fff;font-size:clamp(10px,3vw,18px);box-shadow:0 0 20px rgba(245,200,66,.4)}
.t4096{background:linear-gradient(135deg,#dc2626,#7c3aed);color:#fff;font-size:clamp(9px,2.8vw,16px);box-shadow:0 0 24px rgba(124,58,237,.5)}

/* controls */
.btn-row{display:flex;gap:8px;margin-bottom:.75rem}
.btn{flex:1;padding:10px;border-radius:10px;border:.5px solid #2a2a4a;background:#12122a;color:#eee;font-size:13px;font-weight:600;cursor:pointer;transition:all .1s}
.btn:active{transform:scale(.97);background:#1a1a3a}
.btn.primary{background:linear-gradient(135deg,#4a1a8a,#7c3aed);border-color:#7c3aed;color:#fff}

/* swipe guide */
.guide{display:grid;grid-template-columns:repeat(3,1fr);width:80px;margin:.5rem auto;gap:2px;opacity:.35}
.guide-btn{aspect-ratio:1;background:#2a2a4a;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px}

/* overlay */
.overlay{position:absolute;inset:0;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,20,.88);backdrop-filter:blur(4px);z-index:10;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:26px;font-weight:800;margin-bottom:.5rem}
.overlay .sub{font-size:13px;color:#9a9ab0;margin-bottom:1rem}
.overlay .score-big{font-size:36px;font-weight:800;color:#f5c842;margin-bottom:1rem}

/* toast */
.toast{position:fixed;bottom:calc(1.5rem + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:#1a1a3a;border:.5px solid #5555cc;border-radius:10px;padding:.5rem 1.2rem;font-size:13px;color:#c4b5fd;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1}

/* info */
.info{font-size:12px;color:#444;text-align:center;margin-top:auto;padding-top:.5rem}

/* 防長按 */
canvas,img,.board,.cell{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
</style></head>
<body><div class="app">

<div class="topbar">
  <button class="back-btn" onclick="goBack()">← 大廳</button>
  <h1>🔢 2048</h1>
</div>

<div class="score-row">
  <div class="score-box">
    <div class="lbl">分數</div>
    <div class="val" id="score">0</div>
  </div>
  <div class="score-box best">
    <div class="lbl">最高</div>
    <div class="val" id="best">0</div>
  </div>
  <div class="score-box">
    <div class="lbl">目標</div>
    <div class="val" style="color:#f5c842">2048</div>
  </div>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
  <div class="overlay" id="overlay-win">
    <h2 style="color:#f5c842">🏆 達成 2048！</h2>
    <div class="sub">繼續挑戰更高！</div>
    <div class="score-big" id="win-score"></div>
    <button class="btn primary" onclick="continueGame()" style="width:140px">繼續挑戰</button>
    <button class="btn" onclick="newGame()" style="width:140px;margin-top:8px">重新開始</button>
  </div>
  <div class="overlay" id="overlay-over">
    <h2 style="color:#f87171">😵 沒路走了</h2>
    <div class="sub">最終分數</div>
    <div class="score-big" id="over-score"></div>
    <button class="btn primary" onclick="newGame()" style="width:140px">再來一局</button>
    <button class="btn" onclick="goBack()" style="width:140px;margin-top:8px">回大廳</button>
  </div>
</div>

<div class="btn-row">
  <button class="btn" onclick="newGame()">🔄 重新開始</button>
  <button class="btn" onclick="undo()">↩️ 悔一步</button>
</div>

<div class="guide">
  <div></div><div class="guide-btn">↑</div><div></div>
  <div class="guide-btn">←</div><div class="guide-btn" style="background:#3a3a5a">滑動</div><div class="guide-btn">→</div>
  <div></div><div class="guide-btn">↓</div><div></div>
</div>

<div class="info">鍵盤方向鍵 / WASD / 滑動操作</div>
<div class="toast" id="toast"></div>
</div>

<script>
const LS_BEST = 'game_2048_best';
const LS_PENDING = 'game_pending_score';

let grid = [], score = 0, bestScore = 0, won = false, continued = false;
let prevGrid = null, prevScore = 0;

// ── 初始化 ──────────────────────────────────────────
function newGame(){
  grid = Array.from({length:4}, () => Array(4).fill(0));
  score = 0; won = false; continued = false;
  prevGrid = null; prevScore = 0;
  hideOverlays();
  addTile(); addTile();
  render();
}

function addTile(){
  const empty = [];
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(!grid[r][c]) empty.push([r,c]);
  if(!empty.length) return false;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  grid[r][c] = Math.random()<.9 ? 2 : 4;
  return true;
}

// ── 移動邏輯 ─────────────────────────────────────────
function slide(row){
  // 過濾零
  let nums = row.filter(v=>v);
  let merged = [];
  let i = 0;
  while(i < nums.length){
    if(i+1 < nums.length && nums[i] === nums[i+1]){
      const val = nums[i]*2;
      merged.push({val, isNew:true});
      score += val;
      i += 2;
    } else {
      merged.push({val:nums[i], isNew:false});
      i++;
    }
  }
  return merged;
}

function move(dir){
  // dir: 0=left 1=right 2=up 3=down
  prevGrid = grid.map(r=>[...r]);
  prevScore = score;
  let moved = false;
  const mergedCells = new Set();

  for(let i=0;i<4;i++){
    let row, idxs;
    if(dir===0){      row=grid[i].slice();     idxs=[[i,0],[i,1],[i,2],[i,3]];}
    else if(dir===1){ row=[...grid[i]].reverse(); idxs=[[i,3],[i,2],[i,1],[i,0]];}
    else if(dir===2){ row=grid.map(r=>r[i]);   idxs=[[0,i],[1,i],[2,i],[3,i]];}
    else{             row=grid.map(r=>r[i]).reverse(); idxs=[[3,i],[2,i],[1,i],[0,i]];}

    const result = slide(row);
    const newRow = result.map(x=>x.val);

    for(let j=0;j<4;j++){
      const [r,c] = idxs[j];
      const newVal = newRow[j]||0;
      if(grid[r][c] !== newVal) moved = true;
      if(result[j]?.isNew) mergedCells.add(`${r},${c}`);
      grid[r][c] = newVal;
    }
  }
  return {moved, mergedCells};
}

function canMove(){
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    if(!grid[r][c]) return true;
    if(c<3 && grid[r][c]===grid[r][c+1]) return true;
    if(r<3 && grid[r][c]===grid[r+1][c]) return true;
  }
  return false;
}

function hasValue(v){ return grid.some(r=>r.some(c=>c===v)); }

// ── 操作入口 ─────────────────────────────────────────
function doMove(dir){
  const {moved, mergedCells} = move(dir);
  if(!moved) return;
  addTile();
  render(mergedCells);
  saveBest();

  if(!won && !continued && hasValue(2048)){
    won = true;
    document.getElementById('win-score').textContent = score.toLocaleString();
    document.getElementById('overlay-win').classList.add('show');
    saveScore();
  } else if(!canMove()){
    document.getElementById('over-score').textContent = score.toLocaleString();
    document.getElementById('overlay-over').classList.add('show');
    saveScore();
  }
}

function continueGame(){
  continued = true;
  hideOverlays();
  toast('繼續挑戰！目標 4096 🚀');
}

function undo(){
  if(!prevGrid){ toast('沒有可悔棋的步驟'); return; }
  grid = prevGrid.map(r=>[...r]);
  score = prevScore;
  prevGrid = null;
  hideOverlays();
  render();
  toast('↩️ 已悔一步');
}

// ── 渲染 ─────────────────────────────────────────────
const COLORS = {2:'t2',4:'t4',8:'t8',16:'t16',32:'t32',64:'t64',128:'t128',256:'t256',512:'t512',1024:'t1024',2048:'t2048'};
function tileClass(v){ return COLORS[v] || 't4096'; }

function render(mergedCells=new Set()){
  const board = document.getElementById('board');
  board.innerHTML = '';
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    const v = grid[r][c];
    const el = document.createElement('div');
    el.className = 'cell' + (v ? ' '+tileClass(v) : '');
    if(v){
      el.textContent = v >= 1000 ? (v>=10000?v:v) : v;
      if(mergedCells.has(`${r},${c}`)) el.classList.add('merge');
    }
    board.appendChild(el);
  }
  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('best').textContent = bestScore.toLocaleString();
}

function hideOverlays(){
  document.getElementById('overlay-win').classList.remove('show');
  document.getElementById('overlay-over').classList.remove('show');
}

// ── 儲存 ─────────────────────────────────────────────
function saveBest(){
  if(score > bestScore){
    bestScore = score;
    localStorage.setItem(LS_BEST, String(bestScore));
  }
}

function saveScore(){
  saveBest();
  const maxTile = Math.max(...grid.flat());
  try{
    const d = JSON.parse(localStorage.getItem('game_lobby_v2')||'{}');
    if(d.name){
      localStorage.setItem(LS_PENDING, JSON.stringify({
        game:'2048', score, detail:`最高方塊 ${maxTile}`
      }));
    }
  }catch(e){}
}

function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(()=>el.classList.remove('show'), 2000);
}

function goBack(){
  saveScore();
  window.location.href = '/';
}

// ── 鍵盤 ──────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  const map = {ArrowLeft:0,ArrowRight:1,ArrowUp:2,ArrowDown:3,a:0,d:1,w:2,s:3,A:0,D:1,W:2,S:3};
  if(map[e.key] !== undefined){ e.preventDefault(); doMove(map[e.key]); }
});

// ── 滑動 ──────────────────────────────────────────────
let tx=0, ty=0;
const board = document.getElementById('board');
board.addEventListener('touchstart', e=>{
  tx=e.touches[0].clientX; ty=e.touches[0].clientY;
},{passive:true});
board.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.max(Math.abs(dx),Math.abs(dy))<20) return;
  if(Math.abs(dx)>Math.abs(dy)) doMove(dx<0?0:1);
  else doMove(dy<0?2:3);
},{passive:true});

// ── 啟動 ──────────────────────────────────────────────
bestScore = parseInt(localStorage.getItem(LS_BEST)||'0');
newGame();
document.addEventListener('contextmenu',e=>e.preventDefault());
</script>
</body></html>
