<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🧩 MBTI 人格測驗</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0a0a1a;color:#eee;display:flex;justify-content:center;padding:1rem;min-height:100vh}
.app{width:100%;max-width:520px}
.btn{font-size:13px;padding:6px 16px;border-radius:8px;border:0.5px solid #444;background:transparent;color:#eee;cursor:pointer}
.btn:hover{background:#1a1a2e}.btn:active{transform:scale(0.97)}
.screen{display:none}.screen.active{display:block}

/* intro */
.intro-card{background:#12122a;border:0.5px solid #2a2a4a;border-radius:16px;padding:1.5rem;text-align:center;margin-bottom:.75rem}
.intro-icon{font-size:56px;margin-bottom:.5rem}
.intro-card h2{font-size:20px;font-weight:600;color:#a78bfa;margin-bottom:.5rem}
.intro-card p{font-size:13px;color:#9a9ab0;line-height:1.7}
.disclaimer{font-size:11px;color:#555;background:#0d0d1a;border:0.5px solid #222;border-radius:8px;padding:.5rem .75rem;margin-top:.75rem;line-height:1.6}
.big-btn{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#4a1a8a,#7c3aed);color:#fff;font-size:15px;font-weight:500;cursor:pointer;margin-top:.5rem}
.big-btn:active{transform:scale(0.98)}

/* progress */
.prog-bar-wrap{height:4px;background:#1a1a2e;border-radius:2px;margin-bottom:1rem;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:2px;transition:width .3s ease}
.q-num{font-size:12px;color:#6b6b8a;text-align:center;margin-bottom:.5rem}

/* question */
.q-card{background:#12122a;border:0.5px solid #2a2a4a;border-radius:14px;padding:1.2rem;margin-bottom:.75rem;text-align:center;min-height:90px;display:flex;align-items:center;justify-content:center}
.q-card p{font-size:16px;line-height:1.6;color:#eee}
.dim-tag{font-size:11px;color:#7c3aed;margin-bottom:.5rem;text-align:center}

/* choices */
.choice{width:100%;padding:14px 16px;margin-bottom:10px;border-radius:12px;border:1.5px solid #2a2a4a;background:#0d0d22;color:#ddd;font-size:14px;cursor:pointer;text-align:left;transition:all .15s;line-height:1.4}
.choice:hover{border-color:#7c3aed;background:#1a1a3a;transform:translateX(2px)}
.choice:active{transform:scale(0.98)}
.choice.picked-a{border-color:#a855f7;background:#1a0a3a;color:#e9d5ff}
.choice.picked-b{border-color:#60a5fa;background:#0a1a3a;color:#bfdbfe}

/* result */
.type-badge{font-size:48px;margin-bottom:.5rem;text-align:center}
.type-code{font-size:38px;font-weight:800;text-align:center;letter-spacing:4px;margin-bottom:.25rem}
.type-name{font-size:16px;text-align:center;color:#9a9ab0;margin-bottom:1rem}
.result-card{border-radius:14px;padding:1.2rem;margin-bottom:.75rem}
.result-card h3{font-size:13px;color:#9a9ab0;margin-bottom:.6rem}
.result-card p{font-size:14px;color:#ddd;line-height:1.7}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:.5rem}
.tag{font-size:12px;padding:3px 10px;border-radius:20px;border:0.5px solid;display:inline-block}
.tag.good{border-color:#22c55e44;background:#0a2a0a;color:#4ade80}
.tag.weak{border-color:#ef444444;background:#2a0a0a;color:#f87171}
.dim-bars{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem}
.dim-box{background:#12122a;border:0.5px solid #2a2a4a;border-radius:10px;padding:.6rem .75rem}
.dim-label{font-size:11px;color:#9a9ab0;margin-bottom:4px;display:flex;justify-content:space-between}
.dim-track{height:8px;background:#1a1a2e;border-radius:4px;overflow:hidden}
.dim-fill{height:100%;border-radius:4px;transition:width .8s ease}
</style></head><body>
<div class="app">
<button class="btn" style="margin-bottom:.5rem" onclick="window.location.href='/'">← 大廳</button>
<h1 style="font-size:21px;font-weight:500;text-align:center;margin-bottom:.75rem">🧩 MBTI 人格測驗</h1>

<!-- INTRO -->
<div class="screen active" id="screen-intro">
  <div class="intro-card">
    <div class="intro-icon">🧩</div>
    <h2>探索你的人格類型</h2>
    <p>共 20 道情境題，誠實選擇最符合你的答案。<br>沒有對錯，只有最真實的你。</p>
    <div class="disclaimer">⚠️ 純屬娛樂參考，結果不可作為任何心理診斷、學術研究或人事判斷之依據。正式 MBTI 測驗請洽專業機構。</div>
  </div>
  <button class="big-btn" onclick="startTest()">開始測驗 →</button>
</div>

<!-- QUESTION -->
<div class="screen" id="screen-q">
  <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
  <div class="q-num" id="q-num">題 1 / 20</div>
  <div class="dim-tag" id="dim-tag"></div>
  <div class="q-card"><p id="q-text"></p></div>
  <button class="choice" id="choice-a" onclick="pick(0)"></button>
  <button class="choice" id="choice-b" onclick="pick(1)"></button>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div id="type-badge" class="type-badge"></div>
  <div id="type-code" class="type-code"></div>
  <div id="type-name" class="type-name"></div>
  <div class="dim-bars" id="dim-bars"></div>
  <div class="result-card" id="result-desc-card" style="background:#12122a;border:0.5px solid #2a2a4a">
    <h3>人格特質</h3>
    <p id="result-desc"></p>
  </div>
  <div class="result-card" id="result-str-card" style="background:#0a1a0a;border:0.5px solid #1a3a1a">
    <h3>✅ 優勢</h3>
    <div class="tag-row" id="str-tags"></div>
  </div>
  <div class="result-card" id="result-weak-card" style="background:#1a0a0a;border:0.5px solid #3a1a1a">
    <h3>⚠️ 成長空間</h3>
    <div class="tag-row" id="weak-tags"></div>
  </div>
  <div class="result-card" style="background:#0d0d22;border:0.5px solid #222">
    <h3>代表人物</h3>
    <p id="result-famous" style="font-size:13px;color:#9a9ab0"></p>
  </div>
  <div class="disclaimer" style="margin-bottom:.75rem">⚠️ 本測驗純屬娛樂，不可作為任何診斷、評估或人事依據。</div>
  <button class="big-btn" onclick="restartTest()">再測一次</button>
  <div style="display:flex;gap:8px;justify-content:center;margin-top:.5rem">
    <button class="btn" onclick="shareResult()">📋 複製結果</button>
    <button class="btn" onclick="window.location.href='/'">← 大廳</button>
  </div>
</div>

<script>

const TYPES={

    str:['領袖魅力','深厚同理心','善於溝通','激勵他人'],
    weak:['過於敏感批評','難以拒絕','自我犧牲','情緒承擔過多'],
    famous:'歐普拉、歐巴馬、甘地'},
  ENFP:{name:'競選者',icon:'✨',color:'#f97316',
    desc:'充滿熱情的自由靈魂。精力充沛，想像力豐富，善於找到各種可能性，能輕易感染周圍的人，讓生活充滿色彩。',

const DIM_NAMES={E:'外向',I:'內向',S:'實感',N:'直覺',T:'思考',F:'情感',J:'判斷',P:'感知'};
let curQ=0, answers=[], scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};

function startTest(){
  curQ=0; answers=[]; scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  showQ();
  document.getElementById('screen-intro').classList.remove('active');
  document.getElementById('screen-q').classList.add('active');
}

function showQ(){
  const q=QUESTIONS[curQ];
  const pct=Math.round(curQ/QUESTIONS.length*100);
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('q-num').textContent='題 '+(curQ+1)+' / '+QUESTIONS.length;
  const dims={EI:'外向 vs 內向',SN:'實感 vs 直覺',TF:'思考 vs 情感',JP:'判斷 vs 感知'};
  document.getElementById('dim-tag').textContent=dims[q.dim];
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('choice-a').textContent='A　'+q.a[0];
  document.getElementById('choice-b').textContent='B　'+q.a[1];
  document.getElementById('choice-a').className='choice';
  document.getElementById('choice-b').className='choice';
}

function pick(choice){
  const q=QUESTIONS[curQ];
  const [d1,d2]=q.dim.split('');
  if(choice===0){scores[d1]++;document.getElementById('choice-a').classList.add('picked-a');}
  else{scores[d2]++;document.getElementById('choice-b').classList.add('picked-b');}
  answers.push(choice);
  setTimeout(()=>{
    curQ++;
    if(curQ>=QUESTIONS.length) showResult();
    else showQ();
  },300);
}

function showResult(){
  document.getElementById('screen-q').classList.remove('active');
  document.getElementById('screen-result').classList.add('active');
  const type=(scores.E>=scores.I?'E':'I')+(scores.S>=scores.N?'S':'N')+(scores.T>=scores.F?'T':'F')+(scores.J>=scores.P?'J':'P');
  const t=TYPES[type];
  document.getElementById('type-badge').textContent=t.icon;
  document.getElementById('type-code').textContent=type;
  document.getElementById('type-code').style.color=t.color;
  document.getElementById('type-name').textContent=t.name;
  // dim bars
  const dims=[['EI','E','I'],['SN','S','N'],['TF','T','F'],['JP','J','P']];
  const barColors=['#7c3aed','#0ea5e9','#10b981','#f59e0b'];
  document.getElementById('dim-bars').innerHTML=dims.map(([d,a,b],i)=>{
    const sa=scores[a], sb=scores[b], total=sa+sb||1;
    const pct=Math.round(sa/total*100);
    const winner=sa>=sb?a:b;
    return `<div class="dim-box">
      <div class="dim-label"><span>${DIM_NAMES[a]}</span><span>${DIM_NAMES[b]}</span></div>
      <div class="dim-label" style="margin-top:2px"><span style="color:${barColors[i]};font-weight:600">${winner}</span><span>${sa}/${sb}</span></div>
      <div class="dim-track"><div class="dim-fill" style="width:${pct}%;background:${barColors[i]}"></div></div>
    </div>`;
  }).join('');
  document.getElementById('result-desc').textContent=t.desc;
  document.getElementById('str-tags').innerHTML=t.str.map(s=>`<span class="tag good">${s}</span>`).join('');
  document.getElementById('weak-tags').innerHTML=t.weak.map(s=>`<span class="tag weak">${s}</span>`).join('');
  document.getElementById('result-famous').textContent=t.famous;

// 儲存到 localStorage（僅本機，不上傳）
try {
  const d = JSON.parse(localStorage.getItem('game_lobby_v2') || '{}');
  if (!d.self) d.self = {};
  d.self.mbti = { type, name: t.name, icon: t.icon, date: new Date().toLocaleDateString('zh-TW') };
  localStorage.setItem('game_lobby_v2', JSON.stringify(d));
} catch(e) {}
}

function shareResult(){
  const type=(scores.E>=scores.I?'E':'I')+(scores.S>=scores.N?'S':'N')+(scores.T>=scores.F?'T':'F')+(scores.J>=scores.P?'J':'P');
  const t=TYPES[type];
  const txt=`我的 MBTI 人格類型是 ${type} ${t.name} ${t.icon}\n測出來的分析：${t.desc.slice(0,40)}...\n快來測測你的！`;
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>alert('已複製到剪貼簿！'));}
}

function restartTest(){
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-intro').classList.add('active');
}
</script>
</body></html>
