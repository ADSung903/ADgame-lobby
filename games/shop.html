<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>🎲 24H 迷你店長</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060610;--bg2:#0d0d1e;--bg3:#12122a;--border:#1e1e3a;--accent:#7c3aed;--gold:#f59e0b;--text:#eee;--sub:#9a9ab0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;justify-content:center}
.app{width:100%;max-width:420px;display:flex;flex-direction:column;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom,12px)}

/* topbar — fixed safe-area */
.topbar{display:flex;align-items:center;padding-top:calc(.6rem + env(safe-area-inset-top,0px));padding-right:.75rem;padding-bottom:.6rem;padding-left:.75rem;gap:.5rem;border-bottom:.5px solid var(--border);flex-shrink:0}
.back-btn{font-size:12px;padding:4px 10px;border-radius:8px;border:.5px solid #333;background:transparent;color:#aaa;cursor:pointer}
.game-title{font-size:16px;font-weight:700;color:var(--accent);flex:1;text-align:center}
.save-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}

/* hero */
.hero{padding:.75rem .75rem .5rem;text-align:center;background:linear-gradient(180deg,#0d0020 0%,var(--bg) 100%);flex-shrink:0}
.money-lbl{font-size:11px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.money-val{font-size:36px;font-weight:900;color:var(--gold);line-height:1;letter-spacing:-1px}
.cps-row{display:flex;justify-content:center;gap:1rem;margin-top:.35rem}
.cps-item{font-size:11px;color:var(--sub)}
.cps-item span{color:var(--text);font-weight:600}
.prestige-row{display:none;justify-content:center;flex-wrap:wrap;gap:.4rem;margin-top:.4rem}
.pbadge{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700}
.pb-prestige{background:#1a0a30;border:.5px solid var(--accent);color:var(--accent)}
.pb-token{background:#1a1200;border:.5px solid var(--gold);color:var(--gold)}
.pb-mult{background:#0a1a0a;border:.5px solid #4ade80;color:#4ade80}

/* prestige button + progress */
.prestige-area{padding:.35rem .75rem;flex-shrink:0}
.pp-wrap{margin-bottom:.3rem}
.pp-bar{height:5px;background:#0d0d1e;border:.5px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:.22rem}
.pp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:3px;transition:width .6s;width:0%}
.pp-txt{font-size:10px;color:var(--sub);text-align:center}
.prestige-btn{display:none;width:100%;padding:.65rem;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,var(--gold));color:#fff;font-size:13px;font-weight:700;cursor:pointer;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}50%{box-shadow:0 0 0 8px rgba(245,158,11,0)}}
.shop-section-hdr{font-size:11px;color:var(--gold);letter-spacing:.5px;padding:.55rem .2rem .2rem;margin-top:.25rem;border-top:.5px solid var(--border)}
.shop-locked{font-size:12px;color:var(--sub);text-align:center;padding:.9rem;background:var(--bg3);border:.5px solid var(--border);border-radius:10px;margin-top:.3rem;line-height:1.7}

/* click */
.click-area{padding:.35rem .75rem;flex-shrink:0}
.click-btn{width:100%;padding:.85rem;border-radius:14px;border:none;background:linear-gradient(135deg,#3a0a7a,var(--accent));color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:transform .08s;user-select:none;-webkit-user-select:none}
.click-btn:active{transform:scale(.97)}
.click-btn .sub{font-size:11px;font-weight:400;opacity:.7;display:block;margin-top:1px}
.float-num{position:fixed;font-size:16px;font-weight:800;color:var(--gold);pointer-events:none;z-index:100;text-shadow:0 0 8px #f59e0b88;animation:floatUp .7s ease forwards}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-55px);opacity:0}}

/* tabs */
.tabs{display:flex;border-bottom:.5px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:.45rem .25rem;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--sub);border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* shop */
.shop-scroll{flex:1;overflow-y:auto;padding:.5rem .75rem}
.shop-scroll::-webkit-scrollbar{width:3px}
.shop-scroll::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}
.upgrade-card{background:var(--bg3);border:.5px solid var(--border);border-radius:12px;padding:.7rem;margin-bottom:.45rem;display:flex;align-items:center;gap:.65rem;transition:border-color .15s;cursor:default}
.upgrade-card.affordable{border-color:#3a2a6a;cursor:pointer}
.upgrade-card.affordable:hover{border-color:var(--accent);background:#14143a}
.upgrade-card.affordable:active{transform:scale(.99)}
.upgrade-card.maxed{opacity:.45}
.uc-icon{font-size:26px;width:34px;text-align:center;flex-shrink:0}
.uc-body{flex:1;min-width:0}
.uc-name{font-size:13px;font-weight:600;margin-bottom:1px;display:flex;align-items:center;gap:4px}
.uc-lvl{font-size:10px;padding:1px 5px;border-radius:8px;background:#1a1a3a;color:var(--sub)}
.uc-desc{font-size:11px;color:var(--sub)}
.uc-right{text-align:right;flex-shrink:0}
.uc-cost{font-size:12px;font-weight:700;color:var(--gold)}
.uc-cps{font-size:10px;color:#4ade80}
.buy-btn{margin-top:3px;font-size:11px;padding:3px 10px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:600}
.buy-btn:disabled{background:#2a2a4a;color:#555;cursor:default}
.progress-bar{height:3px;background:#1a1a2e;border-radius:2px;margin-top:.35rem;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}

/* stats */
.page-scroll{flex:1;overflow-y:auto;padding:.75rem}
.stat-section{margin-bottom:1rem}
.stat-section h3{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.45rem}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:.38rem 0;border-bottom:.5px solid #0d0d1e}
.stat-row .sn{font-size:13px;color:var(--sub)}
.stat-row .sv{font-size:13px;font-weight:600;color:var(--text)}
.offline-box{background:#0a1a0a;border:.5px solid #1a3a1a;border-radius:10px;padding:.65rem;text-align:center;margin-bottom:.6rem}
.offline-box .earn{font-size:20px;font-weight:800;color:#4ade80}
.offline-box .desc{font-size:12px;color:var(--sub);margin-top:.15rem}
.action-btn{width:100%;padding:8px;border-radius:8px;font-size:12px;cursor:pointer;margin-top:.4rem}
.submit-btn{border:.5px solid #2a4a2a;background:transparent;color:#4ade80}
.reset-btn{border:.5px solid #3a1a1a;background:transparent;color:#f87171}

/* Forbes leaderboard */
.lb-subtabs{display:flex;gap:5px;margin-bottom:.6rem;flex-wrap:wrap}
.lb-stab{font-size:11px;padding:4px 12px;border-radius:16px;border:.5px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;transition:all .15s}
.lb-stab.active{background:#1a1a3a;border-color:var(--accent);color:#fff}
.week-info{font-size:11px;color:var(--sub);text-align:center;margin-bottom:.45rem;min-height:16px}
.lb-box{background:var(--bg3);border:.5px solid var(--border);border-radius:12px;overflow:hidden}
.lb-row{display:flex;align-items:center;gap:7px;padding:.5rem .7rem;border-bottom:.5px solid #0d0d1e}
.lb-row:last-child{border:none}
.lb-row.me{background:#1a1a2e}
.lb-rank{font-size:13px;width:22px;text-align:center;flex-shrink:0}
.lb-arrow{font-size:10px;width:14px;text-align:center;flex-shrink:0}
.lb-arrow.up{color:#4ade80}.lb-arrow.dn{color:#f87171}.lb-arrow.eq{color:var(--sub)}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-tag{font-size:10px;color:var(--sub)}
.lb-score{font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap;text-align:right}
.lb-date{font-size:10px;color:var(--sub);text-align:right}
.lb-empty{text-align:center;padding:1.5rem;color:var(--sub);font-size:13px;line-height:1.8}

/* milestone / offline modals */
.ms-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:49;display:none}
.milestone{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,0,30,.97);border:1px solid var(--accent);border-radius:18px;padding:1.4rem 1.6rem;text-align:center;z-index:50;display:none;max-width:300px;width:90%;box-shadow:0 0 32px rgba(124,58,237,.35)}
.milestone h3{color:var(--gold);font-size:18px;margin-bottom:.4rem}
.milestone p{font-size:12px;color:var(--sub);margin-bottom:.85rem;white-space:pre-line;line-height:1.7}
.milestone .ms-btns{display:flex;gap:8px;justify-content:center}
.milestone .ms-btns button{flex:1;padding:8px 10px;border-radius:9px;border:none;font-size:12px;font-weight:600;cursor:pointer}
.milestone .ms-skip{background:#1a1a3a;color:var(--sub)}
.milestone .ms-ok{background:var(--accent);color:#fff}
.offline-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:80;padding:1rem;display:none}
.offline-card{background:#0d0d22;border:1px solid var(--accent);border-radius:20px;padding:1.4rem;text-align:center;width:100%;max-width:300px}
.offline-card .icon{font-size:44px;margin-bottom:.4rem}
.offline-card h2{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:.25rem}
.offline-card .earn2{font-size:28px;font-weight:900;color:#4ade80;margin:.4rem 0}
.offline-card .sub2{font-size:11px;color:var(--sub);margin-bottom:.9rem}
.offline-card button{padding:9px 24px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--gold));color:#fff;font-size:13px;font-weight:700;cursor:pointer}
</style>
</head><body><div class="app">

<div class="topbar">
  <button class="back-btn" onclick="goBack()">← 大廳</button>

  <div class="save-dot" id="save-dot"></div>
</div>

</div>

<div class="prestige-area">

</div>

<div id="tab-forbes" class="page-scroll" style="display:none">

    <button class="ms-ok"   id="ms-ok-btn" onclick="closeMilestone()">確定</button>

</div>

// 轉生門檻：P3-P14 ×2、P15-P49 ×5、P50-P99 ×10、P100+ ×20
function prestigeThreshold(){
  const P=state.prestige;
  if(P===0)return 1e8;
  if(P===1)return 5e8;
  if(P===2)return 2e9;
  if(P<15) return 2e9*Math.pow(2,P-2);          // 4B→8.19T
  if(P<50) return 8e12*Math.pow(5,P-14);         // P15=40T...
  if(P<100)return 8e12*Math.pow(5,35)*Math.pow(10,P-49); // P50+
  return 8e12*Math.pow(5,35)*Math.pow(10,50)*Math.pow(20,P-99);
}

function weekKey(){
  const d=new Date(),j=new Date(d.getFullYear(),0,4);
  return d.getFullYear()+'-W'+String(Math.ceil((((d-j)/864e5)+j.getDay()+1)/7)).padStart(2,'0');
}
function daysToSun(){const d=new Date().getDay();return d===0?7:7-d;}

function upgradeCost(u){return Math.floor(u.base_cost*Math.pow(RATE,state.counts[u.id]||0));}
function mult(){return 1+2*state.prestige;}
function totalCps(){return allUpgrades().reduce((s,u)=>s+u.cps*(state.counts[u.id]||0),0)*mult();}
function clickPow(){const u=UPGRADES[0];return(1+u.click_boost*(state.counts[u.id]||0))*mult();}

function industryTag(){
  const all=allUpgrades();
  let top=all[0];
  all.forEach(u=>{if((state.counts[u.id]||0)>(state.counts[top.id]||0))top=u;});
  return (state.counts[top.id]||0)>0?INDUSTRY_TAGS[top.id]:'新晉店長';
}

function tierLocked(u){
  if(UPGRADES_P3.includes(u))  return state.prestige<3;
  if(UPGRADES_P15.includes(u)) return state.prestige<15;
  if(UPGRADES_P50.includes(u)) return state.prestige<50;
  if(UPGRADES_P100.includes(u))return state.prestige<100;
  return false;
}
function buyUpgrade(id){
  const u=allUpgrades().find(x=>x.id===id);
  if(!u||tierLocked(u))return;
  if((state.counts[u.id]||0)>=u.max)return;
  const cost=upgradeCost(u);
  if(state.money<cost)return;
  state.money-=cost; state.counts[u.id]=(state.counts[u.id]||0)+1;
  updateUI(); renderShop();
  toast(`✅ ${u.icon} ${u.name} Lv.${state.counts[u.id]}`);
}

function spawnFloat(text,x,y){

function fmt(n){
  if(n>=1e24)return(n/1e24).toFixed(2)+'Y';   // Yotta
  if(n>=1e21)return(n/1e21).toFixed(2)+'Z';   // Zetta
  if(n>=1e18)return(n/1e18).toFixed(2)+'E';   // Exa
  if(n>=1e15)return(n/1e15).toFixed(2)+'P';   // Peta
  if(n>=1e12)return(n/1e12).toFixed(2)+'T';
  if(n>=1e9) return(n/1e9).toFixed(2)+'B';
  if(n>=1e6) return(n/1e6).toFixed(2)+'M';
  if(n>=1e3) return(n/1e3).toFixed(1)+'K';
  return Math.floor(n).toLocaleString();
}
function fmtT(ms){
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  return h>0?h+'小時'+(m%60)+'分':m+'分'+(s%60)+'秒';
}

  document.getElementById('pp-txt').textContent=`轉生進度 $${fmt(state.money)} / $${fmt(threshold)} · ${pct.toFixed(0)}%`;

  document.querySelectorAll('.upgrade-card').forEach(card=>{
    const u=allUpgrades().find(x=>x.id===card.dataset.id);if(!u)return;
    const cnt=state.counts[u.id]||0,cost=upgradeCost(u);
    const can=state.money>=cost&&cnt<u.max&&!tierLocked(u),maxed=cnt>=u.max;

function withTimeout(p,ms=5000){
  return Promise.race([p,new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),ms))]);
}

// ── Firebase 寫入（只更新比現有更好的數值）────────────
async function fbWrite(path,val){
  try{
    const {ref,get,set}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    const db=await getFbDb();
    const r=ref(db,path);
    const snap=await withTimeout(get(r));
    const cur=snap.val();
    if(cur===null||val>cur) await set(r,val);
  }catch(e){console.warn('fbWrite',path,e);}
}

async function fbWriteEntry(category,name,data){
  try{
    const {ref,get,set}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    const db=await getFbDb();
    const key=encodeURIComponent(name).replace(/\./g,'_');
    const r=ref(db,`shop_lb/${category}/${key}`);
    const snap=await withTimeout(get(r));
    const cur=snap.val();
    const scoreKey=category==='prestige'?'count':category==='cps'?'cps':'amount';
    if(!cur||data[scoreKey]>(cur[scoreKey]||0)){
      await set(r,data);
    }
  }catch(e){console.warn('fbWriteEntry',category,e);}
}

async function fbReadCategory(category){
  try{
    const {ref,get}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    const db=await getFbDb();
    const snap=await withTimeout(get(ref(db,`shop_lb/${category}`)));
    if(!snap.exists())return[];
    return Object.values(snap.val());
  }catch(e){return[];}
}

function upsert(arr,key,val,extra){
  const e=arr.find(x=>x.name===extra.name);
  if(!e||val>e[key]){
    const entry={...extra,[key]:val};
    if(e)Object.assign(e,entry);else arr.push(entry);
  }
  arr.sort((a,b)=>b[key]-a[key]);
  if(arr.length>20)arr.length=20;
}

async function submitToLB(showToast=true){
  const name=playerName();
  if(!name){if(showToast)toast('⚠️ 請先在大廳設定名字');return;}
  const wk=weekKey();
  const meta={name,tag:industryTag(),prestige:state.prestige,date:new Date().toLocaleDateString('zh-TW')};

  // 寫 Firebase（4個榜）
  const weeklyData ={...meta,amount:state.weekly,   weekKey:wk};
  const alltimeData={...meta,amount:state.allTime};
  const cpsData    ={...meta,cps:state.peakCpsEver};
  const prestigeData={...meta,count:state.prestige};

  // weekly 特殊處理：需依 weekKey 區分（寫在不同路徑）
  try{
    const {ref,get,set}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    const db=await getFbDb();
    const key=encodeURIComponent(name).replace(/\./g,'_');
    // weekly：路徑含 weekKey，每週一個空間
    const wRef=ref(db,`shop_lb/weekly/${wk}/${key}`);
    const wSnap=await withTimeout(get(wRef));
    const wCur=wSnap.val();
    if(!wCur||state.weekly>(wCur.amount||0)) await set(wRef,weeklyData);
  }catch(e){console.warn('fbWeekly',e);}

  fbWriteEntry('alltime', name, alltimeData);
  fbWriteEntry('cps',     name, cpsData);
  fbWriteEntry('prestige',name, prestigeData);

  // 同步更新 prevRanks 到 localStorage（用於漲跌箭頭）
  const lb=loadLBLocal();
  if(!lb.prevRanks)lb.prevRanks={};
  if(!lb.prevRanks[name])lb.prevRanks[name]={};
  // 箭頭在下次 renderForbes 後更新
  saveLBLocal(lb);

  if(showToast)toast('✅ 已提交到富比士榜！');
}

      try{
        const {ref,get}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
        const db=await getFbDb();
        const wk=weekKey();
        const snap=await withTimeout(get(ref(db,`shop_lb/weekly/${wk}`)));
        entries=snap.exists()?Object.values(snap.val()):[];
      }catch(e){entries=[];}
      break;
    case 'alltime':
      scoreKey='amount'; fmtScore=v=>'$'+fmt(v);
      entries=await fbReadCategory('alltime');
      break;
    case 'cps':
      scoreKey='cps'; fmtScore=v=>'$'+fmt(v)+'/s';
      entries=await fbReadCategory('cps');
      break;
    case 'prestige':
      scoreKey='count'; fmtScore=v=>v+'次';
      entries=await fbReadCategory('prestige');
      break;
  }

  entries.sort((a,b)=>b[scoreKey]-a[scoreKey]);
  if(entries.length>20)entries.length=20;

  // 更新 prevRanks
  const lb=loadLBLocal();
  if(!lb.prevRanks)lb.prevRanks={};
  const prevRanksSnap={...lb.prevRanks};

  if(!entries.length){
    list.innerHTML='<div class="lb-empty">還沒有人提交成績<br>到「統計」頁點「提交成績」！🎮</div>';
    return;
  }

  // 寫入新排名
  entries.forEach((e,i)=>{
    if(!lb.prevRanks[e.name])lb.prevRanks[e.name]={};
    if(!lb.prevRanks[e.name][lbTab]) lb.prevRanks[e.name][lbTab]=i+1;
  });

  list.innerHTML=entries.map((e,i)=>{
    const isMe=e.name===pName;
    const prev=prevRanksSnap?.[e.name]?.[lbTab]??null;
    const cur=i+1;
    let arrow='',cls='eq';
    if(prev!==null&&prev!==cur){arrow=cur<prev?'▲':'▼';cls=cur<prev?'up':'dn';}
    else if(prev!==null)arrow='—';
    return`<div class="lb-row${isMe?' me':''}">
      <div class="lb-rank">${rankEmoji(i)}</div>
      <div class="lb-arrow ${cls}">${arrow}</div>
      <div class="lb-info">
        <div class="lb-name">${e.name}${isMe?' 👈':''}</div>
        <div class="lb-tag">${e.tag||'新晉店長'}${e.prestige>0?' · 🔄×'+e.prestige:''}</div>
      </div>
      <div>
        <div class="lb-score">${fmtScore(e[scoreKey])}</div>
        <div class="lb-date">${e.date||''}</div>
      </div>
    </div>`;
  }).join('');

  // 更新 prevRanks（下次對比用）
  entries.forEach((e,i)=>{ lb.prevRanks[e.name][lbTab]=i+1; });
  saveLBLocal(lb);
}

// ── 里程碑 ────────────────────────────────────────────
function checkMS(){
  while(msIdx<MILESTONES.length&&state.totalEarned>=MILESTONES[msIdx].v){
    showMS(MILESTONES[msIdx]);msIdx++;
  }
}
function showMS(ms,isForbes=false){
  document.getElementById('ms-title').textContent=ms.title;
  document.getElementById('ms-body').textContent=ms.body;
  const okBtn=document.getElementById('ms-ok-btn');
  if(isForbes){
    okBtn.textContent='📊 查看榜單 →';
    okBtn.onclick=()=>{closeMilestone();switchTab('forbes');};
  } else {
    okBtn.textContent='繼續加油！';
    okBtn.onclick=closeMilestone;
  }
  document.getElementById('ms-backdrop').style.display='block';
  document.getElementById('milestone').style.display='block';
}
function closeMilestone(){
  document.getElementById('milestone').style.display='none';
  document.getElementById('ms-backdrop').style.display='none';
}

// ── 富比士財富對比 ────────────────────────────────────
function checkForbes(){
  let last=null;
  while(state.forbesCrossed<BILLIONAIRES.length&&state.money>=BILLIONAIRES[state.forbesCrossed].t){
    last=BILLIONAIRES[state.forbesCrossed];
    state.forbesCrossed++;
  }
  if(last){
    const rank=BILLIONAIRES.length-state.forbesCrossed+1;
    showMS({
      title:`💰 超越 ${last.n}！`,
      body:`${last.s}\n$${last.usd}B USD・換算 NT$${fmt(last.t)}\n\n🏆 本榜富比士第 ${rank} 名！`
    }, true);
  }
}

function updateForbesRank(){
  const el=document.getElementById('fb-rank');
  const beaten=BILLIONAIRES.filter(f=>state.money>=f.t).length;
  if(beaten===0){el.style.display='none';return;}
  el.style.display='block';
  if(beaten>=BILLIONAIRES.length){
    el.textContent='🌍 富比士 #1・超越 Elon Musk！世界首富！';
  } else {
    const top=BILLIONAIRES[beaten-1],next=BILLIONAIRES[beaten];
    const rank=BILLIONAIRES.length-beaten+1;
    el.textContent=`📊 富比士第 ${rank} 名・超越 ${top.n}｜距 ${next.n} 還差 NT$${fmt(next.t-state.money)}`;
  }
}

// ── 股市帳戶（與 stock.html 共用 localStorage）────────
const LS_STOCK='shop24h_stock';
function getStockAccount(){try{return JSON.parse(localStorage.getItem(LS_STOCK)||'{"cash":0}');}catch(e){return{cash:0};}}
function saveStockAccount(sa){localStorage.setItem(LS_STOCK,JSON.stringify(sa));}

function transferToStock(){
  const input=document.getElementById('stock-amt');
  const M=parseFloat(input.value||0);
  if(!M||M<=0){toast('⚠️ 請輸入金額（M 為單位）');return;}
  const amt=Math.floor(M*1e6);
  if(amt>state.money){toast('⚠️ 店鋪餘額不足');return;}
  const sa=getStockAccount();
  sa.cash=(sa.cash||0)+amt;
  saveStockAccount(sa);
  state.money-=amt;
  input.value='';
  updateUI();renderStats();
  toast(`✅ 已匯 NT$${fmt(amt)} 進股市帳戶`);
}

function transferFromStock(){
  const sa=getStockAccount();
  if(!(sa.cash>0)){toast('⚠️ 股市帳戶餘額為零');return;}
  const amt=sa.cash;
  state.money+=amt;state.totalEarned+=amt;state.allTime+=amt;state.weekly+=amt;
  sa.cash=0;
  saveStockAccount(sa);
  updateUI();renderStats();
  toast(`✅ 已從股市匯回 NT$${fmt(amt)} 到店鋪`);
}

// ── 存檔 ──────────────────────────────────────────────
function save(){
  localStorage.setItem(LS_KEY,JSON.stringify({...state,lastSave:Date.now(),msIdx}));
  const dot=document.getElementById('save-dot');
  dot.style.background='#ffd700';setTimeout(()=>dot.style.background='#22c55e',300);
}

function load(){
  try{
    const raw=localStorage.getItem(LS_KEY);if(!raw)return;
    const d=JSON.parse(raw);
    Object.assign(state,d);
    msIdx=d.msIdx||0;
    // 遷移舊存檔
    if(!state.allTime)state.allTime=state.totalEarned||0;
    if(!state.peakCpsEver)state.peakCpsEver=state.peakCps||0;
    if(!state.weekly)state.weekly=0;
    if(!state.weekKey)state.weekKey='';
    // 遷移：補上所有新增 upgrade counts 和 forbesCrossed
    [...UPGRADES_P3,...UPGRADES_P15,...UPGRADES_P50,...UPGRADES_P100].forEach(u=>{
      if(state.counts[u.id]===undefined)state.counts[u.id]=0;
    });
    if(state.forbesCrossed===undefined)state.forbesCrossed=0;
    // 週重置
    const wk=weekKey();
    if(state.weekKey&&state.weekKey!==wk){state.weekly=0;state.weekKey=wk;}
    // 離線收益（最多8小時）
    const offSec=Math.min((Date.now()-state.lastSave)/1000,8*3600);
    const cps=totalCps();
    if(offSec>10&&cps>0){
      const earn=Math.floor(cps*offSec);
      state.money+=earn;state.totalEarned+=earn;state.allTime+=earn;state.weekly+=earn;
      document.getElementById('modal-earn').textContent='+$'+fmt(earn);
      document.getElementById('modal-desc').textContent=`離線 ${fmtT(offSec*1000)}，自動幫你賺了這些！`;
      document.getElementById('offline-modal').style.display='flex';
      document.getElementById('offline-earned').textContent='+$'+fmt(earn);
      document.getElementById('offline-earned-box').style.display='block';
    }
  }catch(e){}
}

function closeOfflineModal(){document.getElementById('offline-modal').style.display='none';}

function switchTab(tab){
  ['shop','stats','forbes'].forEach((t,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
  });
  if(tab==='stats')renderStats();
  if(tab==='forbes')renderForbes();
}

function confirmReset(){
  if(!confirm('確定要重置所有進度嗎？此操作無法復原！'))return;
  localStorage.removeItem(LS_KEY);location.reload();
}

function toast(msg){
  let el=document.getElementById('_toast');
  if(!el){
    el=document.createElement('div');el.id='_toast';
    el.style.cssText='position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:#1a1a3a;border:.5px solid #7c3aed;border-radius:10px;padding:.4rem 1rem;font-size:13px;color:#c4b5fd;opacity:0;transition:opacity .25s;pointer-events:none;z-index:60;white-space:nowrap;max-width:90vw;text-align:center';
    document.body.appendChild(el);
  }
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',2200);
}

function goBack(){
  submitToLB(false);save();
  const name=playerName();
  if(name){
    localStorage.setItem('game_pending_score',JSON.stringify({
      game:'shop',
      score:state.prestige,
      detail:`身家 $${fmt(state.allTime)}・${industryTag()}`
    }));
  }
  window.location.href='../';
}

setInterval(()=>{
  const cps=totalCps();
  if(cps>0){
    state.money+=cps;state.totalEarned+=cps;state.allTime+=cps;state.weekly+=cps;
    if(cps>state.peakCps)state.peakCps=cps;
    if(cps>state.peakCpsEver)state.peakCpsEver=cps;
    updateUI();checkMS();checkForbes();
  }
},1000);

setInterval(save,30000);

document.addEventListener('contextmenu',e=>e.preventDefault());
load();
renderShop();
updateUI();
checkMS();checkForbes();
if(state.prestige>0)document.getElementById('prestige-row').style.display='flex';
</script>
</body></html>
