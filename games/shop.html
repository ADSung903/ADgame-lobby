<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>🎲 24H 迷你店長</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060610;--bg2:#0d0d1e;--bg3:#12122a;--border:#1e1e3a;--accent:#7c3aed;--gold:#f59e0b;--text:#eee;--sub:#9a9ab0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;justify-content:center}
.app{width:100%;max-width:420px;display:flex;flex-direction:column;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom,12px)}

/* topbar */
.topbar{display:flex;align-items:center;padding:calc(.6rem .75rem; + env(safe-area-inset-top,0px));gap:.5rem;border-bottom:.5px solid var(--border);flex-shrink:0}
.back-btn{font-size:12px;padding:4px 10px;border-radius:8px;border:.5px solid #333;background:transparent;color:#aaa;cursor:pointer}
.game-title{font-size:16px;font-weight:700;color:var(--accent);flex:1;text-align:center}
.save-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}

/* 主資產顯示 */
.hero{padding:1rem .75rem .6rem;text-align:center;background:linear-gradient(180deg,#0d0020 0%,var(--bg) 100%);flex-shrink:0}
.money-lbl{font-size:11px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.money-val{font-size:38px;font-weight:900;color:var(--gold);line-height:1;letter-spacing:-1px}
.cps-row{display:flex;justify-content:center;gap:1rem;margin-top:.4rem}
.cps-item{font-size:11px;color:var(--sub)}
.cps-item span{color:var(--text);font-weight:600}

/* 點擊按鈕 */
.click-area{padding:.6rem .75rem;flex-shrink:0}
.click-btn{width:100%;padding:1rem;border-radius:14px;border:none;background:linear-gradient(135deg,#3a0a7a,var(--accent));color:#fff;font-size:16px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;transition:transform .08s;user-select:none;-webkit-user-select:none;letter-spacing:.3px}
.click-btn:active{transform:scale(.97)}
.click-btn .sub{font-size:11px;font-weight:400;opacity:.7;display:block;margin-top:1px}

/* 浮動數字 */
.float-num{position:fixed;font-size:16px;font-weight:800;color:var(--gold);pointer-events:none;z-index:100;text-shadow:0 0 8px #f59e0b88;animation:floatUp .7s ease forwards}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-55px);opacity:0}}

/* 里程碑提示 */
.milestone{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,0,30,.95);border:1px solid var(--accent);border-radius:16px;padding:1.2rem 1.5rem;text-align:center;z-index:50;display:none;max-width:300px}
.milestone h3{color:var(--gold);font-size:18px;margin-bottom:.4rem}
.milestone p{font-size:13px;color:var(--sub);margin-bottom:.75rem}
.milestone button{padding:8px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer}

/* tabs */
.tabs{display:flex;border-bottom:.5px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:.5rem;font-size:12px;font-weight:600;text-align:center;cursor:pointer;color:var(--sub);border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* 商店 */
.shop-scroll{flex:1;overflow-y:auto;padding:.5rem .75rem}
.shop-scroll::-webkit-scrollbar{width:3px}
.shop-scroll::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}

.upgrade-card{background:var(--bg3);border:.5px solid var(--border);border-radius:12px;padding:.75rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.75rem;transition:border-color .15s}
.upgrade-card.affordable{border-color:#3a2a6a;cursor:pointer}
.upgrade-card.affordable:hover{border-color:var(--accent);background:#14143a}
.upgrade-card.affordable:active{transform:scale(.99)}
.upgrade-card.maxed{opacity:.45}
.uc-icon{font-size:28px;width:36px;text-align:center;flex-shrink:0}
.uc-body{flex:1;min-width:0}
.uc-name{font-size:13px;font-weight:600;margin-bottom:1px;display:flex;align-items:center;gap:4px}
.uc-lvl{font-size:10px;padding:1px 6px;border-radius:10px;background:#1a1a3a;color:var(--sub)}
.uc-desc{font-size:11px;color:var(--sub)}
.uc-right{text-align:right;flex-shrink:0}
.uc-cost{font-size:12px;font-weight:700;color:var(--gold)}
.uc-cps{font-size:10px;color:#4ade80}
.buy-btn{margin-top:3px;font-size:11px;padding:3px 10px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:600}
.buy-btn:disabled{background:#2a2a4a;color:#555;cursor:default}
.progress-bar{height:3px;background:#1a1a2e;border-radius:2px;margin-top:.4rem;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}

/* 統計頁 */
.stats-page{flex:1;overflow-y:auto;padding:.75rem}
.stat-section{margin-bottom:1rem}
.stat-section h3{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.5rem}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:.5px solid #0d0d1e}
.stat-row .name{font-size:13px;color:var(--sub)}
.stat-row .val{font-size:13px;font-weight:600;color:var(--text)}
.offline-box{background:#0a1a0a;border:.5px solid #1a3a1a;border-radius:10px;padding:.75rem;text-align:center;margin-bottom:.75rem}
.offline-box .earn{font-size:22px;font-weight:800;color:#4ade80}
.offline-box .desc{font-size:12px;color:var(--sub);margin-top:.2rem}
.reset-btn{width:100%;padding:8px;border-radius:8px;border:.5px solid #3a1a1a;background:transparent;color:#f87171;font-size:12px;cursor:pointer;margin-top:.5rem}

/* 離線收益彈窗 */
.offline-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:80;padding:1rem}
.offline-card{background:#0d0d22;border:1px solid var(--accent);border-radius:20px;padding:1.5rem;text-align:center;width:100%;max-width:320px}
.offline-card .icon{font-size:48px;margin-bottom:.5rem}
.offline-card h2{font-size:20px;font-weight:700;color:var(--gold);margin-bottom:.3rem}
.offline-card .earn2{font-size:32px;font-weight:900;color:#4ade80;margin:.5rem 0}
.offline-card .sub2{font-size:12px;color:var(--sub);margin-bottom:1rem}
.offline-card button{padding:10px 28px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--gold));color:#fff;font-size:14px;font-weight:700;cursor:pointer}

canvas,img{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
</style>
</head><body><div class="app">

<!-- TOPBAR -->
<div class="topbar">
  <button class="back-btn" onclick="goBack()">← 大廳</button>
  <div class="game-title">🎲 24H 迷你店長</div>
  <div class="save-dot" id="save-dot" title="自動儲存"></div>
</div>

<!-- 主資產 -->
<div class="hero">
  <div class="money-lbl">💰 桌遊館資產</div>
  <div class="money-val" id="money-val">$0</div>
  <div class="cps-row">
    <div class="cps-item">每秒: <span id="cps-val">$0</span></div>
    <div class="cps-item">點擊: <span id="click-val">+$1</span></div>
    <div class="cps-item">總計: <span id="total-val">$0</span></div>
  </div>
</div>

<!-- 點擊按鈕 -->
<div class="click-area">
  <button class="click-btn" id="click-btn" onclick="doClick(event)">
    🎲 招攬客人！
    <span class="sub" id="click-sub">點擊賺錢 +$1</span>
  </button>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('shop')">🏪 商店升級</div>
  <div class="tab" onclick="switchTab('stats')">📊 營運統計</div>
</div>

<!-- 商店頁 -->
<div id="tab-shop" class="shop-scroll"></div>

<!-- 統計頁 -->
<div id="tab-stats" class="stats-page" style="display:none">
  <div id="offline-earned-box" style="display:none" class="offline-box">
    <div class="earn" id="offline-earned">$0</div>
    <div class="desc">離線期間自動營收 🎉</div>
  </div>
  <div class="stat-section">
    <h3>📈 營運數據</h3>
    <div class="stat-row"><span class="name">累計收入</span><span class="val" id="stat-total">$0</span></div>
    <div class="stat-row"><span class="name">手動點擊次數</span><span class="val" id="stat-clicks">0</span></div>
    <div class="stat-row"><span class="name">遊戲進行時間</span><span class="val" id="stat-time">0分鐘</span></div>
    <div class="stat-row"><span class="name">最高每秒收益</span><span class="val" id="stat-peak">$0/s</span></div>
  </div>
  <div class="stat-section">
    <h3>🏆 升級進度</h3>
    <div id="stat-upgrades"></div>
  </div>
  <button class="reset-btn" onclick="confirmReset()">🗑️ 重置遊戲（確認後無法復原）</button>
</div>

<!-- 離線收益彈窗 -->
<div class="offline-modal" id="offline-modal" style="display:none">
  <div class="offline-card">
    <div class="icon">🌙</div>
    <h2>歡迎回來，店長！</h2>
    <div class="earn2" id="modal-earn">$0</div>
    <div class="sub2" id="modal-desc">離線期間，店鋪自動幫你賺錢了！</div>
    <button onclick="closeOfflineModal()">收下！繼續經營 💪</button>
  </div>
</div>

<!-- 里程碑 -->
<div class="milestone" id="milestone">
  <h3 id="ms-title">🎉</h3>
  <p id="ms-body"></p>
  <button onclick="closeMilestone()">繼續加油！</button>
</div>

<script>
// ── 遊戲資料定義 ──────────────────────────────────────
const UPGRADES = [
  {id:'click',   name:'升級招攬話術', icon:'📢', desc:'提升手動點擊收益',        base_cost:15,    click_boost:1, cps:0,    max:50, color:'#7c3aed'},
  {id:'intern',  name:'招募工讀生',   icon:'👨‍💼', desc:'每秒自動服務客人',        base_cost:100,   click_boost:0, cps:2,    max:50, color:'#0ea5e9'},
  {id:'table',   name:'升級自動桌',   icon:'🎯', desc:'自助桌機每秒帶來收益',    base_cost:500,   click_boost:0, cps:15,   max:40, color:'#10b981'},
  {id:'cafe',    name:'開設咖啡吧台', icon:'☕', desc:'飲料收益讓資產快速增加',  base_cost:2000,  click_boost:0, cps:60,   max:30, color:'#f59e0b'},
  {id:'vip',     name:'VIP 包廂',     icon:'👑', desc:'高端包廂帶來豐厚利潤',    base_cost:8000,  click_boost:0, cps:200,  max:25, color:'#ec4899'},
  {id:'branch',  name:'開設分店',     icon:'🏪', desc:'多點營運，收益倍增',      base_cost:35000, click_boost:0, cps:800,  max:20, color:'#f97316'},
  {id:'chain',   name:'加盟連鎖',     icon:'🌐', desc:'品牌授權，錢滾錢',        base_cost:150000,click_boost:0, cps:3000, max:15, color:'#6366f1'},
  {id:'empire',  name:'桌遊帝國',     icon:'🏰', desc:'稱霸全台！終極形態',      base_cost:800000,click_boost:0, cps:12000,max:10, color:'#f5c842'},
];

const MILESTONES = [
  {money:1000,    title:'🎉 首批客人！', body:'恭喜達成 $1,000！小店開始有人氣了！'},
  {money:10000,   title:'📈 生意興隆！', body:'$10,000！工讀生開始幫你賺錢了！'},
  {money:100000,  title:'🏆 小有名氣！', body:'$100,000！你的桌遊館在社群上火了！'},
  {money:1000000, title:'💎 百萬店長！', body:'$1,000,000！你已經是業界傳奇了！'},
  {money:10000000,title:'🌐 連鎖王者！', body:'$10,000,000！全台都是你的分店！'},
];

const LS_KEY = 'shop24h_save';
const RATE = 1.15;

// ── 遊戲狀態 ──────────────────────────────────────────
let state = {
  money: 0,
  totalEarned: 0,
  clicks: 0,
  peakCps: 0,
  startTime: Date.now(),
  counts: {},   // upgrade_id → count
  lastSave: Date.now(),
};

UPGRADES.forEach(u => state.counts[u.id] = 0);

// ── 計算 ──────────────────────────────────────────────
function upgradeCost(u){
  return Math.floor(u.base_cost * Math.pow(RATE, state.counts[u.id]));
}

function totalCps(){
  return UPGRADES.reduce((s,u) => s + u.cps * state.counts[u.id], 0);
}

function totalClickPower(){
  const base = UPGRADES.find(u=>u.id==='click');
  return 1 + base.click_boost * state.counts[base.id];
}

// ── 互動 ──────────────────────────────────────────────
function doClick(e){
  const earn = totalClickPower();
  state.money += earn;
  state.totalEarned += earn;
  state.clicks++;

  // 浮動數字
  const btn = document.getElementById('click-btn');
  const rect = btn.getBoundingClientRect();
  const cx = e ? e.clientX : rect.left + rect.width/2;
  const cy = e ? e.clientY : rect.top;
  spawnFloat('+$'+fmt(earn), cx, cy);

  updateUI();
  checkMilestones();
}

function buyUpgrade(id){
  const u = UPGRADES.find(x=>x.id===id);
  if(!u || state.counts[u.id] >= u.max) return;
  const cost = upgradeCost(u);
  if(state.money < cost) return;
  state.money -= cost;
  state.counts[u.id]++;
  updateUI();
  renderShop();
  toast(`✅ ${u.icon} ${u.name} Lv.${state.counts[u.id]}`);
}

// ── 浮動數字 ──────────────────────────────────────────
function spawnFloat(text, x, y){
  const el = document.createElement('div');
  el.className = 'float-num';
  el.textContent = text;
  el.style.left = x+'px';
  el.style.top = y+'px';
  el.style.transform = 'translateX(-50%)';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 800);
}

// ── 格式化 ────────────────────────────────────────────
function fmt(n){
  if(n >= 1e12) return (n/1e12).toFixed(2)+'T';
  if(n >= 1e9)  return (n/1e9).toFixed(2)+'B';
  if(n >= 1e6)  return (n/1e6).toFixed(2)+'M';
  if(n >= 1e3)  return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toLocaleString();
}

function fmtTime(ms){
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const h = Math.floor(m/60);
  if(h>0) return h+'小時'+( m%60)+'分';
  return m+'分'+( s%60)+'秒';
}

// ── UI 更新 ───────────────────────────────────────────
function updateUI(){
  const cps = totalCps();
  const cp = totalClickPower();
  if(cps > state.peakCps) state.peakCps = cps;

  document.getElementById('money-val').textContent = '$'+fmt(state.money);
  document.getElementById('cps-val').textContent = '$'+fmt(cps)+'/s';
  document.getElementById('click-val').textContent = '+$'+fmt(cp);
  document.getElementById('total-val').textContent = '$'+fmt(state.totalEarned);
  document.getElementById('click-sub').textContent = `點擊賺錢 +$${fmt(cp)}`;

  // 更新商店可購狀態
  document.querySelectorAll('.upgrade-card').forEach(card=>{
    const id = card.dataset.id;
    const u = UPGRADES.find(x=>x.id===id);
    if(!u) return;
    const cost = upgradeCost(u);
    const cnt = state.counts[u.id];
    const can = state.money >= cost && cnt < u.max;
    const maxed = cnt >= u.max;
    card.className = 'upgrade-card' + (can?' affordable':'') + (maxed?' maxed':'');
    const costEl = card.querySelector('.uc-cost');
    const btnEl = card.querySelector('.buy-btn');
    const progEl = card.querySelector('.progress-fill');
    if(costEl) costEl.textContent = maxed ? '滿級！' : '$'+fmt(cost);
    if(btnEl){ btnEl.disabled = !can; btnEl.textContent = maxed?'MAX':'購買'; }
    if(progEl) progEl.style.width = (cnt/u.max*100)+'%';
  });
}

// ── 商店渲染 ──────────────────────────────────────────
function renderShop(){
  const ctr = document.getElementById('tab-shop');
  ctr.innerHTML = UPGRADES.map(u=>{
    const cnt = state.counts[u.id];
    const cost = upgradeCost(u);
    const can = state.money >= cost && cnt < u.max;
    const maxed = cnt >= u.max;
    const desc2 = u.cps > 0 ? `+$${u.cps}/秒` : `+$${u.click_boost}/點擊`;
    return `<div class="upgrade-card${can?' affordable':''}${maxed?' maxed':''}" data-id="${u.id}" onclick="buyUpgrade('${u.id}')">
      <div class="uc-icon">${u.icon}</div>
      <div class="uc-body">
        <div class="uc-name">${u.name}<span class="uc-lvl">Lv.${cnt}/${u.max}</span></div>
        <div class="uc-desc">${u.desc}｜${desc2}（每級）</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${cnt/u.max*100}%;background:${u.color}"></div></div>
      </div>
      <div class="uc-right">
        <div class="uc-cost">${maxed?'滿級！':'$'+fmt(cost)}</div>
        <div class="uc-cps">${u.cps>0?'+$'+fmt(u.cps*cnt)+'/s':'+$'+fmt(u.click_boost*cnt)+'/點'}</div>
        <button class="buy-btn" ${(!can||maxed)?'disabled':''}>${maxed?'MAX':'購買'}</button>
      </div>
    </div>`;
  }).join('');
}

// ── 統計頁 ────────────────────────────────────────────
function renderStats(){
  document.getElementById('stat-total').textContent = '$'+fmt(state.totalEarned);
  document.getElementById('stat-clicks').textContent = state.clicks.toLocaleString();
  document.getElementById('stat-time').textContent = fmtTime(Date.now()-state.startTime);
  document.getElementById('stat-peak').textContent = '$'+fmt(state.peakCps)+'/s';

  const ctr = document.getElementById('stat-upgrades');
  ctr.innerHTML = UPGRADES.map(u=>{
    const cnt = state.counts[u.id];
    return `<div class="stat-row">
      <span class="name">${u.icon} ${u.name}</span>
      <span class="val" style="color:${u.color}">Lv.${cnt}/${u.max}</span>
    </div>`;
  }).join('');
}

// ── 里程碑 ────────────────────────────────────────────
let msIdx = 0;
function checkMilestones(){
  while(msIdx < MILESTONES.length && state.totalEarned >= MILESTONES[msIdx].money){
    showMilestone(MILESTONES[msIdx]);
    msIdx++;
  }
}

function showMilestone(ms){
  document.getElementById('ms-title').textContent = ms.title;
  document.getElementById('ms-body').textContent = ms.body;
  document.getElementById('milestone').style.display = 'block';
  setTimeout(closeMilestone, 3500);
}
function closeMilestone(){ document.getElementById('milestone').style.display='none'; }

// ── 存檔 ──────────────────────────────────────────────
function save(){
  const data = {
    ...state,
    lastSave: Date.now(),
    msIdx,
  };
  localStorage.setItem(LS_KEY, JSON.stringify(data));
  // 儲存指示閃一下
  const dot = document.getElementById('save-dot');
  dot.style.background='#ffd700';
  setTimeout(()=>dot.style.background='#22c55e',300);
}

function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    Object.assign(state, data);
    msIdx = data.msIdx||0;

    // 離線收益計算（最多8小時）
    const offlineSec = Math.min((Date.now()-state.lastSave)/1000, 8*3600);
    const cps = totalCps();
    if(offlineSec > 10 && cps > 0){
      const earn = Math.floor(cps * offlineSec);
      state.money += earn;
      state.totalEarned += earn;
      showOfflineModal(earn, offlineSec);
    }
  }catch(e){}
}

function showOfflineModal(earn, sec){
  document.getElementById('modal-earn').textContent = '+$'+fmt(earn);
  document.getElementById('modal-desc').textContent =
    `離線 ${fmtTime(sec*1000)}，店鋪自動幫你賺了這些！`;
  document.getElementById('offline-modal').style.display='flex';
  // 也顯示在統計頁
  document.getElementById('offline-earned').textContent = '+$'+fmt(earn);
  document.getElementById('offline-earned-box').style.display='block';
}

function closeOfflineModal(){
  document.getElementById('offline-modal').style.display='none';
}

// ── tab 切換 ──────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',
    (i===0&&tab==='shop')||(i===1&&tab==='stats')));
  document.getElementById('tab-shop').style.display = tab==='shop'?'block':'none';
  document.getElementById('tab-stats').style.display = tab==='stats'?'block':'none';
  if(tab==='stats') renderStats();
}

// ── 重置 ──────────────────────────────────────────────
function confirmReset(){
  if(!confirm('確定要重置所有進度嗎？此操作無法復原！')) return;
  localStorage.removeItem(LS_KEY);
  location.reload();
}

function toast(msg){
  let el = document.getElementById('_toast');
  if(!el){
    el = document.createElement('div');
    el.id='_toast';
    el.style.cssText='position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:#1a1a3a;border:.5px solid #7c3aed;border-radius:10px;padding:.4rem 1rem;font-size:13px;color:#c4b5fd;opacity:0;transition:opacity .25s;pointer-events:none;z-index:60;white-space:nowrap';
    document.body.appendChild(el);
  }
  el.textContent=msg; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>el.style.opacity='0',2000);
}

function goBack(){
  save();
  window.location.href='/';
}

// ── 遊戲主循環 ────────────────────────────────────────
setInterval(()=>{
  const cps = totalCps();
  if(cps > 0){
    state.money += cps;
    state.totalEarned += cps;
    if(cps > state.peakCps) state.peakCps = cps;
    updateUI();
    checkMilestones();
  }
}, 1000);

// 自動存檔每30秒
setInterval(save, 30000);

// ── 啟動 ──────────────────────────────────────────────
document.addEventListener('contextmenu',e=>e.preventDefault());
load();
renderShop();
updateUI();
checkMilestones();
</script>
