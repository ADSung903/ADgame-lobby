<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>🎲 24H 迷你店長</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060610;--bg2:#0d0d1e;--bg3:#12122a;--border:#1e1e3a;--accent:#7c3aed;--gold:#f59e0b;--text:#eee;--sub:#9a9ab0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;justify-content:center}
.app{width:100%;max-width:420px;display:flex;flex-direction:column;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom,12px)}

/* topbar — fixed safe-area */
.topbar{display:flex;align-items:center;padding-top:calc(.6rem + env(safe-area-inset-top,0px));padding-right:.75rem;padding-bottom:.6rem;padding-left:.75rem;gap:.5rem;border-bottom:.5px solid var(--border);flex-shrink:0}
.back-btn{font-size:12px;padding:4px 10px;border-radius:8px;border:.5px solid #333;background:transparent;color:#aaa;cursor:pointer}
.game-title{font-size:16px;font-weight:700;color:var(--accent);flex:1;text-align:center}
.save-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}

/* hero */
.hero{padding:.75rem .75rem .5rem;text-align:center;background:linear-gradient(180deg,#0d0020 0%,var(--bg) 100%);flex-shrink:0}
.money-lbl{font-size:11px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.money-val{font-size:36px;font-weight:900;color:var(--gold);line-height:1;letter-spacing:-1px}
.cps-row{display:flex;justify-content:center;gap:1rem;margin-top:.35rem}
.cps-item{font-size:11px;color:var(--sub)}
.cps-item span{color:var(--text);font-weight:600}
.prestige-row{display:none;justify-content:center;flex-wrap:wrap;gap:.4rem;margin-top:.4rem}
.pbadge{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700}
.pb-prestige{background:#1a0a30;border:.5px solid var(--accent);color:var(--accent)}
.pb-token{background:#1a1200;border:.5px solid var(--gold);color:var(--gold)}
.pb-mult{background:#0a1a0a;border:.5px solid #4ade80;color:#4ade80}

/* prestige button + progress */
.prestige-area{padding:.35rem .75rem;flex-shrink:0}
.pp-wrap{margin-bottom:.3rem}
.pp-bar{height:5px;background:#0d0d1e;border:.5px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:.22rem}
.pp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:3px;transition:width .6s;width:0%}
.pp-txt{font-size:10px;color:var(--sub);text-align:center}
.prestige-btn{display:none;width:100%;padding:.65rem;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,var(--gold));color:#fff;font-size:13px;font-weight:700;cursor:pointer;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}50%{box-shadow:0 0 0 8px rgba(245,158,11,0)}}
.shop-section-hdr{font-size:11px;color:var(--gold);letter-spacing:.5px;padding:.55rem .2rem .2rem;margin-top:.25rem;border-top:.5px solid var(--border)}
.shop-locked{font-size:12px;color:var(--sub);text-align:center;padding:.9rem;background:var(--bg3);border:.5px solid var(--border);border-radius:10px;margin-top:.3rem;line-height:1.7}

/* click */
.click-area{padding:.35rem .75rem;flex-shrink:0}
.click-btn{width:100%;padding:.85rem;border-radius:14px;border:none;background:linear-gradient(135deg,#3a0a7a,var(--accent));color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:transform .08s;user-select:none;-webkit-user-select:none}
.click-btn:active{transform:scale(.97)}
.click-btn .sub{font-size:11px;font-weight:400;opacity:.7;display:block;margin-top:1px}
.float-num{position:fixed;font-size:16px;font-weight:800;color:var(--gold);pointer-events:none;z-index:100;text-shadow:0 0 8px #f59e0b88;animation:floatUp .7s ease forwards}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-55px);opacity:0}}

/* tabs */
.tabs{display:flex;border-bottom:.5px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:.45rem .25rem;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--sub);border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* shop */
.shop-scroll{flex:1;overflow-y:auto;padding:.5rem .75rem}
.shop-scroll::-webkit-scrollbar{width:3px}
.shop-scroll::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}
.upgrade-card{background:var(--bg3);border:.5px solid var(--border);border-radius:12px;padding:.7rem;margin-bottom:.45rem;display:flex;align-items:center;gap:.65rem;transition:border-color .15s;cursor:default}
.upgrade-card.affordable{border-color:#3a2a6a;cursor:pointer}
.upgrade-card.affordable:hover{border-color:var(--accent);background:#14143a}
.upgrade-card.affordable:active{transform:scale(.99)}
.upgrade-card.maxed{opacity:.45}
.uc-icon{font-size:26px;width:34px;text-align:center;flex-shrink:0}
.uc-body{flex:1;min-width:0}
.uc-name{font-size:13px;font-weight:600;margin-bottom:1px;display:flex;align-items:center;gap:4px}
.uc-lvl{font-size:10px;padding:1px 5px;border-radius:8px;background:#1a1a3a;color:var(--sub)}
.uc-desc{font-size:11px;color:var(--sub)}
.uc-right{text-align:right;flex-shrink:0}
.uc-cost{font-size:12px;font-weight:700;color:var(--gold)}
.uc-cps{font-size:10px;color:#4ade80}
.buy-btn{margin-top:3px;font-size:11px;padding:3px 10px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:600}
.buy-btn:disabled{background:#2a2a4a;color:#555;cursor:default}
.progress-bar{height:3px;background:#1a1a2e;border-radius:2px;margin-top:.35rem;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}

/* stats */
.page-scroll{flex:1;overflow-y:auto;padding:.75rem}
.stat-section{margin-bottom:1rem}
.stat-section h3{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.45rem}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:.38rem 0;border-bottom:.5px solid #0d0d1e}
.stat-row .sn{font-size:13px;color:var(--sub)}
.stat-row .sv{font-size:13px;font-weight:600;color:var(--text)}
.offline-box{background:#0a1a0a;border:.5px solid #1a3a1a;border-radius:10px;padding:.65rem;text-align:center;margin-bottom:.6rem}
.offline-box .earn{font-size:20px;font-weight:800;color:#4ade80}
.offline-box .desc{font-size:12px;color:var(--sub);margin-top:.15rem}
.action-btn{width:100%;padding:8px;border-radius:8px;font-size:12px;cursor:pointer;margin-top:.4rem}
.submit-btn{border:.5px solid #2a4a2a;background:transparent;color:#4ade80}
.reset-btn{border:.5px solid #3a1a1a;background:transparent;color:#f87171}

/* Forbes leaderboard */
.lb-subtabs{display:flex;gap:5px;margin-bottom:.6rem;flex-wrap:wrap}
.lb-stab{font-size:11px;padding:4px 12px;border-radius:16px;border:.5px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;transition:all .15s}
.lb-stab.active{background:#1a1a3a;border-color:var(--accent);color:#fff}
.week-info{font-size:11px;color:var(--sub);text-align:center;margin-bottom:.45rem;min-height:16px}
.lb-box{background:var(--bg3);border:.5px solid var(--border);border-radius:12px;overflow:hidden}
.lb-row{display:flex;align-items:center;gap:7px;padding:.5rem .7rem;border-bottom:.5px solid #0d0d1e}
.lb-row:last-child{border:none}
.lb-row.me{background:#1a1a2e}
.lb-rank{font-size:13px;width:22px;text-align:center;flex-shrink:0}
.lb-arrow{font-size:10px;width:14px;text-align:center;flex-shrink:0}
.lb-arrow.up{color:#4ade80}.lb-arrow.dn{color:#f87171}.lb-arrow.eq{color:var(--sub)}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-tag{font-size:10px;color:var(--sub)}
.lb-score{font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap;text-align:right}
.lb-date{font-size:10px;color:var(--sub);text-align:right}
.lb-empty{text-align:center;padding:1.5rem;color:var(--sub);font-size:13px;line-height:1.8}

/* milestone / offline modals */
.milestone{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,0,30,.96);border:1px solid var(--accent);border-radius:16px;padding:1.2rem 1.5rem;text-align:center;z-index:50;display:none;max-width:300px;width:90%}
.milestone h3{color:var(--gold);font-size:17px;margin-bottom:.35rem}
.milestone p{font-size:12px;color:var(--sub);margin-bottom:.65rem;white-space:pre-line}
.milestone button{padding:7px 18px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.offline-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:80;padding:1rem;display:none}
.offline-card{background:#0d0d22;border:1px solid var(--accent);border-radius:20px;padding:1.4rem;text-align:center;width:100%;max-width:300px}
.offline-card .icon{font-size:44px;margin-bottom:.4rem}
.offline-card h2{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:.25rem}
.offline-card .earn2{font-size:28px;font-weight:900;color:#4ade80;margin:.4rem 0}
.offline-card .sub2{font-size:11px;color:var(--sub);margin-bottom:.9rem}
.offline-card button{padding:9px 24px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--gold));color:#fff;font-size:13px;font-weight:700;cursor:pointer}
</style>
</head><body><div class="app">

<div class="topbar">
  <button class="back-btn" onclick="goBack()">← 大廳</button>
  <div class="game-title">🎲 24H 迷你店長</div>
  <div class="save-dot" id="save-dot"></div>
</div>

<div class="hero">
  <div class="money-lbl">💰 桌遊館資產</div>
  <div class="money-val" id="money-val">$0</div>
  <div class="cps-row">
    <div class="cps-item">每秒: <span id="cps-val">$0</span></div>
    <div class="cps-item">點擊: <span id="click-val">+$1</span></div>
    <div class="cps-item">總計: <span id="total-val">$0</span></div>
  </div>
  <div class="prestige-row" id="prestige-row">
    <span class="pbadge pb-prestige" id="pb-prestige">🔄 轉生 0 次</span>
    <span class="pbadge pb-token" id="pb-token">🏅 0 枚代幣</span>
    <span class="pbadge pb-mult" id="pb-mult">×1 收益</span>
  </div>
</div>

<div class="prestige-area">
  <div class="pp-wrap">
    <div class="pp-bar"><div class="pp-fill" id="pp-fill"></div></div>
    <div class="pp-txt" id="pp-txt">轉生進度 $0 / $100M · 0%</div>
  </div>
  <button class="prestige-btn" id="prestige-btn" onclick="doPrestige()">
    ✨ 開設旗艦店（轉生）— 歸零換取黃金代幣，永久 +200% 收益
  </button>
</div>

<div class="click-area">
  <button class="click-btn" id="click-btn" onclick="doClick(event)">
    🎲 招攬客人！
    <span class="sub" id="click-sub">點擊賺錢 +$1</span>
  </button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('shop')">🏪 升級</div>
  <div class="tab" onclick="switchTab('stats')">📊 統計</div>
  <div class="tab" onclick="switchTab('forbes')">🏆 富比士</div>
</div>

<div id="tab-shop" class="shop-scroll"></div>

<div id="tab-stats" class="page-scroll" style="display:none">
  <div id="offline-earned-box" style="display:none" class="offline-box">
    <div class="earn" id="offline-earned">$0</div>
    <div class="desc">離線期間自動營收 🎉</div>
  </div>
  <div class="stat-section">
    <h3>📈 營運數據</h3>
    <div class="stat-row"><span class="sn">本輪累計</span><span class="sv" id="st-total">$0</span></div>
    <div class="stat-row"><span class="sn">歷代總身家</span><span class="sv" id="st-alltime">$0</span></div>
    <div class="stat-row"><span class="sn">本週收益</span><span class="sv" id="st-weekly">$0</span></div>
    <div class="stat-row"><span class="sn">手動點擊</span><span class="sv" id="st-clicks">0</span></div>
    <div class="stat-row"><span class="sn">遊戲時間</span><span class="sv" id="st-time">0分</span></div>
    <div class="stat-row"><span class="sn">史上最高$/s</span><span class="sv" id="st-peak">$0/s</span></div>
    <div class="stat-row"><span class="sn">轉生次數</span><span class="sv" id="st-prestige">0</span></div>
    <div class="stat-row"><span class="sn">黃金代幣</span><span class="sv" id="st-tokens">0</span></div>
    <div class="stat-row"><span class="sn">產業標籤</span><span class="sv" id="st-tag">—</span></div>
  </div>
  <div class="stat-section">
    <h3>🏆 升級進度</h3>
    <div id="st-upgrades"></div>
  </div>
  <button class="action-btn submit-btn" onclick="submitToLB(true)">📤 提交成績到富比士榜</button>
  <button class="action-btn reset-btn" onclick="confirmReset()">🗑️ 重置遊戲（無法復原）</button>
</div>

<div id="tab-forbes" class="page-scroll" style="display:none">
  <div class="lb-subtabs">
    <button class="lb-stab active" onclick="switchLBTab('weekly')">📅 週榜</button>
    <button class="lb-stab" onclick="switchLBTab('alltime')">💎 身家</button>
    <button class="lb-stab" onclick="switchLBTab('cps')">⚡ $/s</button>
    <button class="lb-stab" onclick="switchLBTab('prestige')">🔄 轉生</button>
  </div>
  <div class="week-info" id="week-info"></div>
  <div class="lb-box" id="lb-list"></div>
</div>

<div class="offline-modal" id="offline-modal">
  <div class="offline-card">
    <div class="icon">🌙</div>
    <h2>歡迎回來，店長！</h2>
    <div class="earn2" id="modal-earn">$0</div>
    <div class="sub2" id="modal-desc"></div>
    <button onclick="closeOfflineModal()">收下！繼續經營 💪</button>
  </div>
</div>

<div class="milestone" id="milestone">
  <h3 id="ms-title"></h3>
  <p id="ms-body"></p>
  <button onclick="closeMilestone()">繼續加油！</button>
</div>

<script>
const UPGRADES=[
  {id:'click',  name:'升級招攬話術',icon:'📢',desc:'提升手動點擊收益',  base_cost:15,    click_boost:1,cps:0,    max:50,color:'#7c3aed'},
  {id:'intern', name:'招募工讀生',  icon:'👨‍💼',desc:'每秒自動服務客人',  base_cost:100,   click_boost:0,cps:2,    max:50,color:'#0ea5e9'},
  {id:'table',  name:'升級自動桌', icon:'🎯',desc:'自助桌機每秒帶來收益',base_cost:500,   click_boost:0,cps:15,   max:40,color:'#10b981'},
  {id:'cafe',   name:'開設咖啡吧台',icon:'☕',desc:'飲料收益快速增加',   base_cost:2000,  click_boost:0,cps:60,   max:30,color:'#f59e0b'},
  {id:'vip',    name:'VIP 包廂',   icon:'👑',desc:'高端包廂豐厚利潤',    base_cost:8000,  click_boost:0,cps:200,  max:25,color:'#ec4899'},
  {id:'branch', name:'開設分店',   icon:'🏪',desc:'多點營運，收益倍增',  base_cost:35000, click_boost:0,cps:800,  max:20,color:'#f97316'},
  {id:'chain',  name:'加盟連鎖',   icon:'🌐',desc:'品牌授權，錢滾錢',    base_cost:150000,click_boost:0,cps:3000, max:15,color:'#6366f1'},
  {id:'empire', name:'桌遊帝國',   icon:'🏰',desc:'稱霸全台！終極形態',  base_cost:800000,click_boost:0,cps:12000,max:10,color:'#f5c842'},
];

// 轉生3次後解鎖的旗艦升級
const UPGRADES_P3=[
  {id:'resort',    name:'海外旗艦館', icon:'🏝️',desc:'全球連鎖旗艦，收益驚人',base_cost:5e6,  click_boost:0,cps:80000,  max:8,color:'#06b6d4'},
  {id:'franchise', name:'品牌授權金', icon:'💎', desc:'品牌價值化為被動收益', base_cost:3e7,  click_boost:0,cps:300000, max:5,color:'#f59e0b'},
  {id:'metaverse', name:'元宇宙桌遊', icon:'🪐', desc:'虛擬世界桌遊無限擴張', base_cost:1.5e8,click_boost:0,cps:1200000,max:3,color:'#8b5cf6'},
];

const INDUSTRY_TAGS={
  click:'口才大師',intern:'人力王',table:'自動先鋒',
  cafe:'餐飲帝國',vip:'尊榮館主',branch:'多點布局',
  chain:'加盟大亨',empire:'桌遊帝王',
  resort:'旗艦館主',franchise:'授權大亨',metaverse:'元宇宙王'
};

// 轉生門檻：1st $100M, 2nd $500M, 3rd $2B, 4th+ ×5
const PRESTIGE_THRESHOLDS=[1e8,5e8,2e9];
function prestigeThreshold(){
  if(state.prestige<PRESTIGE_THRESHOLDS.length)return PRESTIGE_THRESHOLDS[state.prestige];
  return PRESTIGE_THRESHOLDS[PRESTIGE_THRESHOLDS.length-1]*Math.pow(5,state.prestige-PRESTIGE_THRESHOLDS.length+1);
}

function allUpgrades(){return[...UPGRADES,...UPGRADES_P3];}

const MILESTONES=[
  {v:1000,    title:'🎉 首批客人！',  body:'達成 $1,000！小店開始有人氣了！'},
  {v:10000,   title:'📈 生意興隆！',  body:'$10,000！工讀生幫你賺錢了！'},
  {v:100000,  title:'🏆 小有名氣！',  body:'$100,000！你的桌遊館在社群上火了！'},
  {v:1000000, title:'💎 百萬店長！',  body:'$1,000,000！你已經是業界傳奇了！'},
  {v:10000000,title:'🌐 連鎖王者！',  body:'$10,000,000！全台都是你的分店！'},
  {v:1e8,     title:'✨ 旗艦店解鎖！',body:'$100,000,000！\n可以開設旗艦店（轉生）了！'},
];

const LS_KEY='shop24h_save', LS_LB='shop24h_lb_v1', RATE=1.15;

let state={
  money:0, totalEarned:0, allTime:0, weekly:0, weekKey:'',
  clicks:0, peakCps:0, peakCpsEver:0, startTime:Date.now(),
  prestige:0, goldTokens:0, counts:{}, lastSave:Date.now(),
};
let msIdx=0, lbTab='weekly';
allUpgrades().forEach(u=>state.counts[u.id]=0);

function weekKey(){
  const d=new Date(),j=new Date(d.getFullYear(),0,4);
  return d.getFullYear()+'-W'+String(Math.ceil((((d-j)/864e5)+j.getDay()+1)/7)).padStart(2,'0');
}
function daysToSun(){const d=new Date().getDay();return d===0?7:7-d;}

function upgradeCost(u){return Math.floor(u.base_cost*Math.pow(RATE,state.counts[u.id]||0));}
function mult(){return 1+2*state.prestige;}
function totalCps(){return allUpgrades().reduce((s,u)=>s+u.cps*(state.counts[u.id]||0),0)*mult();}
function clickPow(){const u=UPGRADES[0];return(1+u.click_boost*(state.counts[u.id]||0))*mult();}

function industryTag(){
  const all=allUpgrades();
  let top=all[0];
  all.forEach(u=>{if((state.counts[u.id]||0)>(state.counts[top.id]||0))top=u;});
  return (state.counts[top.id]||0)>0?INDUSTRY_TAGS[top.id]:'新晉店長';
}

function playerName(){
  try{const d=JSON.parse(localStorage.getItem('game_lobby_v2'));if(d?.name)return d.name;}catch(e){}
  return null;
}

function doClick(e){
  const earn=clickPow();
  state.money+=earn; state.totalEarned+=earn; state.allTime+=earn; state.weekly+=earn;
  state.clicks++;
  const r=document.getElementById('click-btn').getBoundingClientRect();
  spawnFloat('+$'+fmt(earn), e?e.clientX:r.left+r.width/2, e?e.clientY:r.top);
  updateUI(); checkMS();
}

function buyUpgrade(id){
  const u=allUpgrades().find(x=>x.id===id);
  if(!u)return;
  if(UPGRADES_P3.includes(u)&&state.prestige<3)return;
  if((state.counts[u.id]||0)>=u.max)return;
  const cost=upgradeCost(u);
  if(state.money<cost)return;
  state.money-=cost; state.counts[u.id]=(state.counts[u.id]||0)+1;
  updateUI(); renderShop();
  toast(`✅ ${u.icon} ${u.name} Lv.${state.counts[u.id]}`);
}

function doPrestige(){
  const threshold=prestigeThreshold();
  if(state.money<threshold)return;
  const nextP=state.prestige+1;
  const unlockMsg=nextP===3?'\n🏝️ 旗艦升級將在下一局解鎖！':'';
  if(!confirm(`確定要開設旗艦店？（第 ${nextP} 次轉生）\n所有資產與升級歸零，換取黃金桌遊代幣！\n永久 +200% 收益加成！${unlockMsg}`))return;
  submitToLB(false);
  state.prestige++; state.goldTokens=state.prestige;
  state.money=0; state.totalEarned=0; state.peakCps=0; msIdx=0;
  allUpgrades().forEach(u=>state.counts[u.id]=0);
  save(); renderShop(); updateUI();
  const isP3=state.prestige===3;
  showMS({
    title:`🏆 第 ${state.prestige} 次轉生！`,
    body:`獲得黃金桌遊代幣 🏅\n永久收益倍率：×${mult()}${isP3?'\n\n✨ 旗艦升級已解鎖！':''}`
  });
}

function spawnFloat(text,x,y){
  const el=document.createElement('div');
  el.className='float-num';el.textContent=text;
  el.style.cssText=`left:${x}px;top:${y}px;transform:translateX(-50%)`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),800);
}

function fmt(n){
  if(n>=1e12)return(n/1e12).toFixed(2)+'T';
  if(n>=1e9) return(n/1e9).toFixed(2)+'B';
  if(n>=1e6) return(n/1e6).toFixed(2)+'M';
  if(n>=1e3) return(n/1e3).toFixed(1)+'K';
  return Math.floor(n).toLocaleString();
}
function fmtT(ms){
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  return h>0?h+'小時'+(m%60)+'分':m+'分'+(s%60)+'秒';
}

function updateUI(){
  const cps=totalCps(),cp=clickPow(),m=mult();
  if(cps>state.peakCps)state.peakCps=cps;
  if(cps>state.peakCpsEver)state.peakCpsEver=cps;

  document.getElementById('money-val').textContent='$'+fmt(state.money);
  document.getElementById('cps-val').textContent='$'+fmt(cps)+'/s';
  document.getElementById('click-val').textContent='+$'+fmt(cp);
  document.getElementById('total-val').textContent='$'+fmt(state.allTime);
  document.getElementById('click-sub').textContent='點擊賺錢 +$'+fmt(cp);

  if(state.prestige>0)document.getElementById('prestige-row').style.display='flex';
  document.getElementById('pb-prestige').textContent='🔄 轉生 '+state.prestige+' 次';
  document.getElementById('pb-token').textContent='🏅 '+state.goldTokens+' 枚代幣';
  document.getElementById('pb-mult').textContent='×'+m+' 收益';

  const threshold=prestigeThreshold();
  const pct=Math.min(100,state.money/threshold*100);
  document.getElementById('pp-fill').style.width=pct.toFixed(1)+'%';
  document.getElementById('pp-txt').textContent=`轉生進度 $${fmt(state.money)} / $${fmt(threshold)} · ${pct.toFixed(0)}%`;
  const pb=document.getElementById('prestige-btn');
  pb.style.display=state.money>=threshold?'block':'none';
  pb.textContent=`✨ 第 ${state.prestige+1} 次轉生 — 歸零換取黃金代幣，永久 +200% 收益`;

  document.querySelectorAll('.upgrade-card').forEach(card=>{
    const u=allUpgrades().find(x=>x.id===card.dataset.id);if(!u)return;
    const cnt=state.counts[u.id]||0,cost=upgradeCost(u);
    const p3locked=UPGRADES_P3.includes(u)&&state.prestige<3;
    const can=state.money>=cost&&cnt<u.max&&!p3locked,maxed=cnt>=u.max;
    card.className='upgrade-card'+(can?' affordable':'')+(maxed?' maxed':'');
    const ce=card.querySelector('.uc-cost'),be=card.querySelector('.buy-btn'),pe=card.querySelector('.progress-fill');
    if(ce)ce.textContent=maxed?'滿級！':'$'+fmt(cost);
    if(be){be.disabled=!can;be.textContent=maxed?'MAX':'購買';}
    if(pe)pe.style.width=(cnt/u.max*100)+'%';
  });
}

function cardHTML(u){
  const cnt=state.counts[u.id]||0,cost=upgradeCost(u);
  const p3locked=UPGRADES_P3.includes(u)&&state.prestige<3;
  const can=state.money>=cost&&cnt<u.max&&!p3locked,maxed=cnt>=u.max;
  const d2=u.cps>0?`+$${u.cps}/秒`:`+$${u.click_boost}/點擊`;
  return`<div class="upgrade-card${can?' affordable':''}${maxed?' maxed':''}" data-id="${u.id}" onclick="buyUpgrade('${u.id}')">
    <div class="uc-icon">${u.icon}</div>
    <div class="uc-body">
      <div class="uc-name">${u.name}<span class="uc-lvl">Lv.${cnt}/${u.max}</span></div>
      <div class="uc-desc">${u.desc}｜${d2}（每級）</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${cnt/u.max*100}%;background:${u.color}"></div></div>
    </div>
    <div class="uc-right">
      <div class="uc-cost">${maxed?'滿級！':'$'+fmt(cost)}</div>
      <div class="uc-cps">${u.cps>0?'+$'+fmt(u.cps*cnt)+'/s':'+$'+fmt(u.click_boost*cnt)+'/點'}</div>
      <button class="buy-btn" ${(!can||maxed)?'disabled':''}>${maxed?'MAX':'購買'}</button>
    </div>
  </div>`;
}

function renderShop(){
  const baseHTML=UPGRADES.map(cardHTML).join('');
  let p3HTML;
  if(state.prestige>=3){
    p3HTML=`<div class="shop-section-hdr">🏝️ 旗艦升級（轉生 3 次解鎖）</div>`+
      UPGRADES_P3.map(cardHTML).join('');
  } else {
    const need=3-state.prestige;
    p3HTML=`<div class="shop-section-hdr">🏝️ 旗艦升級</div>
      <div class="shop-locked">🔒 再轉生 <b>${need}</b> 次即可解鎖<br>海外旗艦館 · 品牌授權金 · 元宇宙桌遊<br><small style="font-size:10px">旗艦升級每秒最高達 $1.2M</small></div>`;
  }
  document.getElementById('tab-shop').innerHTML=baseHTML+p3HTML;
}

function renderStats(){
  document.getElementById('st-total').textContent='$'+fmt(state.totalEarned);
  document.getElementById('st-alltime').textContent='$'+fmt(state.allTime);
  document.getElementById('st-weekly').textContent='$'+fmt(state.weekly);
  document.getElementById('st-clicks').textContent=state.clicks.toLocaleString();
  document.getElementById('st-time').textContent=fmtT(Date.now()-state.startTime);
  document.getElementById('st-peak').textContent='$'+fmt(state.peakCpsEver)+'/s';
  document.getElementById('st-prestige').textContent=state.prestige;
  document.getElementById('st-tokens').textContent=state.goldTokens;
  document.getElementById('st-tag').textContent=industryTag();
  const p3rows=state.prestige>=3?UPGRADES_P3.map(u=>
    `<div class="stat-row"><span class="sn">${u.icon} ${u.name}</span><span class="sv" style="color:${u.color}">Lv.${state.counts[u.id]||0}/${u.max}</span></div>`
  ).join(''):`<div class="stat-row"><span class="sn" style="color:var(--sub)">🔒 旗艦升級（轉生3次後解鎖）</span><span class="sv" style="color:var(--sub)">${3-state.prestige}次</span></div>`;
  document.getElementById('st-upgrades').innerHTML=UPGRADES.map(u=>
    `<div class="stat-row"><span class="sn">${u.icon} ${u.name}</span><span class="sv" style="color:${u.color}">Lv.${state.counts[u.id]||0}/${u.max}</span></div>`
  ).join('')+p3rows;
}

// ── Forbes ────────────────────────────────────────────
function loadLB(){
  try{const r=localStorage.getItem(LS_LB);if(r)return JSON.parse(r);}catch(e){}
  return{weekKey:'',weekly:[],alltime:[],cps:[],prestige:[],prevRanks:{}};
}
function saveLB(lb){localStorage.setItem(LS_LB,JSON.stringify(lb));}

function upsert(arr,key,val,extra){
  const e=arr.find(x=>x.name===extra.name);
  if(!e||val>e[key]){
    const entry={...extra,[key]:val};
    if(e)Object.assign(e,entry);else arr.push(entry);
  }
  arr.sort((a,b)=>b[key]-a[key]);
  if(arr.length>20)arr.length=20;
}

function submitToLB(showToast=true){
  const name=playerName();
  if(!name){if(showToast)toast('⚠️ 請先在大廳設定名字');return;}
  const lb=loadLB();
  const wk=weekKey();
  if(lb.weekKey!==wk){lb.weekly=[];lb.weekKey=wk;}
  const meta={name,tag:industryTag(),prestige:state.prestige,date:new Date().toLocaleDateString('zh-TW')};
  upsert(lb.weekly,  'amount',state.weekly,       meta);
  upsert(lb.alltime, 'amount',state.allTime,       meta);
  upsert(lb.cps,     'cps',   state.peakCpsEver,  meta);
  upsert(lb.prestige,'count', state.prestige,      meta);
  if(!lb.prevRanks)lb.prevRanks={};
  if(!lb.prevRanks[name])lb.prevRanks[name]={};
  lb.prevRanks[name].weekly   =lb.weekly.findIndex(e=>e.name===name)+1;
  lb.prevRanks[name].alltime  =lb.alltime.findIndex(e=>e.name===name)+1;
  lb.prevRanks[name].cps      =lb.cps.findIndex(e=>e.name===name)+1;
  lb.prevRanks[name].prestige =lb.prestige.findIndex(e=>e.name===name)+1;
  saveLB(lb);
  if(showToast)toast('✅ 已提交到富比士榜！');
}

function switchLBTab(tab){
  lbTab=tab;
  document.querySelectorAll('.lb-stab').forEach((b,i)=>{
    b.classList.toggle('active',['weekly','alltime','cps','prestige'][i]===tab);
  });
  renderForbes();
}

function rankEmoji(i){return i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1);}

function renderForbes(){
  const lb=loadLB(),pName=playerName();
  const wk=weekKey();
  if(lb.weekKey!==wk)lb.weekly=[];

  let entries,scoreKey,fmtScore;
  const wi=document.getElementById('week-info');
  wi.textContent='';
  switch(lbTab){
    case 'weekly':
      entries=lb.weekly;scoreKey='amount';fmtScore=v=>'$'+fmt(v);
      wi.textContent=`📅 週榜週日重置，還剩 ${daysToSun()} 天`;break;
    case 'alltime':
      entries=lb.alltime;scoreKey='amount';fmtScore=v=>'$'+fmt(v);break;
    case 'cps':
      entries=lb.cps;scoreKey='cps';fmtScore=v=>'$'+fmt(v)+'/s';break;
    case 'prestige':
      entries=lb.prestige;scoreKey='count';fmtScore=v=>v+'次';break;
  }

  const list=document.getElementById('lb-list');
  if(!entries||!entries.length){
    list.innerHTML='<div class="lb-empty">還沒有人提交成績<br>到「統計」頁點「提交成績」！🎮</div>';
    return;
  }

  list.innerHTML=entries.map((e,i)=>{
    const isMe=e.name===pName;
    const prev=lb.prevRanks?.[e.name]?.[lbTab]??null;
    const cur=i+1;
    let arrow='',cls='eq';
    if(prev!==null&&prev!==cur){arrow=cur<prev?'▲':'▼';cls=cur<prev?'up':'dn';}
    else if(prev!==null)arrow='—';
    return`<div class="lb-row${isMe?' me':''}">
      <div class="lb-rank">${rankEmoji(i)}</div>
      <div class="lb-arrow ${cls}">${arrow}</div>
      <div class="lb-info">
        <div class="lb-name">${e.name}${isMe?' 👈':''}</div>
        <div class="lb-tag">${e.tag||'新晉店長'}${e.prestige>0?' · 🔄×'+e.prestige:''}</div>
      </div>
      <div>
        <div class="lb-score">${fmtScore(e[scoreKey])}</div>
        <div class="lb-date">${e.date||''}</div>
      </div>
    </div>`;
  }).join('');
}

// ── 里程碑 ────────────────────────────────────────────
function checkMS(){
  while(msIdx<MILESTONES.length&&state.totalEarned>=MILESTONES[msIdx].v){
    showMS(MILESTONES[msIdx]);msIdx++;
  }
}
function showMS(ms){
  document.getElementById('ms-title').textContent=ms.title;
  document.getElementById('ms-body').textContent=ms.body;
  document.getElementById('milestone').style.display='block';
  setTimeout(closeMilestone,3500);
}
function closeMilestone(){document.getElementById('milestone').style.display='none';}

// ── 存檔 ──────────────────────────────────────────────
function save(){
  localStorage.setItem(LS_KEY,JSON.stringify({...state,lastSave:Date.now(),msIdx}));
  const dot=document.getElementById('save-dot');
  dot.style.background='#ffd700';setTimeout(()=>dot.style.background='#22c55e',300);
}

function load(){
  try{
    const raw=localStorage.getItem(LS_KEY);if(!raw)return;
    const d=JSON.parse(raw);
    Object.assign(state,d);
    msIdx=d.msIdx||0;
    // 遷移舊存檔
    if(!state.allTime)state.allTime=state.totalEarned||0;
    if(!state.peakCpsEver)state.peakCpsEver=state.peakCps||0;
    if(!state.weekly)state.weekly=0;
    if(!state.weekKey)state.weekKey='';
    // 遷移：補上 P3 counts
    UPGRADES_P3.forEach(u=>{if(state.counts[u.id]===undefined)state.counts[u.id]=0;});
    // 週重置
    const wk=weekKey();
    if(state.weekKey&&state.weekKey!==wk){state.weekly=0;state.weekKey=wk;}
    // 離線收益（最多8小時）
    const offSec=Math.min((Date.now()-state.lastSave)/1000,8*3600);
    const cps=totalCps();
    if(offSec>10&&cps>0){
      const earn=Math.floor(cps*offSec);
      state.money+=earn;state.totalEarned+=earn;state.allTime+=earn;state.weekly+=earn;
      document.getElementById('modal-earn').textContent='+$'+fmt(earn);
      document.getElementById('modal-desc').textContent=`離線 ${fmtT(offSec*1000)}，自動幫你賺了這些！`;
      document.getElementById('offline-modal').style.display='flex';
      document.getElementById('offline-earned').textContent='+$'+fmt(earn);
      document.getElementById('offline-earned-box').style.display='block';
    }
  }catch(e){}
}

function closeOfflineModal(){document.getElementById('offline-modal').style.display='none';}

function switchTab(tab){
  ['shop','stats','forbes'].forEach((t,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
  });
  if(tab==='stats')renderStats();
  if(tab==='forbes')renderForbes();
}

function confirmReset(){
  if(!confirm('確定要重置所有進度嗎？此操作無法復原！'))return;
  localStorage.removeItem(LS_KEY);location.reload();
}

function toast(msg){
  let el=document.getElementById('_toast');
  if(!el){
    el=document.createElement('div');el.id='_toast';
    el.style.cssText='position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:#1a1a3a;border:.5px solid #7c3aed;border-radius:10px;padding:.4rem 1rem;font-size:13px;color:#c4b5fd;opacity:0;transition:opacity .25s;pointer-events:none;z-index:60;white-space:nowrap;max-width:90vw;text-align:center';
    document.body.appendChild(el);
  }
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',2200);
}

function goBack(){submitToLB(false);save();window.location.href='../';}

setInterval(()=>{
  const cps=totalCps();
  if(cps>0){
    state.money+=cps;state.totalEarned+=cps;state.allTime+=cps;state.weekly+=cps;
    if(cps>state.peakCps)state.peakCps=cps;
    if(cps>state.peakCpsEver)state.peakCpsEver=cps;
    updateUI();checkMS();
  }
},1000);

setInterval(save,30000);

document.addEventListener('contextmenu',e=>e.preventDefault());
load();
renderShop();
updateUI();
checkMS();
if(state.prestige>0)document.getElementById('prestige-row').style.display='flex';
</script>
</body></html>
