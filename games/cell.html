<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#060612;color:#eee;display:flex;justify-content:center;padding:1rem;min-height:100vh}
.app{width:100%;max-width:520px}
h1{font-size:21px;font-weight:500;text-align:center;margin-bottom:.75rem}
.screen{display:none}.screen.active{display:block}
.btn{font-size:13px;padding:6px 16px;border-radius:8px;border:0.5px solid #444;background:transparent;color:#eee;cursor:pointer}
.btn:hover{background:#12122a}.btn:active{transform:scale(0.97)}
.big-btn{width:100%;padding:11px;border-radius:12px;border:none;color:#fff;font-size:15px;font-weight:500;cursor:pointer;margin-top:.4rem}
.big-btn:active{transform:scale(0.98)}

/* SELECT */
.cell-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.75rem}
.cell-card{background:#0d0d22;border:1.5px solid #222244;border-radius:14px;padding:1rem;cursor:pointer;transition:all .15s}
.cell-card:hover{border-color:#5555cc;transform:translateY(-2px)}
.cell-card.selected{border-color:#7c3aed;background:#1a0a3a;box-shadow:0 0 12px #7c3aed44}
.cell-icon{font-size:36px;margin-bottom:.4rem}
.cell-name{font-size:14px;font-weight:600;margin-bottom:.3rem}
.cell-desc{font-size:11px;color:#8888aa;line-height:1.5}
.cell-trait{font-size:11px;margin-top:.4rem;padding:2px 8px;border-radius:10px;display:inline-block}
.mode-row{display:flex;gap:10px;margin-bottom:.75rem}
.mode-btn{flex:1;padding:8px;border-radius:10px;border:1.5px solid #222244;background:#0d0d22;color:#aaa;cursor:pointer;font-size:13px;text-align:center}
.mode-btn.active{border-color:#7c3aed;background:#1a0a3a;color:#fff}

/* GAME */
.g-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.cell-avatar{font-size:40px;text-align:center;margin-bottom:.2rem}
.cell-stage{font-size:11px;text-align:center;color:#9a9ab0;margin-bottom:.5rem}

/* params */
.params-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.75rem}
.param-box{background:#0d0d22;border:0.5px solid #222244;border-radius:10px;padding:.5rem .6rem}
.param-name{font-size:11px;color:#7788aa;margin-bottom:3px}
.param-bar-wrap{height:6px;background:#1a1a2e;border-radius:3px;overflow:hidden;margin-bottom:2px}
.param-bar{height:100%;border-radius:3px;transition:width .5s ease}
.param-val{font-size:11px;color:#aaa;text-align:right}

/* map */
.map-box{background:#0d0d22;border:0.5px solid #222244;border-radius:14px;padding:.75rem;margin-bottom:.6rem}
.map-box h3{font-size:13px;color:#7788aa;margin-bottom:.5rem}
.food-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.food-item{font-size:28px;cursor:pointer;padding:6px;border-radius:10px;border:1.5px solid transparent;transition:all .15s;user-select:none}
.food-item:hover{border-color:#5555cc;background:#12122a;transform:scale(1.1)}
.food-item:active{transform:scale(0.95)}

/* log */
.log-box{background:#0d0d22;border:0.5px solid #222244;border-radius:12px;padding:.6rem .75rem;margin-bottom:.6rem;max-height:90px;overflow-y:auto}
.log-entry{font-size:12px;color:#7788aa;line-height:1.8;border-bottom:0.5px solid #12122a;padding:1px 0}
.log-entry:last-child{border:none}
.log-entry.special{color:#c4b5fd}
.log-entry.danger{color:#f87171}
.log-entry.evolve{color:#4ade80;font-weight:600}

/* evolution popup */
.evo-popup{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;display:none}
.evo-card{background:#0d0d22;border:2px solid #7c3aed;border-radius:20px;padding:2rem;text-align:center;max-width:320px;width:90%;animation:popIn .4s ease}
@keyframes popIn{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
.evo-card h2{font-size:20px;margin-bottom:.5rem;color:#a78bfa}
.evo-card .evo-icon{font-size:56px;margin:.5rem 0}
.evo-card p{font-size:14px;color:#9a9ab0;line-height:1.6;margin-bottom:1rem}

/* final form */
.final-popup{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:1000;display:none}
.final-card{background:linear-gradient(135deg,#0d0d22,#1a0a3a);border:2px solid #f59e0b;border-radius:20px;padding:2rem;text-align:center;max-width:340px;width:90%;animation:popIn .5s ease}
.final-card h2{font-size:22px;color:#fbbf24;margin-bottom:.3rem}
.final-card .final-icon{font-size:72px;margin:.5rem 0;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.final-card p{font-size:14px;color:#c4b5fd;line-height:1.7;margin-bottom:.75rem}

.controls-bot{display:flex;gap:8px;justify-content:center;margin-top:.5rem}

</style></head><body>

  <div class="controls-bot">

<div class="evo-popup" id="evo-popup">

const MAX_FEEDS={easy:35,hard:55};
let selCell=null, mode='easy', cellState={}, feedCount=0, logEntries=[], totalScore=0;
const PARAM_LABELS={oxidation:'氧化值',temp:'溫度耐受',energy:'能量儲存',toxicity:'毒性',conductivity:'導電性',stability:'穩定性'};
const PARAM_COLORS={oxidation:'#f87171',temp:'#fb923c',energy:'#facc15',toxicity:'#a78bfa',conductivity:'#60a5fa',stability:'#4ade80'};

// build cell select
const cellGrid=document.getElementById('cell-grid');
CELLS.forEach((c,i)=>{
  const div=document.createElement('div');
  div.className='cell-card';
  div.style.background=c.bg;
  div.innerHTML=`<div class="cell-icon">${c.icon}</div><div class="cell-name">${c.name}</div><div class="cell-desc">${c.desc}</div><span class="cell-trait" style="background:${c.color}22;color:${c.traitColor};border:0.5px solid ${c.color}44">${c.trait}</span>`;
  div.addEventListener('click',function(){
    document.querySelectorAll('.cell-card').forEach(x=>x.classList.remove('selected'));
    this.classList.add('selected');
    selCell=c;
    const sb=document.getElementById('select-btn');
    sb.textContent='開始餵食 '+c.icon+' '+c.name;
    sb.style.background=`linear-gradient(135deg,${c.color}88,${c.color})`;
    sb.style.opacity='1';
    sb.style.pointerEvents='auto';
  });
  cellGrid.appendChild(div);
});

function setMode(m){
  mode=m;
  document.getElementById('mode-easy').classList.toggle('active',m==='easy');
  document.getElementById('mode-hard').classList.toggle('active',m==='hard');
}

document.getElementById('select-btn').addEventListener('click',function(){
  if(!selCell)return;
  startGame();
});

function startGame(){
  feedCount=MAX_FEEDS[mode]; logEntries=[]; totalScore=0;
  cellState={...selCell.params};
  showScreen('screen-game');
  buildFoodGrid();
  renderParams();
  updateAvatar();
  document.getElementById('log-box').innerHTML='<div class="log-entry">🧬 '+selCell.name+'誕生！共有 '+feedCount+' 次餵食機會！</div>';
  const fc=document.getElementById('feed-count');
  fc.textContent=feedCount; fc.style.color='#eee';
  document.getElementById('game-over-box').style.display='none';
  document.getElementById('food-grid').style.opacity='1';
  document.getElementById('food-grid').style.pointerEvents='auto';
}

function buildFoodGrid(){
  const foods=mode==='easy'?FOODS_EASY:FOODS_HARD;
  const fg=document.getElementById('food-grid');
  fg.innerHTML='';
  foods.forEach(f=>{
    const el=document.createElement('div');
    el.className='food-item';
    el.textContent=f.e;
    el.title=f.name+'：'+f.desc;
    el.addEventListener('click',function(){feedFood(f);});
    fg.appendChild(el);
  });
}

function renderParams(){
  const pg=document.getElementById('params-grid');
  pg.innerHTML='';
  Object.keys(PARAM_LABELS).forEach(k=>{
    const val=Math.min(100,Math.max(0,Math.round(cellState[k]||0)));
    const div=document.createElement('div');
    div.className='param-box';
    div.innerHTML=`<div class="param-name">${PARAM_LABELS[k]}</div>
      <div class="param-bar-wrap"><div class="param-bar" style="width:${val}%;background:${PARAM_COLORS[k]}"></div></div>
      <div class="param-val">${val}/100</div>`;
    pg.appendChild(div);
  });
}

function calcScore(){
  return Object.values(cellState).reduce((a,b)=>a+Math.max(0,b),0);
}

function updateAvatar(){
  const score=calcScore();
  const stages=selCell.stages;
  let stage=stages[0];
  for(const s of stages)if(score>=s.threshold)stage=s;
  document.getElementById('cell-avatar').textContent=stage.icon;
  document.getElementById('cell-stage').textContent=stage.name+' (總分：'+Math.round(score)+')';
}

function absorbed(delta, curVal){
  if(!delta)return 0;
  return delta>0 ? delta*(0.5+0.5*curVal/100) : delta*(1.5-curVal/100);
}

function feedFood(food){
  if(feedCount<=0)return;
  const r=getReaction(selCell.id,food,mode);
  feedCount--;
  const fc=document.getElementById('feed-count');
  fc.textContent=feedCount;
  fc.style.color=feedCount<=10?'#f87171':feedCount<=20?'#fb923c':'#eee';

  const prevScore=calcScore();
  Object.keys(r.d).forEach(k=>{
    if(cellState[k]===undefined)return;
    cellState[k]=Math.min(100,Math.max(0,cellState[k]+absorbed(r.d[k],cellState[k])));
  });
  const newScore=calcScore();
  const delta=Math.round(newScore-prevScore);

  // log
  let cls='log-entry';
  let txt=food.e+' '+r.log+(delta>0?' (+'+delta+')':delta<0?' ('+delta+')':'');
  if(Math.abs(delta)>30)cls+=' special';
  if(r.log.includes('⚠️')||r.log.includes('☠️'))cls+=' danger';

  logEntries.unshift({txt,cls});
  if(logEntries.length>20)logEntries.pop();
  const lb=document.getElementById('log-box');
  lb.innerHTML=logEntries.map(e=>`<div class="${e.cls}">${e.txt}</div>`).join('');

  renderParams();
  updateAvatar();

  // check final form: all params >= 80
  const allMax=Object.values(cellState).every(v=>v>=80);
  if(allMax){showFinal();return;}

  // check evolution
  const score=calcScore();
  const stages=selCell.stages;
  for(let i=1;i<stages.length;i++){
    if(score>=stages[i].threshold&&prevScore<stages[i].threshold){
      showEvo(stages[i]);
      return;
    }
  }

  if(feedCount===0)showGameOver();
}

function showEvo(stage){
  document.getElementById('evo-icon').textContent=stage.icon;
  document.getElementById('evo-name').textContent=stage.name;
  document.getElementById('evo-desc').textContent='細胞總分達到 '+stage.threshold+'！成功進化為 '+stage.name+'！繼續餵食邁向最終型態！';
  document.getElementById('evo-popup').style.display='flex';
  const entry={txt:'⭐ 進化！→ '+stage.name+' ！',cls:'log-entry evolve'};
  logEntries.unshift(entry);
  document.getElementById('log-box').innerHTML=logEntries.map(e=>`<div class="${e.cls}">${e.txt}</div>`).join('');
}
function closeEvo(){
  document.getElementById('evo-popup').style.display='none';
  if(feedCount===0)showGameOver();
}

function showGameOver(){
  const score=Math.round(calcScore());
  const stages=selCell.stages;
  let stageIdx=0;
  for(let i=0;i<stages.length;i++)if(score>=stages[i].threshold)stageIdx=i;
  const stage=stages[stageIdx];
  const ratings=['😴 剛起步','⭐ 初步進化','⭐⭐ 進化良好','⭐⭐⭐ 驚人進化！','🏆 頂峰型態！'];
  document.getElementById('go-icon').textContent=stage.icon;
  document.getElementById('go-stage').textContent=stage.name;
  document.getElementById('go-score').textContent='總分 '+score;
  document.getElementById('go-rating').textContent=ratings[stageIdx]||ratings[ratings.length-1];
  document.getElementById('game-over-box').style.display='block';
  document.getElementById('food-grid').style.opacity='0.3';
  document.getElementById('food-grid').style.pointerEvents='none';
}

function showFinal(){
  document.getElementById('final-icon').textContent=selCell.finalIcon;
  document.getElementById('final-name').textContent=selCell.finalName;
  document.getElementById('final-desc').textContent=selCell.finalDesc;
  document.getElementById('final-popup').style.display='flex';
}
function closeFinal(){document.getElementById('final-popup').style.display='none';}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('back-btn').addEventListener('click',()=>showScreen('screen-select'));
