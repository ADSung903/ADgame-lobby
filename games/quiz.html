<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0a0a1a;color:#eee;display:flex;justify-content:center;padding:1rem;min-height:100vh}
.app{width:100%;max-width:500px}
h1{font-size:22px;font-weight:500;text-align:center;margin-bottom:1rem}
.screen{display:none}.screen.active{display:block}
.btn{font-size:13px;padding:6px 16px;border-radius:8px;border:0.5px solid #555;background:transparent;color:#eee;cursor:pointer}
.btn:hover{background:#1a1a2e}.btn:active{transform:scale(0.97)}
.big-btn{width:100%;padding:11px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:15px;font-weight:500;cursor:pointer;margin-top:.5rem}
.big-btn:active{transform:scale(0.98)}

/* setup */
.box{background:#12122a;border:0.5px solid #2a2a4a;border-radius:14px;padding:1.1rem;margin-bottom:.75rem}
.box h2{font-size:13px;color:#9a9ab0;margin-bottom:.6rem}
.opt-row{display:flex;gap:8px;flex-wrap:wrap}
.opt-btn{font-size:13px;padding:5px 14px;border-radius:20px;border:0.5px solid #3a3a5a;background:transparent;color:#ccc;cursor:pointer}
.opt-btn.active{background:#3a1a6a;border-color:#a855f7;color:#fff}
.inp{width:100%;padding:8px 12px;border-radius:8px;border:0.5px solid #3a3a5a;background:#0a0a1a;color:#eee;font-size:14px;margin-top:.4rem}

/* game header */
.g-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.score-pill{font-size:13px;padding:4px 12px;border-radius:20px;background:#12122a;border:0.5px solid #2a2a4a;color:#a78bfa}
.q-counter{font-size:13px;color:#6b6b8a}

/* timer bar */
.timer-wrap{height:6px;background:#1a1a2e;border-radius:3px;margin-bottom:.75rem;overflow:hidden}
.timer-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#7c3aed,#a855f7);transition:width .95s linear}
.timer-bar.urgent{background:linear-gradient(90deg,#dc2626,#f87171)}

/* question card */
.q-card{background:#12122a;border:0.5px solid #2a2a4a;border-radius:14px;padding:1.2rem;margin-bottom:.75rem;text-align:center}
.q-emoji{font-size:36px;margin-bottom:.5rem}
.q-text{font-size:16px;font-weight:500;line-height:1.5;color:#eee}

/* answer buttons */
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.75rem}
.ans-btn{padding:14px 10px;border-radius:12px;border:1.5px solid #2a2a4a;background:#12122a;color:#ddd;font-size:14px;cursor:pointer;transition:all .15s;line-height:1.4;text-align:center}
.ans-btn:hover:not(.disabled){border-color:#7c3aed;background:#1e1a3a;transform:translateY(-1px)}
.ans-btn.correct{border-color:#22c55e;background:#0a2a0a;color:#4ade80;animation:pop .3s}
.ans-btn.wrong{border-color:#ef4444;background:#2a0a0a;color:#f87171;animation:shake2 .3s}
.ans-btn.disabled{cursor:default;opacity:.5}
.ans-btn.eliminated{opacity:.2;cursor:default}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes shake2{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* lifelines */
.lifelines{display:flex;gap:8px;justify-content:center;margin-bottom:.75rem}
.ll-btn{padding:6px 14px;border-radius:20px;border:0.5px solid #3a3a5a;background:#12122a;color:#ccc;cursor:pointer;font-size:13px;transition:all .15s}
.ll-btn:hover:not(.used){border-color:#a855f7;color:#fff}
.ll-btn.used{opacity:.3;cursor:default;text-decoration:line-through}

/* audience chart */
.audience{background:#12122a;border:0.5px solid #2a2a4a;border-radius:12px;padding:1rem;margin-bottom:.75rem;display:none}
.audience h3{font-size:13px;color:#9a9ab0;margin-bottom:.6rem;text-align:center}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{width:20px;font-size:13px;text-align:center}
.bar-track{flex:1;height:20px;background:#1a1a2e;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#7c3aed,#a855f7);transition:width .6s ease}
.bar-pct{font-size:12px;color:#9a9ab0;width:32px;text-align:right}

/* phone hint */
.phone-box{background:#12122a;border:0.5px solid #2a2a4a;border-radius:12px;padding:1rem;margin-bottom:.75rem;display:none}
.phone-box h3{font-size:13px;color:#9a9ab0;margin-bottom:.5rem}
.phone-msg{font-size:14px;color:#c4b5fd;line-height:1.6}

/* feedback */
.feedback{text-align:center;font-size:15px;min-height:24px;margin-bottom:.5rem;font-weight:500}
.feedback.correct{color:#4ade80}
.feedback.wrong{color:#f87171}

/* streak */
.streak{text-align:center;font-size:13px;color:#f59e0b;min-height:20px;margin-bottom:.4rem}

/* result */
.result-box{background:#12122a;border:0.5px solid #2a2a4a;border-radius:16px;padding:1.5rem;text-align:center}
.result-box h2{font-size:28px;margin-bottom:.4rem}
.result-score{font-size:42px;font-weight:700;color:#a855f7;margin:.5rem 0}
.result-sub{font-size:14px;color:#9a9ab0;margin-bottom:1rem}
.result-stats{display:flex;gap:12px;justify-content:center;margin-bottom:1rem}
.stat-box{background:#0a0a1a;border-radius:10px;padding:.6rem .9rem;text-align:center}
.stat-val{font-size:20px;font-weight:600;color:#eee}
.stat-lbl{font-size:11px;color:#6b6b8a;margin-top:2px}
.controls-bot{display:flex;gap:8px;justify-content:center;margin-top:.6rem}

  /* 防止長按選取 */
  * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  canvas { -webkit-tap-highlight-color: transparent; touch-action: none; }
</style></head><body>
<div class="app">
<button class="btn" style="margin-bottom:.5rem" onclick="window.location.href='/'">← 大廳</button>
<h1>🧠 機智問答</h1>

<!-- SETUP -->
<div class="screen active" id="screen-setup">

      <button class="opt-btn active" data-q="10">10題</button>

      <button class="opt-btn" data-q="50">50題</button>
      <button class="opt-btn" data-q="100">100題</button>
    </div>
  </div>
  <div class="box">
    <h2>難度</h2>
    <div class="opt-row">
      <button class="opt-btn active" data-lvl="kg">🧒 幼稚園</button>
      <button class="opt-btn" data-lvl="el">📚 小學</button>
      <button class="opt-btn" data-lvl="ms">🔬 國中</button>
      <button class="opt-btn" data-lvl="hs">🧪 高中</button>
      <button class="opt-btn" data-lvl="uni">🎓 大學+碩士</button>
    </div>
  </div>
  <div class="box">
    <h2>主題</h2>
    <div class="opt-row" id="topic-row">
      <button class="opt-btn active" data-topic="all">全部</button>
      <button class="opt-btn" data-topic="animal">🐾 動物</button>
      <button class="opt-btn" data-topic="nature">🌿 自然</button>
      <button class="opt-btn" data-topic="food">🍎 食物</button>
      <button class="opt-btn" data-topic="number">🔢 數字</button>
      <button class="opt-btn" data-topic="life">🏠 生活</button>
      <button class="opt-btn" data-topic="body">🧍 身體</button>
      <button class="opt-btn" data-topic="space">🌙 宇宙</button>
    </div>
  </div>
  <button class="big-btn" id="start-btn">🎯 開始挑戰</button>
</div>

<!-- GAME -->
<div class="screen" id="screen-game">
  <div class="g-header">
    <span class="q-counter" id="q-counter">題 1 / 10</span>
    <span class="score-pill">分數：<span id="score">0</span></span>
  </div>
  <div class="timer-wrap"><div class="timer-bar" id="timer-bar"></div></div>
  <div class="q-card">
    <div class="q-emoji" id="q-emoji"></div>
    <div class="q-text" id="q-text"></div>
  </div>
  <div class="ans-grid" id="ans-grid"></div>
  <div class="lifelines" id="lifelines">
    <button class="ll-btn" id="ll-5050">✂️ 50/50</button>
    <button class="ll-btn" id="ll-audience">👥 問觀眾</button>
    <button class="ll-btn" id="ll-phone">📞 打電話</button>
  </div>
  <div class="audience" id="audience-box">
    <h3>👥 觀眾投票結果</h3>
    <div id="audience-bars"></div>
  </div>
  <div class="phone-box" id="phone-box">
    <h3>📞 朋友說…</h3>
    <div class="phone-msg" id="phone-msg"></div>
  </div>
  <div class="streak" id="streak"></div>
  <div class="feedback" id="feedback"></div>
  <div class="controls-bot">
    <button class="btn" id="quit-btn">退出</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div class="result-box">
    <h2 id="res-emoji"></h2>
    <div class="result-score" id="res-score"></div>
    <div class="result-sub" id="res-sub"></div>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-val" id="res-correct"></div><div class="stat-lbl">答對</div></div>
      <div class="stat-box"><div class="stat-val" id="res-streak"></div><div class="stat-lbl">最長連答</div></div>
      <div class="stat-box"><div class="stat-val" id="res-time"></div><div class="stat-lbl">平均秒/題</div></div>
    </div>
    <button class="big-btn" id="again-btn">再玩一次 🎯</button>
    <div class="controls-bot" style="margin-top:.5rem">
      <button class="btn" id="change-btn">更換設定</button>
    </div>
  </div>
</div>

let playerName='', numQ=10, topic='all', level='kg', questions=[], curQ=0, score=0, streak=0, maxStreak=0;

// Read name from lobby localStorage
(function(){
  try{
    const d=JSON.parse(localStorage.getItem('game_lobby_v2'));
    if(d&&d.name){
      document.getElementById('player-name').value=d.name;
      document.getElementById('name-box').style.display='none';
    }
  }catch(e){}
})();
let llUsed={5050:false,audience:false,phone:false};
let timer=null, timeLeft=15, totalTime=0, answered=false;
let correctCount=0;

// Setup interactions
document.querySelectorAll('[data-q]').forEach(b=>{
  b.addEventListener('click',function(){
    document.querySelectorAll('[data-q]').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
  });
});
document.querySelectorAll('[data-topic]').forEach(b=>{
  b.addEventListener('click',function(){
    document.querySelectorAll('[data-topic]').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
  });
});
document.querySelectorAll('[data-lvl]').forEach(b=>{
  b.addEventListener('click',function(){
    document.querySelectorAll('[data-lvl]').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
  });
});

document.getElementById('start-btn').addEventListener('click',function(){
  playerName=document.getElementById('player-name').value.trim()||'玩家';
  numQ=parseInt(document.querySelector('[data-q].active').dataset.q);
  topic=document.querySelector('[data-topic].active').dataset.topic;
  level=document.querySelector('[data-lvl].active').dataset.lvl;
  startGame();
});

function startGame(){
  let pool=ALL_QS.filter(q=>q.level===level&&(topic==='all'||q.t===topic));
  // shuffle and pick numQ
  pool.sort(()=>Math.random()-.5);
  questions=pool.slice(0,Math.min(numQ,pool.length));
  // if not enough, repeat
  while(questions.length<numQ){
    const extra=[...pool].sort(()=>Math.random()-.5);
    questions=[...questions,...extra];
  }
  questions=questions.slice(0,numQ);

  curQ=0;score=0;streak=0;maxStreak=0;correctCount=0;totalTime=0;
  llUsed={5050:false,audience:false,phone:false};
  showScreen('screen-game');
  resetLifelines();
  loadQuestion();
}

function loadQuestion(){
  if(curQ>=questions.length){showResult();return;}
  answered=false;
  const q=questions[curQ];
  document.getElementById('q-counter').textContent='題 '+(curQ+1)+' / '+questions.length;
  document.getElementById('q-emoji').textContent=q.e;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('score').textContent=score;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('streak').textContent=streak>=3?'🔥 連答 '+streak+' 題！':'';
  document.getElementById('audience-box').style.display='none';
  document.getElementById('phone-box').style.display='none';

  // build answer buttons
  const grid=document.getElementById('ans-grid');
  grid.innerHTML='';
  const labels=['A','B','C','D'];
  q.a.forEach((ans,i)=>{
    const b=document.createElement('button');
    b.className='ans-btn';
    b.id='ans-'+i;
    b.innerHTML='<b>'+labels[i]+'</b>　'+ans;
    b.addEventListener('click',function(){selectAnswer(i);});
    grid.appendChild(b);
  });

  startTimer();
}

function startTimer(){
  clearInterval(timer);
  timeLeft=15;
  const bar=document.getElementById('timer-bar');
  bar.style.transition='none';
  bar.style.width='100%';
  bar.className='timer-bar';
  setTimeout(()=>{
    bar.style.transition='width 15s linear';
    bar.style.width='0%';
  },50);
  timer=setInterval(()=>{
    timeLeft--;
    if(timeLeft<=5)bar.className='timer-bar urgent';
    if(timeLeft<=0){
      clearInterval(timer);
      if(!answered)timeUp();
    }
  },1000);
}

function timeUp(){
  answered=true;
  totalTime+=15;
  const q=questions[curQ];
  document.getElementById('ans-'+q.c).classList.add('correct');
  document.querySelectorAll('.ans-btn').forEach(b=>b.classList.add('disabled'));
  streak=0;
  document.getElementById('feedback').textContent='⏰ 時間到！';
  document.getElementById('feedback').className='feedback wrong';
  setTimeout(()=>{curQ++;loadQuestion();},1500);
}

function selectAnswer(idx){
  if(answered)return;
  answered=true;
  clearInterval(timer);
  totalTime+=(15-timeLeft);
  const q=questions[curQ];
  const correct=idx===q.c;
  document.querySelectorAll('.ans-btn').forEach(b=>b.classList.add('disabled'));
  document.getElementById('ans-'+idx).classList.add(correct?'correct':'wrong');
  if(!correct)document.getElementById('ans-'+q.c).classList.add('correct');

  if(correct){
    const bonus=Math.ceil(timeLeft/3);
    const pts=10+bonus+(streak>=3?5:0);
    score+=pts;
    correctCount++;
    streak++;
    if(streak>maxStreak)maxStreak=streak;
    document.getElementById('feedback').textContent='✅ 答對了！+'+pts+'分';
    document.getElementById('feedback').className='feedback correct';
    document.getElementById('streak').textContent=streak>=3?'🔥 連答 '+streak+' 題！':'';
  } else {
    streak=0;
    document.getElementById('feedback').textContent='❌ 答錯了！';
    document.getElementById('feedback').className='feedback wrong';
    document.getElementById('streak').textContent='';
  }
  document.getElementById('score').textContent=score;
  setTimeout(()=>{curQ++;loadQuestion();},1400);
}

function resetLifelines(){
  llUsed={5050:false,audience:false,phone:false};
  ['5050','audience','phone'].forEach(ll=>{
    const b=document.getElementById('ll-'+ll);
    b.classList.remove('used');
  });
}

document.getElementById('ll-5050').addEventListener('click',function(){
  if(llUsed['5050']||answered)return;
  llUsed['5050']=true;
  this.classList.add('used');
  const q=questions[curQ];
  const wrong=[];
  for(let i=0;i<4;i++)if(i!==q.c)wrong.push(i);
  wrong.sort(()=>Math.random()-.5);
  wrong.slice(0,2).forEach(i=>{
    const b=document.getElementById('ans-'+i);
    b.classList.add('eliminated','disabled');
  });
});

document.getElementById('ll-audience').addEventListener('click',function(){
  if(llUsed['audience']||answered)return;
  llUsed['audience']=true;
  this.classList.add('used');
  const q=questions[curQ];
  // generate fake but biased votes
  const votes=[0,0,0,0];
  const correctVotes=50+Math.floor(Math.random()*30); // 50-80% for correct
  votes[q.c]=correctVotes;
  let rem=100-correctVotes;
  for(let i=0;i<4;i++){
    if(i===q.c)continue;
    const v=i===3?rem:Math.floor(Math.random()*rem*.7);
    votes[i]=v; rem-=v;
  }
  const labels=['A','B','C','D'];
  const box=document.getElementById('audience-box');
  const bars=document.getElementById('audience-bars');
  bars.innerHTML='';
  votes.forEach((v,i)=>{
    bars.innerHTML+=`<div class="bar-row">
      <div class="bar-label">${labels[i]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:0%" id="bar-${i}"></div></div>
      <div class="bar-pct">${v}%</div>
    </div>`;
  });
  box.style.display='block';
  setTimeout(()=>{
    votes.forEach((v,i)=>{document.getElementById('bar-'+i).style.width=v+'%';});
  },100);
});

document.getElementById('ll-phone').addEventListener('click',function(){
  if(llUsed['phone']||answered)return;
  llUsed['phone']=true;
  this.classList.add('used');
  const q=questions[curQ];
  const ans=q.a[q.c];
  const phrases=[
    '我覺得應該是「'+ans+'」，不過你自己再想想看！',
    '嗯…我比較確定是「'+ans+'」這個答案喔！',
    '「'+ans+'」！我剛好查過這個，應該沒錯！',
    '這題我知道！是「'+ans+'」！',
  ];
  document.getElementById('phone-msg').textContent=phrases[Math.floor(Math.random()*phrases.length)];
  document.getElementById('phone-box').style.display='block';
});

document.getElementById('quit-btn').addEventListener('click',function(){
  clearInterval(timer);
  showResult();
});

function showResult(){
  clearInterval(timer);
  showScreen('screen-result');
  const pct=Math.round(correctCount/questions.length*100);
  let emoji='😢',msg='繼續加油！';
  if(pct>=90){emoji='🏆';msg='超級厲害！'}
  else if(pct>=70){emoji='🌟';msg='答得很好！'}
  else if(pct>=50){emoji='👍';msg='不錯喔！'}
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-score').textContent=score+' 分';
  document.getElementById('res-sub').textContent=playerName+'，'+msg+' 答對 '+correctCount+'/'+questions.length+' 題（'+pct+'%）';
  document.getElementById('res-correct').textContent=correctCount;
  document.getElementById('res-streak').textContent=maxStreak;
  const avg=questions.length>0?Math.round(totalTime/Math.max(correctCount+1,1)):0;
  document.getElementById('res-time').textContent=avg+'秒';
}

document.getElementById('again-btn').addEventListener('click',startGame);
document.getElementById('change-btn').addEventListener('click',()=>showScreen('screen-setup'));

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
<script>
  /* 鎖右鍵與長按 */
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('touchstart', e => { if(e.touches.length > 1) e.preventDefault(); }, {passive:false});
  document.addEventListener('touchend', e => e.preventDefault(), {passive:false});
  document.addEventListener('selectstart', e => e.preventDefault());
</script>
