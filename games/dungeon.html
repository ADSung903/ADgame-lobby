function openInventory(filter) {
  checkNearMerchant(); // 每次開背包都確認是否在商人/村莊附近
  filter = filter || state._invFilter || 'all';
  state._invFilter = filter;
  const grid = document.getElementById('inv-grid');
  const countEl = document.getElementById('inv-count');
  grid.innerHTML = '';
  countEl.textContent = `${state.inventory.length}/${state.inventoryMax}`;

  // 篩選 tab
  const tabs = [
    {id:'all', label:'全部'},
    {id:'weapon', label:'武器'},
    {id:'armor', label:'防具'},
    {id:'potion', label:'藥水'},
    {id:'scroll', label:'卷軸'},
  ];
  const tabsEl = document.getElementById('inv-tabs');
  if (tabsEl) {
    tabsEl.innerHTML = tabs.map(t => `
      <button onclick="openInventory('${t.id}')"
        style="padding:4px 8px;border-radius:6px;border:none;cursor:pointer;font-size:11px;
        background:${filter===t.id?'var(--accent)':'#1a1a2e'};
        color:${filter===t.id?'#fff':'#666'}">${t.label}</button>
    `).join('');
  }

  // 背包排序：武器 > 防具 > 藥水（固定順序） > 卷軸，同類保持原始順序
  const INV_TYPE_ORDER = {weapon:0, armor:1, potion:2, scroll:3};
  const POTION_SUBTYPE_ORDER = ['heal_s','heal_m','heal_l','heal_xl','heal_full',
    'antidote','cure_all','str_boost','agi_boost','luk_boost','int_boost','berserk','invincible'];
  const sortedInv = [...state.inventory].sort((a, b) => {
    const ta = INV_TYPE_ORDER[a.type] ?? 9, tb = INV_TYPE_ORDER[b.type] ?? 9;
    if (ta !== tb) return ta - tb;
    if (a.type === 'potion') {
      return POTION_SUBTYPE_ORDER.indexOf(a.subtype) - POTION_SUBTYPE_ORDER.indexOf(b.subtype);
    }
    return 0;
  });

  // 藥水疊加：同 subtype 合併顯示
  const stackedInv = [];
  const potionMap = {};
  sortedInv.forEach((item) => {
    const origIdx = state.inventory.indexOf(item);
    if (item.type === 'potion' || item.type === 'scroll') {
      const key = item.subtype;
      if (potionMap[key]) {
        potionMap[key].count++;
      } else {
        potionMap[key] = {item, count:1, firstIdx:origIdx};
        stackedInv.push(potionMap[key]);
      }
    } else {
      stackedInv.push({item, count:1, firstIdx:origIdx});
    }
  });

  // 過濾
  const filtered = stackedInv.filter(({item}) => {
    if (filter === 'all') return true;
    if (filter === 'weapon') return item.type === 'weapon';
    if (filter === 'armor') return item.type === 'armor';
    if (filter === 'potion') return item.type === 'potion';
    if (filter === 'scroll') return item.type === 'scroll';
    return true;
  });

  filtered.forEach(({item, count, firstIdx}) => {
    const el = document.createElement('div');
    el.className = `inv-slot ${item.rarity}`;
    const icon = item.icon || (item.type==='weapon' ? WPN_ICON[item.subtype]||'⚔️' : SLOT_ICON[item.subtype]||'📦');
    const nameDisplay = item.unidentified
      ? `<span style="color:#818cf8">【待鑑定】</span>`
      : item.name;
    const uidBadge = item.unidentified
      ? `<div style="position:absolute;top:2px;right:2px;font-size:8px;background:#818cf8;color:#fff;border-radius:3px;padding:0 2px">?</div>` : '';
    const stackBadge = count > 1
      ? `<div style="position:absolute;bottom:2px;right:3px;font-size:9px;color:#f59e0b;font-weight:700">×${count}</div>` : '';
    el.style.position = 'relative';
    el.innerHTML = `<div class="s-icon">${renderItemIcon(item)}</div>
      <div class="s-name rarity-${item.rarity}">${nameDisplay}</div>
      ${item.enhance>0?`<div class="s-enh">+${item.enhance}</div>`:''}
      ${uidBadge}${stackBadge}`;
    el.onclick = () => openItemCard(item, true, firstIdx, false);
    grid.appendChild(el);
  });

  // Empty slots（顯示剩餘空格）
  const usedSlots = filter === 'all' ? stackedInv.length : filtered.length;
  const totalDisplay = filter === 'all' ? state.inventoryMax : 0;
  if (filter === 'all') {
    for (let i = stackedInv.length; i < state.inventoryMax; i++) {
      const el = document.createElement('div');
      el.className = 'inv-slot empty';
      el.innerHTML = '<div class="s-icon" style="font-size:14px;color:#333">·</div>';
      grid.appendChild(el);
    }
  }

  openModal('modal-inv');
}

function allocStat(k) {
  if (state.freePoints <= 0) return;
  state.freePoints--;
  state.stats[k] = (state.stats[k]||0) + 1;
  // 加點後重算 maxHp（力量×1、敏捷×0.5、防禦×0.5）
  if (k === 'str' || k === 'agi' || k === 'def') {
    // 加點時：+1血（力量）或+0.5血（敏捷/防禦）
    const hpBonus = k==='str' ? 1 : 0; // 敏捷防禦每2點才+1，改在升級時累計
    if (hpBonus > 0) {
      state.stats.maxHp += hpBonus;
      state.stats.hp = Math.min(state.stats.hp + hpBonus, state.stats.maxHp);
    }
  }
  openStats(); updateUI(); save();
}

function openItemCard(item, fromInv, invIdx, atMerchant, buyFn) {
  checkNearMerchant();
  // 確保物品有 id
  if (!item.id) item.id = Date.now() + Math.random();
  const iid = String(item.id);
  const rCol = `rarity-${item.rarity}`;
  const rarityLabel = RARITY_NAME[item.rarity] || '';
  const typeLabel = item.type==='weapon' ? `${WPN_ICON[item.subtype]} 武器·${item.subtype}` : `${SLOT_LABEL[item.subtype]||'裝備'}`;
  const reqOk = state.level >= (item.reqLevel||0);

  // Element
  const elemInfo = ELEMENTS[item.element || 'none'];
  const elemStr = (elemInfo && elemInfo.name !== '無')
    ? `・<span style="color:${elemInfo.color}">${elemInfo.icon} ${elemInfo.name}</span>` : '';

  // 任何情況都可以比較（從背包、裝備欄、商店都顯示差異）
  const canCompare = (item.type === 'weapon' || item.type === 'armor');
  const curItem = item.type === 'weapon'
    ? (fromInv || atMerchant ? state.weapon : null) // 從裝備欄看自己，不需要比較自己
    : (state.equipment[item.subtype] || null);
  // 從裝備欄看已穿著的武器，curItem 應該是 null（因為比的就是自己）
  const isEquipped = !fromInv && !atMerchant;
  const compareTarget = isEquipped ? null : curItem;

  // Compare header
  let compareHtml = '';
  if (!isEquipped && canCompare) {
    if (compareTarget) {
      const curEnh = compareTarget.enhance > 0 ? ` +${compareTarget.enhance}` : '';
      const curElemInfo = ELEMENTS[compareTarget.element || 'none'];
      const curElemIco = (curElemInfo && curElemInfo.name !== '無') ? ` ${curElemInfo.icon}` : '';
      compareHtml = `<div style="font-size:11px;color:var(--sub);background:var(--bg3);border:.5px solid var(--border);border-radius:8px;padding:.35rem .6rem;margin-bottom:.4rem">
        🔄 目前裝備：<span class="rarity-${compareTarget.rarity}">${compareTarget.name}${curEnh}</span>${curElemIco}
      </div>`;
    } else {
      compareHtml = `<div style="font-size:11px;color:#555;padding:.1rem 0;margin-bottom:.3rem">🔄 目前該部位未裝備</div>`;
    }
  }

  // Stats (with comparison diff if applicable)
  const statLabels = {str:'💪力量',agi:'⚡敏捷',luk:'🍀幸運',int:'🧠智力',def:'🛡️防禦'};
  let statHtml = '';

  // 武器永遠顯示「預估攻擊力」
  if (item.type === 'weapon') {
    const calcWpnAtk = (wpn) => {
      if (!wpn) return Math.floor(state.stats.str * 1.0 + state.level * 2);
      const str_ = totalStat('str'), agi_ = totalStat('agi');
      const int__ = totalStat('int'), luk_ = totalStat('luk'), def_ = totalStat('def');
      const base = state.stats.str * 1.0 + state.level * 2;
      let atk;
      const sub = wpn.subtype;
      if (sub==='sword')       atk = base + str_*1.0 + agi_*0.5;
      else if (sub==='axe')    atk = base + str_*1.5;
      else if (sub==='bow')    atk = base + agi_*1.5;
      else if (sub==='wand')   atk = base + int__*2.0;
      else if (sub==='dagger') atk = base + agi_*2.0 + luk_*0.5;
      else if (sub==='spear')  atk = base + str_*1.0 + def_*0.3;
      else atk = base + str_;
      atk *= (1 + (wpn.enhance||0) * 0.08);
      return Math.floor(atk);
    };
    const newAtk = calcWpnAtk(item);
    let diffStr = '';
    if (!isEquipped) {
      if (compareTarget) {
        const curAtk = calcWpnAtk(compareTarget);
        const diff = newAtk - curAtk;
        diffStr = diff > 0
          ? `<span style="color:#4ade80;font-size:10px;margin-left:4px">▲+${diff}</span>`
          : diff < 0
            ? `<span style="color:#f87171;font-size:10px;margin-left:4px">▼${diff}</span>`
            : `<span style="color:#888;font-size:10px;margin-left:4px">→ 相同</span>`;
      } else {
        diffStr = `<span style="color:#4ade80;font-size:10px;margin-left:4px">▲ 新裝備</span>`;
      }
    }
    statHtml += `<div class="ic-stat"><span>⚔️ 預估攻擊</span><span class="ics-pos">${newAtk}${diffStr}</span></div>`;
  }

  {
    const allKeys = new Set([
      ...Object.keys(item.stats || {}),
      ...Object.keys(compareTarget?.stats || {}),
    ]);
    for (const k of allKeys) {
      const rawV = item.stats?.[k] || 0;
      // 顯示強化後的實際數值
      const enhMult = (item.type === 'weapon')
        ? (1 + (item.enhance||0) * 0.08)
        : (1 + (item.enhance||0) * 0.06);
      const newV = rawV > 0 ? Math.floor(rawV * enhMult) : rawV;
      const curRaw = compareTarget?.stats?.[k] || 0;
      const curEnhMult = compareTarget ? (compareTarget.type === 'weapon'
        ? (1 + (compareTarget.enhance||0) * 0.08)
        : (1 + (compareTarget.enhance||0) * 0.06)) : 1;
      const curV = curRaw > 0 ? Math.floor(curRaw * curEnhMult) : curRaw;
      if (newV === 0 && curV === 0) continue;
      const diff = isEquipped ? 0 : newV - curV;
      const diffStr = !isEquipped && diff !== 0
        ? diff > 0
          ? `<span style="color:#4ade80;font-size:10px;margin-left:4px">▲+${diff}</span>`
          : `<span style="color:#f87171;font-size:10px;margin-left:4px">▼${diff}</span>`
        : '';
      const enhTag = (item.enhance||0) > 0 && rawV > 0
        ? `<span style="color:#888;font-size:9px;margin-left:2px">(基${rawV>0?'+':''}${rawV})</span>` : '';
      statHtml += `<div class="ic-stat"><span>${statLabels[k]||k}</span><span class="${newV>0?'ics-pos':'ics-neg'}">${newV>0?'+':''}${newV}${enhTag}${diffStr}</span></div>`;
    }
  }

  // Curse warning
  let curseHtml = '';
  if (item.cursed && !item.purified && item.curseType) {
    const ef = CURSE_EFFECTS.find(e=>e.type===item.curseType);
    curseHtml = `<div style="font-size:11px;color:#f87171;background:#1a0a0a;border:.5px solid #f87171;border-radius:8px;padding:.4rem .6rem;margin-bottom:.6rem">

  } else if (item.purified) {
    curseHtml = `<div style="font-size:10px;color:#f59e0b;margin-bottom:.3rem">✨ 已淨化（詛咒解除）</div>`;
  }

  // Heirloom
  const heirloomHtml = item.fromGeneration
    ? `<div class="ic-heirloom">📜 第${item.fromGeneration}代遺物<br>於 ${item.deathLocation} 力戰而亡・擊殺 ${item.deathKills} 隻</div>` : '';

  // Set progress
  let setHtml = '';
  if (item.setId && SET_DEFS[item.setId]) {
    const def = SET_DEFS[item.setId];
    const allEquipped = [state.weapon, ...ARMOR_SLOTS.map(s=>state.equipment[s])].filter(Boolean);
    const owned = allEquipped.filter(i=>i.setId===item.setId).length;
    const total = def.pieces.length;
    setHtml = `<div style="margin:.4rem 0;padding:.5rem;background:#0a0a1a;border-radius:8px;border:.5px solid ${def.color}33">
      <div style="color:${def.color};font-size:11px;font-weight:700;margin-bottom:4px">${def.name} ${owned}/${total}</div>
      ${Object.entries(def.bonus).map(([req,b])=>
        `<div style="font-size:10px;color:${owned>=parseInt(req)?def.color:'#444'}">${owned>=parseInt(req)?'✅':'○'} ${req}件：${b.desc}</div>`
      ).join('')}
    </div>`;
  }

  // Enhance UI (weapons/armor only, not at merchant)
  let enhHtml = '';
  if (!atMerchant && (item.type==='weapon' || item.type==='armor')) {
    const enhScrolls = state.inventory.filter(i=>i.type==='scroll'&&i.effect?.action==='enhance');
    const protectScroll = state.inventory.find(i=>i.subtype==='enhance_protect');
    const hasProtect = !!item._protected;
    const curEnh = item.enhance || 0;

    if (enhScrolls.length > 0 || protectScroll || hasProtect) {
      // 去重，每種卷軸只顯示一個按鈕
      const seen = new Set();
      const uniqueScrolls = enhScrolls.filter(s => {
        if (seen.has(s.subtype)) return false;
        seen.add(s.subtype); return true;
      });
      const scrollBtns = uniqueScrolls.map(s => {
        const count = state.inventory.filter(x=>x.subtype===s.subtype).length;
        const invIdx2 = state.inventory.findIndex(x=>x.id===s.id);
        return `<button onclick="doEnhanceDirect('${item.id}',${fromInv},${fromInv?invIdx:'null'},'${item.type==='weapon'?'weapon':item.subtype}','${s.subtype}')"
          style="flex:1;padding:6px 4px;border-radius:7px;border:.5px solid #f59e0b33;background:#1a1400;color:#f59e0b;font-size:10px;cursor:pointer;text-align:center">
          ${s.icon} ${s.name.replace('強化卷軸','').replace('卷軸','').trim()}<br>
          <span style="color:#555;font-size:9px">×${count}</span>
        </button>`;

      const protectBtn = protectScroll && !hasProtect
        ? `<button onclick="applyProtectToItem('${item.id}',${fromInv},${fromInv?invIdx:'null'},'${item.type==='weapon'?'weapon':item.subtype}')"
            style="flex:1;padding:6px 4px;border-radius:7px;border:.5px solid #60a5fa33;background:#0a1420;color:#60a5fa;font-size:10px;cursor:pointer;text-align:center">

          </button>` : '';
      const protectedTag = hasProtect
        ? `<div style="font-size:10px;color:#60a5fa">🛡 已套保護卷軸</div>` : '';

      enhHtml = `<div style="margin:.4rem 0;border:.5px solid #333;border-radius:8px;padding:.5rem">
        <div style="font-size:11px;color:var(--sub);margin-bottom:6px">⚒️ 強化裝備　目前 <span style="color:#f59e0b">+${curEnh}</span></div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">${scrollBtns}${protectBtn}</div>

  // Buttons

  let btns = '';
  if (atMerchant && buyFn) {
    btns = `<button class="ic-btn ic-btn-equip" onclick="(${buyFn.toString()})()">🛒 購買</button>
            <button class="ic-btn ic-btn-close" onclick="closeModal('modal-item')">關閉</button>`;
  } else if (item.type === 'potion' || item.type === 'scroll') {
    const potSellPrice = computeSellPrice(item);
    const potSellBtn = nearMerchant
      ? `<button class="ic-btn ic-btn-sell" onclick="sellItem(true,${invIdx},'potion')">💰 賣出 $${potSellPrice}</button>`
      : '';
    btns = `<button class="ic-btn ic-btn-use" onclick="usePotion(state.inventory[${invIdx}],${invIdx})">使用</button>
            ${potSellBtn}
            <button class="ic-btn ic-btn-drop" onclick="dropItem(state.inventory[${invIdx}],true,${invIdx})">丟棄</button>
            <button class="ic-btn ic-btn-close" onclick="closeModal('modal-item')">關閉</button>`;
  } else {
    const equipBtn = fromInv
      ? `<button class="ic-btn ic-btn-equip" onclick="equipItem(state.inventory[${invIdx}],true,${invIdx})">⚔️ 裝備</button>`

      : '';
    btns = `${equipBtn}${sellBtn}
            <button class="ic-btn ic-btn-drop" onclick="dropItem(${fromInv?`state.inventory[${invIdx}]`:`state.${item.type==='weapon'?'weapon':'equipment.'+item.subtype}`},${fromInv},${fromInv?invIdx:'null'})">🗑️ 丟棄</button>
            <button class="ic-btn ic-btn-close" onclick="closeModal('modal-item')">關閉</button>`;

  document.getElementById('item-card-content').innerHTML = `
    <div class="ic-name ${rCol}" style="display:flex;align-items:center;gap:6px">
      <span style="width:28px;height:28px;display:inline-flex">${renderItemIcon(item)}</span>
      ${cursedPrefix}${item.name}${item.enhance>0?' +'+item.enhance:''}
    </div>
    <div class="ic-sub">${rarityLabel}・${typeLabel}${elemStr}</div>
    ${curseHtml}
    <div class="ic-flavor">${item.flavorText||'一件普通的裝備'}</div>
    ${compareHtml}
    ${statHtml?`<div class="ic-stats">${statHtml}</div>`:''}
    ${item.reqLevel>0?`<div class="ic-req">需求等級：<span class="${reqOk?'':'req-fail'}">Lv.${item.reqLevel}${reqOk?'':'（不足）'}</span></div>`:''}
    ${item.reqStr?`<div class="ic-req">需求力量：<span class="${totalStat('str')>=item.reqStr?'':'req-fail'}">${item.reqStr}${totalStat('str')>=item.reqStr?'':' ⚠️不足'}</span></div>`:''}
    ${item.reqAgi?`<div class="ic-req">需求敏捷：<span class="${totalStat('agi')>=item.reqAgi?'':'req-fail'}">${item.reqAgi}${totalStat('agi')>=item.reqAgi?'':' ⚠️不足'}</span></div>`:''}
    ${item.reqInt?`<div class="ic-req">需求智力：<span class="${totalStat('int')>=item.reqInt?'':'req-fail'}">${item.reqInt}${totalStat('int')>=item.reqInt?'':' ⚠️不足'}</span></div>`:''}
    ${item.type==='weapon' ? (() => {
      const required = getRequiredWeapon(state.job);
      if (!required) return `<div class="ic-req" style="color:#888">⛏️ 礦工可使用所有武器類型</div>`;
      const canUse = item.subtype === required;
      return `<div class="ic-req" style="color:${canUse?'#4ade80':'#ef4444'}">
        ${canUse ? `✅ 此武器符合目前職業，可裝備（攻擊+15%）` : `🚫 目前職業僅能使用 ${WPN_ICON[required]||''}，無法裝備此武器`}

function unequipItem(slot) {
  const item = slot==='weapon' ? state.weapon : state.equipment[slot];
  if (!item) return;
  if (!addToInventory(item)) { toast('背包已滿！'); return; }
  if (slot==='weapon') state.weapon=null; else state.equipment[slot]=null;
  toast(`↩️ 卸下 ${item.name}`);
  closeModal('modal-item');
  refreshInventoryIfOpen();
  updateUI(); save(true);
}

let merchantStock = [];

function openMerchant() {
  // Generate stock based on player level and position seed
  const seedM = posH(px*37+3, py*41+7, WORLD_SEED+500) * 1000 | 0;
  const rngM = (() => { let s=seedM; return () => { s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; }; })();

  merchantStock = [];
  // Weapons
  for (let i=0; i<2; i++) {
    const sub = WPN_SUBTYPES[Math.floor(rngM()*WPN_SUBTYPES.length)];
    const rar = state.level>=10 && rngM()<0.3 ? 'green' : 'white';
    const item = generateWeapon(rar, Math.max(1, state.level-2));
    merchantStock.push({item, price: computeSellPrice(item)*3});
  }
  // Armor
  for (let i=0; i<2; i++) {
    const slot = ARMOR_SLOTS[Math.floor(rngM()*ARMOR_SLOTS.length)];
    const rar = state.level>=10 && rngM()<0.3 ? 'green' : 'white';
    const item = generateArmor(slot, rar, Math.max(1, state.level-2));
    merchantStock.push({item, price: computeSellPrice(item)*3});
  }
  // Potions / scrolls (skip price:0 drop-only items like holy scroll)
  SHOP_ITEMS.forEach(si => {
    if (si.price > 0) merchantStock.push({item:{...si, id:Date.now()+Math.random()}, price:si.price});
  });

  renderMerchant();
  openModal('modal-merchant');
}

function expandBag() {
  const cost = 100000;
  if (state.gold < cost) { toast('金幣不足'); return; }
  if (state.inventoryMax >= 200) { toast('背包已達上限 200 格'); return; }
  state.gold -= cost;
  state.inventoryMax += 20;
  toast(`🎒 背包擴充至 ${state.inventoryMax} 格！`);
  renderMerchant(); updateUI(); save(true);
}

// 統一藥水/卷軸售價表（依 subtype 查詢，避免怪物掉落版本缺少 price 欄位導致賤賣）
const POTION_BASE_PRICE = {
  heal_s: 50, heal_m: 150, heal_l: 400, heal_xl: 1200, heal_full: 8000,
  antidote: 80, cure_all: 300,
  str_boost: 200, agi_boost: 250, luk_boost: 250, int_boost: 250,
  berserk: 600, invincible: 2000,
  fog_clear: 150,
  enhance_normal: 300, enhance_lucky: 600, enhance_holy: 1500,
  enhance_protect: 800, enhance_curse: 100,
  identify: 200, purify: 800,
  teleport_near: 500, teleport_any: 2000,
  job_reset: 50000, job_reincarnate: 500000,
  gem: 300, // 寶箱寶石類 fallback
};

function computeSellPrice(item) {
  if (item.type === 'potion' || item.type === 'scroll') {
    const base = POTION_BASE_PRICE[item.subtype] ?? (item.price || 30);
    return Math.max(1, Math.floor(base * 0.4));
  }
  const basePrice = {white:30, green:80, blue:200, gold:500, red:1200, rainbow:5000}[item.rarity] || 30;
  return basePrice + (item.enhance||0)*50;
}

function renderMerchant() {
  const body = document.getElementById('merchant-body');
  const maxSlots = 200;
  const curSlots = state.inventoryMax || 30;
  const canExpand = curSlots < maxSlots;
  const expandCost = 100000;
  let html = `<div style="font-size:11px;color:var(--sub);margin-bottom:.6rem">💰 你的金幣：${state.gold}</div>`;
  // 背包擴充
  if (canExpand) {
    const canAfford = state.gold >= expandCost;
    html += `<div style="background:#1a1a2e;border:.5px solid ${canAfford?'#f59e0b':'#333'};
      border-radius:10px;padding:.6rem;margin-bottom:.5rem;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:12px;color:#f59e0b">🎒 擴充背包</div>
        <div style="font-size:10px;color:#666">目前 ${curSlots} 格 → ${curSlots+20} 格（上限200）</div>
      </div>
      <button onclick="expandBag()" ${canAfford?'':'disabled'}
        style="padding:6px 12px;border-radius:8px;border:none;font-size:11px;cursor:${canAfford?'pointer':'default'};
        background:${canAfford?'#92400e':'#2a2a4a'};color:${canAfford?'#fde68a':'#555'}">
        💰 ${(expandCost/1000).toFixed(0)}K
      </button>
    </div>`;
  }

  // 一鍵批量銷售
  const whiteCount = state.inventory.filter(i=>i.rarity==='white' && (i.type==='weapon'||i.type==='armor')).length;
  const greenCount = state.inventory.filter(i=>i.rarity==='green' && (i.type==='weapon'||i.type==='armor')).length;
  const blueCount  = state.inventory.filter(i=>i.rarity==='blue'  && (i.type==='weapon'||i.type==='armor')).length;
  const goldCount  = state.inventory.filter(i=>i.rarity==='gold'  && (i.type==='weapon'||i.type==='armor')).length;
  if (whiteCount + greenCount + blueCount + goldCount > 0) {
    html += `<div style="background:#1a1a2e;border:.5px solid #333;border-radius:10px;padding:.6rem;margin-bottom:.5rem">
      <div style="font-size:12px;color:#f59e0b;margin-bottom:.4rem">📦 批量銷售</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${whiteCount>0?`<button onclick="bulkSell('white')" style="flex:1;padding:6px;border-radius:8px;border:.5px solid #888;background:#1a1a2e;color:#ccc;font-size:11px;cursor:pointer">⬜ 白裝 ×${whiteCount}</button>`:''}
        ${greenCount>0?`<button onclick="bulkSell('green')" style="flex:1;padding:6px;border-radius:8px;border:.5px solid #4ade80;background:#1a1a2e;color:#4ade80;font-size:11px;cursor:pointer">🟩 綠裝 ×${greenCount}</button>`:''}
        ${blueCount>0?`<button onclick="bulkSell('blue')" style="flex:1;padding:6px;border-radius:8px;border:.5px solid #60a5fa;background:#1a1a2e;color:#60a5fa;font-size:11px;cursor:pointer">🟦 藍裝 ×${blueCount}</button>`:''}
        ${goldCount>0?`<button onclick="bulkSell('gold')" style="flex:1;padding:6px;border-radius:8px;border:.5px solid #f59e0b;background:#1a1a2e;color:#f59e0b;font-size:11px;cursor:pointer">🟨 金裝 ×${goldCount}</button>`:''}
      </div>
    </div>`;
  }

  merchantStock.forEach((stock, i) => {
    const it = stock.item;
    const canBuy = state.gold >= stock.price;
    html += `<div class="merchant-item">
      <div class="mi-icon">${renderItemIcon(it)}</div>
      <div class="mi-info">
        <div class="mi-name rarity-${it.rarity||'white'}">${it.name}</div>
        <div class="mi-desc">${it.type==='potion'||it.type==='scroll' ? it.desc||'' : (SLOT_LABEL[it.subtype]||it.subtype)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="mi-price">💰${stock.price}</div>
        <button class="mi-buy" ${canBuy?'':'disabled'} onclick="merchantBuy(${i})">購買</button>
      </div>
    </div>`;
  });
  body.innerHTML = html;
}

function bulkSell(rarity) {
  const rarityNames = {white:'白裝', green:'綠裝', blue:'藍裝', gold:'金裝'};
  const items = state.inventory.filter(i => i.rarity === rarity && (i.type==='weapon'||i.type==='armor'));
  if (items.length === 0) { toast('沒有可賣的物品'); return; }
  const totalGold = items.reduce((sum, it) => sum + computeSellPrice(it), 0);
  const enhancedCount = items.filter(it => (it.enhance||0) > 0).length;

  const lines = items.map(it => {
    const p = computeSellPrice(it);
    const enhTag = (it.enhance||0) > 0 ? ' +' + it.enhance : '';
    return '  ' + it.name + enhTag + ' — $' + p;
  }).join('\n');

  let msg = '確定賣出所有 ' + rarityNames[rarity] + '（' + items.length + '件）？\n\n' + lines + '\n\n共可獲得 ' + totalGold + ' 金幣';
  if (enhancedCount > 0) {
    msg = '⚠️ 其中 ' + enhancedCount + ' 件已強化，賣出後強化值將永久消失！\n\n' + msg;
  }
  if (!confirm(msg)) return;

  playSFX('coin');
  state.gold += totalGold;
  state.inventory = state.inventory.filter(i => !(i.rarity === rarity && (i.type==='weapon'||i.type==='armor')));
  toast('💰 賣出 ' + items.length + ' 件 ' + rarityNames[rarity] + '，獲得 ' + totalGold + ' 金幣');
  renderMerchant();
  refreshInventoryIfOpen();
  updateUI(); save(true);
}

function merchantBuy(idx) {
  const stock = merchantStock[idx];
  if (!stock || state.gold < stock.price) return;
  if (state.inventory.length >= state.inventoryMax) { toast('背包已滿！'); return; }
  playSFX('coin');
  state.gold -= stock.price;
  const item = {...stock.item, id: Date.now()+Math.random()};
  addToInventory(item);
  toast(`✅ 購買了 ${item.name}`);
  renderMerchant();
  updateUI(); save();
}

let blackjackState = null;
let baccaratState = null;

function cardLabel(card) {
  const labels = {1:'A', 11:'J', 12:'Q', 13:'K'};
  return labels[card.rank] || String(card.rank);
}
function cardValue(card) {
  if (card.rank === 1) return 11; // Ace 預設算11，超過21再降為1（在算總分時處理）
  if (card.rank >= 11) return 10;
  return card.rank;
}
function drawCard() {
  const suits = ['♠️','♥️','♦️','♣️'];
  return { rank: 1 + Math.floor(Math.random()*13), suit: suits[Math.floor(Math.random()*4)] };
}
function handTotal(hand) {
  let total = hand.reduce((s,c) => s + cardValue(c), 0);
  let aces = hand.filter(c => c.rank === 1).length;
  while (total > 21 && aces > 0) { total -= 10; aces--; }
  return total;
}

function showCasinoMenu(type) {
  if (type === 'blackjack') openBlackjackTable();
  else if (type === 'baccarat') openBaccaratTable();
}

const CASINO_MAX_BET = 50000;

function setBJBet(amt) {
  if (amt > CASINO_MAX_BET) { toast(`⚠️ 單局下注上限為 $${CASINO_MAX_BET}`); return; }
  if (state.gold < amt) { toast('金幣不足'); return; }
  blackjackState.bet = amt;
  state.gold -= amt;
  blackjackState.phase = 'playing';
  blackjackState.player = [drawCard(), drawCard()];
  blackjackState.dealer = [drawCard(), drawCard()];
  updateUI(); save(true);
  renderBlackjack();
  // 雙方都黑傑克自動結算
  if (handTotal(blackjackState.player) === 21) bjStand();
}

function setBJBetCustom() {
  const input = document.getElementById('bj-bet-input');
  const amt = parseInt(input?.value);
  if (!amt || amt <= 0) { toast('請輸入有效金額'); return; }
  setBJBet(amt);
}

function bjHit() {
  blackjackState.player.push(drawCard());
  if (handTotal(blackjackState.player) > 21) {
    bjFinish();
  } else {
    renderBlackjack();
  }
}

function bjStand() {
  // 莊家規則：未達17必須要牌
  while (handTotal(blackjackState.dealer) < 17) {
    blackjackState.dealer.push(drawCard());
  }
  bjFinish();
}

function bjFinish() {
  const s = blackjackState;
  s.phase = 'done';
  const pTotal = handTotal(s.player);
  const dTotal = handTotal(s.dealer);
  let resultText = '', resultColor = '#888', payout = 0;

  if (pTotal > 21) {
    resultText = '💥 爆牌！你輸了'; resultColor = '#f87171'; payout = 0;
  } else if (dTotal > 21) {
    resultText = '🎉 莊家爆牌！你贏了！'; resultColor = '#4ade80'; payout = s.bet * 2;
  } else if (pTotal === 21 && s.player.length === 2) {
    resultText = '🃏 黑傑克！1.5倍賠率！'; resultColor = '#fbbf24'; payout = Math.floor(s.bet * 2.5);
  } else if (pTotal > dTotal) {
    resultText = '🎉 你贏了！'; resultColor = '#4ade80'; payout = s.bet * 2;
  } else if (pTotal < dTotal) {
    resultText = '😢 你輸了'; resultColor = '#f87171'; payout = 0;
  } else {
    resultText = '🤝 和局，退回賭金'; resultColor = '#aaa'; payout = s.bet;
  }

  if (payout > 0) { state.gold += payout; playSFX('coin'); }
  updateUI(); save(true);
  renderBlackjack();
  setTimeout(() => {
    const el = document.getElementById('bj-result');
    if (el) {
      el.style.color = resultColor;
      el.textContent = resultText + (payout > 0 ? `（獲得 $${payout}）` : '');
    }
  }, 50);
}

const DICE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];
function setBacBet(amt) {
  if (amt > CASINO_MAX_BET) { toast(`⚠️ 單局下注上限為 $${CASINO_MAX_BET}`); return; }
  if (state.gold < amt) { toast('金幣不足'); return; }
  state.gold -= amt;
  const s = baccaratState;
  s.bet = amt;
  s.phase = 'done';
  const d1 = 1+Math.floor(Math.random()*6), d2 = 1+Math.floor(Math.random()*6);
  const d3 = 1+Math.floor(Math.random()*6), d4 = 1+Math.floor(Math.random()*6);
  s.playerDice = [DICE_FACES[d1-1], DICE_FACES[d2-1]];
  s.dealerDice = [DICE_FACES[d3-1], DICE_FACES[d4-1]];
  s.playerTotal = d1+d2;
  s.dealerTotal = d3+d4;
  if (s.playerTotal > s.dealerTotal) { s.result = 'win'; s.payout = amt*2; state.gold += s.payout; playSFX('coin'); }
  else if (s.playerTotal < s.dealerTotal) { s.result = 'lose'; s.payout = 0; }
  else { s.result = 'tie'; s.payout = amt; state.gold += amt; }
  updateUI(); save(true);
  renderBaccarat();
}

function setBacBetCustom() {
  const input = document.getElementById('bac-bet-input');
  const amt = parseInt(input?.value);
  if (!amt || amt <= 0) { toast('請輸入有效金額'); return; }
  setBacBet(amt);
}

function inheritanceMax() {
  if (state.level >= 31) return 3;
  if (state.level >= 11) return 2;
  return 1;
}

let inheritanceSelected = new Set();

function showInheritance() {
  document.getElementById('death-overlay').classList.remove('active');
  inheritanceSelected = new Set();

  const maxPick = inheritanceMax();
  document.getElementById('inherit-sub').textContent = `選擇最多 ${maxPick} 件傳給下一代（Lv.${state.level}）`;
  document.getElementById('inherit-confirm').disabled = true;

  // Build pool: all inventory + equipped items
  const pool = [];
  if (state.weapon) pool.push({item:state.weapon, label:'武器'});
  ARMOR_SLOTS.forEach(slot => {
    const it = state.equipment[slot];
    if (it) pool.push({item:it, label:SLOT_LABEL[slot]});
  });
  state.inventory.forEach(it => pool.push({item:it, label:'背包'}));

  const container = document.getElementById('inherit-pool');
  container.innerHTML = '';

  if (pool.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--sub);font-size:13px;padding:1rem">沒有物品可以傳承……</div>';
    document.getElementById('inherit-confirm').disabled = false;
    document.getElementById('inherit-confirm').textContent = '開始新的冒險 ✨';
  } else {
    pool.forEach((entry, i) => {
      const it = entry.item;
      const el = document.createElement('div');
      el.className = `inherit-slot ${it.rarity||'white'}`;
      el.innerHTML = `<div class="is-icon">${renderItemIcon(it)}</div>
        <div class="is-name rarity-${it.rarity||'white'}">${it.name}</div>
        <div style="font-size:9px;color:var(--sub)">${entry.label}</div>`;
      el.onclick = () => toggleInherit(i, el, maxPick, pool);
      container.appendChild(el);
    });
  }

  document.getElementById('inherit-overlay').classList.add('open');
  window._inheritPool = pool;
}

function toggleInherit(idx, el, maxPick, pool) {
  if (inheritanceSelected.has(idx)) {
    inheritanceSelected.delete(idx);
    el.classList.remove('selected');
  } else {
    if (inheritanceSelected.size >= maxPick) {
      toast(`最多選 ${maxPick} 件`); return;
    }
    inheritanceSelected.add(idx);
    el.classList.add('selected');
  }
  document.getElementById('inherit-confirm').disabled = inheritanceSelected.size === 0 && window._inheritPool.length > 0;
}

function confirmInherit() {
  const pool = window._inheritPool || [];
  const heirlooms = [];
  const deathTerrain = getTerrain(px, py);
  const terrainEmoji = TERRAIN_INFO[deathTerrain]?.emoji || '🌿';
  const terrainName = terrainEmoji + ' 探索途中';

  inheritanceSelected.forEach(idx => {
    const entry = pool[idx];
    if (!entry) return;
    const item = {...entry.item};
    item.fromGeneration = state.generation;
    item.deathLocation = terrainName;
    item.deathKills = state.kills;
    item.flavorText = `前代勇者用鮮血換來的教訓，凝結在這件裝備裡`;
    heirlooms.push(item);
  });

  const newGen = state.generation + 1;
  const totalKills = state.totalKills;
  const totalExplored = state.totalExplored;
  const totalGenerations = state.totalGenerations + 1;

  document.getElementById('inherit-overlay').classList.remove('open');

  // Start new generation
  setTimeout(() => {
    state = initState();
    state.generation = newGen;
    state.totalKills = totalKills;
    state.totalExplored = totalExplored;
    state.totalGenerations = totalGenerations;
    state.heirlooms = heirlooms;

    // Add heirlooms to inventory
    heirlooms.forEach(it => addToInventory(it));

    killedSet = new Set();
    const sp = findStart();
    px = sp.x; py = sp.y;
    explored = new Set([`${sp.x},${sp.y}`]);

    deathActive = false;
    // 修正：死亡若發生在地下城內，重生時要清除地下城狀態並隱藏其畫面
    dungeonState = null;
    document.getElementById('dungeon-overlay')?.classList.remove('active');
    raidState = null;

    toast(`✨ 第${newGen}代勇者踏上旅途！`);
    renderMap(); updateUI(); save(true);
  }, 500);
}

// 💿 SAVE / LOAD / RESET

function save(silent=false) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      saveVersion: SAVE_VERSION,
      ...state, killedMonsters: [...killedSet],
      px, py, explored: [...explored],
    }));
    if (!silent) showSaveToast();
  } catch(e) {}
}

function showSaveToast() {
  let t = document.getElementById('save-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'save-toast';
    t.style.cssText = 'position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 180px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:.5px solid #4ade80;color:#4ade80;font-size:11px;padding:4px 12px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999';
    document.body.appendChild(t);
  }
  t.textContent = '💾 已存檔';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 1500);
}

const SAVE_VERSION = 3; // 升版本號會自動捨棄舊存檔

function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    // 版本不符，捨棄舊存檔，使用新預設值
    if (!d.saveVersion || d.saveVersion < SAVE_VERSION) {
      localStorage.removeItem(LS_KEY);
      return;
    }
    Object.assign(state, d);
    killedSet = new Set(state.killedMonsters || []);
    if (d.px !== undefined) px = d.px;
    if (d.py !== undefined) py = d.py;
    if (Array.isArray(d.explored)) {
      explored = new Set(d.explored);
    } else if (d.explored && typeof d.explored === 'object') {
      explored = new Set(Object.keys(d.explored));
    }
    if (!state.statusEffects) state.statusEffects = [];
    if (!state.heirlooms) state.heirlooms = [];
    if (!state.inventory) state.inventory = [];
    if (!state.equipment) state.equipment = {
      helmet:null,armor:null,legs:null,gloves:null,boots:null,
      necklace:null,ring1:null,ring2:null,earring1:null,earring2:null,
    };
    if (!state.kills) state.kills = 0;
    if (!state.totalKills) state.totalKills = 0;
    if (!state.generation) state.generation = 1;
    if (!state.totalExplored) state.totalExplored = 0;
    if (!state.freePoints) state.freePoints = 0;
    if (state.expNext === undefined) state.expNext = expForLevel(state.level);
    if (!state.prevJobs) state.prevJobs = [];
    // 資料修復：舊存檔可能因bug產生同職業重複殘留記錄，去重並只保留最高等級
    if (state.prevJobs.length > 0) {
      const dedup = {};
      for (const p of state.prevJobs) {
        if (!dedup[p.job] || p.level > dedup[p.job].level) dedup[p.job] = p;
      }
      const before = state.prevJobs.length;
      state.prevJobs = Object.values(dedup);
      if (state.prevJobs.length < before) {
        console.warn(`修復轉職殘留重複記錄：${before} → ${state.prevJobs.length}`);
      }
    }
    if (!state.inventoryMax || state.inventoryMax < 40) state.inventoryMax = 40;
    if (!state.job) state.job = 'miner';
    if (!state.jobLevel) state.jobLevel = 1;
  } catch(e) {}
}

function resetGame() {
  // 跳出確認視窗，需要輸入「確認重置」才能清除
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem';
  modal.innerHTML = `
    <div style="background:#0d0d22;border:1px solid #f87171;border-radius:16px;padding:1.5rem;width:100%;max-width:320px;text-align:center">
      <div style="font-size:2rem;margin-bottom:.5rem">⚠️</div>
      <div style="color:#f87171;font-weight:700;font-size:16px;margin-bottom:.5rem">確認重置遊戲？</div>
      <div style="color:#888;font-size:12px;margin-bottom:1rem">所有進度、裝備、探索紀錄將永久清除<br>請輸入「確認重置」繼續</div>
      <input id="reset-input" type="text" placeholder="輸入：確認重置"
        style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid #333;background:#12122a;color:#fff;font-size:14px;text-align:center;margin-bottom:.75rem;outline:none">
      <div style="display:flex;gap:.5rem">
        <button onclick="this.closest('div[style]').remove()"
          style="flex:1;padding:10px;border-radius:8px;border:1px solid #333;background:transparent;color:#888;cursor:pointer">取消</button>
        <button id="reset-confirm-btn"
          style="flex:1;padding:10px;border-radius:8px;border:none;background:#7f1d1d;color:#f87171;cursor:pointer;font-weight:700"
          onclick="doReset(this)">重置</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  document.getElementById('reset-input').focus();
}

function doReset(btn) {
  const val = document.getElementById('reset-input').value.trim();
  if (val !== '確認重置') {
    document.getElementById('reset-input').style.borderColor = '#f87171';
    document.getElementById('reset-input').placeholder = '❌ 請輸入「確認重置」';
    return;
  }
  localStorage.removeItem(LS_KEY);
  location.reload();
}

document.addEventListener('keydown', e => {
  const map = {
    'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right',
    'w':'up','s':'down','a':'left','d':'right',
  };
  const dir = map[e.key];
  if (!dir) return;
  e.preventDefault();
  if (dir==='up')    move(0,-1);
  if (dir==='down')  move(0,1);
  if (dir==='left')  move(-1,0);
  if (dir==='right') move(1,0);
});

function openWorldMap() {
  openModal('modal-worldmap');
  const canvas = document.getElementById('wm-canvas');
  const legend = document.getElementById('wm-legend');
  const size = Math.min(window.innerWidth - 32, 320);
  canvas.width = size; canvas.height = size;
  const ctx2 = canvas.getContext('2d');
  const RANGE = 160; // ±160格範圍
  const scale = size / (RANGE * 2);

  ctx2.fillStyle = '#080818';
  ctx2.fillRect(0, 0, size, size);

  // 繪製已探索區域
  const terrainColors = {
    0:'#0d2a4a', 1:'#8a6020', 2:'#1a4020', 3:'#0d2a10',
    4:'#3a2a14', 5:'#1e1e1e', 6:'#1a0830', 8:'#2a1508'
  };
  for (const key of explored) {
    const [wx, wy] = key.split(',').map(Number);
    const dx = wx - px, dy = wy - py;
    if (Math.abs(dx) > RANGE || Math.abs(dy) > RANGE) continue;
    const sx = Math.floor((dx + RANGE) * scale);
    const sy = Math.floor((dy + RANGE) * scale);
    const ter = getTerrain(wx, wy);
    ctx2.fillStyle = terrainColors[ter] || '#1a1a2a';
    ctx2.fillRect(sx, sy, Math.max(1, scale), Math.max(1, scale));
  }

  // 大陸方向標示
  const contDirs = [
    {id:'desert', dx:200, dy:-50, emoji:'🏜️'},
    {id:'ice',    dx:-200,dy:-50, emoji:'❄️'},
    {id:'sea',    dx:0,   dy:250, emoji:'🌊'},
    {id:'lava',   dx:200, dy:200, emoji:'🌋'},
    {id:'sky',    dx:0,   dy:-400,emoji:'☁️'},
    {id:'shadow', dx:-200,dy:200, emoji:'🌑'},
    {id:'mech',   dx:-500,dy:0,   emoji:'⚙️'},
    {id:'hidden', dx:600, dy:0,   emoji:'👑'},
  ];
  ctx2.font = '12px serif';
  ctx2.textAlign = 'center';
  for (const c of contDirs) {
    const angle = Math.atan2(c.dy, c.dx);
    const ex = size/2 + Math.cos(angle) * (size/2 - 12);
    const ey = size/2 + Math.sin(angle) * (size/2 - 12);
    const visited = state.visitedContinents?.includes(c.id);
    ctx2.globalAlpha = visited ? 1.0 : 0.35;
    ctx2.fillText(c.emoji, ex, ey + 4);
    // 距離
    const dist = Math.floor(Math.sqrt(c.dx*c.dx + c.dy*c.dy));
    ctx2.font = '8px sans-serif'; ctx2.globalAlpha = 0.6;
    ctx2.fillStyle = '#aaa';
    ctx2.fillText(`${dist}格`, ex, ey + 14);
    ctx2.font = '12px serif';
  }
  ctx2.globalAlpha = 1.0;

  // 出發點
  const ox = Math.floor((START_X - px + RANGE) * scale);
  const oy = Math.floor((START_Y - py + RANGE) * scale);
  if (ox > 0 && ox < size && oy > 0 && oy < size) {
    ctx2.fillStyle = 'rgba(255,255,255,0.5)';
    ctx2.beginPath(); ctx2.arc(ox, oy, 3, 0, Math.PI*2); ctx2.fill();
  }

  // 玩家位置（中心紅點）
  const cx2 = size/2, cy2 = size/2;
  const grd = ctx2.createRadialGradient(cx2,cy2,0, cx2,cy2,10);
  grd.addColorStop(0,'rgba(255,80,80,1)');
  grd.addColorStop(1,'rgba(255,80,80,0)');
  ctx2.fillStyle = grd;
  ctx2.beginPath(); ctx2.arc(cx2, cy2, 10, 0, Math.PI*2); ctx2.fill();
  ctx2.fillStyle = '#ff5050';
  ctx2.beginPath(); ctx2.arc(cx2, cy2, 3, 0, Math.PI*2); ctx2.fill();

  // 圖例
  const curCont = CONTINENT_INFO[getContinent(px,py)];
  const visited = (state.visitedContinents||[]).length;
  legend.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span>📍 目前位置：<span style="color:${curCont?.color||'#fff'}">${curCont?.name||'未知'}</span></span>
      <span style="color:#888">探索 ${explored.size} 格</span>
    </div>
    <div style="margin-top:4px;color:#666">🌍 已進入大陸：${visited}/9　　暗色圖示=未探索</div>`;
}

function goBack() {
  save();
  const name = (() => { try { const d=JSON.parse(localStorage.getItem('game_lobby_v2')); return d?.name||null; } catch(e){return null;} })();
  if (name) {
    localStorage.setItem('game_pending_score', JSON.stringify({
      game: 'dungeon',
      score: state.totalKills,
      detail: `第${state.generation}代・擊殺${state.totalKills}隻・探索${state.totalExplored}格`,
    }));
  }
  window.location.href = '../';
}
