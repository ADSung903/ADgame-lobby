<!DOCTYPE html>
<!--
  ⛏️ 礦洞冒險 — Version History
  ════════════════════════════════
  v0.1  Phase 1 初版：地圖生成、基礎戰鬥、裝備系統、死亡傳承
  v0.2  Phase 1 修正：Canvas 自適應、怪物等級距離修正、初始武器+藥水
  v0.3  Phase 1 修正：SVG 主角、快速藥水欄、地圖 overlay 資訊列
  v0.4  Phase 1 修正：賣東西功能、裝備數值比較、存檔版本號
  v0.5  Phase 2 開始：8元素屬性、詛咒裝備、套件效果、職業轉職
  v0.6  Phase 2 修正：多樣掉落系統（金幣/藥水/裝備/卷軸）
  v0.7  修正：強化加成套用至攻擊/防禦計算
  v0.8  架構重整：17個獨立區塊，容器間以呼叫溝通
  v0.9  道具說明完善；鑑定系統實作；解咒選擇介面；迷霧藥水
  v1.0  戰鬥感重構：浮動傷害數字、迴避、武器差異化
        職業技能系統：每場勝利職業經驗、Lv.1/5技能解鎖、CD管理
        裝備屬性門檻；背包擴至30格；商人可購買擴充
  v1.1  9大陸系統（見上）
  v1.2  背包40格；篩選tab；藥水疊加×99；強化後數值顯示修正
        裝備等級限距調整（每10級）；地圖頁獨立按鈕（世界地圖）
        世界地圖：已探索縮略+玩家紅點+大陸方向+探索進度：座標分區、各大陸專屬怪物（共50+種）
        進入新大陸提示卡、建議等級警告、回森林傳送
        地圖overlay顯示當前大陸；scaledMonster null guard
        戰鬥先攻修正（只第一回合判斷）；版本號顯示於畫面下方
  v1.3  村莊系統：8固定村莊、5×5地磚安全區、旅館/商人/傳送石
        回家卷軸/定點傳送卷軸；寶箱系統；隱藏大陸解鎖+專屬怪物+掉落加成
        多怪物戰鬥（1~3隻）；DQ風格受擊抖動/死亡淡出；遊俠系職業樹×5
        武器/技能平衡調整；Buff改為戰鬥次數倒數
  v1.4  完整音樂系統：6首BGM依場景自動切換、10種SFX、開關按鈕、手機解鎖
  v1.34  修正鑑定後商人批量銷售計數未刷新；批量銷售開放至金裝；新增職業經驗卷軸（直升職業Lv+1）
  v1.33  修正裝備圖示 fallback 失效；快捷欄拆回復/增益兩組；背包穩定排序不再亂跳
  v1.10  完整負面狀態系統：中毒/緩速/石化/混亂/力弱/破甲/麻痺/致盲
        狀態列UI、音效掛鉤、視覺飄字特效；各大陸怪物分配對應狀態
        萬能解藥真正解除全部狀態；解毒藥水僅解中毒
  ════════════════════════════════
  SAVE_VERSION = 3
-->
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>⛏️ 礦洞冒險</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation}
:root{
  --bg:#07070f;--bg2:#0d0d1f;--bg3:#121226;--border:#1e1e3a;
  --accent:#8b5cf6;--gold:#f59e0b;--green:#4ade80;--blue:#60a5fa;
  --red:#f87171;--text:#eee;--sub:#8a8aa8;
}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);
  height:100dvh;overflow:hidden;display:flex;justify-content:center}
.app{width:100%;max-width:420px;display:flex;flex-direction:column;height:100dvh}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:.5rem;
  padding:calc(max(env(safe-area-inset-top,0px), 1.5rem) + .75rem) .75rem .5rem;
  border-bottom:.5px solid var(--border);flex-shrink:0;background:var(--bg2)}
.back-btn{font-size:12px;padding:4px 10px;border-radius:8px;
  border:.5px solid #333;background:transparent;color:#aaa;cursor:pointer}
.game-title{flex:1;text-align:center;font-size:16px;font-weight:700;color:var(--accent)}
.lv-badge{font-size:12px;font-weight:700;color:var(--gold);
  background:#1a1400;border:.5px solid var(--gold);border-radius:8px;padding:2px 8px}

/* STATUS BAR */
.status-bar{display:flex;align-items:center;gap:.5rem;padding:.35rem .75rem;
  font-size:12px;flex-shrink:0;border-bottom:.5px solid var(--border);background:var(--bg2)}
.hp-wrap{display:flex;align-items:center;gap:4px;flex:1}
.hp-bar-track{flex:1;height:7px;background:#1a0a0a;border-radius:4px;
  overflow:hidden;border:.5px solid #3a1a1a}
.hp-bar-fill{height:100%;background:linear-gradient(90deg,#b91c1c,#f87171);
  border-radius:4px;transition:width .3s}
.hp-txt{font-size:10px;color:var(--red);white-space:nowrap;font-weight:600}
.gold-txt{color:var(--gold);font-weight:700;font-size:12px;white-space:nowrap}
.wpn-txt{font-size:10px;color:var(--blue);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:120px}

/* MAP */
.map-wrap{flex:1;overflow:hidden;display:flex;align-items:flex-start;justify-content:center;background:#000;min-height:0;border-top:2px solid #1a1a2e;margin-top:4px}
#map-canvas{display:block;flex-shrink:0}

/* CONTROLS */
.controls{display:flex;align-items:center;justify-content:space-between;
  padding:.4rem .75rem calc(.4rem + env(safe-area-inset-bottom,0px));
  flex-shrink:0;background:var(--bg2);border-top:.5px solid var(--border)}
.dpad{display:flex;flex-direction:column;align-items:center;gap:3px}
.dpad-row{display:flex;align-items:center;gap:3px}
.dpad-btn{width:46px;height:46px;border-radius:10px;border:.5px solid #333;
  background:#0d0d1e;color:var(--text);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-user-select:none;user-select:none;transition:background .1s}
.dpad-btn:active{background:#1a1a3a;transform:scale(.93)}
.dpad-center{width:46px;height:46px;display:flex;align-items:center;
  justify-content:center;font-size:22px}
.act-btns{display:flex;gap:3px}
.act-btn{width:48px;height:54px;border-radius:10px;border:.5px solid #333;
  background:#0d0d1e;color:var(--text);font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:2px;line-height:1;
  -webkit-user-select:none;user-select:none;transition:background .1s}
.act-btn:active{background:#1a1a3a}
.act-btn span{font-size:16px}

/* TOAST */
.toast{position:fixed;bottom:calc(100px + env(safe-area-inset-bottom,0px));
  left:50%;transform:translateX(-50%);background:#1a1a3a;
  border:.5px solid var(--accent);border-radius:10px;padding:.4rem 1rem;
  font-size:13px;color:#c4b5fd;z-index:500;white-space:nowrap;
  opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center}

/* MODAL BASE */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-back.open{display:flex}
.modal-sheet{width:100%;max-width:420px;max-height:88dvh;
  background:var(--bg2);border-radius:20px 20px 0 0;
  border:.5px solid var(--border);overflow:hidden;display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom,0px)}
.modal-head{display:flex;align-items:center;padding:.8rem 1rem;
  border-bottom:.5px solid var(--border);flex-shrink:0}
.modal-title{flex:1;font-size:15px;font-weight:700}
.modal-x{width:30px;height:30px;border-radius:50%;border:.5px solid var(--border);
  background:var(--bg3);color:var(--sub);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center}
.modal-body{flex:1;overflow-y:auto;padding:.6rem}
.modal-body::-webkit-scrollbar{width:3px}
.modal-body::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}

/* INVENTORY */
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.inv-slot{background:var(--bg3);border:.5px solid var(--border);border-radius:10px;
  padding:.5rem .3rem;text-align:center;cursor:pointer;
  min-height:70px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;transition:border-color .15s}
.inv-slot:hover{border-color:var(--accent)}
.inv-slot .s-icon{font-size:22px;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.inv-slot .s-name{font-size:9px;color:var(--sub);line-height:1.2;word-break:break-all}
.inv-slot .s-enh{font-size:10px;font-weight:700;color:var(--gold)}
.inv-slot.white .s-name{color:#ddd}
.inv-slot.green .s-name{color:var(--green)}
.inv-slot.blue .s-name{color:var(--blue)}
.inv-slot.gold .s-name{color:var(--gold)}
.inv-slot.red .s-name{color:var(--red)}
.inv-slot.empty{cursor:default;opacity:.3}
.inv-count{font-size:11px;color:var(--sub);text-align:right;margin-bottom:.4rem}

/* EQUIPMENT PANEL */
.eq-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.eq-slot{background:var(--bg3);border:.5px solid var(--border);border-radius:10px;
  padding:.5rem;display:flex;align-items:center;gap:.5rem;cursor:pointer;
  transition:border-color .15s;min-height:52px}
.eq-slot:hover{border-color:var(--accent)}
.eq-slot .es-icon{font-size:20px;flex-shrink:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.eq-slot .es-info{flex:1;min-width:0}
.eq-slot .es-label{font-size:10px;color:var(--sub);line-height:1}
.eq-slot .es-name{font-size:11px;font-weight:600;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.eq-slot.empty .es-name{color:var(--sub);font-weight:400}
.eq-weapon-row{margin-bottom:6px;background:var(--bg3);border:.5px solid var(--border);
  border-radius:10px;padding:.5rem;display:flex;align-items:center;gap:.5rem;cursor:pointer}

/* STATS PANEL */
.stat-section{margin-bottom:.8rem}
.stat-section h3{font-size:11px;color:var(--sub);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:.4rem}
.stat-row{display:flex;justify-content:space-between;align-items:center;
  padding:.32rem 0;border-bottom:.5px solid var(--bg3)}
.stat-row .sn{font-size:13px;color:var(--sub)}
.stat-row .sv{font-size:13px;font-weight:700;color:var(--text)}
.alloc-row{display:flex;justify-content:space-between;align-items:center;
  padding:.32rem 0;border-bottom:.5px solid var(--bg3)}
.alloc-row .an{font-size:13px}
.alloc-row .av{font-size:13px;font-weight:700;min-width:40px;text-align:center}
.alloc-btn{width:28px;height:28px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.alloc-btn:disabled{background:#2a2a4a;color:#555;cursor:default}
.points-badge{text-align:center;padding:.5rem;background:#1a0a2a;
  border:.5px solid var(--accent);border-radius:8px;margin-bottom:.6rem;
  font-size:13px;color:var(--accent);font-weight:700}

/* ITEM CARD */
.item-card-back{position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:350;display:none;align-items:center;justify-content:center;padding:1rem}
.item-card-back.open{display:flex}
.item-card{background:var(--bg2);border:1px solid var(--accent);border-radius:18px;
  padding:1.2rem;width:100%;max-width:320px;max-height:80dvh;overflow-y:auto}
.ic-name{font-size:18px;font-weight:800;margin-bottom:.15rem}
.ic-sub{font-size:11px;color:var(--sub);margin-bottom:.6rem}
.ic-flavor{font-size:11px;color:#8a8aa8;font-style:italic;
  background:var(--bg3);border-radius:8px;padding:.5rem .6rem;
  margin-bottom:.6rem;line-height:1.6}
.ic-stats{margin-bottom:.6rem}
.ic-stat{display:flex;justify-content:space-between;font-size:12px;
  padding:.2rem 0;border-bottom:.5px solid var(--bg3)}
.ic-stat .ics-pos{color:var(--green);font-weight:600}
.ic-stat .ics-neg{color:var(--red);font-weight:600}
.ic-req{font-size:11px;color:var(--sub);margin-bottom:.6rem}
.ic-req .req-fail{color:var(--red)}
.ic-heirloom{font-size:11px;color:var(--gold);background:#1a1200;
  border:.5px solid var(--gold);border-radius:8px;padding:.4rem .6rem;margin-bottom:.6rem}
.ic-btns{display:flex;gap:6px;flex-wrap:wrap}
.ic-btn{flex:1;min-width:70px;padding:8px 4px;border-radius:10px;
  border:none;font-size:12px;font-weight:700;cursor:pointer}
.ic-btn-equip{background:var(--accent);color:#fff}
.ic-btn-use{background:#1a3a1a;color:var(--green);border:.5px solid var(--green)}
.ic-btn-drop{background:#1a0a0a;color:var(--red);border:.5px solid var(--red)}
.ic-btn-sell{background:#1a1400;color:var(--gold);border:.5px solid var(--gold)}
.ic-btn-close{background:var(--bg3);color:var(--sub);border:.5px solid var(--border)}

/* MERCHANT */
.merchant-item{background:var(--bg3);border:.5px solid var(--border);
  border-radius:10px;padding:.6rem;margin-bottom:.4rem;display:flex;
  align-items:center;gap:.5rem}
.mi-icon{font-size:22px;flex-shrink:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.mi-info{flex:1;min-width:0}
.mi-name{font-size:13px;font-weight:600}
.mi-desc{font-size:10px;color:var(--sub)}
.mi-price{font-size:13px;font-weight:700;color:var(--gold)}
.mi-buy{padding:5px 12px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.mi-buy:disabled{background:#2a2a4a;color:#555;cursor:default}

/* COMBAT OVERLAY */
.combat-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  z-index:200;
  visibility:hidden;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s;
}
.combat-overlay.active{
  visibility:visible;
  opacity:1;
  pointer-events:auto;
}
/* 地圖暗層 */
.map-dim{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.88);
  z-index:5;
  display:none;
  pointer-events:none;
}
.map-dim.active{display:block}

/* Corner answer buttons */
.ans-btn{position:fixed;z-index:210;width:100px;
  border:2px solid var(--accent);background:rgba(14,10,35,.97);
  color:var(--text);font-size:20px;font-weight:800;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;line-height:1.1;-webkit-user-select:none;user-select:none;
  transition:transform .1s,border-color .1s,background .1s}
.ans-btn:active{transform:scale(.9);border-color:var(--gold);background:rgba(30,15,60,.97)}
.ans-btn.correct{border-color:var(--green)!important;background:rgba(0,30,10,.97)!important}
.ans-btn.wrong{border-color:var(--red)!important;background:rgba(30,5,5,.97)!important}
.ans-btn .ans-label{font-size:10px;color:var(--sub);font-weight:400}

#ans-tl{top:0;left:0;
  padding:calc(max(env(safe-area-inset-top,0px), 1.5rem) + .75rem) 8px 16px;
  border-radius:0 0 14px 0;border-width:0 2px 2px 0;min-height:calc(80px + max(env(safe-area-inset-top,0px), 1.5rem))}
#ans-tr{top:0;right:0;
  padding:calc(max(env(safe-area-inset-top,0px), 1.5rem) + .75rem) 8px 16px;
  border-radius:0 0 0 14px;border-width:0 0 2px 2px;min-height:calc(80px + max(env(safe-area-inset-top,0px), 1.5rem))}
#ans-bl{bottom:0;left:0;
  padding:16px 8px calc(max(12px,env(safe-area-inset-bottom,0px)));
  border-radius:0 14px 0 0;border-width:2px 2px 0 0;min-height:calc(80px + env(safe-area-inset-bottom,0px))}
#ans-br{bottom:0;right:0;
  padding:16px 8px calc(max(12px,env(safe-area-inset-bottom,0px)));
  border-radius:14px 0 0 0;border-width:2px 0 0 2px;min-height:calc(80px + env(safe-area-inset-bottom,0px))}

/* Combat center content */
.combat-center{position:fixed;top:0;left:0;right:0;bottom:0;z-index:205;display:flex;flex-direction:column;
  pointer-events:none;max-width:420px;margin:0 auto}
.combat-center>*{pointer-events:auto}
.cb-mon{margin-top:calc(env(safe-area-inset-top,0px) + 52px);
  padding:.5rem 1rem;text-align:center;flex-shrink:0}
.cb-mon-group{margin-top:calc(env(safe-area-inset-top,0px) + 40px);
  padding:.3rem 1rem;display:flex;justify-content:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.cb-mon-unit{display:flex;flex-direction:column;align-items:center;gap:3px;
  min-width:70px;transition:opacity .5s, transform .5s}
.cb-mon-unit.dead{opacity:0;transform:scale(0.3) translateY(10px);pointer-events:none}
.cb-mon-unit.targeted .cb-mon-sprite{filter:drop-shadow(0 0 8px #ef4444)}
.cb-mon-sprite{font-size:32px;line-height:1;transition:transform .15s}
.cb-mon-sprite.shake{animation:monShake .3s ease}
@keyframes monShake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px) rotate(-5deg)}
  40%{transform:translateX(5px) rotate(4deg)}
  60%{transform:translateX(-4px) rotate(-3deg)}
  80%{transform:translateX(3px) rotate(2deg)}
}
.cb-mon-unit-name{font-size:11px;font-weight:700;color:var(--red);text-align:center;max-width:75px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cb-mon-unit-hptrack{width:65px;height:6px;background:#2a0a0a;border-radius:3px;overflow:hidden;border:.5px solid #3a1a1a}
.cb-mon-unit-hpfill{height:100%;background:linear-gradient(90deg,#dc2626,#ef4444);border-radius:3px;transition:width .4s}
.cb-mon-unit-hptxt{font-size:9px;color:var(--sub)}
.cb-mon-name{font-size:20px;font-weight:800;color:var(--red);margin-bottom:.3rem;text-align:center}
.cb-mon-hp-track{height:8px;background:#2a0a0a;border-radius:4px;
  overflow:hidden;border:.5px solid #3a1a1a}
.cb-mon-hp-fill{height:100%;background:linear-gradient(90deg,#dc2626,#ef4444);
  border-radius:4px;transition:width .4s}
.cb-mon-hp-txt{font-size:10px;color:var(--sub);margin-top:.15rem}
.cb-log{flex:none;overflow-y:auto;padding:.4rem 1rem;display:flex;
  flex-direction:column;gap:.1rem;margin:4px 0;max-height:28vh}
.cb-log::-webkit-scrollbar{width:3px}
.cb-log::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}
.cb-line{font-size:13px;line-height:1.65;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(.5)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-40px) scale(1.2)}100%{opacity:0;transform:translateY(-70px) scale(0.8)}}
.cl-w{color:var(--text)}.cl-r{color:var(--red);font-weight:700}
.cl-g{color:var(--green)}.cl-y{color:var(--gold);font-weight:700}
.cl-p{color:#c084fc}.cl-o{color:#fb923c}.cl-s{color:var(--sub)}

.cb-q{padding:.4rem 1rem;flex-shrink:0;text-align:center;pointer-events:none}
.cb-q-text{font-size:24px;font-weight:900;letter-spacing:1px;margin-bottom:.35rem}
.cb-timer-track{height:8px;background:#1a1a2a;border-radius:4px;
  overflow:hidden;border:.5px solid var(--border)}
.cb-timer-fill{height:100%;width:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--green),var(--gold),var(--red))}
.cb-footer{padding:.4rem 1rem calc(max(12px,env(safe-area-inset-bottom,0px)) + 8px);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cb-player-hp{font-size:12px;color:var(--green);font-weight:700}
#cb-status-bar{display:inline-flex;align-items:center;margin-left:6px;vertical-align:middle}

<script>
'use strict';
// ═══════════════════════════════════════════════
// WORLD SEED (changes each quarter)
// ═══════════════════════════════════════════════
const d0 = new Date();
const WORLD_SEED = d0.getFullYear() * 4 + Math.floor(d0.getMonth() / 3);

// ═══════════════════════════════════════════════
// SEEDED PRNG + NOISE
// ═══════════════════════════════════════════════


// ════════════════════════════════════════════════════════════
// 🌍 WORLD GENERATION — Perlin Noise, Terrain
// ════════════════════════════════════════════════════════════

function posH(x, y, s) {
  let h = (s * 2246822519 + x * 374761393 + y * 1103515245) | 0;
  h = Math.imul(h ^ (h >>> 13), h * 15731 + 789221) | 0;
  h = h ^ (h >>> 17);
  return (h >>> 0) / 0x100000000;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function ss(t) { return t * t * (3 - 2 * t); }

function vnoise(x, y, s) {
  const xi = Math.floor(x), yi = Math.floor(y);
  const xf = ss(x - xi), yf = ss(y - yi);
  return lerp(
    lerp(posH(xi, yi, s), posH(xi+1, yi, s), xf),
    lerp(posH(xi, yi+1, s), posH(xi+1, yi+1, s), xf), yf);
}

function worldNoise(wx, wy) {
  return 0.5  * vnoise(wx*0.030, wy*0.030, WORLD_SEED)
       + 0.3  * vnoise(wx*0.080, wy*0.080, WORLD_SEED+1000)
       + 0.2  * vnoise(wx*0.150, wy*0.150, WORLD_SEED+2000);
}

function tileH(wx, wy, off) {
  return posH(wx ^ (off*7919), wy ^ (off*6271), WORLD_SEED + off*1231);
}

// 取得村莊中心世界座標
function getVillageCenter(vid) {
  const v = VILLAGE_DEFS[vid];
  if (!v) return null;
  return {x: START_X + v.dx, y: START_Y + v.dy};
}

// 判斷某格是否在某村莊範圍內（3格半徑）
function getVillageAt(wx, wy) {
  for (const [vid, v] of Object.entries(VILLAGE_DEFS)) {
    const cx = START_X + v.dx, cy = START_Y + v.dy;
    if (Math.abs(wx - cx) <= 2 && Math.abs(wy - cy) <= 2) return {vid, ...v, cx, cy};
  }
  return null;
}

// 傳送石位置 = 村莊中心
// 每小時寶箱位置（每大陸 2~3 個）
const CHEST_PER_CONT = 3;
function getChestPositions() {
  const hourSeed = Math.floor(Date.now() / 3600000);
  const chests = [];
  const contList = ['forest','desert','ice','sea','lava','sky','shadow','mech'];
  const contBounds = {
    forest:{cx:START_X,cy:START_Y,r:140},
    desert:{cx:START_X+220,cy:START_Y-80,r:100},
    ice:   {cx:START_X-220,cy:START_Y-80,r:100},
    sea:   {cx:START_X+20, cy:START_Y+270,r:100},
    lava:  {cx:START_X+220,cy:START_Y+220,r:100},
    sky:   {cx:START_X+30, cy:START_Y-420,r:100},
    shadow:{cx:START_X-220,cy:START_Y+220,r:100},
    mech:  {cx:START_X-520,cy:START_Y+30, r:100},
  };
  for (const cont of contList) {
    const b = contBounds[cont];
    for (let i = 0; i < CHEST_PER_CONT; i++) {
      const hv1 = Math.sin(hourSeed*127.1 + i*311.7 + cont.charCodeAt(0)*53) * 43758.5;
      const hv2 = Math.sin(hourSeed*311.7 + i*127.1 + cont.charCodeAt(0)*71) * 43758.5;
      const r1 = hv1 - Math.floor(hv1);
      const r2 = hv2 - Math.floor(hv2);
      const cx2 = Math.floor(b.cx + (r1*2-1)*b.r*0.7);
      const cy2 = Math.floor(b.cy + (r2*2-1)*b.r*0.7);
      chests.push({wx:cx2, wy:cy2, cont});
    }
  }
  return chests;
}

let _chestCache = null, _chestHour = -1;
function isChestAt(wx, wy) {
  const hr = Math.floor(Date.now() / 3600000);
  if (hr !== _chestHour) { _chestCache = getChestPositions(); _chestHour = hr; }
  // 已撿走的
  const key = `chest_${wx}_${wy}_${hr}`;
  if (state.openedChests?.includes(key)) return false;
  return _chestCache.some(c => c.wx === wx && c.wy === wy);
}

function openChest(wx, wy) {
  const hr = Math.floor(Date.now() / 3600000);
  const key = `chest_${wx}_${wy}_${hr}`;
  if (!state.openedChests) state.openedChests = [];
  if (state.openedChests.includes(key)) { toast('這個寶箱已經被開過了'); return; }
  state.openedChests.push(key);
  playSFX('chest');

  const cont = getContinent(wx, wy);
  const contInfo = CONTINENT_INFO[cont];
  const recLv = contInfo?.recLv || 1;

  // 生成 2~5 樣內容
  const count = 2 + Math.floor(Math.random() * 4);
  const items = [];
  const pool = ['gem','gem','weapon','armor','accessory','potion','potion','gold'];

  for (let i = 0; i < count; i++) {
    const type = pool[Math.floor(Math.random() * pool.length)];
    if (type === 'gold') {
      const g = (recLv + 1) * (50 + Math.floor(Math.random() * 100));
      items.push({type:'gold', amount:g});
    } else if (type === 'gem') {
      const gems = ['💎','💎','💍','🔴','🟡'];
      const gemNames = ['藍寶石','藍寶石','鑽石','紅寶石','黃玉'];
      const gemPrices = [200,200,800,500,300];
      const gi = Math.floor(Math.random() * gems.length);
      items.push({id:Date.now()+Math.random(), type:'potion', subtype:'gem',
        name:gemNames[gi], icon:gems[gi], rarity:'blue',
        desc:`珍貴寶石，可賣給商人`, price:gemPrices[gi]*recLv,
        effect:{sell_only:true}});
    } else if (type === 'potion') {
      const potIdx = Math.floor(Math.random() * 3);
      const pots = [
        {name:'回復藥水',icon:'🍶',subtype:'heal_m',effect:{heal:80}},
        {name:'大回復藥水',icon:'💊',subtype:'heal_l',effect:{heal:200}},
        {name:'敏捷藥水',icon:'⚡',subtype:'agi_boost',effect:{buff:'agi',amt:0.3,turns:3}},
      ];
      const p = pots[potIdx];
      items.push({id:Date.now()+Math.random(), type:'potion', rarity:'green', price:100, desc:'',  ...p});
    } else {
      const rarity = ['white','green','blue'][Math.min(2,Math.floor(recLv/20))];
      const it = type === 'weapon'
        ? generateWeapon(rarity, recLv + Math.floor(Math.random()*5))
        : generateArmor(ARMOR_SLOTS[Math.floor(Math.random()*ARMOR_SLOTS.length)], rarity, recLv);
      it.unidentified = true;
      it.name = type === 'weapon' ? '【待鑑定】神秘武器' : '【待鑑定】神秘防具';
      it.icon = '❓';
      items.push(it);
    }
  }

  // 顯示寶箱內容
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:400;padding:1rem';
  modal.innerHTML = `
    <div style="background:#0d0d22;border:1px solid #f59e0b;border-radius:16px;padding:1.2rem;width:100%;max-width:300px">
      <div style="text-align:center;font-size:18px;font-weight:700;color:#f59e0b;margin-bottom:.8rem">📦 寶箱！</div>
      <div style="display:flex;flex-direction:column;gap:.4rem;margin-bottom:.8rem">
        ${items.map(it => it.type==='gold'
          ? `<div style="color:#f59e0b;font-size:13px">💰 金幣 × ${it.amount}</div>`
          : `<div style="font-size:12px" class="rarity-${it.rarity||'white'}">${it.icon} ${it.name}</div>`
        ).join('')}
      </div>
      <button onclick="collectChest(${JSON.stringify(items).replace(/"/g,'&quot;')},this.closest('[style*=fixed]'))"
        style="width:100%;padding:10px;border-radius:10px;border:none;background:#92400e;color:#fde68a;font-size:13px;font-weight:700;cursor:pointer">
        📦 收入背包
      </button>
    </div>`;
  document.body.appendChild(modal);
}

function collectChest(items, modal) {
  let goldGained = 0;
  for (const it of items) {
    if (it.type === 'gold') {
      state.gold += it.amount;
      goldGained += it.amount;
    } else {
      if (!addToInventory(it)) toast(`${it.name} 因背包已滿消失了`);
    }
  }
  if (goldGained > 0) toast(`💰 獲得 ${goldGained} 金幣`);
  if (modal) modal.remove();
  updateUI(); save(true);
}

function getTeleportAt(wx, wy) {
  for (const [vid, v] of Object.entries(VILLAGE_DEFS)) {
    const cx = START_X + v.dx, cy = START_Y + v.dy;
    if (wx === cx && wy === cy) return {vid, ...v};

  return null;
}

// 寶箱位置（每小時刷新，每大陸 2~3 個）
function getChestAt(wx, wy) {
  const hourSeed = Math.floor(Date.now() / 3600000);
  const continent = getContinent(wx, wy);
  if (continent === 'forest') {
    // 只在大陸內生成
    for (let i = 0; i < 3; i++) {
      const hx = Math.sin(hourSeed * 127 + i * 311 + wx * 0) * 43758.5;
      const hy = Math.sin(hourSeed * 311 + i * 127 + wy * 0) * 43758.5;
      const chestX = START_X + Math.floor(((hx - Math.floor(hx)) * 2 - 1) * 120);
      const chestY = START_Y + Math.floor(((hy - Math.floor(hy)) * 2 - 1) * 120);
      if (wx === chestX && wy === chestY) return true;
    }
  }
  return false;
}

const SPAWN_RATE = {[T.PLAINS]:0.22,[T.FOREST]:0.38,[T.MOUNTAIN]:0.15,[T.COAST]:0.06};

function getTerrain(wx, wy) {
  // 村莊特殊格子（5×5範圍）— 無條件存在，不受地形噪聲影響
  const village = getVillageAt(wx, wy);
  if (village) {
    const vdx = wx - village.cx, vdy = wy - village.cy;
    if (vdx === 0  && vdy === 0)  return T.TELEPORT;
    if (vdx === -1 && vdy === -1) return T.MERCHANT;
    if (vdx === 1  && vdy === -1) return T.VILLAGE;
    return T.PLAINS;
  }

  const n = worldNoise(wx, wy);
  if (n >= 0.32 && n < 0.88) {
    // 寶箱（每小時刷新）
    if (isChestAt(wx, wy)) return T.CHEST;
    // 洞穴：約1%機率
    if (tileH(wx, wy, 1) < 0.001) return T.CAVE;
    // 商人：約0.5%機率，且周圍20格內不能有其他商人
    if (tileH(wx, wy, 2) < 0.0009) {
      let nearMerch = false;
      for (let dy = -20; dy <= 20; dy++) {
        for (let dx = -20; dx <= 20; dx++) {
          if (dx === 0 && dy === 0) continue;
          const dist = Math.abs(dx) + Math.abs(dy);
          if (dist > 20) continue;
          if (tileH(wx+dx, wy+dy, 2) < 0.0009 && worldNoise(wx+dx,wy+dy) >= 0.32 && worldNoise(wx+dx,wy+dy) < 0.88) {
            // 只保留 hash 較大的那個，確保唯一性
            if (tileH(wx+dx, wy+dy, 2) > tileH(wx, wy, 2)) { nearMerch = true; break; }
          }
        }
        if (nearMerch) break;
      }
      if (!nearMerch) return T.MERCHANT;
    }
  }
  if (n < 0.30) return T.OCEAN;
  if (n < 0.40) return T.COAST;
  if (n < 0.62) return T.PLAINS;
  if (n < 0.76) return T.FOREST;
  if (n < 0.88) return T.MOUNTAIN;
  return T.HIGH;
}

function isPassable(t) { return TERRAIN_INFO[t]?.pass !== false; }

// ── 大陸判斷 ──
function getContinent(wx, wy) {
  const dx = wx - START_X, dy = wy - START_Y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  // angle: 0°=東, 90°=北, 180°/-180°=西, -90°=南（標準數學角度，y軸已反轉成"上=北"）
  const angle = Math.atan2(-dy, dx) * 180 / Math.PI;

  if (dist < 150) return 'forest'; // 新手森林：中心150格

  // 9大陸用明確的角度扇形劃分（每個方位40°，避免互相侵占）
  // 角度範圍：東=0° 東北=45° 北=90° 西北=135° 西=180°/-180° 西南=-135° 南=-90° 東南=-45°
  if (dist >= 600 && angle >= -20 && angle < 20) return 'hidden';   // 正東：隱藏大陸
  if (dist >= 200 && angle >= 20 && angle < 70)  return 'desert';   // 東北：沙漠
  if (dist >= 400 && angle >= 70 && angle < 110) return 'sky';      // 正北：天空浮島
  if (dist >= 200 && angle >= 110 && angle < 160) return 'ice';     // 西北：冰雪荒原
  if (dist >= 500 && (angle >= 160 || angle < -160)) return 'mech'; // 正西：機械廢都
  if (dist >= 300 && angle >= -160 && angle < -110) return 'shadow'; // 西南：暗影次元
  if (dist >= 250 && angle >= -110 && angle < -70) return 'sea';    // 正南：深海礦洞
  if (dist >= 300 && angle >= -70 && angle < -20) return 'lava';   // 東南：熔岩地獄

  return 'forest'; // 角度落在縫隙或距離不足時，預設新手森林
}

function getMonsterAt(wx, wy) {
  const k = `${wx},${wy}`;
  if (killedSet.has(k)) return null;
  if (getVillageAt(wx, wy)) return null; // 村莊5×5範圍內不生怪物
  const ter = getTerrain(wx, wy);
  if (!SPAWN_TERRAIN.includes(ter)) return null;
  const h3 = tileH(wx, wy, 3);
  if (h3 > SPAWN_RATE[ter]) return null;

  const continent = getContinent(wx, wy);
  const pools = CONTINENT_POOLS[continent] || CONTINENT_POOLS.forest;

  const h4 = tileH(wx, wy, 4);
  if (h4 < 0.05) {
    const elitePool = pools.elite;
    const idx = Math.floor(tileH(wx, wy, 5) * elitePool.length);
    return { name: elitePool[idx], wx, wy };
  }
  const pool = pools.normal;
  const idx = Math.floor(h4 * pool.length);
  return { name: pool[idx], wx, wy };
}

function scaledMonster(name, baseLevel) {
  const d = MDEFS[name];
  if (!d) {
    console.error('Unknown monster:', name);
    // 回傳預設怪物避免崩潰
    return scaledMonster('毒牙蟲', baseLevel);
  }
  const lv = Math.max(1, baseLevel);
  // 怪物成長曲線：改用更接近指數的曲線，避免高等級時被玩家輕易碾壓
  // 一般怪物：(1+lv*0.08) 線性 → 改為輕度指數
  // 菁英/Boss：額外再強化，凸顯首領的存在感
  const hpScale = Math.pow(1 + lv * 0.045, 1.55) * (d.elite ? 1.8 : 1.0);
  const atkScale = Math.pow(1 + lv * 0.035, 1.45) * (d.elite ? 1.5 : 1.0);
  const defScale = Math.pow(1 + lv * 0.03, 1.3) * (d.elite ? 1.4 : 1.0);
  return {
    name, icon:d.icon, maxHp: Math.floor(d.hp*hpScale), atk: Math.floor(d.atk*atkScale),
    def: Math.floor(d.def*defScale), agi:d.agi, special:d.special,
    drop:d.drop, exp:d.exp+lv*4, gold:Math.floor(d.gold*(1+lv*0.05)),
    elite:d.elite, lv, element:d.element||'none',
    hp:0,
    segments: d.special==='segments' ? 3 : 0,
    segHp: d.special==='segments' ? Math.ceil(Math.floor(d.hp*hpScale)/3) : 0,
    slowStacks: 0,
  };
}

// 取得物品對應的 sprite 圖片路徑；找不到對應圖則回傳 null（呼叫端fallback成emoji）
function getSpritePath(item) {
  if (!item) return null;
  const rarity = item.rarity || 'white';
  if (item.type === 'weapon') {
    return `${SPRITE_BASE}weapon_${item.subtype}_${rarity}.png`;
  }
  if (item.type === 'armor') {
    const slotMap = { helmet:'helmet', armor:'armor', legs:'legs', gloves:'gloves', boots:'boots',
      necklace:'acc_necklace', ring1:'acc_ring', ring2:'acc_ring', earring1:'acc_earring', earring2:'acc_earring' };
    const mapped = slotMap[item.subtype];
    if (!mapped) return null;
    if (mapped === 'helmet') return `${SPRITE_BASE}helmet_${rarity}.png`;
    if (mapped.startsWith('acc_')) return `${SPRITE_BASE}${mapped}_${rarity}.png`;
    // armor/legs/gloves/boots 依職業決定重甲或輕甲風格
    const style = getArmorStyle();
    return `${SPRITE_BASE}${style}_${mapped}_${rarity}.png`;
  }
  return null;
}

// 產生 icon 顯示用的 HTML：優先用圖片，找不到圖則 fallback 成原本的 emoji
function renderItemIcon(item, sizeClass) {
  if (!item) return '';
  if (item.unidentified) return `<span class="${sizeClass||''}">${item.icon||'❓'}</span>`;
  const spritePath = getSpritePath(item);
  if (spritePath) {
    // 用 data-fb 儲存 fallback emoji，onerror 透過 dataset 讀取，避免引號問題
    const fb = (item.icon||'❓').replace(/'/g,"\\'");
    return `<img src="${spritePath}" class="${sizeClass||''}" data-fb="${(item.icon||'❓').replace(/"/g,'&quot;')}" style="display:block;width:100%;height:100%;object-fit:contain;image-rendering:pixelated"
      onerror="var s=document.createElement('span');s.className=this.className;s.textContent=this.dataset.fb;this.replaceWith(s)">`;
  }
  return `<span class="${sizeClass||''}">${item.icon||'❓'}</span>`;
}

function rarityIdx(r) { return RARITY_ORDER.indexOf(r); }

function rollElement(rarity) {
  const noneChance = {white:0.8, green:0.5, blue:0.2}[rarity] || 0.1;
  if (Math.random() < noneChance) return 'none';
  const elems = Object.keys(ELEMENTS).filter(e => e !== 'none');
  return elems[Math.floor(Math.random() * elems.length)];
}

function rollCurse(rarity) {
  return Math.random() < (CURSE_CHANCE[rarity] || 0);
}

function generateWeapon(rarity, level) {
  const ri = rarityIdx(rarity);
  const r2 = RARITY_ORDER[ri];
  const sub = WPN_SUBTYPES[Math.floor(Math.random() * WPN_SUBTYPES.length)];
  const tpl = WPN_TPL[sub][Math.min(ri,2)];
  const name = tpl[Math.floor(Math.random() * tpl.length)];
  const base = {white:4,green:8,blue:16,gold:30,red:50,rainbow:80}[r2] || 4;
  const lm = 1 + level * 0.06;
  const v = () => Math.floor(base * lm * (0.8 + Math.random()*0.4));
  const stats = {str:0,agi:0,int:0,luk:0,def:0};
  if (sub==='sword')   { stats.str=v(); stats.agi=Math.floor(v()/2); }
  else if (sub==='axe')   { stats.str=Math.floor(v()*1.5); }
  else if (sub==='bow')   { stats.agi=Math.floor(v()*1.5); }
  else if (sub==='wand')  { stats.int=Math.floor(v()*2); }
  else if (sub==='dagger'){ stats.agi=Math.floor(v()*2); stats.luk=Math.floor(v()/2); }
  else if (sub==='spear') { stats.str=v(); stats.def=Math.floor(v()/3); }
  const isCursed = rollCurse(r2);
  const curseType = isCursed ? CURSE_EFFECTS[Math.floor(Math.random()*CURSE_EFFECTS.length)].type : null;
  if (isCursed) { for (const k in stats) if (stats[k]) stats[k] = Math.ceil(stats[k]*1.2); }
  // 藍色以上有70%機率待鑑定
  const unidentified = (r2 === 'blue' || r2 === 'gold' || r2 === 'red' || r2 === 'rainbow')
    && Math.random() < 0.70;
  return {
    id: Date.now()+Math.random(), type:'weapon', subtype:sub, rarity:r2,
    name: unidentified ? `【待鑑定】${['神秘武器','未知利器','古老兵器'][Math.floor(Math.random()*3)]}` : name,
    realName: name,
    icon: unidentified ? '❓' : WPN_ICON[sub], enhance:0, element:rollElement(r2),
    cursed:isCursed, purified:false, curseType,
    stats: unidentified ? {} : stats, realStats: stats,
    reqLevel:({white:0,green:10,blue:20,gold:30,red:50,rainbow:100}[r2]||0),
    unidentified,
    flavorText: unidentified ? '這件裝備散發著神秘的氣息，需要鑑定才能了解其真正能力。' : (WPN_FLAVOR[name] || `一把${name}，散發著冒險的氣息`),
    fromGeneration:null, deathLocation:null, deathKills:null,
  };
}

function generateArmor(slot, rarity, level, forceSetId) {
  if (!ARMOR_SLOTS.includes(slot)) {
    console.warn('Invalid armor slot:', slot, '→ fallback to random slot');
    slot = ARMOR_SLOTS[Math.floor(Math.random()*ARMOR_SLOTS.length)];
  }
  const ri = rarityIdx(rarity);
  const r2 = RARITY_ORDER[ri];
  const tpl = ARMOR_TPL[slot]?.[Math.min(ri,2)] || ARMOR_TPL.armor[0];
  const name = tpl[Math.floor(Math.random() * tpl.length)];
  const base = {white:3,green:6,blue:12,gold:22,red:38,rainbow:60}[r2] || 3;
  const lm = 1 + level * 0.05;
  const v = () => Math.floor(base * lm * (0.8 + Math.random()*0.4));
  const stats = {};
  const mainStat = {
    helmet:'def', armor:'def', legs:'def', gloves:'str', boots:'agi',
    necklace:'luk', ring1:'str', ring2:'int', earring1:'luk', earring2:'int',
  }[slot] || 'def';
  stats[mainStat] = v();
  if (r2 !== 'white' && Math.random() < 0.5) {
    const extra = ['str','agi','luk','int','def'].filter(s=>s!==mainStat);
    const ek = extra[Math.floor(Math.random()*extra.length)];
    stats[ek] = Math.floor(v()/2);
  }

  // 套裝判定：金裝以上、四個固定部位(helmet/armor/gloves/boots)，且等級符合套裝門檻
  // 隱藏大陸機率大幅提升（0.12→0.35）
  let setId = forceSetId || null;
  const setChance = (getContinent(px, py) === 'hidden') ? 0.35 : 0.12;
  if (!setId && (r2 === 'gold' || r2 === 'red' || r2 === 'rainbow') &&
      ['helmet','armor','gloves','boots'].includes(slot) && Math.random() < setChance) {
    const candidates = Object.entries(SET_DEFS).filter(([_,d]) => level >= (d.minLv||0));
    if (candidates.length > 0) {
      setId = candidates[Math.floor(Math.random()*candidates.length)][0];
    }
  }
  const setName = setId ? SET_DEFS[setId]?.name : null;
  const finalName = setId ? `${setName}・${SLOT_LABEL[slot]||name}` : name;

  const isCursed = !setId && rollCurse(r2);
  const curseType = isCursed ? CURSE_EFFECTS[Math.floor(Math.random()*CURSE_EFFECTS.length)].type : null;
  if (isCursed) { for (const k in stats) if (stats[k]) stats[k] = Math.ceil(stats[k]*1.2); }
  const unidentified = !setId && (r2 === 'blue' || r2 === 'gold' || r2 === 'red' || r2 === 'rainbow')
    && Math.random() < 0.70;
  return {
    id: Date.now()+Math.random(), type:'armor', subtype:slot, rarity:r2,
    name: unidentified ? `【待鑑定】${['神秘防具','古老護甲','未知寶物'][Math.floor(Math.random()*3)]}` : finalName,
    realName: finalName,
    icon: unidentified ? '❓' : SLOT_ICON[slot], enhance:0, element:setId ? SET_DEFS[setId].element : rollElement(r2),
    cursed:isCursed, purified:false, curseType,
    setId: unidentified ? null : setId,
    stats: unidentified ? {} : stats, realStats: stats,
    reqLevel:({white:0,green:10,blue:20,gold:30,red:50,rainbow:100}[r2]||0),
    unidentified,
    flavorText: unidentified ? '這件裝備散發著神秘的氣息，需要鑑定才能了解其真正能力。'
              : setId ? `傳說中的${setName}套裝部位之一，蘊藏著強大的力量。`
              : `一件${name}，防護著這一代勇者`,
    fromGeneration:null, deathLocation:null, deathKills:null,
  };
}

function rollRarity(monLv, isHiddenCont) {
  const r = Math.random();
  if (isHiddenCont) {
    // 隱藏大陸：稀有度大幅提升
    if (r < 0.04) return 'rainbow';
    if (r < 0.12) return 'red';
    if (r < 0.30) return 'gold';
    if (r < 0.55) return 'blue';
    if (r < 0.80) return 'green';
    return 'white';
  }
  if (monLv >= 50 && r < 0.02) return 'red';
  if (monLv >= 30 && r < 0.06) return 'gold';
  if (monLv >= 25 && r < 0.14) return 'blue';
  if (monLv >= 8  && r < 0.32) return 'green';
  return 'white';
}

function generateDrop(slot, monLv) {
  const rarity = rollRarity(monLv);
  if (slot === 'weapon' || Math.random() < 0.4) return generateWeapon(rarity, monLv);
  let armorSlot = slot;
  if (slot === 'multi') {
    armorSlot = ARMOR_SLOTS[Math.floor(Math.random()*ARMOR_SLOTS.length)];
  } else if (slot === 'ring') {
    armorSlot = Math.random() < 0.5 ? 'ring1' : 'ring2';
  } else if (slot === 'earring') {
    armorSlot = Math.random() < 0.5 ? 'earring1' : 'earring2';
  } else if (!ARMOR_SLOTS.includes(slot)) {
    armorSlot = ARMOR_SLOTS[Math.floor(Math.random()*ARMOR_SLOTS.length)];
  }
  return generateArmor(armorSlot, rarity, monLv);
}

function openChangelog() {
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:600;padding:1rem';
  const list = VERSION_HISTORY.map(entry => `
    <div style="margin-bottom:.7rem">
      <div style="font-size:13px;font-weight:700;color:#a78bfa">v${entry.v}</div>
      ${entry.notes.map(n => `<div style="font-size:11px;color:#aaa;margin-top:2px">・${n}</div>`).join('')}
    </div>`).join('');
  modal.innerHTML = `
    <div style="background:#0d0d22;border:1px solid #7c3aed;border-radius:16px;padding:1.2rem;width:100%;max-width:340px;max-height:85vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem">
        <div style="font-size:15px;font-weight:800;color:#c4b5fd">📋 更新日誌</div>
        <button id="changelog-close-x" style="background:none;border:none;color:#666;font-size:18px;cursor:pointer">✕</button>
      </div>
      ${list}
    </div>`;
  document.body.appendChild(modal);
  modal.querySelector('#changelog-close-x').onclick = () => modal.remove();
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
}

// 職業等級經驗需求
function jobExpForLevel(lv) {
  return lv * 10; // Lv.1→2需10場，Lv.2→3需20場...
}

// 取得當前職業已解鎖的技能
function getUnlockedSkills() {
  const jd = JOB_DEFS[state.job || 'miner'];
  if (!jd?.skills) return [];
  return jd.skills.filter(s => (state.jobLevel||1) >= s.lv);
}

// ════════════════════════════════════════════════════════════
// 📦 LOOT — Drop tables
// ════════════════════════════════════════════════════════════

function generateLoot(monName, monLv) {
  const mon = MDEFS[monName];
  const luk = totalStat('luk');
  // 技能掉落率加成（挖礦直覺/採礦大師等）
  let skillDropBonus = 0;
  let skillGoldBonus = 0;
  for (const s of getUnlockedSkills()) {
    if (s.effect?.dropBonus) skillDropBonus += s.effect.dropBonus;
    if (s.effect?.goldBonus) skillGoldBonus += s.effect.goldBonus;
  }
  for (const prev of (state.prevJobs||[])) {
    const pjd = JOB_DEFS[prev.job];
    for (const sk of (pjd?.skills||[]).filter(sk2 => prev.level >= sk2.lv)) {
      if (sk.effect?.dropBonus) skillDropBonus += sk.effect.dropBonus * 0.3;
      if (sk.effect?.goldBonus) skillGoldBonus += sk.effect.goldBonus * 0.3;
    }
  }
  const lukBonus = 1 + luk * 0.01 + skillDropBonus;
  const goldMult = 1 + skillGoldBonus;

  const results = [];

  // ── 金幣（80%機率，狡猾狐狸必掉）
  const goldChance = mon?.special === 'steal' ? 1.0 : 0.80;
  if (Math.random() < goldChance) {
    const base = mon?.gold || 10;
    const gold = Math.floor(base * (0.8 + Math.random() * 0.6) * lukBonus * goldMult);
    results.push({type:'gold', amount: gold});
  }

  // ── 藥水（30%機率，依怪物等級分層）
  if (Math.random() < 0.30 * lukBonus) {
    const poolBase = [
      {name:'小回復藥水', icon:'🧪', type:'potion', subtype:'heal_s',   rarity:'white', desc:'回復 30 HP',  effect:{heal:30}},
      {name:'解毒藥水',   icon:'💚', type:'potion', subtype:'antidote', rarity:'white', desc:'解除中毒',    effect:{cure:'poison'}},
    ];
    const poolMid = [
      {name:'回復藥水',   icon:'🍶', type:'potion', subtype:'heal_m',    rarity:'white', desc:'回復 80 HP',      effect:{heal:80}},
      {name:'力量藥水',   icon:'💪', type:'potion', subtype:'str_boost', rarity:'green', desc:'攻擊+30% 3回合',  effect:{buff:'str', amt:0.3, turns:3}},
      {name:'敏捷藥水',   icon:'⚡', type:'potion', subtype:'agi_boost', rarity:'green', desc:'敏捷+30% 3回合',  effect:{buff:'agi', amt:0.3, turns:3}},
      {name:'幸運藥水',   icon:'🍀', type:'potion', subtype:'luk_boost', rarity:'green', desc:'幸運+50% 3回合',  effect:{buff:'luk', amt:0.5, turns:3}},
      {name:'智慧藥水',   icon:'🧠', type:'potion', subtype:'int_boost', rarity:'green', desc:'智力+30% 3回合',  effect:{buff:'int', amt:0.3, turns:3}},
      {name:'迷霧藥水',   icon:'🌫', type:'potion', subtype:'fog_clear', rarity:'green', desc:'揭開周圍迷霧',    effect:{action:'fog'}},
    ];
    const poolHigh = [
      {name:'大回復藥水', icon:'💊', type:'potion', subtype:'heal_l',   rarity:'green', desc:'回復 200 HP',      effect:{heal:200}},
      {name:'萬能解藥',   icon:'🌈', type:'potion', subtype:'cure_all', rarity:'green', desc:'解除所有負面狀態',  effect:{cure:'all'}},
      {name:'狂暴藥水',   icon:'🔥', type:'potion', subtype:'berserk',  rarity:'blue',  desc:'攻擊×2 3回合',    effect:{buff:'berserk', turns:3}},
    ];
    const poolRare = [
      {name:'超級回復藥水', icon:'🫙', type:'potion', subtype:'heal_xl',    rarity:'blue', desc:'回復 500 HP',     effect:{heal:500}},
      {name:'無敵藥水',     icon:'🛡️', type:'potion', subtype:'invincible', rarity:'gold', desc:'免疫傷害 1回合',  effect:{buff:'invincible', turns:1}},
    ];
    const poolLegend = [
      {name:'不死藥', icon:'✨', type:'potion', subtype:'heal_full', rarity:'rainbow', desc:'完全回復所有 HP', effect:{heal:'full'}},
    ];
    let pool = [...poolBase];
    if (monLv >= 10) pool = pool.concat(poolMid);
    if (monLv >= 30) pool = pool.concat(poolHigh);
    if (monLv >= 50) pool = pool.concat(poolRare);
    if (monLv >= 70 && Math.random() < 0.1) pool = pool.concat(poolLegend);
    const pot = pool[Math.floor(Math.random() * pool.length)];
    results.push({...pot, id: Date.now() + Math.random()});
  }

  // ── 裝備（依怪物設定掉落率）
  const isHiddenCont = getContinent(px, py) === 'hidden';
  const slot = mon?.drop;
  const eqChance = mon?.elite ? 0.85 : 0.40;
  if (slot && Math.random() < eqChance * lukBonus) {
    const rarity = rollRarity(monLv, isHiddenCont);
    const item = (slot === 'weapon' || Math.random() < 0.35)
      ? generateWeapon(rarity, monLv)
      : generateArmor(
          slot === 'multi'
            ? ARMOR_SLOTS[Math.floor(Math.random() * ARMOR_SLOTS.length)]
            : slot,
          rarity, monLv
        );
    if (mon.element && mon.element !== 'none' && Math.random() < 0.3) {
      item.element = mon.element;
    }
    // autoIdentify（礦神之眼）：自動鑑定
    if (hasSkill('miner_35') && item.unidentified) {
      item.unidentified = false;
      item.name = item.realName || item.name;
      item.icon = item.type === 'weapon' ? (WPN_ICON[item.subtype]||'⚔️') : (SLOT_ICON[item.subtype]||'🛡');
      item.stats = item.realStats || item.stats;
    }
    results.push(item);
  }

  // ── 卷軸（稀有，8%機率，幸運加成）
  if (Math.random() < 0.08 * lukBonus) {
    const scrollPool = [
      {name:'普通強化卷軸', icon:'📜', type:'scroll', subtype:'enhance_normal', rarity:'green', desc:'強化裝備+1', effect:{action:'enhance', type:'normal'}},
      {name:'鑑定卷軸',     icon:'🔍', type:'scroll', subtype:'identify',       rarity:'green', desc:'鑑定未知裝備', effect:{action:'identify'}},
      {name:'幸運強化卷軸', icon:'🍀', type:'scroll', subtype:'enhance_lucky',  rarity:'blue',  desc:'成功率×150%，可跳級', effect:{action:'enhance', type:'lucky'}},
      {name:'保護卷軸',     icon:'🛡', type:'scroll', subtype:'enhance_protect',rarity:'blue',  desc:'失敗不爆裝', effect:{action:'protect'}},
      {name:'解咒卷軸',     icon:'✨', type:'scroll', subtype:'purify',         rarity:'blue',  desc:'解除裝備詛咒', effect:{action:'purify'}},
      {name:'神聖強化卷軸', icon:'⚡', type:'scroll', subtype:'enhance_holy',   rarity:'gold',  desc:'+4~+6保證成功', effect:{action:'enhance', type:'holy'}},
    ];
    // Boss 才有機會掉神聖卷軸
    const pool = mon?.special === 'boss' ? scrollPool : scrollPool.slice(0, 4);
    const scroll = pool[Math.floor(Math.random() * pool.length)];
    results.push({...scroll, id: Date.now() + Math.random() + 1});
  }

  return results.length > 0 ? results : null;
}

function initAudio() {
  audioState.bgmEl = new Audio();
  audioState.bgmEl.loop = true;
  audioState.bgmEl.volume = audioState.bgmVolume;
  // 預載音效
  audioState._sfxCache = {};
  for (const [key, src] of Object.entries(SFX_FILES)) {
    const a = new Audio(src);
    a.volume = audioState.sfxVolume;
    audioState._sfxCache[key] = a;
  }
}

// 解鎖音訊（手機瀏覽器需要使用者手動互動才能播放）
function unlockAudio() {
  if (audioState.unlocked) return;
  audioState.unlocked = true;
  if (audioState.bgmEnabled) playBGM('explore');
}

function playSFX(name) {
  if (!audioState.sfxEnabled || !audioState._sfxCache) return;
  const base = audioState._sfxCache[name];
  if (!base) return;
  // clone避免快速連續觸發時互相打斷
  const clone = base.cloneNode();
  clone.volume = audioState.sfxVolume;
  clone.play().catch(()=>{});
}

function playBGM(key) {
  if (!audioState.bgmEnabled || !audioState.bgmEl) return;
  if (audioState.currentBgm === key) return; // 已經在播放同一首，不重新觸發
  audioState.currentBgm = key;
  const src = BGM_FILES[key];
  if (!src) return;
  audioState.bgmEl.pause();
  audioState.bgmEl.src = src;
  audioState.bgmEl.volume = audioState.bgmVolume;
  audioState.bgmEl.play().catch(()=>{});
}

function stopBGM() {
  audioState.currentBgm = null;
  if (audioState.bgmEl) audioState.bgmEl.pause();
}

function toggleBGM() {
  audioState.bgmEnabled = !audioState.bgmEnabled;
  localStorage.setItem('dungeon_bgm', audioState.bgmEnabled ? 'on' : 'off');
  if (audioState.bgmEnabled) {
    audioState.currentBgm = null; // 強制重新播放目前場景音樂
    updateBGMForContext();
  } else {
    stopBGM();
  }
  updateAudioBtns();
}

function toggleSFX() {
  audioState.sfxEnabled = !audioState.sfxEnabled;
  localStorage.setItem('dungeon_sfx', audioState.sfxEnabled ? 'on' : 'off');
  updateAudioBtns();
}

function updateAudioBtns() {
  const bgmBtn = document.getElementById('audio-bgm-btn');

  if (bgmBtn) bgmBtn.textContent = audioState.bgmEnabled ? '🔊' : '🔇';

}

// 依目前場景（地圖位置/戰鬥狀態）自動切換BGM
function updateBGMForContext() {
  if (!audioState.bgmEnabled || !audioState.unlocked) return;
  if (deathActive) { playBGM('death'); return; }
  if (combatActive) {
    const isBoss = combat?.monsters?.some(m => m.special === 'boss') || raidState?.isBossFight;
    playBGM(isBoss ? 'boss' : 'battle');
    return;
  }
  if (dungeonState) { playBGM('explore_dark'); return; }
  if (typeof px !== 'undefined' && getVillageAt(px, py)) { playBGM('village'); return; }
  const cont = typeof px !== 'undefined' ? getContinent(px, py) : 'forest';
  const darkContinents = ['lava','shadow','mech','hidden'];
  playBGM(darkContinents.includes(cont) ? 'explore_dark' : 'explore');
}

function findStart() {
  // 從晨曦村出發
  const ox = START_X + 60, oy = START_Y - 40;
  for (let r = 0; r <= 10; r++) {
    for (let dx = -r; dx <= r; dx++) {
      for (let dy = -r; dy <= r; dy++) {
        if (Math.abs(dx) !== r && Math.abs(dy) !== r) continue;
        const t = getTerrain(ox+dx, oy+dy);
        if (isPassable(t) && t !== T.CAVE && t !== T.MERCHANT && t !== T.OCEAN) {
          return {x:ox+dx, y:oy+dy};
        }
      }
    }
  }
  return {x:ox, y:oy};
}

// ════════════════════════════════════════════════════════════
// 📊 STAT CALCULATION — Pure functions, no side effects
// // Input: state/item data  Output: numbers only
// // ⚠️ These functions must NOT modify state directly
// ════════════════════════════════════════════════════════════

function eqStats() {
  const s = {str:0,agi:0,luk:0,int:0,def:0};
  for (const slot of ARMOR_SLOTS) {
    const it = state.equipment[slot]; if (!it) continue;
    const enhMult = 1 + (it.enhance||0) * 0.06; // 防具每+1增加6%數值
    for (const k in it.stats) s[k] = (s[k]||0) + Math.floor((it.stats[k]||0) * enhMult);
  }
  if (state.weapon) {
    // 武器 stats 不在這裡套強化，calcAtk() 會統一處理
    for (const k in state.weapon.stats) s[k] = (s[k]||0) + (state.weapon.stats[k]||0);
  }
  return s;
}

function totalStat(k) {
  const base = (state.stats[k]||0) + (eqStats()[k]||0);
  const jp = getJobPassive();
  const pj = getPrevJobBonus();

  // 職業固定加成（defBonus 等）
  let bonus = 0;
  if (k === 'def') bonus += (jp.defBonus||0) + (pj.defBonus||0);

  // 技能固定加成（礦工石皮 defBonus:5 等）
  const skills = getUnlockedSkills();
  for (const s of skills) {
    const ef = s.effect || {};
    if (k === 'def' && ef.defBonus)  bonus += ef.defBonus;
    if (ef.allStats) bonus += ef.allStats;
    // 賭徒技能
    if (k === 'luk' && ef.lukBonus) bonus += ef.lukBonus;
  }
  // 前職業技能殘留30%
  for (const prev of (state.prevJobs||[])) {
    const pjd = JOB_DEFS[prev.job];
    for (const s of (pjd?.skills||[]).filter(sk => prev.level >= sk.lv)) {
      const ef = s.effect || {};
      if (k === 'def' && ef.defBonus)  bonus += Math.floor(ef.defBonus * 0.3);
      if (ef.allStats) bonus += Math.floor(ef.allStats * 0.3);
      if (k === 'luk' && ef.lukBonus) bonus += Math.floor(ef.lukBonus * 0.3);
    }
  }

  // 職業乘數
  const mult = k === 'str' ? (jp.strMult||1)
             : k === 'agi' ? (jp.agiMult||1)
             : k === 'luk' ? (jp.lukMult||1)
             : k === 'int' ? (jp.intMult||1)
             : k === 'def' ? (jp.defMult||1) : 1;

  // allStatsMult（地脈共鳴）
  let statMult = 1.0;
  for (const s of skills) {
    if (s.effect?.allStatsMult) statMult += s.effect.allStatsMult;
  }
  for (const prev of (state.prevJobs||[])) {
    const pjd = JOB_DEFS[prev.job];
    for (const sk of (pjd?.skills||[]).filter(sk2 => prev.level >= sk2.lv)) {
      if (sk.effect?.allStatsMult) statMult += sk.effect.allStatsMult * 0.3;
    }
  }

  return Math.floor((base + bonus) * mult * Math.min(statMult, 3.0) * (k === 'def' && hasStatus('armorbrk') ? 0.8 : 1));
}

// 暴擊率計算（戰鬥與屬性頁共用，確保兩處顯示一致；上限80%）
function getCritRate() {
  const jp = getJobPassive();
  const luk_ = totalStat('luk');
  const str_ = totalStat('str');
  const agi_ = totalStat('agi');
  const int__ = totalStat('int');
  const wpnSub = state.weapon?.subtype;
  let rate;
  if (wpnSub === 'dagger') rate = luk_ * 0.005 + agi_ * 0.002;
  else if (wpnSub === 'bow') rate = luk_ * 0.003 + agi_ * 0.002;
  else if (wpnSub === 'sword' || wpnSub === 'axe') rate = luk_ * 0.003 + str_ * 0.001;
  else if (wpnSub === 'wand') rate = luk_ * 0.003 + int__ * 0.001;
  else rate = luk_ * 0.003;
  rate = rate + (jp.critBonus||0);
  if (jp.critChance) rate = jp.critChance;
  if (typeof hasStatus === 'function' && hasStatus('blind')) rate = 0;
  return Math.max(0, Math.min(0.80, rate)); // 硬上限 80%，避免顯示/實際超過合理範圍
}

// 職業-武器強制限制：礦工可用全部武器，轉職後僅能使用對應主線武器
const JOB_WEAPON_LOCK = {
  miner: null, // 不限
  // 劍士系
  swordsman:'sword', sword_saint:'sword', knight_king:'sword',
  blade_master:'sword', king_ascendant:'sword',
  // 戰士系（斧）
  warrior:'axe', paladin:'axe', death_knight:'axe', holy_knight:'axe', death_lord:'axe',
  // 法師系（杖）
  mage:'wand', ice_mage:'wand', fire_mage:'wand', frost_lich:'wand', archmage:'wand',
  // 盜賊系（匕首/弓）
  rogue:'dagger', gambler:'dagger', fortune_god:'dagger',
  hunter:'bow', sniper_king:'bow',
  // 遊俠系（槍）
  ranger:'spear', bard:'spear', dragon_knight:'spear', sage:'spear', dragon_god:'spear',
};

function getRequiredWeapon(jobKey) {
  return JOB_WEAPON_LOCK[jobKey] ?? null;
}

function canUseWeapon(jobKey, weaponSub) {
  const req = getRequiredWeapon(jobKey);
  if (!req) return true; // 礦工不限
  return weaponSub === req;
}

function getWeaponAffinityMult(sub) {
  const required = getRequiredWeapon(state.job);
  if (!required) return 1.0; // 礦工：無限制無加成
  if (sub === required) return 1.15; // 正確武器：+15%（裝備限制下這應該永遠成立）
  return 0.92; // 保護性 fallback（理論上不會觸發，因為裝備時已強制限制）
}

function calcAtk() {
  // totalStat() 已包含職業乘數和加成，直接使用
  const str_ = totalStat('str');
  const agi_ = totalStat('agi');
  const int__ = totalStat('int');
  const luk_ = totalStat('luk');
  const def_ = totalStat('def');
  const lv = state.level;

  let baseAtk;
  if (!state.weapon) {
    baseAtk = str_ * 1.5 + lv;
  } else {
    const sub = state.weapon.subtype;
    if (sub==='sword')       baseAtk = str_ * 3.0 + lv * 2;
    else if (sub==='axe')    baseAtk = str_ * 3.8 + lv * 2;
    else if (sub==='bow')    baseAtk = agi_ * 3.5 + lv * 2;
    else if (sub==='wand')   baseAtk = int__ * 4.0 + lv * 2;
    else if (sub==='dagger') baseAtk = agi_ * 2.0 + luk_ * 0.5 + lv * 2;
    else if (sub==='spear')  baseAtk = str_ * 2.0 + def_ * 1.5 + lv * 2;
    else baseAtk = str_ * 2.0 + lv * 2;

    // 技能攻擊加成
    const skills = getUnlockedSkills();
    let atkBonusMult = 1.0;
    for (const s of skills) {
      if (s.effect?.atkBonus) atkBonusMult += s.effect.atkBonus;
      if (s.effect?.wandBonus && sub==='wand') atkBonusMult += s.effect.wandBonus;
      if (s.effect?.bowBonus  && sub==='bow')  atkBonusMult += s.effect.bowBonus;
    }
    // 前職業技能殘留30%
    for (const prev of (state.prevJobs||[])) {
      const pjd = JOB_DEFS[prev.job];
      for (const sk of (pjd?.skills||[]).filter(sk2 => prev.level >= sk2.lv)) {
        if (sk.effect?.atkBonus) atkBonusMult += sk.effect.atkBonus * 0.3;
      }
    }
    baseAtk *= atkBonusMult;

    // 礦工 Lv.40 不屈意志：血量<20%攻擊×2
    const lowHpSkill = skills.find(s => s.effect?.lowHpAtkMult);
    if (lowHpSkill && state.stats.hp < state.stats.maxHp * lowHpSkill.effect.threshold) {
      baseAtk *= lowHpSkill.effect.lowHpAtkMult;
    }

    // 強化加成
    const enh = state.weapon.enhance || 0;
    if (enh > 0) baseAtk *= (1 + enh * 0.08);
  }

  const setBonuses = getSetBonuses();
  let setAtkMult = 1.0;
  for (const b of setBonuses) { if (b.atkMult) setAtkMult *= b.atkMult; }
  let buffMult = 1.0;
  if (hasBuff('str'))     buffMult *= (1 + (state.buffEffects?.find(b=>b.type==='str')?.amt||0));
  if (hasBuff('berserk')) buffMult *= 2.0;
  if (hasStatus('weaken')) buffMult *= 0.8; // 力弱：攻擊-20%
  const affinityMult = state.weapon ? getWeaponAffinityMult(state.weapon.subtype) : 1.0;
  return Math.floor((baseAtk || 1) * setAtkMult * buffMult * affinityMult);
}

function timeLimit() { return 8 + totalStat('int') * 0.1; }

function expForLevel(lv) { return Math.floor(100 * Math.pow(lv, 1.3)); }

function monsterLevel(wx, wy) {
  const continent = getContinent(wx, wy);
  const info = CONTINENT_INFO[continent];
  const recLv = info?.recLv || 1;

  // 用大陸建議等級為基準，加上大陸內的微距離調整與隨機浮動
  const dx = wx - START_X, dy = wy - START_Y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const rand = Math.floor(tileH(wx, wy, 6) * 5) - 2; // -2~+2 隨機浮動

  let lv;
  if (continent === 'forest') {
    // 新手森林：距離決定 1~20級
    lv = Math.max(1, Math.floor(dist / 8)) + rand;
  } else {
    // 其他大陸：以建議等級為基準，範圍 recLv ~ recLv+20
    const distIntoCont = Math.max(0, dist - 150); // 扣掉森林半徑
    lv = recLv + Math.floor(distIntoCont / 12) + rand;
  }
  return Math.max(1, Math.min(150, lv));
}

// MAP RENDERING
// ═══════════════════════════════════════════════
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
const VIEW = 15;
// TILE 先給預設值，initCanvas() 會覆蓋
let TILE = 40;


// ════════════════════════════════════════════════════════════
// 🗺️ MAP RENDERING — Canvas, tiles, fog
// ════════════════════════════════════════════════════════════

function initCanvas() {
  const mapWrap = document.querySelector('.map-wrap');
  // 用寬度決定格子大小，地圖永遠是正方形
  const availW = mapWrap.clientWidth || window.innerWidth;
  TILE = Math.floor(availW / VIEW);
  canvas.width  = TILE * VIEW;
  canvas.height = TILE * VIEW;
}

function drawTerrain(ctx, ter, cx, cy, size, wx, wy) {
  // 用座標當 seed 做偽隨機，讓每格細節固定
  const s1 = Math.sin(wx * 127.1 + wy * 311.7) * 43758.5453;
  const s2 = Math.sin(wx * 269.5 + wy * 183.3) * 43758.5453;
  const r1 = (s1 - Math.floor(s1));
  const r2 = (s2 - Math.floor(s2));

  switch(ter) {
    case T.OCEAN: {
      // 深藍漸層 + 波紋
      const g = ctx.createLinearGradient(cx, cy, cx, cy+size);
      g.addColorStop(0, '#0d2a4a');
      g.addColorStop(1, '#0a1f38');
      ctx.fillStyle = g;
      ctx.fillRect(cx, cy, size, size);
      // 波紋線
      ctx.strokeStyle = 'rgba(100,160,255,0.15)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 2; i++) {
        const wy2 = cy + size * (0.3 + i * 0.35 + r1 * 0.1);
        ctx.beginPath();
        ctx.moveTo(cx + 2, wy2);
        ctx.bezierCurveTo(cx+size*0.3, wy2-2, cx+size*0.7, wy2+2, cx+size-2, wy2);
        ctx.stroke();
      }
      break;
    }
    case T.COAST: {
      // 沙灘色 + 小石子
      ctx.fillStyle = '#8a6a2a';
      ctx.fillRect(cx, cy, size, size);
      ctx.fillStyle = '#a07a3a';
      ctx.fillRect(cx+1, cy+1, size-2, size-2);
      // 小石子
      ctx.fillStyle = 'rgba(180,140,80,0.6)';
      for (let i = 0; i < 3; i++) {
        const sx = Math.sin(wx*17+wy*31+i*53) * 43758.5;
        const sy = Math.sin(wx*23+wy*47+i*71) * 43758.5;
        const rx = cx + 3 + ((sx-Math.floor(sx)) * (size-6));
        const ry = cy + 3 + ((sy-Math.floor(sy)) * (size-6));
        ctx.beginPath();
        ctx.arc(rx, ry, 1.5, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    }
    case T.PLAINS: {
      const vInPlains = getVillageAt(wx, wy);
      if (vInPlains) {
        // 村莊範圍：淺綠色磚地，不畫草
        ctx.fillStyle = '#1a3a22'; ctx.fillRect(cx, cy, size, size);
        ctx.fillStyle = 'rgba(120,200,140,0.30)';
        ctx.fillRect(cx, cy, size, size);
        ctx.strokeStyle = 'rgba(160,220,170,0.35)'; ctx.lineWidth = 0.5;
        ctx.strokeRect(cx+1, cy+1, size-2, size-2);
        break;
      }
      ctx.fillStyle = '#1a4020'; ctx.fillRect(cx, cy, size, size);
      ctx.fillStyle = '#142e18'; ctx.fillRect(cx, cy+size*0.65, size, size*0.35);
      // 密集草葉 12根
      for (let i = 0; i < 12; i++) {
        const bx2 = cx + 2 + (Math.sin(wx*13+i*41)*43758.5 - Math.floor(Math.sin(wx*13+i*41)*43758.5)) * (size-4);
        const by2 = cy + size - 2;
        const hh = 3 + (Math.sin(i*17+wy*43)*43758.5 - Math.floor(Math.sin(i*17+wy*43)*43758.5)) * 8;
        const lean = ((Math.sin(wx*7+i*13)*43758.5 - Math.floor(Math.sin(wx*7+i*13)*43758.5)) - 0.5) * 4;
        const g = Math.floor(110 + (Math.sin(i*7+wy*11)*43758.5 - Math.floor(Math.sin(i*7+wy*11)*43758.5)) * 50);
        ctx.strokeStyle = `rgba(40,${g},30,0.85)`;
        ctx.lineWidth = 0.8 + (Math.sin(i*3+wx)*43758.5 - Math.floor(Math.sin(i*3+wx)*43758.5)) * 0.8;
        ctx.beginPath(); ctx.moveTo(bx2, by2);
        ctx.quadraticCurveTo(bx2+lean, by2-hh*0.5, bx2+lean*1.5, by2-hh);
        ctx.stroke();
      }
      // 小花點
      for (let i = 0; i < 4; i++) {
        const fx = cx + 4 + (Math.sin(wx*31+i*57)*43758.5 - Math.floor(Math.sin(wx*31+i*57)*43758.5)) * (size-8);
        const fy = cy + size*0.4 + (Math.sin(i*43+wy*37)*43758.5 - Math.floor(Math.sin(i*43+wy*37)*43758.5)) * size*0.35;
        ctx.fillStyle = 'rgba(180,200,80,0.5)';
        ctx.beginPath(); ctx.arc(fx, fy, 1.2, 0, Math.PI*2); ctx.fill();
      }
      break;
    }
    case T.FOREST: {
      ctx.fillStyle = '#091a0a'; ctx.fillRect(cx, cy, size, size);
      // 樹幹
      const trx = cx + size*0.5, tryy = cy + size*0.82;
      const tw = size*0.1, th = size*0.35;
      ctx.fillStyle = '#3a2008';
      ctx.fillRect(trx-tw/2, tryy-th, tw, th);
      // 三層樹冠（下→上越來越窄）
      const layers = [
        {yf:0.64, w:size*0.48, h:size*0.28, col:'#1a5018'},
        {yf:0.46, w:size*0.38, h:size*0.25, col:'#1e6020'},
        {yf:0.30, w:size*0.27, h:size*0.22, col:'#226822'},
      ];
      for (const l of layers) {
        ctx.fillStyle = l.col;
        ctx.beginPath();
        ctx.moveTo(trx, cy+size*l.yf-l.h);
        ctx.lineTo(trx+l.w/2, cy+size*l.yf);
        ctx.lineTo(trx-l.w/2, cy+size*l.yf);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(50,120,40,0.25)'; ctx.lineWidth = 0.5; ctx.stroke();
      }
      // 頂尖
      ctx.fillStyle = '#28702a';
      ctx.beginPath();
      ctx.moveTo(trx, cy+size*0.14);
      ctx.lineTo(trx+size*0.1, cy+size*0.28);
      ctx.lineTo(trx-size*0.1, cy+size*0.28);
      ctx.closePath(); ctx.fill();
      // 地面陰影
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath(); ctx.ellipse(trx, tryy+2, size*0.18, size*0.05, 0, 0, Math.PI*2); ctx.fill();
      break;
    }
    case T.MOUNTAIN: {
      // 黃土色底 + 岩石顆粒
      ctx.fillStyle = '#4a3a20';
      ctx.fillRect(cx, cy, size, size);
      // 岩石顆粒
      const grains = 6 + (r1 * 4 | 0);
      for (let i = 0; i < grains; i++) {
        const gx = Math.sin(wx*11+wy*37+i*59) * 43758.5;
        const gy = Math.sin(wx*17+wy*53+i*73) * 43758.5;
        const grx = cx + 1 + ((gx-Math.floor(gx)) * (size-2));
        const gry = cy + 1 + ((gy-Math.floor(gy)) * (size-2));
        const gs = 1 + ((Math.sin(i*31)*0.5+0.5) * 2.5);
        const bright = 0.3 + (Math.sin(i*17)*0.5+0.5) * 0.4;
        ctx.fillStyle = `rgba(${(140+bright*60)|0},${(110+bright*40)|0},${(60+bright*30)|0},0.8)`;
        ctx.fillRect(grx, gry, gs, gs);
      }
      // 山峰輪廓
      ctx.fillStyle = 'rgba(100,80,40,0.5)';
      ctx.beginPath();
      ctx.moveTo(cx + size*0.5, cy + size*0.1);
      ctx.lineTo(cx + size*0.85, cy + size*0.75);
      ctx.lineTo(cx + size*0.15, cy + size*0.75);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case T.HIGH: {
      // 深灰 + 雪頂
      ctx.fillStyle = '#252520';
      ctx.fillRect(cx, cy, size, size);
      // 岩石顆粒（更深）
      for (let i = 0; i < 8; i++) {
        const gx = Math.sin(wx*7+wy*41+i*61) * 43758.5;
        const gy = Math.sin(wx*13+wy*67+i*79) * 43758.5;
        const grx = cx + 1 + ((gx-Math.floor(gx)) * (size-2));
        const gry = cy + 1 + ((gy-Math.floor(gy)) * (size-2));
        ctx.fillStyle = `rgba(80,75,70,0.7)`;
        ctx.fillRect(grx, gry, 1.5, 1.5);
      }
      // 雪頂
      ctx.fillStyle = 'rgba(230,235,240,0.7)';
      ctx.beginPath();
      ctx.moveTo(cx + size*0.5, cy + size*0.05);
      ctx.lineTo(cx + size*0.65, cy + size*0.35);
      ctx.lineTo(cx + size*0.35, cy + size*0.35);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case T.CAVE: {
      // 紫黑 + 洞口
      ctx.fillStyle = '#120820';
      ctx.fillRect(cx, cy, size, size);
      const cg = ctx.createRadialGradient(cx+size/2, cy+size/2, 1, cx+size/2, cy+size/2, size*0.4);
      cg.addColorStop(0, 'rgba(0,0,0,0.9)');
      cg.addColorStop(1, 'rgba(50,10,80,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.ellipse(cx+size/2, cy+size*0.55, size*0.3, size*0.25, 0, 0, Math.PI*2);
      ctx.fill();
      // 洞口邊石
      ctx.strokeStyle = 'rgba(100,60,140,0.6)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(cx+size/2, cy+size*0.55, size*0.3, size*0.25, 0, 0, Math.PI*2);
      ctx.stroke();
      break;
    }
    case T.MERCHANT: {
      // 暖黃色帳篷
      ctx.fillStyle = '#2a1a08';
      ctx.fillRect(cx, cy, size, size);
      // 帳篷
      ctx.fillStyle = 'rgba(200,150,50,0.85)';
      ctx.beginPath();
      ctx.moveTo(cx+size*0.5, cy+size*0.1);
      ctx.lineTo(cx+size*0.9, cy+size*0.75);
      ctx.lineTo(cx+size*0.1, cy+size*0.75);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(160,100,20,0.9)';
      ctx.fillRect(cx+size*0.35, cy+size*0.5, size*0.3, size*0.25);
      // 燈光
      ctx.fillStyle = 'rgba(255,220,100,0.3)';
      ctx.beginPath();
      ctx.arc(cx+size/2, cy+size*0.4, size*0.15, 0, Math.PI*2);
      ctx.fill();
      break;
    }
    case T.VILLAGE: {
      // 旅館建築（藍色屋頂）
      ctx.fillStyle = '#1a1508'; ctx.fillRect(cx, cy, size, size);
      ctx.fillStyle = 'rgba(80,55,20,0.4)'; ctx.fillRect(cx,cy+size*.62,size,size*.38);
      ctx.fillStyle = 'rgba(100,65,30,0.95)';
      ctx.fillRect(cx+size*.1,cy+size*.4,size*.8,size*.45);
      ctx.fillStyle = 'rgba(40,80,160,0.95)';
      ctx.beginPath();
      ctx.moveTo(cx+size*.5,cy+size*.1); ctx.lineTo(cx+size*.92,cy+size*.42); ctx.lineTo(cx+size*.08,cy+size*.42);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(50,30,8,0.95)';
      ctx.fillRect(cx+size*.4,cy+size*.62,size*.2,size*.23);
      ctx.fillStyle = 'rgba(255,220,150,0.6)';
      ctx.fillRect(cx+size*.18,cy+size*.5,size*.14,size*.13);
      ctx.fillRect(cx+size*.68,cy+size*.5,size*.14,size*.13);
      // 月亮標誌（旅館象徵）
      ctx.fillStyle = 'rgba(220,200,120,0.85)';
      ctx.beginPath(); ctx.arc(cx+size*.5,cy+size*.22,size*.07,0,Math.PI*2); ctx.fill();
      break;
    }
    case T.TELEPORT: {
      ctx.fillStyle = '#0a0820'; ctx.fillRect(cx, cy, size, size);
      // 石台
      ctx.fillStyle = 'rgba(90,50,140,0.85)';
      ctx.fillRect(cx+size*.22,cy+size*.55,size*.56,size*.35);
      // 寶石光柱
      const tgX = cx+size/2, tgY = cy+size*.4;
      const tgGrad = ctx.createRadialGradient(tgX,tgY,0,tgX,tgY,size*.4);
      tgGrad.addColorStop(0,'rgba(180,120,255,0.9)');
      tgGrad.addColorStop(1,'rgba(80,20,160,0)');
      ctx.fillStyle = tgGrad;
      ctx.beginPath(); ctx.arc(tgX,tgY,size*.38,0,Math.PI*2); ctx.fill();
      // 符文圈
      ctx.strokeStyle = 'rgba(200,150,255,0.8)'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(tgX,tgY,size*.28,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(tgX,cy+size*.6,size*.15,0,Math.PI*2); ctx.stroke();
      break;
    }
    case T.CHEST: {
      ctx.fillStyle = '#1a1000'; ctx.fillRect(cx, cy, size, size);
      // 箱體
      ctx.fillStyle = 'rgba(120,70,20,0.95)';
      ctx.fillRect(cx+size*.1,cy+size*.35,size*.8,size*.5);
      // 蓋子
      ctx.fillStyle = 'rgba(150,90,25,0.95)';
      ctx.fillRect(cx+size*.1,cy+size*.25,size*.8,size*.15);
      ctx.beginPath(); ctx.arc(cx+size/2,cy+size*.25,size*.35,Math.PI,0); ctx.fill();
      // 金屬扣
      ctx.fillStyle = 'rgba(255,200,50,0.9)';
      ctx.fillRect(cx+size*.42,cy+size*.38,size*.16,size*.14);
      // 光暈
      ctx.fillStyle = 'rgba(255,200,50,0.15)';
      ctx.beginPath(); ctx.arc(cx+size/2,cy+size*.45,size*.4,0,Math.PI*2); ctx.fill();
      break;
    }
    default: {
      ctx.fillStyle = '#1e4a1e';
      ctx.fillRect(cx, cy, size, size);
      // 村莊範圍地板（淺綠色磚地，安全區無怪物）
      const vt = getVillageAt(wx, wy);
      if (vt) {
        ctx.fillStyle = 'rgba(120,200,140,0.30)';
        ctx.fillRect(cx, cy, size, size);
        ctx.strokeStyle = 'rgba(160,220,170,0.25)'; ctx.lineWidth = 0.5;
        ctx.strokeRect(cx+1, cy+1, size-2, size-2);
      }
    }
  }
}

function getTile(wx, wy) {
  const ter = getTerrain(wx, wy);
  const ti = TERRAIN_INFO[ter] || TERRAIN_INFO[2];
  return { color: ti.col, walkable: ti.pass !== false, terrain: ter };
}

function renderMap() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const camX = px - 7, camY = py - 7;

  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  // Pass 1: terrain
  for (let row = 0; row < VIEW; row++) {
    for (let col = 0; col < VIEW; col++) {
      const worldX = camX + col, worldY = camY + row;
      const tile = getTile(worldX, worldY);
      const cx = col * TILE, cy = row * TILE;

      // Draw terrain with canvas detail
      drawTerrain(ctx, tile.terrain, cx, cy, TILE, worldX, worldY);

      // Monster indicator
      if (col !== 7 || row !== 7) {
        if (Math.abs(col - 7) <= 3 && Math.abs(row - 7) <= 3) {
          const mon = getMonsterAt(worldX, worldY);
          if (mon) {
            ctx.fillStyle = MDEFS[mon.name]?.elite ? 'rgba(245,158,11,0.35)' : 'rgba(248,113,113,0.35)';
            ctx.fillRect(cx, cy, TILE, TILE);
            ctx.font = `${Math.floor(TILE * 0.65)}px serif`;
            ctx.fillText(MDEFS[mon.name]?.icon || '👾', cx + 3, cy + TILE - 3);
          }
        }
      }
    }
  }

  // Player fixed at center (col=7, row=7)
  ctx.fillStyle = '#3b0764';
  ctx.fillRect(7 * TILE, 7 * TILE, TILE, TILE);
  ctx.strokeStyle = '#a855f7';
  ctx.lineWidth = 2;
  ctx.strokeRect(7 * TILE + 1, 7 * TILE + 1, TILE - 2, TILE - 2);

  // Pass 2: fog
  for (let row = 0; row < VIEW; row++) {
    for (let col = 0; col < VIEW; col++) {
      if (col === 7 && row === 7) continue;
      const worldX = camX + col, worldY = camY + row;
      if (!explored.has(`${worldX},${worldY}`)) {
        ctx.fillStyle = 'rgba(0,0,0,0.88)';
        ctx.fillRect(col * TILE, row * TILE, TILE, TILE);
      }
    }
  }

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(20,20,40,0.3)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= VIEW; i++) {
    ctx.beginPath(); ctx.moveTo(i * TILE, 0); ctx.lineTo(i * TILE, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * TILE); ctx.lineTo(canvas.width, i * TILE); ctx.stroke();
  }
}

// MOVEMENT

let moveCooldown = false;
let nearMerchant = false;

function checkNearMerchant() {
  // 檢查玩家周圍2格內有沒有商人或村莊
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      const ter = getTerrain(px+dx, py+dy);
      if (ter === T.MERCHANT || ter === T.VILLAGE) {
        nearMerchant = true;
        return;
      }
    }
  }
  nearMerchant = false;
}

// 隱藏大陸解鎖條件：礦工Lv.50技能「傳說礦工」(unlockHidden) 或角色Lv.80以上
function isHiddenUnlocked() {
  if (state.level >= 80) return true;
  if (hasSkill('miner_50')) return true;
  // 前職業殘留也算
  for (const prev of (state.prevJobs||[])) {
    if (prev.job === 'miner' && prev.level >= 50) return true;
  }
  return false;
}

function move(dx, dy) {
  unlockAudio();
  if (moveCooldown || combatActive || deathActive) return;
  const nx = px + dx, ny = py + dy;

  // 隱藏大陸解鎖檢查：需礦工Lv.50技能或角色Lv.80+
  if (getContinent(nx, ny) === 'hidden' && !isHiddenUnlocked()) {
    toast('🔒 此區域被神秘力量封鎖，似乎需要某種「傳說」般的力量才能進入……');
    return;
  }

  const ter = getTerrain(nx, ny);
  if (!isPassable(ter)) { toast('⛔ 無法通行'); return; }

  moveCooldown = true;
  setTimeout(() => moveCooldown = false, 180);

  px = nx; py = ny;
  explored.add(`${nx},${ny}`);
  // Explore 3×3 around new position
  for (let ey = -1; ey <= 1; ey++) {
    for (let ex = -1; ex <= 1; ex++) {
      const ek = `${nx+ex},${ny+ey}`;
      if (!explored.has(ek)) { explored.add(ek); state.totalExplored++; }
    }
  }

  // Status effect tick
  tickEffects();
  checkContinentChange();
  checkVillageRegen();
  updateBGMForContext();

  // Terrain interaction
  if (ter === T.CAVE) {
    showCaveEvent();
    renderMap(); updateUI(); return;
  }
  if (ter === T.MERCHANT) {
    openMerchant();
    renderMap(); updateUI(); return;
  }
  if (ter === T.CHEST) {
    openChest(px, py);
    renderMap(); updateUI(); return;
  }
  if (ter === T.VILLAGE) {
    // 旅館格子
    const v = getVillageAt(px, py);
    if (v) showInn(v);
    renderMap(); updateUI(); return;
  }
  if (ter === T.TELEPORT) {
    const v = getTeleportAt(px, py);
    if (v) {
      if (!state.unlockedTeleports) state.unlockedTeleports = [];
      const isNew = !state.unlockedTeleports.includes(v.vid);
      if (isNew) {
        state.unlockedTeleports.push(v.vid);
        toast(`🔮 ${v.name} 傳送石已激活！`);
        save(true);
      }
      showTeleportMenu(v);
    }
    renderMap(); updateUI(); return;
  }

  // Monster encounter
  const mon = getMonsterAt(nx, ny);
  if (mon) {
    const lv = monsterLevel(nx, ny);
    startCombat(mon.name, nx, ny, lv);
    renderMap(); updateUI(); return;
  }

  applyCurseEffects('move');
  renderMap(); updateUI(); save(true);
}

function showArrivalAnim(title, subtitle, color) {
  // 移除舊的
  const existing = document.getElementById('arrival-overlay');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'arrival-overlay';
  el.style.cssText = `position:fixed;inset:0;z-index:600;pointer-events:none;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,0,0,0);transition:background .6s`;
  el.innerHTML = `
    <div id="arrival-text" style="text-align:center;opacity:0;transition:opacity .6s">
      <div style="font-size:22px;font-weight:900;color:${color||'#fff'};
        text-shadow:0 0 20px ${color||'#fff'}88;margin-bottom:.4rem">${title}</div>
      ${subtitle?`<div style="font-size:13px;color:#aaa">${subtitle}</div>`:''}
    </div>`;
  document.body.appendChild(el);
  // 漸暗
  requestAnimationFrame(() => {
    el.style.background = 'rgba(0,0,0,0.75)';
    setTimeout(() => {
      document.getElementById('arrival-text').style.opacity = '1';
      setTimeout(() => {
        document.getElementById('arrival-text').style.opacity = '0';
        el.style.background = 'rgba(0,0,0,0)';
        setTimeout(() => el.remove(), 700);
      }, 2000);
    }, 400);
  });
}

function checkContinentChange() {
  const cur = getContinent(px, py);
  if (!state.visitedContinents) state.visitedContinents = ['forest'];
  if (!state.visitedContinents.includes(cur)) {
    state.visitedContinents.push(cur);
    lastContinent = cur;
    const info = CONTINENT_INFO[cur];
    if (!info) return;
    // 抵達動畫
    showArrivalAnim(info.name, `建議等級：Lv.${info.recLv}`, info.color);
    const isUnder = state.level < info.recLv;
    if (!isUnder) return; // 等級夠不用彈提示卡
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:500;pointer-events:auto;animation:fadeUp .4s ease';
    modal.innerHTML = `
      <div style="background:#0d0d22;border:1px solid ${info.color};border-radius:14px;
        padding:.8rem 1.2rem;min-width:220px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.5)">
        <div style="font-size:15px;font-weight:700;color:${info.color};margin-bottom:.3rem">${info.name}</div>
        <div style="font-size:11px;color:#888;margin-bottom:.5rem">建議等級：Lv.${info.recLv}</div>
        ${isUnder?`<div style="font-size:11px;color:#f87171;margin-bottom:.5rem">⚠️ 目前 Lv.${state.level}，此區域危險！</div>`:''}
        <div style="display:flex;gap:.5rem;justify-content:center">
          <button onclick="this.closest('[style*=fixed]').remove()"
            style="padding:5px 14px;border-radius:8px;border:.5px solid #444;
            background:transparent;color:#aaa;font-size:11px;cursor:pointer">繼續探索</button>
          ${isUnder?`<button onclick="goBack2Forest();this.closest('[style*=fixed]').remove()"
            style="padding:5px 14px;border-radius:8px;border:none;
            background:#1a1a3a;color:#a78bfa;font-size:11px;cursor:pointer">← 回新手森林</button>`:''}
        </div>
      </div>`;
    document.body.appendChild(modal);
    setTimeout(() => { if (modal.parentNode) modal.remove(); }, 6000);
  }
}

// ── 村莊回血計時器 ──
let villageRegenTimer = null;

function checkVillageRegen() {
  const inVillage = !!getVillageAt(px, py);
  if (inVillage) {
    // 第一次進入村莊顯示抵達動畫
    const v = getVillageAt(px, py);
    if (v) {
      if (!state.visitedVillages) state.visitedVillages = [];
      if (!state.visitedVillages.includes(v.vid)) {
        state.visitedVillages.push(v.vid);
        showArrivalAnim(`🏘️ ${v.name}`, '村莊', '#f59e0b');
        save(true);
      }
    }
    if (!villageRegenTimer) {
      villageRegenTimer = setInterval(() => {
        if (!getVillageAt(px, py)) {
          clearInterval(villageRegenTimer);
          villageRegenTimer = null;
          return;
        }
        if (state.stats.hp < state.stats.maxHp) {
          state.stats.hp = Math.min(state.stats.maxHp, state.stats.hp + 1);
          updateStatusBar();
        }
      }, 2000);
    }
  } else {
    if (villageRegenTimer) {
      clearInterval(villageRegenTimer);
      villageRegenTimer = null;
    }
  }
}

function goBack2Forest() {
  // 傳送回出發點附近
  const sp = findStart();
  px = sp.x; py = sp.y;
  lastContinent = 'forest';
  renderMap(); updateUI();
  toast('🌿 已回到新手森林');
}

  blind:    {icon:'🌫️',  name:'致盲',   color:'#94a3b8', sfx:'blind',    desc:'暴擊率歸零'},
};

function addStatus(type, turns) {
  if (!state.statusEffects) state.statusEffects = [];
  const existing = state.statusEffects.find(e => e.type === type);
  if (existing) {
    existing.turns = Math.max(existing.turns, turns); // 重新套用取較長者，不無限疊加回合
    existing.stack = (existing.stack||1) + 1;
  } else {
    state.statusEffects.push({type, turns, stack:1});
  }
  playSFX(STATUS_DEFS[type]?.sfx);
  renderStatusBar();
}

function hasStatus(type) {
  return !!(state.statusEffects?.find(e => e.type === type));
}

function getStatus(type) {
  return state.statusEffects?.find(e => e.type === type);
}

function clearAllStatus() {
  state.statusEffects = [];
  renderStatusBar();
}

// 渲染戰鬥中狀態列（玩家血條旁）
function renderStatusBar() {
  const el = document.getElementById('cb-status-bar');
  if (!el) return;
  const effects = state.statusEffects || [];
  if (effects.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = effects.map(e => {
    const def = STATUS_DEFS[e.type];
    if (!def) return '';
    const stackTag = e.stack > 1 ? `<span style="font-size:8px;position:absolute;bottom:-2px;right:-2px;background:${def.color};color:#000;border-radius:50%;width:11px;height:11px;display:flex;align-items:center;justify-content:center">${e.stack}</span>` : '';
    return `<span style="position:relative;display:inline-block;font-size:14px;margin-right:3px"
      title="${def.name}（${e.desc}）剩餘${e.turns}回合">${def.icon}${stackTag}</span>`;
  }).join('');
}

// 視覺特效：在戰鬥中央顯示狀態觸發飄字
function showStatusFx(type, extraText) {
  const def = STATUS_DEFS[type];
  if (!def) return;
  const area = document.querySelector('.combat-center') || document.body;
  const el = document.createElement('div');
  // 用 fixed 定位於畫面中央，避免修改 .combat-center 原有的 position（曾導致 fixed→relative 造成版面錯亂）
  el.style.cssText = `position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);
    font-size:15px;font-weight:800;color:${def.color};text-shadow:0 0 8px ${def.color}aa;
    z-index:600;pointer-events:none;animation:statusFxFloat 1.1s ease forwards`;
  el.textContent = `${def.icon} ${def.name}${extraText?'：'+extraText:''}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

function tickEffects() {
  if (!state.statusEffects) state.statusEffects = [];
  state.statusEffects = state.statusEffects.filter(e => {
    e.turns--;
    if (e.type === 'poison') {
      const dmg = 5;
      state.stats.hp = Math.max(1, state.stats.hp - dmg);
      toast(`☠️ 毒素侵蝕 -${dmg} HP`);
    }
    return e.turns > 0;
  });
  renderStatusBar();
  // Buff 不再逐回合倒數，改為逐「場」倒數（見 endCombatVictory / endCombatLoss / tryEscape）
}

// 戰鬥結束時呼叫：buff 戰鬥次數倒數
function tickBuffBattles() {
  if (!state.buffEffects) return;
  state.buffEffects = state.buffEffects.filter(b => {
    b.battles--;
    if (b.battles <= 0) toast(`⏰ ${BUFF_NAMES[b.type]||b.type} 效果消退`);
    return b.battles > 0;
  });
}

const BUFF_NAMES = {str:'力量藥水', agi:'敏捷藥水', luk:'幸運藥水', int:'智慧藥水', berserk:'狂暴藥水', invincible:'無敵藥水'};

// 取得當前 buff 倍率
function getBuffMult(type) {
  if (!state.buffEffects) return 1;
  const b = state.buffEffects.find(b => b.type === type);
  return b ? (1 + (b.amt || 0)) : 1;
}

function hasBuff(type) {
  return !!(state.buffEffects?.find(b => b.type === type && b.battles > 0));
}
