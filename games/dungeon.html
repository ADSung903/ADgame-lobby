<!DOCTYPE html>
<!--
  ⛏️ 礦洞冒險 — Version History
  ════════════════════════════════
  v0.1  Phase 1 初版：地圖生成、基礎戰鬥、裝備系統、死亡傳承
  v0.2  Phase 1 修正：Canvas 自適應、怪物等級距離修正、初始武器+藥水
  v0.3  Phase 1 修正：SVG 主角、快速藥水欄、地圖 overlay 資訊列
  v0.4  Phase 1 修正：賣東西功能、裝備數值比較、存檔版本號
  v0.5  Phase 2 開始：8元素屬性、詛咒裝備、套件效果、職業轉職
  v0.6  Phase 2 修正：多樣掉落系統（金幣/藥水/裝備/卷軸）
  v0.7  修正：強化加成套用至攻擊/防禦計算
  v0.8  架構重整：97個函式分成17個獨立區塊，容器間以呼叫溝通
  v0.9  道具說明完善；鑑定系統實作；解咒選擇介面；迷霧藥水
  v1.0  戰鬥感重構：浮動傷害數字、迴避機制（敏捷決定閃避率上限35%）
        武器差異化：法杖改為智力×3.5（遠高於物理）、弓純敏捷路線
        智力與力量路線明確分開
  ════════════════════════════════
  SAVE_VERSION = 3
-->
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>⛏️ 礦洞冒險</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation}
:root{
  --bg:#07070f;--bg2:#0d0d1f;--bg3:#121226;--border:#1e1e3a;
  --accent:#8b5cf6;--gold:#f59e0b;--green:#4ade80;--blue:#60a5fa;
  --red:#f87171;--text:#eee;--sub:#8a8aa8;
}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);
  height:100dvh;overflow:hidden;display:flex;justify-content:center}
.app{width:100%;max-width:420px;display:flex;flex-direction:column;height:100dvh}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:.5rem;
  padding:calc(max(env(safe-area-inset-top,0px), 1.5rem) + .75rem) .75rem .5rem;
  border-bottom:.5px solid var(--border);flex-shrink:0;background:var(--bg2)}
.back-btn{font-size:12px;padding:4px 10px;border-radius:8px;
  border:.5px solid #333;background:transparent;color:#aaa;cursor:pointer}
.game-title{flex:1;text-align:center;font-size:16px;font-weight:700;color:var(--accent)}
.lv-badge{font-size:12px;font-weight:700;color:var(--gold);
  background:#1a1400;border:.5px solid var(--gold);border-radius:8px;padding:2px 8px}

/* STATUS BAR */
.status-bar{display:flex;align-items:center;gap:.5rem;padding:.35rem .75rem;
  font-size:12px;flex-shrink:0;border-bottom:.5px solid var(--border);background:var(--bg2)}
.hp-wrap{display:flex;align-items:center;gap:4px;flex:1}
.hp-bar-track{flex:1;height:7px;background:#1a0a0a;border-radius:4px;
  overflow:hidden;border:.5px solid #3a1a1a}
.hp-bar-fill{height:100%;background:linear-gradient(90deg,#b91c1c,#f87171);
  border-radius:4px;transition:width .3s}
.hp-txt{font-size:10px;color:var(--red);white-space:nowrap;font-weight:600}
.gold-txt{color:var(--gold);font-weight:700;font-size:12px;white-space:nowrap}
.wpn-txt{font-size:10px;color:var(--blue);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:120px}

/* MAP */
.map-wrap{flex:1;overflow:hidden;display:flex;align-items:flex-start;justify-content:center;background:#000;min-height:0;border-top:2px solid #1a1a2e;margin-top:4px}
#map-canvas{display:block;flex-shrink:0}

/* CONTROLS */
.controls{display:flex;align-items:center;justify-content:space-between;
  padding:.4rem .75rem calc(.4rem + env(safe-area-inset-bottom,0px));
  flex-shrink:0;background:var(--bg2);border-top:.5px solid var(--border)}
.dpad{display:flex;flex-direction:column;align-items:center;gap:3px}
.dpad-row{display:flex;align-items:center;gap:3px}
.dpad-btn{width:46px;height:46px;border-radius:10px;border:.5px solid #333;
  background:#0d0d1e;color:var(--text);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-user-select:none;user-select:none;transition:background .1s}
.dpad-btn:active{background:#1a1a3a;transform:scale(.93)}
.dpad-center{width:46px;height:46px;display:flex;align-items:center;
  justify-content:center;font-size:22px}
.act-btns{display:flex;gap:5px}
.act-btn{width:56px;height:54px;border-radius:10px;border:.5px solid #333;
  background:#0d0d1e;color:var(--text);font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:2px;line-height:1;
  -webkit-user-select:none;user-select:none;transition:background .1s}
.act-btn:active{background:#1a1a3a}
.act-btn span{font-size:18px}

/* TOAST */
.toast{position:fixed;bottom:calc(100px + env(safe-area-inset-bottom,0px));
  left:50%;transform:translateX(-50%);background:#1a1a3a;
  border:.5px solid var(--accent);border-radius:10px;padding:.4rem 1rem;
  font-size:13px;color:#c4b5fd;z-index:500;white-space:nowrap;
  opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center}

/* MODAL BASE */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-back.open{display:flex}
.modal-sheet{width:100%;max-width:420px;max-height:88dvh;
  background:var(--bg2);border-radius:20px 20px 0 0;
  border:.5px solid var(--border);overflow:hidden;display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom,0px)}
.modal-head{display:flex;align-items:center;padding:.8rem 1rem;
  border-bottom:.5px solid var(--border);flex-shrink:0}
.modal-title{flex:1;font-size:15px;font-weight:700}
.modal-x{width:30px;height:30px;border-radius:50%;border:.5px solid var(--border);
  background:var(--bg3);color:var(--sub);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center}
.modal-body{flex:1;overflow-y:auto;padding:.6rem}
.modal-body::-webkit-scrollbar{width:3px}
.modal-body::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}

/* INVENTORY */
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.inv-slot{background:var(--bg3);border:.5px solid var(--border);border-radius:10px;
  padding:.5rem .3rem;text-align:center;cursor:pointer;
  min-height:70px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;transition:border-color .15s}
.inv-slot:hover{border-color:var(--accent)}
.inv-slot .s-icon{font-size:22px}
.inv-slot .s-name{font-size:9px;color:var(--sub);line-height:1.2;word-break:break-all}
.inv-slot .s-enh{font-size:10px;font-weight:700;color:var(--gold)}
.inv-slot.white .s-name{color:#ddd}
.inv-slot.green .s-name{color:var(--green)}
.inv-slot.blue .s-name{color:var(--blue)}
.inv-slot.gold .s-name{color:var(--gold)}
.inv-slot.red .s-name{color:var(--red)}
.inv-slot.empty{cursor:default;opacity:.3}
.inv-count{font-size:11px;color:var(--sub);text-align:right;margin-bottom:.4rem}

/* EQUIPMENT PANEL */
.eq-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.eq-slot{background:var(--bg3);border:.5px solid var(--border);border-radius:10px;
  padding:.5rem;display:flex;align-items:center;gap:.5rem;cursor:pointer;
  transition:border-color .15s;min-height:52px}
.eq-slot:hover{border-color:var(--accent)}
.eq-slot .es-icon{font-size:20px;flex-shrink:0}
.eq-slot .es-info{flex:1;min-width:0}
.eq-slot .es-label{font-size:10px;color:var(--sub);line-height:1}
.eq-slot .es-name{font-size:11px;font-weight:600;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.eq-slot.empty .es-name{color:var(--sub);font-weight:400}
.eq-weapon-row{margin-bottom:6px;background:var(--bg3);border:.5px solid var(--border);
  border-radius:10px;padding:.5rem;display:flex;align-items:center;gap:.5rem;cursor:pointer}

/* STATS PANEL */
.stat-section{margin-bottom:.8rem}
.stat-section h3{font-size:11px;color:var(--sub);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:.4rem}
.stat-row{display:flex;justify-content:space-between;align-items:center;
  padding:.32rem 0;border-bottom:.5px solid var(--bg3)}
.stat-row .sn{font-size:13px;color:var(--sub)}
.stat-row .sv{font-size:13px;font-weight:700;color:var(--text)}
.alloc-row{display:flex;justify-content:space-between;align-items:center;
  padding:.32rem 0;border-bottom:.5px solid var(--bg3)}
.alloc-row .an{font-size:13px}
.alloc-row .av{font-size:13px;font-weight:700;min-width:40px;text-align:center}
.alloc-btn{width:28px;height:28px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.alloc-btn:disabled{background:#2a2a4a;color:#555;cursor:default}
.points-badge{text-align:center;padding:.5rem;background:#1a0a2a;
  border:.5px solid var(--accent);border-radius:8px;margin-bottom:.6rem;
  font-size:13px;color:var(--accent);font-weight:700}

/* ITEM CARD */
.item-card-back{position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:350;display:none;align-items:center;justify-content:center;padding:1rem}
.item-card-back.open{display:flex}
.item-card{background:var(--bg2);border:1px solid var(--accent);border-radius:18px;
  padding:1.2rem;width:100%;max-width:320px;max-height:80dvh;overflow-y:auto}
.ic-name{font-size:18px;font-weight:800;margin-bottom:.15rem}
.ic-sub{font-size:11px;color:var(--sub);margin-bottom:.6rem}
.ic-flavor{font-size:11px;color:#8a8aa8;font-style:italic;
  background:var(--bg3);border-radius:8px;padding:.5rem .6rem;
  margin-bottom:.6rem;line-height:1.6}
.ic-stats{margin-bottom:.6rem}
.ic-stat{display:flex;justify-content:space-between;font-size:12px;
  padding:.2rem 0;border-bottom:.5px solid var(--bg3)}
.ic-stat .ics-pos{color:var(--green);font-weight:600}
.ic-stat .ics-neg{color:var(--red);font-weight:600}
.ic-req{font-size:11px;color:var(--sub);margin-bottom:.6rem}
.ic-req .req-fail{color:var(--red)}
.ic-heirloom{font-size:11px;color:var(--gold);background:#1a1200;
  border:.5px solid var(--gold);border-radius:8px;padding:.4rem .6rem;margin-bottom:.6rem}
.ic-btns{display:flex;gap:6px;flex-wrap:wrap}
.ic-btn{flex:1;min-width:70px;padding:8px 4px;border-radius:10px;
  border:none;font-size:12px;font-weight:700;cursor:pointer}
.ic-btn-equip{background:var(--accent);color:#fff}
.ic-btn-use{background:#1a3a1a;color:var(--green);border:.5px solid var(--green)}
.ic-btn-drop{background:#1a0a0a;color:var(--red);border:.5px solid var(--red)}
.ic-btn-sell{background:#1a1400;color:var(--gold);border:.5px solid var(--gold)}
.ic-btn-close{background:var(--bg3);color:var(--sub);border:.5px solid var(--border)}

/* MERCHANT */
.merchant-item{background:var(--bg3);border:.5px solid var(--border);
  border-radius:10px;padding:.6rem;margin-bottom:.4rem;display:flex;
  align-items:center;gap:.5rem}
.mi-icon{font-size:22px;flex-shrink:0}
.mi-info{flex:1;min-width:0}
.mi-name{font-size:13px;font-weight:600}
.mi-desc{font-size:10px;color:var(--sub)}
.mi-price{font-size:13px;font-weight:700;color:var(--gold)}
.mi-buy{padding:5px 12px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.mi-buy:disabled{background:#2a2a4a;color:#555;cursor:default}

/* COMBAT OVERLAY */
.combat-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  z-index:200;
  visibility:hidden;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s;
}
.combat-overlay.active{
  visibility:visible;
  opacity:1;
  pointer-events:auto;
}
/* 地圖暗層 */
.map-dim{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.7);
  z-index:5;
  display:none;
  pointer-events:none;
}
.map-dim.active{display:block}

/* Corner answer buttons */
.ans-btn{position:fixed;z-index:210;width:100px;
  border:2px solid var(--accent);background:rgba(14,10,35,.97);
  color:var(--text);font-size:20px;font-weight:800;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;line-height:1.1;-webkit-user-select:none;user-select:none;
  transition:transform .1s,border-color .1s,background .1s}
.ans-btn:active{transform:scale(.9);border-color:var(--gold);background:rgba(30,15,60,.97)}
.ans-btn.correct{border-color:var(--green)!important;background:rgba(0,30,10,.97)!important}
.ans-btn.wrong{border-color:var(--red)!important;background:rgba(30,5,5,.97)!important}
.ans-btn .ans-label{font-size:10px;color:var(--sub);font-weight:400}

#ans-tl{top:0;left:0;
  padding:calc(max(env(safe-area-inset-top,0px), 1.5rem) + .75rem) 8px 16px;
  border-radius:0 0 14px 0;border-width:0 2px 2px 0;min-height:calc(80px + max(env(safe-area-inset-top,0px), 1.5rem))}
#ans-tr{top:0;right:0;
  padding:calc(max(env(safe-area-inset-top,0px), 1.5rem) + .75rem) 8px 16px;
  border-radius:0 0 0 14px;border-width:0 0 2px 2px;min-height:calc(80px + max(env(safe-area-inset-top,0px), 1.5rem))}
#ans-bl{bottom:0;left:0;
  padding:16px 8px calc(max(12px,env(safe-area-inset-bottom,0px)));
  border-radius:0 14px 0 0;border-width:2px 2px 0 0;min-height:calc(80px + env(safe-area-inset-bottom,0px))}
#ans-br{bottom:0;right:0;
  padding:16px 8px calc(max(12px,env(safe-area-inset-bottom,0px)));
  border-radius:14px 0 0 0;border-width:2px 0 0 2px;min-height:calc(80px + env(safe-area-inset-bottom,0px))}

/* Combat center content */
.combat-center{position:fixed;top:0;left:0;right:0;bottom:0;z-index:205;display:flex;flex-direction:column;
  pointer-events:none;max-width:420px;margin:0 auto}
.combat-center>*{pointer-events:auto}
.cb-mon{margin-top:calc(env(safe-area-inset-top,0px) + 4px);
  padding:.5rem 110px;text-align:center;flex-shrink:0}
.cb-mon-name{font-size:18px;font-weight:800;color:var(--red);margin-bottom:.3rem}
.cb-mon-hp-track{height:8px;background:#2a0a0a;border-radius:4px;
  overflow:hidden;border:.5px solid #3a1a1a}
.cb-mon-hp-fill{height:100%;background:linear-gradient(90deg,#dc2626,#ef4444);
  border-radius:4px;transition:width .4s}
.cb-mon-hp-txt{font-size:10px;color:var(--sub);margin-top:.15rem}
.cb-log{flex:1;overflow-y:auto;padding:.5rem 110px;display:flex;
  flex-direction:column;gap:.15rem;margin:4px 0}
.cb-log::-webkit-scrollbar{width:3px}
.cb-log::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}
.cb-line{font-size:13px;line-height:1.65;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(.5)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-40px) scale(1.2)}100%{opacity:0;transform:translateY(-70px) scale(0.8)}}
.cl-w{color:var(--text)}.cl-r{color:var(--red);font-weight:700}
.cl-g{color:var(--green)}.cl-y{color:var(--gold);font-weight:700}
.cl-p{color:#c084fc}.cl-o{color:#fb923c}.cl-s{color:var(--sub)}

.cb-q{padding:.4rem 110px;flex-shrink:0;text-align:center;pointer-events:none}
.cb-q-text{font-size:24px;font-weight:900;letter-spacing:1px;margin-bottom:.35rem}
.cb-timer-track{height:8px;background:#1a1a2a;border-radius:4px;
  overflow:hidden;border:.5px solid var(--border)}
.cb-timer-fill{height:100%;width:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--green),var(--gold),var(--red))}
.cb-footer{padding:.4rem 110px calc(max(12px,env(safe-area-inset-bottom,0px)) + 56px);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cb-player-hp{font-size:12px;color:var(--green);font-weight:700}
.cb-escape{padding:6px 16px;border-radius:10px;border:.5px solid #333;
  background:#0d0d1e;color:var(--sub);font-size:12px;cursor:pointer}
.cb-escape:disabled{opacity:.4;cursor:default}

/* DEATH SCREEN */
.death-overlay{position:fixed;inset:0;z-index:400;
  background:#000;display:none;flex-direction:column;
  align-items:center;justify-content:center;padding:2rem}
.death-overlay.active{display:flex}
.death-text{font-size:15px;line-height:2;text-align:center;color:#888;
  max-width:300px;transition:color .5s}
.death-text.gold{color:var(--gold)}

/* INHERITANCE */
.inherit-overlay{position:fixed;inset:0;z-index:410;
  background:rgba(0,0,0,.9);display:none;align-items:flex-end;justify-content:center}
.inherit-overlay.open{display:flex}
.inherit-sheet{width:100%;max-width:420px;background:var(--bg2);
  border-radius:20px 20px 0 0;border:.5px solid var(--gold);
  padding:1rem;padding-bottom:calc(1rem + env(safe-area-inset-bottom,0px));
  max-height:75dvh;display:flex;flex-direction:column}
.inherit-title{text-align:center;color:var(--gold);font-size:16px;font-weight:700;
  margin-bottom:.3rem}
.inherit-sub{text-align:center;color:var(--sub);font-size:12px;margin-bottom:.8rem}
.inherit-pool{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.inherit-slot{background:var(--bg3);border:.5px solid var(--border);border-radius:10px;
  padding:.5rem .3rem;text-align:center;cursor:pointer;min-height:70px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  transition:border-color .15s}
.inherit-slot.selected{border-color:var(--gold);background:#1a1200}
.inherit-slot .is-icon{font-size:20px}
.inherit-slot .is-name{font-size:9px;line-height:1.2}
.inherit-confirm{width:100%;margin-top:.8rem;padding:.8rem;border-radius:12px;
  border:none;background:linear-gradient(135deg,var(--accent),var(--gold));
  color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.inherit-confirm:disabled{background:#2a2a4a;color:#555;cursor:default}

/* CAVE / EVENT MODAL */
.event-card{background:var(--bg2);border:1px solid var(--accent);border-radius:18px;
  padding:1.4rem;text-align:center;max-width:300px;margin:1rem}
.event-card h2{color:var(--accent);font-size:18px;margin-bottom:.5rem}
.event-card p{font-size:13px;color:var(--sub);line-height:1.7;margin-bottom:1rem}
.event-btn{padding:8px 24px;border-radius:10px;border:none;
  background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;
  border:.5px solid var(--border)}

/* RARITY COLORS */
.rarity-white{color:#eee}.rarity-green{color:var(--green)}
.rarity-blue{color:var(--blue)}.rarity-gold{color:var(--gold)}
.rarity-red{color:var(--red)}.rarity-rainbow{background:linear-gradient(90deg,#f87171,#fb923c,#f59e0b,#4ade80,#60a5fa,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* MINI MAP INDICATOR */
.gen-badge{position:fixed;top:calc(env(safe-area-inset-top,0px) + 46px + 48px);
  right:.5rem;background:rgba(7,7,15,.85);border:.5px solid var(--accent);
  border-radius:8px;padding:3px 8px;font-size:10px;color:#c4b5fd;z-index:10;pointer-events:none}
</style>
</head><body>
<div class="app" id="app">
  <div class="topbar">
    <button class="back-btn" onclick="goBack()">← 大廳</button>
    <div class="game-title">⛏️ 礦洞冒險</div>
    <span class="lv-badge" id="lv-badge">Lv.1</span>
  </div>

  <div class="status-bar" style="display:none">
    <div class="hp-wrap">
      <span class="hp-txt" id="hp-txt">❤️100/100</span>
      <div class="hp-bar-track"><div class="hp-bar-fill" id="hp-bar" style="width:100%"></div></div>

<script>
'use strict';
// ═══════════════════════════════════════════════
// WORLD SEED (changes each quarter)
// ═══════════════════════════════════════════════
const d0 = new Date();
const WORLD_SEED = d0.getFullYear() * 4 + Math.floor(d0.getMonth() / 3);

// ═══════════════════════════════════════════════
// SEEDED PRNG + NOISE
// ═══════════════════════════════════════════════


// ════════════════════════════════════════════════════════════
// 🌍 WORLD GENERATION — Perlin Noise, Terrain
// ════════════════════════════════════════════════════════════

function posH(x, y, s) {
  let h = (s * 2246822519 + x * 374761393 + y * 1103515245) | 0;
  h = Math.imul(h ^ (h >>> 13), h * 15731 + 789221) | 0;
  h = h ^ (h >>> 17);
  return (h >>> 0) / 0x100000000;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function ss(t) { return t * t * (3 - 2 * t); }

function vnoise(x, y, s) {
  const xi = Math.floor(x), yi = Math.floor(y);
  const xf = ss(x - xi), yf = ss(y - yi);
  return lerp(
    lerp(posH(xi, yi, s), posH(xi+1, yi, s), xf),
    lerp(posH(xi, yi+1, s), posH(xi+1, yi+1, s), xf), yf);
}

function worldNoise(wx, wy) {
  return 0.5  * vnoise(wx*0.030, wy*0.030, WORLD_SEED)
       + 0.3  * vnoise(wx*0.080, wy*0.080, WORLD_SEED+1000)
       + 0.2  * vnoise(wx*0.150, wy*0.150, WORLD_SEED+2000);
}

function tileH(wx, wy, off) {
  return posH(wx ^ (off*7919), wy ^ (off*6271), WORLD_SEED + off*1231);
}

// ═══════════════════════════════════════════════
// TERRAIN
// ═══════════════════════════════════════════════
const T = { OCEAN:0, COAST:1, PLAINS:2, FOREST:3, MOUNTAIN:4, HIGH:5, CAVE:6, MERCHANT:8 };
const TERRAIN_INFO = {
  0:{col:'#0a1f3a',emoji:'🌊',pass:false},
  1:{col:'#5c3d11',emoji:'🏖️',pass:true},
  2:{col:'#1a3a1a',emoji:'🌿',pass:true},
  3:{col:'#0d250d',emoji:'🌲',pass:true},
  4:{col:'#252525',emoji:'🪨',pass:true},
  5:{col:'#131313',emoji:'⛰️',pass:false},
  6:{col:'#1a0a2a',emoji:'🕳️',pass:true},
  8:{col:'#2a1a0a',emoji:'🧑‍💼',pass:true},
};
const SPAWN_TERRAIN = [T.PLAINS, T.FOREST, T.MOUNTAIN, T.COAST];
const SPAWN_RATE = {[T.PLAINS]:0.22,[T.FOREST]:0.38,[T.MOUNTAIN]:0.15,[T.COAST]:0.06};

function getTerrain(wx, wy) {
  const n = worldNoise(wx, wy);
  if (n >= 0.32 && n < 0.88) {
    // 洞穴：約1%機率
    if (tileH(wx, wy, 1) < 0.001) return T.CAVE;
    // 商人：約0.5%機率，且周圍20格內不能有其他商人
    if (tileH(wx, wy, 2) < 0.0009) {
      // 間距檢查：用座標 hash 確保鄰近商人不會同時出現
      let nearMerch = false;
      for (let dy = -20; dy <= 20; dy++) {
        for (let dx = -20; dx <= 20; dx++) {
          if (dx === 0 && dy === 0) continue;
          const dist = Math.abs(dx) + Math.abs(dy);
          if (dist > 20) continue;
          if (tileH(wx+dx, wy+dy, 2) < 0.0009 && worldNoise(wx+dx,wy+dy) >= 0.32 && worldNoise(wx+dx,wy+dy) < 0.88) {
            // 只保留 hash 較大的那個，確保唯一性
            if (tileH(wx+dx, wy+dy, 2) > tileH(wx, wy, 2)) { nearMerch = true; break; }
          }
        }
        if (nearMerch) break;
      }
      if (!nearMerch) return T.MERCHANT;
    }
  }
  if (n < 0.30) return T.OCEAN;
  if (n < 0.40) return T.COAST;
  if (n < 0.62) return T.PLAINS;
  if (n < 0.76) return T.FOREST;
  if (n < 0.88) return T.MOUNTAIN;
  return T.HIGH;
}

function isPassable(t) { return TERRAIN_INFO[t]?.pass !== false; }

// ═══════════════════════════════════════════════
// MONSTER DEFINITIONS
// ═══════════════════════════════════════════════
const MDEFS = {
  毒牙蟲:    {icon:'🐛',hp:30,atk:8,def:2,agi:6,  special:'poison',   drop:'ring',    exp:18,gold:12,elite:false,element:'earth'},
  憤怒蘑菇:  {icon:'🍄',hp:80,atk:6,def:15,agi:3, special:'highdef',  drop:'legs',    exp:32,gold:22,elite:false,element:'earth'},
  森林野狼:  {icon:'🐺',hp:50,atk:14,def:5,agi:18,special:null,       drop:'boots',   exp:28,gold:18,elite:false,element:'none'},
  藤蔓精靈:  {icon:'🌿',hp:45,atk:10,def:8,agi:8, special:'slow',     drop:'necklace',exp:26,gold:16,elite:false,element:'water'},
  狂蜂群:    {icon:'🐝',hp:75,atk:8,def:3,agi:15, special:'segments', drop:'earring1',exp:42,gold:28,elite:false,element:'thunder'},
  狡猾狐狸:  {icon:'🦊',hp:40,atk:12,def:6,agi:20,special:'steal',    drop:null,      exp:22,gold:45,elite:false,element:'none'},
  石頭哥布林:{icon:'🪨',hp:70,atk:10,def:20,agi:5,special:'highdef',  drop:'armor',   exp:38,gold:28,elite:false,element:'earth'},
  毒沼蛙:    {icon:'🐸',hp:55,atk:11,def:7,agi:10,special:'stackslow',drop:'gloves',  exp:30,gold:20,elite:false,element:'water'},
  憤怒山豬王:{icon:'🐗',hp:200,atk:28,def:12,agi:10,special:'berserk',drop:'multi',   exp:120,gold:80,elite:true,element:'fire'},
  古樹守衛:  {icon:'🌳',hp:300,atk:18,def:25,agi:4,special:'regen',   drop:'multi',   exp:150,gold:100,elite:true,element:'earth'},
  森林詛咒者:{icon:'🧟',hp:800,atk:35,def:20,agi:12,special:'boss',   drop:'multi',   exp:500,gold:300,elite:true,element:'dark'},
};
const FOREST_POOL   = ['毒牙蟲','憤怒蘑菇','森林野狼','藤蔓精靈','狡猾狐狸','毒沼蛙'];
const PLAINS_POOL   = ['毒牙蟲','森林野狼','石頭哥布林','狡猾狐狸'];
const MOUNTAIN_POOL = ['石頭哥布林','憤怒蘑菇','毒牙蟲'];
const ELITE_POOL    = ['憤怒山豬王','古樹守衛'];


// ════════════════════════════════════════════════════════════
// 👾 MONSTER DEFINITIONS & SCALING
// ════════════════════════════════════════════════════════════

function getMonsterAt(wx, wy) {
  const k = `${wx},${wy}`;
  if (killedSet.has(k)) return null;
  const ter = getTerrain(wx, wy);
  if (!SPAWN_TERRAIN.includes(ter)) return null;
  const h3 = tileH(wx, wy, 3);
  if (h3 > SPAWN_RATE[ter]) return null;
  // Elite check: ~5% of spawns
  const h4 = tileH(wx, wy, 4);
  if (h4 < 0.05) {
    const idx = Math.floor(tileH(wx, wy, 5) * ELITE_POOL.length);
    return { name: ELITE_POOL[idx], wx, wy };
  }
  const pool = ter === T.FOREST ? FOREST_POOL : ter === T.PLAINS ? PLAINS_POOL : MOUNTAIN_POOL;
  const idx = Math.floor(h4 * pool.length);
  return { name: pool[idx], wx, wy };
}

function scaledMonster(name, baseLevel) {
  const d = MDEFS[name];
  const lv = Math.max(1, baseLevel);
  return {
    name, icon:d.icon, maxHp: Math.floor(d.hp*(1+lv*0.08)), atk: Math.floor(d.atk*(1+lv*0.06)),
    def: Math.floor(d.def*(1+lv*0.05)), agi:d.agi, special:d.special,
    drop:d.drop, exp:d.exp+lv*4, gold:Math.floor(d.gold*(1+lv*0.05)),
    elite:d.elite, lv, element:d.element||'none',
    hp:0,
    segments: d.special==='segments' ? 3 : 0,
    segHp: d.special==='segments' ? Math.ceil(Math.floor(d.hp*(1+lv*0.08))/3) : 0,
    slowStacks: 0,
  };
}

function rarityIdx(r) { return RARITY_ORDER.indexOf(r); }

function rollElement(rarity) {
  const noneChance = {white:0.8, green:0.5, blue:0.2}[rarity] || 0.1;
  if (Math.random() < noneChance) return 'none';
  const elems = Object.keys(ELEMENTS).filter(e => e !== 'none');
  return elems[Math.floor(Math.random() * elems.length)];
}

function rollCurse(rarity) {
  return Math.random() < (CURSE_CHANCE[rarity] || 0);
}

function generateWeapon(rarity, level) {
  const ri = Math.min(rarityIdx(rarity), 2);
  const r2 = RARITY_ORDER[ri];
  const sub = WPN_SUBTYPES[Math.floor(Math.random() * WPN_SUBTYPES.length)];
  const tpl = WPN_TPL[sub][ri];
  const name = tpl[Math.floor(Math.random() * tpl.length)];
  const base = {white:4,green:8,blue:16}[r2] || 4;
  const lm = 1 + level * 0.06;
  const v = () => Math.floor(base * lm * (0.8 + Math.random()*0.4));
  const stats = {str:0,agi:0,int:0,luk:0,def:0};
  if (sub==='sword')   { stats.str=v(); stats.agi=Math.floor(v()/2); }
  else if (sub==='axe')   { stats.str=Math.floor(v()*1.5); }
  else if (sub==='bow')   { stats.agi=Math.floor(v()*1.5); }
  else if (sub==='wand')  { stats.int=Math.floor(v()*2); }
  else if (sub==='dagger'){ stats.agi=Math.floor(v()*2); stats.luk=Math.floor(v()/2); }
  else if (sub==='spear') { stats.str=v(); stats.def=Math.floor(v()/3); }
  const isCursed = rollCurse(r2);
  const curseType = isCursed ? CURSE_EFFECTS[Math.floor(Math.random()*CURSE_EFFECTS.length)].type : null;
  if (isCursed) { for (const k in stats) if (stats[k]) stats[k] = Math.ceil(stats[k]*1.2); }
  // 藍色以上有70%機率待鑑定
  const unidentified = (r2 === 'blue' || r2 === 'gold' || r2 === 'red' || r2 === 'rainbow')
    && Math.random() < 0.70;
  return {
    id: Date.now()+Math.random(), type:'weapon', subtype:sub, rarity:r2,
    name: unidentified ? `【待鑑定】${['神秘武器','未知利器','古老兵器'][Math.floor(Math.random()*3)]}` : name,
    realName: name,
    icon: unidentified ? '❓' : WPN_ICON[sub], enhance:0, element:rollElement(r2),
    cursed:isCursed, purified:false, curseType,
    stats: unidentified ? {} : stats, realStats: stats,
    reqLevel:{white:0,green:10,blue:30}[r2]||0,
    unidentified,
    flavorText: unidentified ? '這件裝備散發著神秘的氣息，需要鑑定才能了解其真正能力。' : (WPN_FLAVOR[name] || `一把${name}，散發著冒險的氣息`),
    fromGeneration:null, deathLocation:null, deathKills:null,
  };
}

function generateArmor(slot, rarity, level) {
  const ri = Math.min(rarityIdx(rarity), 2);
  const r2 = RARITY_ORDER[ri];
  const tpl = ARMOR_TPL[slot]?.[ri] || ['普通裝備'];
  const name = tpl[Math.floor(Math.random() * tpl.length)];
  const base = {white:3,green:6,blue:12}[r2] || 3;
  const lm = 1 + level * 0.05;
  const v = () => Math.floor(base * lm * (0.8 + Math.random()*0.4));
  const stats = {};
  const mainStat = {
    helmet:'def', armor:'def', legs:'def', gloves:'def', boots:'agi',
    necklace:'luk', ring1:'str', ring2:'int', earring1:'luk', earring2:'int',
  }[slot] || 'def';
  stats[mainStat] = v();
  if (r2 !== 'white' && Math.random() < 0.5) {
    const extra = ['str','agi','luk','int','def'].filter(s=>s!==mainStat);
    const ek = extra[Math.floor(Math.random()*extra.length)];
    stats[ek] = Math.floor(v()/2);
  }
  const isCursed = rollCurse(r2);
  const curseType = isCursed ? CURSE_EFFECTS[Math.floor(Math.random()*CURSE_EFFECTS.length)].type : null;
  if (isCursed) { for (const k in stats) if (stats[k]) stats[k] = Math.ceil(stats[k]*1.2); }
  const unidentified = (r2 === 'blue' || r2 === 'gold' || r2 === 'red' || r2 === 'rainbow')
    && Math.random() < 0.70;
  return {
    id: Date.now()+Math.random(), type:'armor', subtype:slot, rarity:r2,
    name: unidentified ? `【待鑑定】${['神秘防具','古老護甲','未知寶物'][Math.floor(Math.random()*3)]}` : name,
    realName: name,
    icon: unidentified ? '❓' : SLOT_ICON[slot], enhance:0, element:rollElement(r2),
    cursed:isCursed, purified:false, curseType,
    stats: unidentified ? {} : stats, realStats: stats,
    reqLevel:{white:0,green:10,blue:30}[r2]||0,
    unidentified,
    flavorText: unidentified ? '這件裝備散發著神秘的氣息，需要鑑定才能了解其真正能力。' : `一件${name}，防護著這一代勇者`,
    fromGeneration:null, deathLocation:null, deathKills:null,
  };
}

function rollRarity(monLv) {
  const r = Math.random();
  if (monLv >= 25 && r < 0.08) return 'blue';
  if (monLv >= 8  && r < 0.28) return 'green';
  return 'white';
}

function generateDrop(slot, monLv) {
  const rarity = rollRarity(monLv);
  if (slot === 'weapon' || Math.random() < 0.4) return generateWeapon(rarity, monLv);
  const armorSlot = slot === 'multi'
    ? ARMOR_SLOTS[Math.floor(Math.random()*ARMOR_SLOTS.length)]
    : slot;
  return generateArmor(armorSlot, rarity, monLv);
}

function generateLoot(monName, monLv) {
  const mon = MDEFS[monName];
  const luk = totalStat('luk');
  const lukBonus = 1 + luk * 0.01; // 幸運影響掉落率

  const results = [];

  // ── 金幣（80%機率，狡猾狐狸必掉）
  const goldChance = mon?.special === 'steal' ? 1.0 : 0.80;
  if (Math.random() < goldChance) {
    const base = mon?.gold || 10;
    const gold = Math.floor(base * (0.8 + Math.random() * 0.6) * lukBonus);
    results.push({type:'gold', amount: gold});
  }

  // ── 藥水（30%機率）
  if (Math.random() < 0.30 * lukBonus) {
    const potPool = [
      {name:'小回復藥水', icon:'🧪', type:'potion', subtype:'heal_s', rarity:'white', desc:'回復 30 HP', effect:{heal:30}},
      {name:'回復藥水',   icon:'🍶', type:'potion', subtype:'heal_m', rarity:'green', desc:'回復 80 HP', effect:{heal:80}},
      {name:'解毒藥水',   icon:'💚', type:'potion', subtype:'cure_poison', rarity:'white', desc:'解除中毒', effect:{cure:'poison'}},
      {name:'力量藥水',   icon:'💪', type:'potion', subtype:'buff_str', rarity:'green', desc:'攻擊+30% 3回合', effect:{buff:'str', turns:3}},
      {name:'迷霧藥水',   icon:'🌫', type:'potion', subtype:'fog_clear', rarity:'green', desc:'揭開周圍15格迷霧', effect:{action:'fog'}},
    ];
    // 較高等怪掉比較好的藥水
    const pool = monLv >= 10 ? potPool : potPool.slice(0, 3);
    const pot = pool[Math.floor(Math.random() * pool.length)];
    results.push({...pot, id: Date.now() + Math.random()});
  }

  // ── 裝備（依怪物設定掉落率）
  const slot = mon?.drop;
  const eqChance = mon?.elite ? 0.85 : 0.40;
  if (slot && Math.random() < eqChance * lukBonus) {
    const rarity = rollRarity(monLv);
    const item = (slot === 'weapon' || Math.random() < 0.35)
      ? generateWeapon(rarity, monLv)
      : generateArmor(
          slot === 'multi'
            ? ARMOR_SLOTS[Math.floor(Math.random() * ARMOR_SLOTS.length)]
            : slot,
          rarity, monLv
        );
    if (mon.element && mon.element !== 'none' && Math.random() < 0.3) {
      item.element = mon.element;
    }
    results.push(item);
  }

  // ── 卷軸（稀有，8%機率，幸運加成）
  if (Math.random() < 0.08 * lukBonus) {
    const scrollPool = [
      {name:'普通強化卷軸', icon:'📜', type:'scroll', subtype:'enhance_normal', rarity:'green', desc:'強化裝備+1', effect:{action:'enhance', type:'normal'}},
      {name:'鑑定卷軸',     icon:'🔍', type:'scroll', subtype:'identify',       rarity:'green', desc:'鑑定未知裝備', effect:{action:'identify'}},
      {name:'幸運強化卷軸', icon:'🍀', type:'scroll', subtype:'enhance_lucky',  rarity:'blue',  desc:'成功率×150%，可跳級', effect:{action:'enhance', type:'lucky'}},
      {name:'保護卷軸',     icon:'🛡', type:'scroll', subtype:'enhance_protect',rarity:'blue',  desc:'失敗不爆裝', effect:{action:'protect'}},
      {name:'解咒卷軸',     icon:'✨', type:'scroll', subtype:'purify',         rarity:'blue',  desc:'解除裝備詛咒', effect:{action:'purify'}},
      {name:'神聖強化卷軸', icon:'⚡', type:'scroll', subtype:'enhance_holy',   rarity:'gold',  desc:'+4~+6保證成功', effect:{action:'enhance', type:'holy'}},
    ];
    // Boss 才有機會掉神聖卷軸
    const pool = mon?.special === 'boss' ? scrollPool : scrollPool.slice(0, 4);
    const scroll = pool[Math.floor(Math.random() * pool.length)];
    results.push({...scroll, id: Date.now() + Math.random() + 1});
  }

  return results.length > 0 ? results : null;
}

let state = initState();

// ═══════════════════════════════════════════════
// START POSITION
// ═══════════════════════════════════════════════

function findStart() {
  const ox = START_X, oy = START_Y;
  for (let r = 0; r <= 40; r++) {
    for (let dx = -r; dx <= r; dx++) {
      for (let dy = -r; dy <= r; dy++) {
        if (Math.abs(dx) !== r && Math.abs(dy) !== r) continue;
        const t = getTerrain(ox+dx, oy+dy);
        if (isPassable(t) && t !== T.CAVE && t !== T.MERCHANT && t !== T.OCEAN) {
          return {x:ox+dx, y:oy+dy};
        }
      }
    }
  }
  return {x:ox, y:oy};
}

// ═══════════════════════════════════════════════
// STAT HELPERS

// ════════════════════════════════════════════════════════════
// 📊 STAT CALCULATION — Pure functions, no side effects
// // Input: state/item data  Output: numbers only
// // ⚠️ These functions must NOT modify state directly
// ════════════════════════════════════════════════════════════

function eqStats() {
  const s = {str:0,agi:0,luk:0,int:0,def:0};
  for (const slot of ARMOR_SLOTS) {
    const it = state.equipment[slot]; if (!it) continue;
    const enhMult = 1 + (it.enhance||0) * 0.06; // 防具每+1增加6%數值
    for (const k in it.stats) s[k] = (s[k]||0) + Math.floor((it.stats[k]||0) * enhMult);
  }
  if (state.weapon) {
    // 武器 stats 不在這裡套強化，calcAtk() 會統一處理
    for (const k in state.weapon.stats) s[k] = (s[k]||0) + (state.weapon.stats[k]||0);
  }
  return s;
}

function totalStat(k) { return (state.stats[k]||0) + (eqStats()[k]||0); }

function calcAtk() {
  const jp = getJobPassive();
  const pj = getPrevJobBonus();
  const str_ = totalStat('str') * (jp.strMult||1) * (pj.strMult ? 1+(pj.strMult-1)*0.3 : 1);
  const agi_ = totalStat('agi') * (jp.agiMult||1) * (pj.agiMult ? 1+(pj.agiMult-1)*0.3 : 1);
  const int__ = totalStat('int') * (jp.intMult||1) * (pj.intMult ? 1+(pj.intMult-1)*0.3 : 1);
  const luk_ = totalStat('luk') * (jp.lukMult||1) * (pj.lukMult ? 1+(pj.lukMult-1)*0.3 : 1);
  const def_ = totalStat('def');

  // 每種武器的基礎計算都不同，體現差異化
  // 物理系：力量/敏捷影響，智力無用
  // 魔法系：智力決定一切，力量無用
  const physBase = str_ * 2.0 + state.level * 2;   // 物理基礎
  const magiBase = int__ * 3.5 + state.level * 2;   // 魔法基礎（智力加成更高）

  let baseAtk;
  if (!state.weapon) {
    baseAtk = physBase * 0.5; // 空手很弱
  } else {
    const sub = state.weapon.subtype;
    if (sub==='sword')       baseAtk = physBase + agi_ * 0.8;          // 力量主，敏捷副
    else if (sub==='axe')    baseAtk = physBase * 1.4;                  // 純力量爆發
    else if (sub==='bow')    baseAtk = agi_ * 3.5 + state.level * 2;   // 純敏捷，不看力量
    else if (sub==='wand')   baseAtk = magiBase;                        // 純智力，遠高於物理
    else if (sub==='dagger') baseAtk = agi_ * 2.5 + luk_ * 1.0 + state.level * 2; // 敏捷+幸運
    else if (sub==='spear')  baseAtk = physBase * 0.9 + def_ * 0.8;    // 攻防兼備
    else baseAtk = physBase;

    if (sub==='wand' && jp.atkWandMult) baseAtk *= jp.atkWandMult;
    if (sub==='bow'  && jp.bowMult)     baseAtk *= jp.bowMult;
    if (sub==='wand' && pj.atkWandMult) baseAtk *= 1+(pj.atkWandMult-1)*0.3;
    if (sub==='bow'  && pj.bowMult)     baseAtk *= 1+(pj.bowMult-1)*0.3;

    // 強化加成：每+1增加8%攻擊
    const enh = state.weapon.enhance || 0;
    if (enh > 0) baseAtk *= (1 + enh * 0.08);
  }
  const setBonuses = getSetBonuses();
  let setAtkMult = 1.0;
  for (const b of setBonuses) { if (b.atkMult) setAtkMult *= b.atkMult; }
  return Math.floor((baseAtk || 1) * setAtkMult);
}

function timeLimit() { return 8 + totalStat('int') * 0.1; }

function expForLevel(lv) { return Math.floor(100 * Math.pow(lv, 1.3)); }

function monsterLevel(wx, wy) {
  // 用距離出生點的相對距離，而非世界原點
  const dx = wx - START_X, dy = wy - START_Y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const base = Math.max(1, Math.floor(dist / 15));
  const rand = Math.floor(tileH(wx, wy, 6) * 3);
  return Math.min(50, base + rand);
}

// ═══════════════════════════════════════════════
// MAP RENDERING
// ═══════════════════════════════════════════════
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
const VIEW = 15;
// TILE 先給預設值，initCanvas() 會覆蓋
let TILE = 40;


// ════════════════════════════════════════════════════════════
// 🗺️ MAP RENDERING — Canvas, tiles, fog
// ════════════════════════════════════════════════════════════

function initCanvas() {
  const mapWrap = document.querySelector('.map-wrap');
  // 用寬度決定格子大小，地圖永遠是正方形
  const availW = mapWrap.clientWidth || window.innerWidth;
  TILE = Math.floor(availW / VIEW);
  canvas.width  = TILE * VIEW;
  canvas.height = TILE * VIEW;
}

function drawTerrain(ctx, ter, cx, cy, size, wx, wy) {
  // 用座標當 seed 做偽隨機，讓每格細節固定
  const s1 = Math.sin(wx * 127.1 + wy * 311.7) * 43758.5453;
  const s2 = Math.sin(wx * 269.5 + wy * 183.3) * 43758.5453;
  const r1 = (s1 - Math.floor(s1));
  const r2 = (s2 - Math.floor(s2));

  switch(ter) {
    case T.OCEAN: {
      // 深藍漸層 + 波紋
      const g = ctx.createLinearGradient(cx, cy, cx, cy+size);
      g.addColorStop(0, '#0d2a4a');
      g.addColorStop(1, '#0a1f38');
      ctx.fillStyle = g;
      ctx.fillRect(cx, cy, size, size);
      // 波紋線
      ctx.strokeStyle = 'rgba(100,160,255,0.15)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 2; i++) {
        const wy2 = cy + size * (0.3 + i * 0.35 + r1 * 0.1);
        ctx.beginPath();
        ctx.moveTo(cx + 2, wy2);
        ctx.bezierCurveTo(cx+size*0.3, wy2-2, cx+size*0.7, wy2+2, cx+size-2, wy2);
        ctx.stroke();
      }
      break;
    }
    case T.COAST: {
      // 沙灘色 + 小石子
      ctx.fillStyle = '#8a6a2a';
      ctx.fillRect(cx, cy, size, size);
      ctx.fillStyle = '#a07a3a';
      ctx.fillRect(cx+1, cy+1, size-2, size-2);
      // 小石子
      ctx.fillStyle = 'rgba(180,140,80,0.6)';
      for (let i = 0; i < 3; i++) {
        const sx = Math.sin(wx*17+wy*31+i*53) * 43758.5;
        const sy = Math.sin(wx*23+wy*47+i*71) * 43758.5;
        const rx = cx + 3 + ((sx-Math.floor(sx)) * (size-6));
        const ry = cy + 3 + ((sy-Math.floor(sy)) * (size-6));
        ctx.beginPath();
        ctx.arc(rx, ry, 1.5, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    }
    case T.PLAINS: {
      ctx.fillStyle = '#1a4020'; ctx.fillRect(cx, cy, size, size);
      ctx.fillStyle = '#142e18'; ctx.fillRect(cx, cy+size*0.65, size, size*0.35);
      // 密集草葉 12根
      for (let i = 0; i < 12; i++) {
        const bx2 = cx + 2 + (Math.sin(wx*13+i*41)*43758.5 - Math.floor(Math.sin(wx*13+i*41)*43758.5)) * (size-4);
        const by2 = cy + size - 2;
        const hh = 3 + (Math.sin(i*17+wy*43)*43758.5 - Math.floor(Math.sin(i*17+wy*43)*43758.5)) * 8;
        const lean = ((Math.sin(wx*7+i*13)*43758.5 - Math.floor(Math.sin(wx*7+i*13)*43758.5)) - 0.5) * 4;
        const g = Math.floor(110 + (Math.sin(i*7+wy*11)*43758.5 - Math.floor(Math.sin(i*7+wy*11)*43758.5)) * 50);
        ctx.strokeStyle = `rgba(40,${g},30,0.85)`;
        ctx.lineWidth = 0.8 + (Math.sin(i*3+wx)*43758.5 - Math.floor(Math.sin(i*3+wx)*43758.5)) * 0.8;
        ctx.beginPath(); ctx.moveTo(bx2, by2);
        ctx.quadraticCurveTo(bx2+lean, by2-hh*0.5, bx2+lean*1.5, by2-hh);
        ctx.stroke();
      }
      // 小花點
      for (let i = 0; i < 4; i++) {
        const fx = cx + 4 + (Math.sin(wx*31+i*57)*43758.5 - Math.floor(Math.sin(wx*31+i*57)*43758.5)) * (size-8);
        const fy = cy + size*0.4 + (Math.sin(i*43+wy*37)*43758.5 - Math.floor(Math.sin(i*43+wy*37)*43758.5)) * size*0.35;
        ctx.fillStyle = 'rgba(180,200,80,0.5)';
        ctx.beginPath(); ctx.arc(fx, fy, 1.2, 0, Math.PI*2); ctx.fill();
      }
      break;
    }
    case T.FOREST: {
      ctx.fillStyle = '#091a0a'; ctx.fillRect(cx, cy, size, size);
      // 樹幹
      const trx = cx + size*0.5, tryy = cy + size*0.82;
      const tw = size*0.1, th = size*0.35;
      ctx.fillStyle = '#3a2008';
      ctx.fillRect(trx-tw/2, tryy-th, tw, th);
      // 三層樹冠（下→上越來越窄）
      const layers = [
        {yf:0.64, w:size*0.48, h:size*0.28, col:'#1a5018'},
        {yf:0.46, w:size*0.38, h:size*0.25, col:'#1e6020'},
        {yf:0.30, w:size*0.27, h:size*0.22, col:'#226822'},
      ];
      for (const l of layers) {
        ctx.fillStyle = l.col;
        ctx.beginPath();
        ctx.moveTo(trx, cy+size*l.yf-l.h);
        ctx.lineTo(trx+l.w/2, cy+size*l.yf);
        ctx.lineTo(trx-l.w/2, cy+size*l.yf);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(50,120,40,0.25)'; ctx.lineWidth = 0.5; ctx.stroke();
      }
      // 頂尖
      ctx.fillStyle = '#28702a';
      ctx.beginPath();
      ctx.moveTo(trx, cy+size*0.14);
      ctx.lineTo(trx+size*0.1, cy+size*0.28);
      ctx.lineTo(trx-size*0.1, cy+size*0.28);
      ctx.closePath(); ctx.fill();
      // 地面陰影
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath(); ctx.ellipse(trx, tryy+2, size*0.18, size*0.05, 0, 0, Math.PI*2); ctx.fill();
      break;
    }
    case T.MOUNTAIN: {
      // 黃土色底 + 岩石顆粒
      ctx.fillStyle = '#4a3a20';
      ctx.fillRect(cx, cy, size, size);
      // 岩石顆粒
      const grains = 6 + (r1 * 4 | 0);
      for (let i = 0; i < grains; i++) {
        const gx = Math.sin(wx*11+wy*37+i*59) * 43758.5;
        const gy = Math.sin(wx*17+wy*53+i*73) * 43758.5;
        const grx = cx + 1 + ((gx-Math.floor(gx)) * (size-2));
        const gry = cy + 1 + ((gy-Math.floor(gy)) * (size-2));
        const gs = 1 + ((Math.sin(i*31)*0.5+0.5) * 2.5);
        const bright = 0.3 + (Math.sin(i*17)*0.5+0.5) * 0.4;
        ctx.fillStyle = `rgba(${(140+bright*60)|0},${(110+bright*40)|0},${(60+bright*30)|0},0.8)`;
        ctx.fillRect(grx, gry, gs, gs);
      }
      // 山峰輪廓
      ctx.fillStyle = 'rgba(100,80,40,0.5)';
      ctx.beginPath();
      ctx.moveTo(cx + size*0.5, cy + size*0.1);
      ctx.lineTo(cx + size*0.85, cy + size*0.75);
      ctx.lineTo(cx + size*0.15, cy + size*0.75);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case T.HIGH: {
      // 深灰 + 雪頂
      ctx.fillStyle = '#252520';
      ctx.fillRect(cx, cy, size, size);
      // 岩石顆粒（更深）
      for (let i = 0; i < 8; i++) {
        const gx = Math.sin(wx*7+wy*41+i*61) * 43758.5;
        const gy = Math.sin(wx*13+wy*67+i*79) * 43758.5;
        const grx = cx + 1 + ((gx-Math.floor(gx)) * (size-2));
        const gry = cy + 1 + ((gy-Math.floor(gy)) * (size-2));
        ctx.fillStyle = `rgba(80,75,70,0.7)`;
        ctx.fillRect(grx, gry, 1.5, 1.5);
      }
      // 雪頂
      ctx.fillStyle = 'rgba(230,235,240,0.7)';
      ctx.beginPath();
      ctx.moveTo(cx + size*0.5, cy + size*0.05);
      ctx.lineTo(cx + size*0.65, cy + size*0.35);
      ctx.lineTo(cx + size*0.35, cy + size*0.35);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case T.CAVE: {
      // 紫黑 + 洞口
      ctx.fillStyle = '#120820';
      ctx.fillRect(cx, cy, size, size);
      const cg = ctx.createRadialGradient(cx+size/2, cy+size/2, 1, cx+size/2, cy+size/2, size*0.4);
      cg.addColorStop(0, 'rgba(0,0,0,0.9)');
      cg.addColorStop(1, 'rgba(50,10,80,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.ellipse(cx+size/2, cy+size*0.55, size*0.3, size*0.25, 0, 0, Math.PI*2);
      ctx.fill();
      // 洞口邊石
      ctx.strokeStyle = 'rgba(100,60,140,0.6)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(cx+size/2, cy+size*0.55, size*0.3, size*0.25, 0, 0, Math.PI*2);
      ctx.stroke();
      break;
    }
    case T.MERCHANT: {
      // 暖黃色帳篷
      ctx.fillStyle = '#2a1a08';
      ctx.fillRect(cx, cy, size, size);
      // 帳篷
      ctx.fillStyle = 'rgba(200,150,50,0.85)';
      ctx.beginPath();
      ctx.moveTo(cx+size*0.5, cy+size*0.1);
      ctx.lineTo(cx+size*0.9, cy+size*0.75);
      ctx.lineTo(cx+size*0.1, cy+size*0.75);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(160,100,20,0.9)';
      ctx.fillRect(cx+size*0.35, cy+size*0.5, size*0.3, size*0.25);
      // 燈光
      ctx.fillStyle = 'rgba(255,220,100,0.3)';
      ctx.beginPath();
      ctx.arc(cx+size/2, cy+size*0.4, size*0.15, 0, Math.PI*2);
      ctx.fill();
      break;
    }
    default: {
      ctx.fillStyle = '#1e4a1e';
      ctx.fillRect(cx, cy, size, size);
    }
  }
}

function getTile(wx, wy) {
  const ter = getTerrain(wx, wy);
  const ti = TERRAIN_INFO[ter] || TERRAIN_INFO[2];
  return { color: ti.col, walkable: ti.pass !== false, terrain: ter };
}

function renderMap() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const camX = px - 7, camY = py - 7;

  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  // Pass 1: terrain
  for (let row = 0; row < VIEW; row++) {
    for (let col = 0; col < VIEW; col++) {
      const worldX = camX + col, worldY = camY + row;
      const tile = getTile(worldX, worldY);
      const cx = col * TILE, cy = row * TILE;

      // Draw terrain with canvas detail
      drawTerrain(ctx, tile.terrain, cx, cy, TILE, worldX, worldY);

      // Monster indicator
      if (col !== 7 || row !== 7) {
        if (Math.abs(col - 7) <= 3 && Math.abs(row - 7) <= 3) {
          const mon = getMonsterAt(worldX, worldY);
          if (mon) {
            ctx.fillStyle = MDEFS[mon.name]?.elite ? 'rgba(245,158,11,0.35)' : 'rgba(248,113,113,0.35)';
            ctx.fillRect(cx, cy, TILE, TILE);
            ctx.font = `${Math.floor(TILE * 0.65)}px serif`;
            ctx.fillText(MDEFS[mon.name]?.icon || '👾', cx + 3, cy + TILE - 3);
          }
        }
      }
    }
  }

  // Player fixed at center (col=7, row=7)
  ctx.fillStyle = '#3b0764';
  ctx.fillRect(7 * TILE, 7 * TILE, TILE, TILE);
  ctx.strokeStyle = '#a855f7';
  ctx.lineWidth = 2;
  ctx.strokeRect(7 * TILE + 1, 7 * TILE + 1, TILE - 2, TILE - 2);

  // Pass 2: fog
  for (let row = 0; row < VIEW; row++) {
    for (let col = 0; col < VIEW; col++) {
      if (col === 7 && row === 7) continue;
      const worldX = camX + col, worldY = camY + row;
      if (!explored.has(`${worldX},${worldY}`)) {
        ctx.fillStyle = 'rgba(0,0,0,0.88)';
        ctx.fillRect(col * TILE, row * TILE, TILE, TILE);
      }
    }
  }

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(20,20,40,0.3)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= VIEW; i++) {
    ctx.beginPath(); ctx.moveTo(i * TILE, 0); ctx.lineTo(i * TILE, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * TILE); ctx.lineTo(canvas.width, i * TILE); ctx.stroke();
  }
}

// ═══════════════════════════════════════════════
// MOVEMENT
// ═══════════════════════════════════════════════
let moveCooldown = false;
let nearMerchant = false;

function checkNearMerchant() {
  // 檢查玩家周圍3格內有沒有商人
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      if (getTerrain(px+dx, py+dy) === T.MERCHANT) {
        nearMerchant = true;
        return;
      }
    }
  }
  nearMerchant = false;
}


// ════════════════════════════════════════════════════════════
// 🚶 MOVEMENT & TERRAIN EFFECTS
// ════════════════════════════════════════════════════════════

function move(dx, dy) {
  if (moveCooldown || combatActive || deathActive) return;
  const nx = px + dx, ny = py + dy;
  const ter = getTerrain(nx, ny);
  if (!isPassable(ter)) { toast('⛔ 無法通行'); return; }

  moveCooldown = true;
  setTimeout(() => moveCooldown = false, 180);

  px = nx; py = ny;
  explored.add(`${nx},${ny}`);
  // Explore 3×3 around new position
  for (let ey = -1; ey <= 1; ey++) {
    for (let ex = -1; ex <= 1; ex++) {
      const ek = `${nx+ex},${ny+ey}`;
      if (!explored.has(ek)) { explored.add(ek); state.totalExplored++; }
    }
  }

  // Status effect tick
  tickEffects();

  // Terrain interaction
  if (ter === T.CAVE) {
    showCaveEvent();
    renderMap(); updateUI(); return;
  }
  if (ter === T.MERCHANT) {
    openMerchant();
    renderMap(); updateUI(); return;
  }

  // Monster encounter
  const mon = getMonsterAt(nx, ny);
  if (mon) {
    const lv = monsterLevel(nx, ny);
    startCombat(mon.name, nx, ny, lv);
    renderMap(); updateUI(); return;
  }

  applyCurseEffects('move');
  renderMap(); updateUI(); save(true);
}

function tickEffects() {
  state.statusEffects = state.statusEffects.filter(e => {
    e.turns--;
    if (e.type === 'poison') {
      const dmg = 5;
      state.stats.hp = Math.max(1, state.stats.hp - dmg);
      toast(`☠️ 毒素侵蝕 -${dmg} HP`);
    }
    return e.turns > 0;
  });
}

// ═══════════════════════════════════════════════
// COMBAT SYSTEM
// ═══════════════════════════════════════════════
let combatActive = false, deathActive = false;
let combat = null;
let cbTimer = null, cbTextQ = [], cbTextRunning = false;
let answerActive = false;

const CORRECT_MSGS = [
  '反應神速！', '正中要害！', '答對了！', '快準狠！', '思路清晰！',
];
const WRONG_MSGS = [
  '判斷失誤——', '腦袋短路了！', '答錯了！', '選錯了！', '失誤！',
];


// ════════════════════════════════════════════════════════════
// ⚔️ COMBAT SYSTEM
// // Flow: startCombat → startCombatTurn → showQuestion
// //       → answerQ/onTimeout → resolvePlayerAttack/doMonsterAttack
// //       → nextTurnOrEnd → endCombatVictory / checkPlayerDead
// ════════════════════════════════════════════════════════════

function startCombat(monName, wx, wy, lv) {
  const m = scaledMonster(monName, lv);
  m.hp = m.maxHp;
  combat = {
    monster: m, wx, wy,
    turn: 0,
    timeLimit: timeLimit(),
    slowPenalty: 0, // additional seconds removed
    buffAtk: 1.0, buffDef: 1.0,
    beesSeg: m.segments > 0 ? 0 : -1, // current bee segment
    phase: 1, // for boss
    fled: false,
    answered: false,
  };
  combatActive = true;
  cbTextQ = []; cbTextRunning = false;
  answerActive = false;

  document.getElementById('combat-overlay').classList.add('active');
  document.getElementById('map-dim').classList.add('active');
  document.getElementById('cb-q').style.display = 'none';
  document.getElementById('cb-log').innerHTML = '';
  updateCombatHPDisplay();

  // First strike check
  const monHasFirst = m.agi * 3 >= totalStat('agi');
  if (!monHasFirst) {
    cbLog('cl-w', `你眼疾手快，搶先一步出手！`);
  } else {
    cbLog('cl-w', `${m.icon} ${m.name}身形一閃，搶先出爪！`);
  }

  // Bee intro text
  if (m.special === 'segments') {
    cbLog('cl-o', `蜂群！一波未平一波又起——`);
  }

  setTimeout(() => startCombatTurn(monHasFirst), 1200);
}

function startCombatTurn(monGoesFirst) {
  if (!combatActive) return;
  combat.turn++;
  combat.answered = false;

  // Paladin regen
  const jp = getJobPassive();
  if (jp.regenPerTurn) {
    state.stats.hp = Math.min(state.stats.maxHp, state.stats.hp + jp.regenPerTurn);
    cbLog('cl-g', `🛡️ 聖騎士之力，回復 ${jp.regenPerTurn} HP`);
    updateStatusBar();
  }

  // Monster goes first
  if (monGoesFirst && combat.turn > 0) {
    doMonsterAttack(() => { showQuestion(); });
    return;
  }
  showQuestion();
}

function showQuestion() {
  if (!combatActive) return;
  answerActive = false;
  const q = genQuestion(state.level);
  const choices = shuffleAnswers(q.answer);
  const corners = ['tl','tr','bl','br'];
  corners.forEach((c, i) => {
    document.getElementById(`ans-${c}`).classList.remove('correct','wrong');
    document.getElementById(`ans-${c}-val`).textContent = choices[i];
    document.getElementById(`ans-${c}`).dataset.correct = choices[i] === q.answer ? '1' : '0';
  });

  // Bee segment text
  const m = combat.monster;
  if (m.special === 'segments' && m.segments > 0) {
    const seg = m.segments - Math.floor(m.hp / m.segHp);
    const segTexts = ['第一隻蜜蜂撲來！','蜂群持續進攻！第二波！','最後一隻！打倒牠就勝利了！'];
    if (seg < 3 && segTexts[seg]) cbLog('cl-o', segTexts[seg]);
  }

  document.getElementById('cb-q-text').textContent = `${q.text}`;
  document.getElementById('cb-q').style.display = '';
  document.getElementById('cb-escape').disabled = false;

  // Timer
  const tl = Math.max(3, combat.timeLimit - combat.slowPenalty);
  const fill = document.getElementById('cb-timer');
  fill.style.transition = 'none'; fill.style.width = '100%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      fill.style.transition = `width ${tl}s linear`;
      fill.style.width = '0%';
    });
  });
  answerActive = true;
  cbTimer = setTimeout(() => onTimeout(), tl * 1000);
}

function answerQ(corner) {
  if (!answerActive || !combatActive) return;
  answerActive = false;
  clearTimeout(cbTimer);
  document.getElementById('cb-escape').disabled = true;
  document.getElementById('cb-q').style.display = 'none';

  const btn = document.getElementById(`ans-${corner}`);
  const correct = btn.dataset.correct === '1';
  const fill = document.getElementById('cb-timer');
  const tl = Math.max(3, combat.timeLimit - combat.slowPenalty);
  const remaining = parseFloat(fill.style.width) / 100 * tl;
  fill.style.transition = 'none'; fill.style.width = '0%';

  btn.classList.add(correct ? 'correct' : 'wrong');
  setTimeout(() => btn.classList.remove('correct','wrong'), 600);

  if (correct) {
    resolvePlayerAttack(remaining, tl);
  } else {
    cbLog('cl-s', WRONG_MSGS[Math.floor(Math.random()*WRONG_MSGS.length)]);
    setTimeout(() => doMonsterAttack(nextTurnOrEnd), 800);
  }
}

function onTimeout() {
  if (!answerActive || !combatActive) return;
  answerActive = false;
  document.getElementById('cb-q').style.display = 'none';
  cbLog('cl-p', '腦中一片空白……怪物看準機會猛攻！');
  setTimeout(() => {
    const dmg = Math.floor(combat.monster.atk * 1.5);
    applyDmgToPlayer(dmg);
    checkPlayerDead() || nextTurnOrEnd();
  }, 800);
}

function resolvePlayerAttack(timeLeft, tl) {
  const elapsed = tl - timeLeft;
  let atk = Math.floor(calcAtk() * combat.buffAtk);
  let sub = '';
  if (elapsed <= 3)         { atk = Math.floor(atk * 1.5); sub = '反應神速！傷害+50%'; }
  else if (timeLeft < 1)    { atk = Math.floor(atk * 0.8); sub = '險！勉強答對……'; }
  else                      { sub = CORRECT_MSGS[Math.floor(Math.random()*CORRECT_MSGS.length)]; }

  // Crit (with job passives)
  const jp = getJobPassive();
  let critRate = (totalStat('luk') * 0.5) / 100 + (jp.critBonus || 0);
  if (jp.critChance) critRate = jp.critChance;
  const critMult = jp.critMult || 2;
  let isCrit = false;
  if (Math.random() < critRate) { atk = Math.floor(atk * critMult); isCrit = true; }

  // Element multiplier
  const wpnElem = state.weapon?.element || 'none';
  const monElem = combat.monster.element || 'none';
  let elemMult = 1.0;
  if (wpnElem !== 'none' && ELEMENT_COUNTER[wpnElem] === monElem) {
    elemMult = 1.3;
    cbLog('cl-y', `⚡ 屬性相剋！傷害+30%`);
  } else if (monElem !== 'none' && ELEMENT_COUNTER[monElem] === wpnElem) {
    elemMult = 0.8;
    cbLog('cl-s', `🛡 屬性弱勢，傷害-20%`);
  }
  // Job element bonuses
  if (wpnElem==='dark'  && jp.darkBonus)  elemMult *= jp.darkBonus;
  if (wpnElem==='ice'   && jp.iceBonus)   elemMult *= jp.iceBonus;
  if (wpnElem==='fire'  && jp.fireBonus)  elemMult *= jp.fireBonus;
  // Set element bonus
  const setBonuses = getSetBonuses();
  for (const b of setBonuses) {
    if (b.elemBonus === wpnElem) elemMult *= 1.2;
  }
  atk = Math.floor(atk * elemMult);

  // Monster defense：防禦減傷最多50%，避免低等玩家完全打不動
  const m = combat.monster;
  const defReduction = Math.min(0.5, m.def / (m.def + 30));
  // High defense special: if def > atk*2, damage = 1
  if ((m.special === 'highdef') && atk <= m.def * 0.5) {
    cbLog('cl-s', `${sub}`);
    cbLog('cl-s', `${m.icon} ${m.name}的護甲紋絲不動！傷害僅 `+wrapCol('cl-r','1')+'！');
    atk = 1;
  } else {
    atk = Math.max(1, Math.floor(atk * (1 - defReduction)));
    const critText = isCrit ? wrapCol('cl-y','暴擊！') + ' ' : '';
    cbLog('cl-w', `${sub}`);
    cbLog('cl-w', `你的攻擊命中要害，${critText}造成 ${wrapCol('cl-r',atk)} 點傷害！`);
  }

  m.hp = Math.max(0, m.hp - atk);
  showFloatingDmg(atk, isCrit, false);
  updateCombatHPDisplay();

  if (m.hp <= 0) {
    setTimeout(() => endCombatVictory(), 600);
  } else {
    setTimeout(() => doMonsterAttack(nextTurnOrEnd), 700);
  }
}

function doMonsterAttack(cb) {
  if (!combatActive) return;
  const m = combat.monster;
  let dmg = Math.max(1, m.atk - Math.floor(totalStat('def') * 0.4));

  // Special abilities
  let specialText = '';
  if (m.special === 'poison' && Math.random() < 0.25) {
    const alreadyPoisoned = state.statusEffects.some(e=>e.type==='poison');
    if (!alreadyPoisoned) {
      state.statusEffects.push({type:'poison',turns:4});
      specialText = wrapCol('cl-p','中毒！每回合-5血');
    }
  }
  if (m.special === 'steal' && Math.random() < 0.45) {
    const stolen = Math.min(state.gold, Math.floor(10 + Math.random()*25));
    state.gold = Math.max(0, state.gold - stolen);
    cbLog('cl-y', `狡猾狐狸趁你分神，叼走了你的 ${wrapCol('cl-y',stolen)} 枚金幣！`);
  }
  if (m.special === 'slow' && Math.random() < 0.4) {
    combat.slowPenalty = Math.min(combat.slowPenalty + 2, combat.timeLimit - 2);
    specialText = wrapCol('cl-p',`答題時間-2秒`);
  }
  if (m.special === 'stackslow') {
    combat.slowPenalty = Math.min(combat.slowPenalty + 0.5, combat.timeLimit - 2);
    if (combat.turn <= 3) specialText = wrapCol('cl-p','毒素侵蝕……思緒越來越遲鈍');
  }
  if (m.special === 'regen') {
    const regen = 15;
    m.hp = Math.min(m.maxHp, m.hp + regen);
    cbLog('cl-g', `古樹守衛的樹根吸收大地能量，回復 ${regen} HP`);
    updateCombatHPDisplay();
  }
  if (m.special === 'berserk' && m.hp < m.maxHp * 0.5) {
    dmg = Math.floor(dmg * 2);
    cbLog('cl-o', `山豬王瀕死狂怒，攻擊力翻倍！`);
  }

  cbLog('cl-w', `${m.icon} ${m.name}發起攻擊，造成 ${wrapCol('cl-r',dmg)} 點傷害！${specialText?'　'+specialText:''}`);
  showFloatingDmg(dmg, false, true);
  applyDmgToPlayer(dmg);
  if (!checkPlayerDead()) cb();
}

function nextTurnOrEnd() {
  if (!combatActive) return;
  setTimeout(() => showQuestion(), 600);
}

function applyDmgToPlayer(dmg) {
  const jp = getJobPassive();
  const pj = getPrevJobBonus();
  const pDef = totalStat('def');
  const pAgi = totalStat('agi');

  // 迴避判斷：敏捷決定閃避率，上限35%
  const dodgeRate = Math.min(0.35, pAgi * 0.008);
  if (Math.random() < dodgeRate) {
    cbLog('cl-g', `⚡ 閃避成功！你靈巧地躲開了攻擊！`);
    showFloatingText('DODGE!', '#4ade80', 'player');
    return; // 完全不扣血
  }

  let reduction = Math.min(0.6, pDef / (pDef + 20));
  if (jp.defMult) reduction = Math.min(0.75, reduction * jp.defMult);
  if (pj.defMult) reduction = Math.min(0.75, reduction * (1+(pj.defMult-1)*0.3));
  const setBonuses = getSetBonuses();
  for (const b of setBonuses) {
    if (b.defMult) reduction = Math.min(0.75, reduction * b.defMult);
  }
  dmg = Math.max(1, Math.floor(dmg * (1 - reduction)));
  state.stats.hp = Math.max(0, state.stats.hp - dmg);
  document.getElementById('cb-player-hp').textContent = `❤️ ${state.stats.hp}/${state.stats.maxHp}`;
  showFloatingText(`-${dmg}`, '#f87171', 'player');
  updateStatusBar();
}

// 浮動傷害數字
function showFloatingText(text, color, target) {
  const combatEl = document.getElementById('combat-overlay');
  if (!combatEl || !combatEl.classList.contains('active')) return;
  const el = document.createElement('div');
  el.textContent = text;
  el.style.cssText = `
    position:absolute;
    ${target==='player' ? 'left:25%;' : 'right:25%;'}
    top:35%;
    color:${color};
    font-size:${text.includes('DODGE') || text.includes('MISS') ? '1.1rem' : '1.8rem'};
    font-weight:900;
    text-shadow:0 2px 8px ${color}88;
    pointer-events:none;
    z-index:10;
    animation:floatUp .9s ease-out forwards;
  `;
  combatEl.style.position = 'relative';
  combatEl.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

// 同時讓玩家攻擊也顯示浮動數字
function showFloatingDmg(atk, isCrit, isMonster) {
  const color = isCrit ? '#f59e0b' : isMonster ? '#f87171' : '#4ade80';
  const text = isCrit ? `💥${atk}` : `${atk}`;
  showFloatingText(text, color, isMonster ? 'player' : 'monster');
}

function checkPlayerDead() {
  if (state.stats.hp > 0) return false;
  combatActive = false;
  clearTimeout(cbTimer);
  document.getElementById('combat-overlay').classList.remove('active');
    document.getElementById('map-dim').classList.remove('active');
  triggerDeath();
  return true;
}

function endCombatVictory() {
  const m = combat.monster;
  combatActive = false;
  clearTimeout(cbTimer);

  const victoryTexts = {
    毒牙蟲:'毒牙蟲發出最後的嘶鳴，癱倒在地。',
    憤怒蘑菇:'蘑菇精炸裂成一堆孢子，你撿起了掉落的裝備。',
    森林野狼:'野狼發出最後一聲嚎叫，倒下了。',
    藤蔓精靈:'藤蔓精靈的藤蔓瞬間枯萎，消散在空氣中。',
    狂蜂群:'最後一隻蜜蜂跌落，周圍終於安靜下來。',
    狡猾狐狸:'狐狸踉蹌逃竄，留下了金幣。',
    石頭哥布林:'石頭哥布林發出悶響，轟然倒塌。',
    毒沼蛙:'毒沼蛙發出臨死前的叫聲，沉入地面。',
    憤怒山豬王:'山豬王轟然倒地，震得地面微微顫抖。',
    古樹守衛:'古樹守衛發出低沉的呻吟，緩緩枯萎。',
    森林詛咒者:'詛咒者轟然倒地，整片森林陷入詭異的寂靜……',
  };
  cbLog('cl-g', victoryTexts[m.name] || `${m.icon} ${m.name}被擊敗了！`);

  // Rewards
  const gold = m.gold;
  const exp  = m.exp;
  state.gold += gold;
  state.kills++; state.totalKills++;
  applyCurseEffects('combat_end');

  // 多樣掉落
  const loots = generateLoot(m.name, m.lv);
  if (loots) {
    for (const loot of loots) {
      if (loot.type === 'gold') {
        state.gold += loot.amount;
        cbLog('cl-y', `💰 獲得 ${wrapCol('cl-y', loot.amount)} 金幣！`);
      } else {
        if (addToInventory(loot)) {
          const elemTag = loot.element && loot.element !== 'none'
            ? ` ${ELEMENTS[loot.element]?.icon || ''}` : '';
          const cursedTag = loot.cursed ? ' <span style="color:#f87171">【腐化】</span>' : '';
          cbLog('cl-y', `📦 掉落：${cursedTag}${wrapCol('rarity-'+loot.rarity, loot.name)}${elemTag}`);
        } else {
          cbLog('cl-s', `${loot.name} 因背包已滿而消失了……`);
        }
      }
    }
  }

  // Mark killed
  killedSet.add(`${combat.wx},${combat.wy}`);
  state.killedMonsters = [...killedSet];

  setTimeout(() => {
    document.getElementById('combat-overlay').classList.remove('active');
    document.getElementById('map-dim').classList.remove('active');
    gainExp(exp);
    updateUI(); save();
  }, 1200);
}

function tryEscape() {
  if (!answerActive || !combatActive) return;
  answerActive = false;
  clearTimeout(cbTimer);
  document.getElementById('cb-q').style.display = 'none';

  const m = combat.monster;
  const myAgi = totalStat('agi'), monAgi = m.agi;
  const escapeChance = Math.max(0.1, Math.min(0.85, (myAgi - monAgi*0.5) / (myAgi + monAgi)));

  if (Math.random() < escapeChance) {
    cbLog('cl-g', '你趁隙逃脫了！');
    setTimeout(() => {
      combatActive = false;
      document.getElementById('combat-overlay').classList.remove('active');
    document.getElementById('map-dim').classList.remove('active');
      updateUI();
    }, 700);
  } else {
    cbLog('cl-r', '逃跑失敗！怪物攔住了你！');
    setTimeout(() => doMonsterAttack(nextTurnOrEnd), 700);
  }
}

function cbLog(cls, html) {
  const log = document.getElementById('cb-log');
  const line = document.createElement('div');
  line.className = `cb-line ${cls}`;
  line.innerHTML = html;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function wrapCol(cls, text) {
  return `<span class="${cls}">${text}</span>`;
}

function updateCombatHPDisplay() {
  if (!combat) return;
  const m = combat.monster;
  const pct = Math.max(0, m.hp / m.maxHp * 100);
  document.getElementById('cb-hp').style.width = pct + '%';
  document.getElementById('cb-name').textContent = `${m.icon} ${m.name}`;
  document.getElementById('cb-hp-txt').textContent = `❤️ ${m.hp} / ${m.maxHp}`;
  document.getElementById('cb-player-hp').textContent = `❤️ ${state.stats.hp}/${state.stats.maxHp}`;
}

// QUESTION GENERATOR
// ═══════════════════════════════════════════════

function genQuestion(lv) {
  const diff = Math.min(5, Math.ceil(lv / 10));
  const r = () => Math.floor(Math.random() * 1e9);
  let a, b, text, answer;

  if (diff === 1) {
    a = Math.floor(Math.random()*12)+1; b = Math.floor(Math.random()*12)+1;
    if (Math.random()<0.5) { text=`${a} + ${b} = ?`; answer=a+b; }
    else { const big=Math.max(a,b),sm=Math.min(a,b); text=`${big} - ${sm} = ?`; answer=big-sm; }
  } else if (diff === 2) {
    a=Math.floor(Math.random()*20)+10; b=Math.floor(Math.random()*15)+2;
    if (Math.random()<0.5) { text=`${a} + ${b} = ?`; answer=a+b; }
    else { text=`${a} - ${b} = ?`; answer=a-b; }
  } else if (diff === 3) {
    a=Math.floor(Math.random()*9)+2; b=Math.floor(Math.random()*9)+2;
    text=`${a} × ${b} = ?`; answer=a*b;
  } else if (diff === 4) {
    b=Math.floor(Math.random()*8)+2; a=b*(Math.floor(Math.random()*8)+2);
    if (Math.random()<0.5) { text=`${a} ÷ ${b} = ?`; answer=a/b; }
    else { const x=Math.floor(Math.random()*6)+2; const y=Math.floor(Math.random()*6)+2;
           text=`${x} × ${y} = ?`; answer=x*y; }
  } else {
    a=Math.floor(Math.random()*50)+50; b=Math.floor(Math.random()*30)+10;
    const ops=['+','-','×'];const op=ops[Math.floor(Math.random()*ops.length)];
    if (op==='+') { text=`${a} + ${b} = ?`; answer=a+b; }
    else if (op==='-') { text=`${a} - ${b} = ?`; answer=a-b; }
    else { const x=Math.floor(Math.random()*12)+2; const y=Math.floor(Math.random()*6)+2;
           text=`${x} × ${y} = ?`; answer=x*y; }
  }
  return { text, answer };
}

function shuffleAnswers(correct) {
  const wrong = new Set();
  const spread = Math.max(3, Math.floor(correct * 0.2) + 2);
  const attempts = 50;
  for (let i=0; i<attempts && wrong.size<3; i++) {
    const off = Math.floor(Math.random()*spread*2+1) * (Math.random()<0.5?1:-1);
    const v = correct + off;
    if (v !== correct && v >= 0 && !wrong.has(v)) wrong.add(v);
  }
  // Fallback
  let fallback = 1;
  while (wrong.size < 3) { if (correct+fallback!==correct) wrong.add(correct+fallback); fallback++; }
  const arr = [correct, ...[...wrong].slice(0,3)];
  for (let i=arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ⬆️ PROGRESSION — EXP, Level up, Jobs
// ════════════════════════════════════════════════════════════

function gainExp(amount) {
  state.exp += amount;
  while (state.exp >= state.expNext && state.level < 999) {
    state.exp -= state.expNext;
    state.level++;
    state.expNext = expForLevel(state.level);
    state.stats.maxHp += 5;
    state.stats.hp = Math.min(state.stats.maxHp, state.stats.hp + 20);
    state.freePoints += state.level % 10 === 0 ? 4 : 1;
    toast(`✨ 升級！Lv.${state.level}　獲得屬性點 +${state.level%10===0?4:1}`);
  }
  updateUI();
}

function getJobPassive() {
  return JOB_DEFS[state.job||'miner']?.passive || {};
}

function getPrevJobBonus() {
  if (!state.prevJobs?.length) return {};
  const combined = {};
  for (const prev of state.prevJobs) {
    for (const [k,v] of Object.entries(prev.passive||{})) {
      if (typeof v==='number' && v>0) {
        combined[k] = (combined[k]||1) * (1+(v-1)*0.3);
      }
    }
  }
  return combined;
}

function changeJob(jobKey) {
  const jd = JOB_DEFS[jobKey];
  if (!jd) return;
  if (state.level < (jd.reqLevel||0)) { toast(`需要 Lv.${jd.reqLevel}`); return; }
  if (state.job !== jd.reqJob) { toast('職業條件不符'); return; }
  if ((state.jobLevel||1) < (jd.reqJobLevel||0)) { toast(`需要目前職業 Lv.${jd.reqJobLevel}`); return; }
  if (!confirm(`確定轉職為「${jd.name}」？\n職業等級將重置為1，但前職業殘留30%被動加成。`)) return;
  if (!state.prevJobs) state.prevJobs = [];
  state.prevJobs.push({job:state.job, level:state.jobLevel||1, passive:JOB_DEFS[state.job]?.passive||{}});
  state.job = jobKey;
  state.jobLevel = 1;
  closeModal('modal-stats');
  toast(`🎉 成功轉職為 ${jd.name}！`);
  updateUI(); save(true);
}

// Ch6: 怪物掉落（含屬性繼承）


// ════════════════════════════════════════════════════════════
// ⚒️ ENHANCE SYSTEM — Scrolls, success rates, cursed items
// ════════════════════════════════════════════════════════════

function getEnhanceRate(enhance, scrollType) {
  const base = ENHANCE_RATES[enhance] || 0.0001;
  if (scrollType==='lucky')  return Math.min(1, base*1.5);
  if (scrollType==='holy')   return enhance<=6 ? 1.0 : base;
  if (scrollType==='cursed') return Math.max(0.01, base-0.3);
  return base;
}

function tryEnhance(item, scrollType, hasProtect) {
  const cur = item.enhance || 0;
  if (cur >= 15) { toast('已達最高強化等級 +15'); return 'done'; }
  const rate = getEnhanceRate(cur+1, scrollType);
  const roll = Math.random();
  if (roll < rate) {
    let jump = 1;
    if (scrollType==='lucky' && Math.random()<0.5) {
      const r2 = Math.random();
      jump = r2<0.15 ? 3 : r2<0.50 ? 2 : 1;
    }
    item.enhance = Math.min(15, cur+jump);
    const jumpText = jump>1 ? ` 🎊 跳級+${jump}！` : '';
    toast(`✨ 強化成功！${item.name} → +${item.enhance}${jumpText}`);
    showEnhanceResult('success', item.name, item.enhance, jump);
  } else if (cur >= 7 && !hasProtect) {
    removeItemFromGame(item);
    toast(`💥 強化失敗！${item.name} 已碎裂……`);
    showEnhanceResult('break', item.name, cur);
    return 'break';
  } else {
    toast(`❌ 強化失敗，${item.name} 維持 +${cur}`);
    showEnhanceResult('fail', item.name, cur);
  }
  return 'done';
}

function showEnhanceResult(type, name, enhance) {
  const colors = {success:'#4ade80', break:'#f87171', fail:'#9ca3af'};
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);
    font-size:2rem;font-weight:900;color:${colors[type]};
    text-shadow:0 0 20px ${colors[type]};pointer-events:none;z-index:9999;
    animation:popIn .5s ease-out forwards`;
  el.textContent = type==='break' ? '💥 碎裂！' : type==='success' ? `✨ +${enhance}` : '❌ 失敗';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

function removeItemFromGame(item) {
  const invIdx = state.inventory.findIndex(i=>i.id===item.id);
  if (invIdx>=0) { state.inventory.splice(invIdx,1); return; }
  if (state.weapon?.id===item.id) { state.weapon=null; return; }
  for (const slot of ARMOR_SLOTS) {
    if (state.equipment[slot]?.id===item.id) { state.equipment[slot]=null; return; }
  }
}

function doEnhance(itemId, fromInv, invIdx, slot) {
  let item = fromInv ? state.inventory.find(i=>String(i.id)===String(itemId))
    : (slot==='weapon' ? state.weapon : state.equipment[slot]);
  if (!item) return;
  const sel = document.getElementById('enh-scroll-sel');
  if (!sel) return;
  const scrollIdx = parseInt(sel.value);
  const scrolls = state.inventory.filter(i=>i.type==='scroll'&&i.effect?.action==='enhance');
  const scroll = scrolls[scrollIdx];
  if (!scroll) return;
  const protectIdx = state.inventory.findIndex(i=>i.subtype==='enhance_protect');
  const hasProtect = protectIdx>=0;
  const realScrollIdx = state.inventory.findIndex(i=>i.id===scroll.id);
  if (realScrollIdx>=0) state.inventory.splice(realScrollIdx,1);
  tryEnhance(item, scroll.effect?.type, hasProtect);
  if (hasProtect) {
    const pi = state.inventory.findIndex(i=>i.subtype==='enhance_protect');
    if (pi>=0) state.inventory.splice(pi,1);
  }
  closeModal('modal-item');
  updateUI(); save(true);
}

function usePurifyScroll(item) {

// ════════════════════════════════════════════════════════════
// 🎯 SET BONUSES & CURSE EFFECTS
// ════════════════════════════════════════════════════════════

function getSetBonuses() {
  const setCounts = {};
  const allEquipped = [state.weapon, ...ARMOR_SLOTS.map(s=>state.equipment[s])].filter(Boolean);
  for (const item of allEquipped) {
    if (!item.setId) continue;
    setCounts[item.setId] = (setCounts[item.setId]||0)+1;
  }
  const bonuses = [];
  for (const [setId, count] of Object.entries(setCounts)) {
    const def = SET_DEFS[setId];
    if (!def) continue;
    for (const [req, bonus] of Object.entries(def.bonus)) {
      if (count>=parseInt(req)) bonuses.push({setId, setName:def.name, count, req:parseInt(req), ...bonus});
    }
  }
  return bonuses;
}

// Ch5: 職業被動

function applyCurseEffects(triggerType) {
  const allEquipped = [state.weapon, ...ARMOR_SLOTS.map(s=>state.equipment[s])].filter(Boolean);
  for (const item of allEquipped) {
    if (!item.cursed || item.purified) continue;
    const ef = CURSE_EFFECTS.find(e=>e.type===item.curseType);
    if (!ef) continue;
    if (triggerType==='move' && ef.type==='hp_drain') {
      state.stats.hp = Math.max(1, state.stats.hp-1);
      updateStatusBar();
    }
    if (triggerType==='combat_end' && ef.type==='gold_drain') {
      const drain = Math.floor(state.gold*0.05);
      if (drain>0) {
        state.gold = Math.max(0, state.gold-drain);
        toast(`☠️ 詛咒吸走了 $${drain} 金幣`);
      }
    }
  }
}

// 🎒 INVENTORY — Add, remove, equip, sell, use
