// 用座標+世界種子生成固定但看起來隨機的迷宮（每個洞穴入口對應一個固定迷宮版本，每天輪換）
function getDungeonSeed(wx, wy) {
  const day = Math.floor(Date.now() / 86400000); // 每天換一次迷宮
  return (wx * 73856093) ^ (wy * 19349663) ^ (day * 83492791);
}

function dungeonRand(seed, idx) {
  const v = Math.sin(seed * 12.9898 + idx * 78.233) * 43758.5453;
  return v - Math.floor(v);
}

// 生成迷宮：0=牆 1=通道 2=入口 3=出口 4=寶箱 5=怪物點
function generateDungeonGrid(seed) {
  const size = DUNGEON_SIZE;
  const grid = Array.from({length:size}, () => Array(size).fill(0));
  const entryX = 0, entryY = Math.floor(size/2);

  // 從入口開始鑿（保證入口必定連通），用 drunk-walk 但起點=入口
  let cx = entryX, cy = entryY;
  grid[cy][cx] = 1;
  let idx = 0;
  const carved = [[cx,cy]];
  const targetCells = Math.floor(size*size*0.45);
  let stuckCount = 0;
  while (carved.length < targetCells && stuckCount < 500) {
    const dir = Math.floor(dungeonRand(seed, idx++) * 4);
    const ddx = [1,-1,0,0][dir], ddy = [0,0,1,-1][dir];
    const nx2 = cx+ddx, ny2 = cy+ddy;
    if (nx2 < 0 || ny2 < 0 || nx2 >= size || ny2 >= size) { stuckCount++; continue; }
    cx = nx2; cy = ny2;
    if (grid[cy][cx] === 0) {
      grid[cy][cx] = 1;
      carved.push([cx,cy]);
      stuckCount = 0;
    } else {
      stuckCount++;
    }
    // 偶爾跳回已鑿格，避免走太遠變成一條線
    if (stuckCount > 0 && stuckCount % 20 === 0 && carved.length > 0) {
      const jump = carved[Math.floor(dungeonRand(seed, idx++) * carved.length)];
      cx = jump[0]; cy = jump[1];
    }
  }

  // BFS 找出口（保證在連通範圍內，離入口最遠的格子）
  const visited = Array.from({length:size}, () => Array(size).fill(false));
  const dist = Array.from({length:size}, () => Array(size).fill(-1));
  const queue = [[entryX, entryY]];
  visited[entryY][entryX] = true;
  dist[entryY][entryX] = 0;
  let qi = 0;
  while (qi < queue.length) {
    const [x,y] = queue[qi++];
    for (const [ddx,ddy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nx2 = x+ddx, ny2 = y+ddy;
      if (nx2<0||ny2<0||nx2>=size||ny2>=size) continue;
      if (grid[ny2][nx2] !== 1 || visited[ny2][nx2]) continue;
      visited[ny2][nx2] = true;
      dist[ny2][nx2] = dist[y][x] + 1;
      queue.push([nx2, ny2]);
    }
  }

  // 找連通範圍內離入口最遠的格子作為出口（保證可達）
  let exitX = entryX, exitY = entryY, maxDist = 0;
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      if (visited[y][x] && dist[y][x] > maxDist) {
        maxDist = dist[y][x]; exitX = x; exitY = y;
      }
    }
  }

  // 只保留連通範圍內的格子作為「合法通道」（避免孤立通道誤導玩家）
  const reachableCarved = [];
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      if (visited[y][x]) reachableCarved.push([x,y]);
    }
  }

  // 寶箱：隨機3個通道格（避開入口/出口，且必須是可達的）
  const chestCells = reachableCarved.filter(([x,y]) => !(x===entryX&&y===entryY) && !(x===exitX&&y===exitY));
  const chestPositions = [];
  for (let i = 0; i < 3 && chestCells.length > 0; i++) {
    const ci = Math.floor(dungeonRand(seed, idx++) * chestCells.length);
    chestPositions.push(chestCells[ci]);
  }

  // 清除不可達的孤立通道格（避免顯示出玩家走不到的死路造成困惑）
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      if (grid[y][x] === 1 && !visited[y][x]) grid[y][x] = 0;
    }
  }

  return {grid, entryX, entryY, exitX, exitY, carved: reachableCarved, chestPositions};
}

// 進入地下城
function enterDungeon(wx, wy) {
  const seed = getDungeonSeed(wx, wy);
  const {grid, entryX, entryY, exitX, exitY, chestPositions} = generateDungeonGrid(seed);
  const contLv = CONTINENT_INFO[getContinent(wx, wy)]?.recLv || 1;

  dungeonState = {
    grid, entryX, entryY, exitX, exitY,
    chestPositions: chestPositions.map(([x,y]) => ({x, y, opened:false})),
    px: entryX, py: entryY,
    returnWx: wx, returnWy: wy,
    monLv: contLv + 5, // 地下城怪物比地面+5級
    openedChests: [],
    seed,
  };
  document.getElementById('dungeon-overlay')?.classList.add('active');
  renderDungeon();
  showArrivalAnim('🕳️ 地下城', '小心，怪物密度更高……', '#4a2a6a');
  updateBGMForContext();
}

function exitDungeon() {
  if (!dungeonState) return;
  px = dungeonState.returnWx;
  py = dungeonState.returnWy;
  document.getElementById('dungeon-overlay')?.classList.remove('active');
  dungeonState = null;
  renderMap(); updateUI(); save(true);
  updateBGMForContext();
  toast('🚪 離開地下城');
}

function confirmExitDungeon() {
  if (!confirm('確定要離開地下城嗎？地下城本身會在每天重新生成。')) return;
  exitDungeon();
}

// 渲染地下城迷宮（Canvas）
function renderDungeon() {
  if (!dungeonState) return;
  const canvas = document.getElementById('dungeon-canvas');
  if (!canvas) return;
  const size = DUNGEON_SIZE;
  const cellSize = Math.min(22, Math.floor((window.innerWidth - 32) / size));
  canvas.width = cellSize * size;
  canvas.height = cellSize * size;
  const ctx2 = canvas.getContext('2d');
  const {grid, exitX, exitY, chestPositions, px: dpx, py: dpy} = dungeonState;

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const cx = x*cellSize, cy = y*cellSize;
      // 只顯示已探索過或玩家附近2格內的格子（戰爭迷霧）
      const dist = Math.abs(x-dpx) + Math.abs(y-dpy);
      const visible = dist <= 3;
      if (grid[y][x] === 0) {
        ctx2.fillStyle = visible ? '#1a0f2a' : '#050308';
        ctx2.fillRect(cx, cy, cellSize, cellSize);
      } else {
        ctx2.fillStyle = visible ? '#2a1f3a' : '#0d0a14';
        ctx2.fillRect(cx, cy, cellSize, cellSize);
        ctx2.strokeStyle = visible ? '#3a2a52' : '#15101f';
        ctx2.strokeRect(cx+0.5, cy+0.5, cellSize-1, cellSize-1);
        if (visible && x === exitX && y === exitY) {
          ctx2.fillStyle = '#fbbf24';
          ctx2.font = `${cellSize*0.6}px serif`;
          ctx2.textAlign = 'center'; ctx2.textBaseline = 'middle';
          ctx2.fillText('🚪', cx+cellSize/2, cy+cellSize/2);
        }
        const chest = chestPositions.find(c => c.x===x && c.y===y && !c.opened);
        if (visible && chest) {
          ctx2.font = `${cellSize*0.55}px serif`;
          ctx2.textAlign = 'center'; ctx2.textBaseline = 'middle';
          ctx2.fillText('📦', cx+cellSize/2, cy+cellSize/2);
        }
      }
    }
  }
  // 玩家位置
  const pcx = dpx*cellSize + cellSize/2, pcy = dpy*cellSize + cellSize/2;
  ctx2.fillStyle = '#f87171';
  ctx2.beginPath(); ctx2.arc(pcx, pcy, cellSize*0.28, 0, Math.PI*2); ctx2.fill();
}

function moveDungeon(dx, dy) {
  if (!dungeonState || combatActive) return;
  unlockAudio();
  const {grid} = dungeonState;
  const nx = dungeonState.px + dx, ny = dungeonState.py + dy;
  if (nx < 0 || ny < 0 || nx >= DUNGEON_SIZE || ny >= DUNGEON_SIZE) return;
  if (grid[ny][nx] === 0) { toast('⛔ 此處是牆壁'); return; }

  dungeonState.px = nx; dungeonState.py = ny;
  renderDungeon();

  // 出口判斷
  if (nx === dungeonState.exitX && ny === dungeonState.exitY) {
    showDungeonExitChoice();
    return;
  }
  // 寶箱判斷
  const chest = dungeonState.chestPositions.find(c => c.x===nx && c.y===ny && !c.opened);
  if (chest) {
    chest.opened = true;
    openDungeonChest();
    return;
  }
  // 隨機遇怪（每步約30%機率）
  if (Math.random() < 0.30) {
    triggerDungeonEncounter();
  }
}

function showDungeonExitChoice() {
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:600;padding:1rem';
  modal.innerHTML = `
    <div style="background:#0d0d22;border:1px solid #fbbf24;border-radius:16px;padding:1.2rem;width:100%;max-width:300px;text-align:center">
      <div style="font-size:16px;color:#fbbf24;font-weight:700;margin-bottom:.6rem">🚪 找到出口！</div>
      <div style="font-size:11px;color:#888;margin-bottom:1rem">繼續深入會遇到更強的挑戰，但也有機會找到稀有寶藏。</div>
      <div style="display:flex;flex-direction:column;gap:.5rem">
        <button id="dg-leave" style="padding:10px;border-radius:10px;border:none;background:#92400e;color:#fde68a;font-size:13px;cursor:pointer">離開地下城</button>
        <button id="dg-deeper" style="padding:10px;border-radius:10px;border:.5px solid #7c3aed;background:#1a1030;color:#c4b5fd;font-size:13px;cursor:pointer">繼續深入（重新生成更難迷宮）</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.querySelector('#dg-leave').onclick = () => { modal.remove(); exitDungeon(); };
  modal.querySelector('#dg-deeper').onclick = () => {
    modal.remove();
    dungeonState.depth = (dungeonState.depth||1) + 1;
    dungeonState.monLv += 8;
    const seed = dungeonState.seed + dungeonState.depth * 7919;
    const {grid, entryX, entryY, exitX, exitY, chestPositions} = generateDungeonGrid(seed);
    dungeonState.grid = grid;
    dungeonState.px = entryX; dungeonState.py = entryY;
    dungeonState.exitX = exitX; dungeonState.exitY = exitY;
    dungeonState.chestPositions = chestPositions.map(([x,y]) => ({x,y,opened:false}));
    renderDungeon();
    toast(`⬇️ 深入地下城第 ${dungeonState.depth} 層！怪物更強了……`);
  };
}

function triggerDungeonEncounter() {
  const continent = getContinent(dungeonState.returnWx, dungeonState.returnWy);
  const pools = CONTINENT_POOLS[continent] || CONTINENT_POOLS.forest;
  // 地下城探索：8%機率直接遇到菁英/首領怪，增加深入探索的驚喜感
  const isElite = Math.random() < 0.08;
  const pool = isElite ? pools.elite : pools.normal;
  const monName = pool[Math.floor(Math.random() * pool.length)];
  if (isElite) toast('⚠️ 強大的氣息逼近……');
  startCombat(monName, dungeonState.returnWx, dungeonState.returnWy, dungeonState.monLv);
}

function openDungeonChest() {
  const contLv = dungeonState.monLv;
  const items = [];
  const count = 3 + Math.floor(Math.random()*3);
  for (let i = 0; i < count; i++) {
    const roll = Math.random();
    if (roll < 0.3) {
      items.push({type:'gold', amount: contLv * (80 + Math.floor(Math.random()*120))});
    } else {
      const rarity = rollRarity(contLv, false);
      const it = Math.random() < 0.4 ? generateWeapon(rarity, contLv) : generateArmor(ARMOR_SLOTS[Math.floor(Math.random()*ARMOR_SLOTS.length)], rarity, contLv);
      it.unidentified = true;
      it.name = '【待鑑定】地下城寶藏';
      it.icon = '❓';
      items.push(it);
    }
  }
  // 職業經驗卷軸：地下城寶箱 0.5% 機率額外出現
  if (Math.random() < 0.005) {
    items.push({id:Date.now()+Math.random(), name:'職業經驗卷軸', icon:'📘', type:'scroll', subtype:'job_exp_up',
      desc:'立即提升目前職業等級+1級（無視所需經驗），若該等級有技能解鎖會直接獲得。',
      effect:{action:'job_exp_up'}, rarity:'gold'});
  }
  playSFX('chest');
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:600;padding:1rem';
  modal.innerHTML = `
    <div style="background:#0d0d22;border:1px solid #f59e0b;border-radius:16px;padding:1.2rem;width:100%;max-width:300px">
      <div style="text-align:center;font-size:16px;font-weight:700;color:#f59e0b;margin-bottom:.6rem">📦 地下城寶箱！</div>
      <div style="display:flex;flex-direction:column;gap:.3rem;margin-bottom:.8rem">
        ${items.map(it => it.type==='gold'
          ? `<div style="color:#f59e0b;font-size:12px">💰 金幣 × ${it.amount}</div>`
          : `<div style="font-size:11px" class="rarity-${it.rarity}">${it.icon} ${it.name}</div>`
        ).join('')}
      </div>
      <button id="dg-chest-collect" style="width:100%;padding:10px;border-radius:10px;border:none;background:#92400e;color:#fde68a;font-size:13px;font-weight:700;cursor:pointer">收入背包</button>
    </div>`;
  document.body.appendChild(modal);
  modal.querySelector('#dg-chest-collect').onclick = () => {
    let goldGained = 0;
    for (const it of items) {
      if (it.type === 'gold') { state.gold += it.amount; goldGained += it.amount; }
      else if (!addToInventory(it)) toast(`${it.name} 因背包已滿消失了`);
    }
    if (goldGained > 0) toast(`💰 獲得 ${goldGained} 金幣`);
    modal.remove();
    updateUI(); save(true);
  };
}


let cbTimer = null, cbTextQ = [], cbTextRunning = false;
let answerActive = false;

const CORRECT_MSGS = [
  '反應神速！', '正中要害！', '答對了！', '快準狠！', '思路清晰！',
];
const WRONG_MSGS = [
  '判斷失誤——', '腦袋短路了！', '答錯了！', '選錯了！', '失誤！',
];


// ════════════════════════════════════════════════════════════
// ⚔️ COMBAT SYSTEM
// // Flow: startCombat → startCombatTurn → showQuestion
// //       → answerQ/onTimeout → resolvePlayerAttack/doMonsterAttack
// //       → nextTurnOrEnd → endCombatVictory / checkPlayerDead
// ════════════════════════════════════════════════════════════

function rollMonsterCount() {
  const r = Math.random();
  if (r < 0.20) return 3;
  if (r < 0.50) return 2;
  return 1;
}

function startCombat(monName, wx, wy, lv) {
  const mainMon = scaledMonster(monName, lv);
  mainMon.hp = mainMon.maxHp;
  mainMon.uid = 0;

  const monsters = [mainMon];
  // 額外怪物：等級較低、同地圖怪物池
  if (!mainMon.elite) {
    const count = rollMonsterCount();
    if (count > 1) {
      const continent = getContinent(wx, wy);
      const pool = (CONTINENT_POOLS[continent] || CONTINENT_POOLS.forest).normal;
      for (let i = 1; i < count; i++) {
        const extraName = pool[Math.floor(Math.random() * pool.length)];
        const extraLv = Math.max(1, lv - 2 - Math.floor(Math.random()*3));
        const extraMon = scaledMonster(extraName, extraLv);
        extraMon.hp = extraMon.maxHp;
        extraMon.uid = i;
        monsters.push(extraMon);
      }
    }
  }

  combat = {
    monsters, wx, wy,
    turn: 0,
    timeLimit: timeLimit(),
    slowPenalty: 0,
    buffAtk: 1.0, buffDef: 1.0,
    beesSeg: mainMon.segments > 0 ? 0 : -1,
    phase: 1,
    fled: false,
    answered: false,
  };
  // get/set 相容：combat.monster 永遠指向「目前選定目標」或主怪
  Object.defineProperty(combat, 'monster', {
    get() { return this.monsters.find(m => m.uid === (this.targetUid ?? 0) && m.hp > 0) || this.monsters.find(m => m.hp > 0) || this.monsters[0]; },
    configurable: true,
  });

  combatActive = true;
  updateBGMForContext();
  cbTextQ = []; cbTextRunning = false;
  answerActive = false;
  resetCombatSkills();
  tickSkillCDs();

  document.getElementById('combat-overlay').classList.add('active');
  // 保護措施：清除可能殘留的 inline position 樣式（避免舊版bug造成畫面錯位）
  const ccEl = document.querySelector('.combat-center');
  if (ccEl) ccEl.style.position = '';
  document.getElementById('map-dim').classList.add('active');
  document.getElementById('cb-q').style.display = 'none';
  document.getElementById('cb-log').innerHTML = '';
  renderMonsterGroup();
  renderStatusBar();
  try { renderCombatSkillBtns(); } catch(e) { console.error('skillBtns error:', e); }

  if (hasSkill('miner_15')) {
    const elem = mainMon.element || 'none';
    if (elem !== 'none') {
      const ei = ELEMENTS[elem];
      cbLog('cl-p', `🔍 礦脈感知：${mainMon.name} 屬性為 ${ei?.icon||''} ${ei?.name||elem}`);
    }
  }

  const monHasFirst = mainMon.agi * 3 >= totalStat('agi');
  combat.playerWentFirst = !monHasFirst;
  if (monsters.length > 1) {
    cbLog('cl-o', `⚠️ 遭遇 ${monsters.length} 隻怪物的圍攻！`);
  }
  if (!monHasFirst) {
    cbLog('cl-w', `你眼疾手快，搶先一步出手！`);
  } else {
    cbLog('cl-w', `${mainMon.icon} ${mainMon.name}身形一閃，搶先出爪！`);
  }

  if (mainMon.special === 'segments') {
    cbLog('cl-o', `蜂群！一波未平一波又起——`);
  }

  setTimeout(() => startCombatTurn(monHasFirst), 1200);
}

// 渲染多怪物群組顯示
function renderMonsterGroup() {
  const area = document.getElementById('cb-mon-group');
  if (!area) return;
  area.innerHTML = combat.monsters.map(m => {
    const pct = Math.max(0, Math.floor(m.hp / m.maxHp * 100));
    const isDead = m.hp <= 0;
    return `<div class="cb-mon-unit ${isDead?'dead':''}" id="cb-mon-unit-${m.uid}" data-uid="${m.uid}">
      <div class="cb-mon-sprite" id="cb-mon-sprite-${m.uid}">${m.icon}</div>
      <div class="cb-mon-unit-name">${m.name}</div>
      <div class="cb-mon-unit-hptrack"><div class="cb-mon-unit-hpfill" id="cb-mon-hpfill-${m.uid}" style="width:${pct}%"></div></div>
      <div class="cb-mon-unit-hptxt" id="cb-mon-hptxt-${m.uid}">${Math.max(0,m.hp)}/${m.maxHp}</div>
    </div>`;
  }).join('');
}

// 更新單一怪物血條（不重繪整組，避免動畫被打斷）
function updateMonsterHP(uid) {
  const m = combat.monsters.find(mm => mm.uid === uid);
  if (!m) return;
  const pct = Math.max(0, Math.floor(m.hp / m.maxHp * 100));
  const fill = document.getElementById(`cb-mon-hpfill-${uid}`);
  const txt = document.getElementById(`cb-mon-hptxt-${uid}`);
  if (fill) fill.style.width = pct + '%';
  if (txt) txt.textContent = `${Math.max(0,m.hp)}/${m.maxHp}`;
  if (m.hp <= 0) {
    const unit = document.getElementById(`cb-mon-unit-${uid}`);
    if (unit) setTimeout(() => unit.classList.add('dead'), 250);
  }
}

// 受擊抖動效果
function shakeMonster(uid) {
  const sprite = document.getElementById(`cb-mon-sprite-${uid}`);
  if (!sprite) return;
  sprite.classList.remove('shake');
  void sprite.offsetWidth; // reflow強制重啟動畫
  sprite.classList.add('shake');
}

// 隨機選一個存活的怪物作為攻擊目標
function pickRandomAliveMonster() {
  const alive = combat.monsters.filter(m => m.hp > 0);
  if (alive.length === 0) return null;
  return alive[Math.floor(Math.random() * alive.length)];
}

function allMonstersDead() {
  return combat.monsters.every(m => m.hp <= 0);
}

// AOE：對所有存活怪物造成傷害（法師系技能用）
function attackAllMonsters(dmgEach, label) {
  const alive = combat.monsters.filter(m => m.hp > 0);
  alive.forEach(m => {
    m.hp = Math.max(0, m.hp - dmgEach);
    shakeMonster(m.uid);
    updateMonsterHP(m.uid);
  });
  cbLog('cl-y', `💥 ${label||'範圍攻擊'}！對全體造成 ${wrapCol('cl-r', dmgEach)} 傷害`);
  if (allMonstersDead()) {
    setTimeout(() => endCombatVictory(), 600);
    return true;
  }
  return false;
}

function startCombatTurn(monGoesFirst) {
  if (!combatActive) return;
  combat.turn++;
  combat.answered = false;

  // Paladin regen
  const jp = getJobPassive();
  if (jp.regenPerTurn) {
    state.stats.hp = Math.min(state.stats.maxHp, state.stats.hp + jp.regenPerTurn);
    cbLog('cl-g', `🛡️ 聖騎士之力，回復 ${jp.regenPerTurn} HP`);
    updateStatusBar();
  }

  // 只有第一回合才考慮先攻順序
  if (combat.turn === 1 && monGoesFirst) {
    doMonsterAttack(() => showQuestion());
    return;
  }
  showQuestion();
}

function showQuestion() {
  if (!combatActive) return;
  answerActive = false;

  // 麻痺：25%機率完全跳過本回合（不出題，直接輪到怪物攻擊）
  if (hasStatus('paralyze') && Math.random() < 0.25) {
    showStatusFx('paralyze', '身體無法動彈！');
    cbLog('cl-s', '⚡ 麻痺發作！你無法動彈，這回合無法行動！');
    setTimeout(() => doMonsterAttack(nextTurnOrEnd), 900);
    return;
  }

  let q, choices;
  try {
    q = genQuestion(state.level);
    choices = shuffleAnswers(q.answer);
  } catch(e) {
    console.error('genQuestion error:', e);
    toast('⚠️ 出題錯誤：' + e.message);
    return;
  }
  const corners = ['tl','tr','bl','br'];

  // 混亂：隨機選2個位置顯示？？（仍可點擊，dataset.correct正確記錄不受影響）
  const confused = hasStatus('confuse');
  let confusedIdx = [];
  if (confused) {
    const idxPool = [0,1,2,3].sort(() => Math.random()-0.5);
    confusedIdx = idxPool.slice(0,2);
  }

  try {
    corners.forEach((c, i) => {
      const btn = document.getElementById(`ans-${c}`);
      const valEl = document.getElementById(`ans-${c}-val`);
      btn.classList.remove('correct','wrong','ans-confused');
      if (confusedIdx.includes(i)) {
        valEl.textContent = '？？';
        btn.classList.add('ans-confused');
      } else {
        valEl.textContent = choices[i];
      }
      btn.dataset.correct = choices[i] === q.answer ? '1' : '0';
    });
  } catch(e) {
    console.error('answer button error:', e);
    toast('⚠️ 按鈕錯誤：' + e.message);
    return;
  }
  if (confused) showStatusFx('confuse', '答案看不清楚了！');

  // Bee segment text
  const m = combat.monster;
  if (m.special === 'segments' && m.segments > 0) {
    const seg = m.segments - Math.floor(m.hp / m.segHp);
    const segTexts = ['第一隻蜜蜂撲來！','蜂群持續進攻！第二波！','最後一隻！打倒牠就勝利了！'];
    if (seg < 3 && segTexts[seg]) cbLog('cl-o', segTexts[seg]);
  }

  const qTextEl = document.getElementById('cb-q-text');
  qTextEl.textContent = `${q.text}`;
  document.getElementById('cb-q').style.display = '';
  document.getElementById('cb-escape').disabled = false;

  // 石化：答案延遲3秒才出現（時間照跑，等於少3秒可用時間）
  const petrified = hasStatus('petrify');
  const tl = Math.max(3, combat.timeLimit - combat.slowPenalty - (hasStatus('slow') ? 2 : 0));
  const cbQ = document.getElementById('cb-q');

  if (petrified) {
    cbQ.classList.add('petrifying');
    showStatusFx('petrify', '身體變得僵硬……');
    setTimeout(() => { cbQ.classList.remove('petrifying'); }, 3000);
  }

  // Timer
  const fill = document.getElementById('cb-timer');
  fill.style.transition = 'none'; fill.style.width = '100%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      fill.style.transition = `width ${tl}s linear`;
      fill.style.width = '0%';
    });
  });
  answerActive = true;
  cbTimer = setTimeout(() => onTimeout(), tl * 1000);
}

function answerQ(corner) {
  if (!answerActive || !combatActive) return;
  answerActive = false;
  clearTimeout(cbTimer);
  document.getElementById('cb-escape').disabled = true;
  document.getElementById('cb-q').style.display = 'none';

  const btn = document.getElementById(`ans-${corner}`);
  const correct = btn.dataset.correct === '1';
  const fill = document.getElementById('cb-timer');
  const tl = Math.max(3, combat.timeLimit - combat.slowPenalty - (hasStatus('slow') ? 2 : 0));
  const remaining = parseFloat(fill.style.width) / 100 * tl;
  fill.style.transition = 'none'; fill.style.width = '0%';

  btn.classList.add(correct ? 'correct' : 'wrong');
  setTimeout(() => btn.classList.remove('correct','wrong'), 600);

  if (correct) {
    playSFX('correct');
    resolvePlayerAttack(remaining, tl);
  } else {
    playSFX('wrong');
    cbLog('cl-s', WRONG_MSGS[Math.floor(Math.random()*WRONG_MSGS.length)]);
    setTimeout(() => doMonsterAttack(nextTurnOrEnd), 800);
  }
}

function onTimeout() {
  if (!answerActive || !combatActive) return;
  answerActive = false;
  document.getElementById('cb-q').style.display = 'none';
  cbLog('cl-p', '腦中一片空白……怪物看準機會猛攻！');
  setTimeout(() => {
    const dmg = Math.floor(combat.monster.atk * 1.5);
    applyDmgToPlayer(dmg);
    checkPlayerDead() || nextTurnOrEnd();
  }, 800);
}

function resolvePlayerAttack(timeLeft, tl) {
  const elapsed = tl - timeLeft;
  let atk = Math.floor(calcAtk() * combat.buffAtk);
  let sub = '';
  if (elapsed <= 3)         { atk = Math.floor(atk * 1.5); sub = '反應神速！傷害+50%'; }
  else if (timeLeft < 1)    { atk = Math.floor(atk * 0.8); sub = '險！勉強答對……'; }
  else                      { sub = CORRECT_MSGS[Math.floor(Math.random()*CORRECT_MSGS.length)]; }

  // 先手必殺（盜賊）
  if (combat.playerWentFirst && hasSkill('rogue_1')) {
    const bonus = getSkillEffect('rogue_1').firstStrikeBonus;
    atk = Math.floor(atk * (1 + bonus));
    cbLog('cl-p', `🗡️ 先手必殺！傷害+${Math.round(bonus*100)}%`);
  }

  // 狂暴（戰士 Lv.5，血量<30%）
  if (hasSkill('warrior_5') && !skillOnCD('warrior_5') &&
      state.stats.hp < state.stats.maxHp * 0.3 && !combat.berserk) {
    combat.berserk = true;
    combat.buffAtk *= 1.5;
    setSkillCD('warrior_5', 5);
    cbLog('cl-r', `⚔️ 狂暴！攻擊×1.5，持續3回合！`);
  }

  // 爆炎（火法師 Lv.5，血量>70%）
  if (hasSkill('fire_5') && !skillOnCD('fire_5') && !skillUsedThisCombat('fire_5') &&
      state.stats.hp > state.stats.maxHp * 0.7) {
    atk = Math.floor(atk * getSkillEffect('fire_5').burstMult);
    setSkillCD('fire_5', 4);
    markSkillUsed('fire_5');
    cbLog('cl-r', `🔥 爆炎！×${getSkillEffect('fire_5').burstMult}傷害！`);
  }

  // 賭徒幸運一擲
  if (hasSkill('gambler_1')) {
    const ef = getSkillEffect('gambler_1');
    if (Math.random() < ef.luckyStrike) {
      atk = Math.floor(atk * ef.luckyMult);
      cbLog('cl-y', `🃏 幸運一擲！×${ef.luckyMult}暴擊！`);
    }
  }

  // 暴擊率：各武器路線不同（共用 getCritRate）
  const critRate = getCritRate();
  const jp = getJobPassive();
  const critMult = jp.critMult || 2;
  const wpnSub = state.weapon?.subtype;
  let isCrit = false;
  if (Math.random() < critRate) { atk = Math.floor(atk * critMult); isCrit = true; }
  if (wpnSub === 'axe') isCrit = false;

  // ── 武器專屬機制 ──
  if (wpnSub === 'bow' && Math.random() < 0.15) {
    atk = Math.floor(atk * 1.5);
    cbLog('cl-y', `🏹 二連射！額外傷害+50%`);
  } else if (wpnSub === 'wand' && elapsed <= 3 && Math.random() < 0.15) {
    atk = Math.floor(atk * 1.3);
    cbLog('cl-p', `✨ 咒語連鎖！額外傷害+30%`);
  } else if (wpnSub === 'dagger' && combat.playerWentFirst && combat.turn === 1 && Math.random() < 0.25) {
    atk = Math.floor(atk * 2.0);
    cbLog('cl-r', `🗡️ 背刺！傷害×2！`);
  } else if (wpnSub === 'spear' && combat.spearCounterReady) {
    atk = Math.floor(atk * 1.4);
    combat.spearCounterReady = false;
    cbLog('cl-g', `🔱 反擊強化！傷害+40%`);
  }

  // Element multiplier
  const wpnElem = state.weapon?.element || 'none';
  const monElem = combat.monster.element || 'none';
  let elemMult = 1.0;
  if (wpnElem !== 'none' && ELEMENT_COUNTER[wpnElem] === monElem) {
    elemMult = 1.3;
    cbLog('cl-y', `⚡ 屬性相剋！傷害+30%`);
  } else if (monElem !== 'none' && ELEMENT_COUNTER[monElem] === wpnElem) {
    elemMult = 0.8;
    cbLog('cl-s', `🛡 屬性弱勢，傷害-20%`);
  }
  // Job element bonuses
  if (wpnElem==='dark'  && jp.darkBonus)  elemMult *= jp.darkBonus;
  if (wpnElem==='ice'   && jp.iceBonus)   elemMult *= jp.iceBonus;
  if (wpnElem==='fire'  && jp.fireBonus)  elemMult *= jp.fireBonus;
  // Set element bonus
  const setBonuses = getSetBonuses();
  for (const b of setBonuses) {
    if (b.elemBonus === wpnElem) elemMult *= 1.2;
  }
  atk = Math.floor(atk * elemMult);

  // Monster defense：防禦減傷最多50%，避免低等玩家完全打不動
  // 一般攻擊：隨機選一個存活怪物作為目標
  const m = combat.singleTarget || pickRandomAliveMonster();
  combat.singleTarget = null;
  if (!m) { setTimeout(() => endCombatVictory(), 300); return; }
  const defReduction = Math.min(0.5, m.def / (m.def + 30));
  // High defense special: if def > atk*2, damage = 1
  if ((m.special === 'highdef') && atk <= m.def * 0.5) {
    cbLog('cl-s', `${sub}`);
    cbLog('cl-s', `${m.icon} ${m.name}的護甲紋絲不動！傷害僅 `+wrapCol('cl-r','1')+'！');
    atk = 1;
  } else {
    atk = Math.max(1, Math.floor(atk * (1 - defReduction)));
    const critText = isCrit ? wrapCol('cl-y','暴擊！') + ' ' : '';
    cbLog('cl-w', `${sub}`);
    cbLog('cl-w', `你的攻擊命中 ${m.name}，${critText}造成 ${wrapCol('cl-r',atk)} 點傷害！`);
  }

  m.hp = Math.max(0, m.hp - atk);
  combat.lastPlayerDmg = atk;
  shakeMonster(m.uid);
  // 燃燒標記（火法師）
  if (hasSkill('fire_1')) combat.burned = true;
  // 毒刃（盜賊 Lv.5）
  if (hasSkill('rogue_5') && !combat.poisonApplied) {
    combat.poisonApplied = true;
    cbLog('cl-p', `🗡️ 毒刃！怪物中毒，每回合-8血`);
  }
  // 記錄破甲層數影響怪物防禦
  if (combat.armorBreakStacks > 0) {
    const reduction = combat.armorBreakStacks * 0.05;
    m.def = Math.max(0, Math.floor(m.def * (1 - reduction)));
  }
  playSFX(isCrit ? 'crit' : 'hit');
  showFloatingDmg(atk, isCrit, false);
  updateMonsterHP(m.uid);

  if (m.hp <= 0) {
    cbLog('cl-g', `${m.icon} ${m.name} 被擊敗了！`);
  }

  if (allMonstersDead()) {
    setTimeout(() => endCombatVictory(), 600);
  } else {
    setTimeout(() => doMonsterAttack(nextTurnOrEnd), 700);
  }
}

function doMonsterAttack(cb) {
  if (!combatActive) return;
  const aliveMonsters = combat.monsters.filter(mm => mm.hp > 0);
  if (aliveMonsters.length === 0) { if (cb) cb(); return; }
  attackSequence(aliveMonsters, 0, cb);
}

function attackSequence(list, idx, cb) {
  if (!combatActive) return;
  if (idx >= list.length) {
    if (cb && !checkPlayerDead()) cb();
    return;
  }
  const m = list[idx];
  if (m.hp <= 0) { attackSequence(list, idx+1, cb); return; }

  let dmg = Math.max(1, m.atk - Math.floor(totalStat('def') * 0.4));

  // Special abilities
  let specialText = '';
  if (m.special === 'poison' && Math.random() < 0.25 && !hasStatus('poison')) {
    addStatus('poison', 4);
    specialText = wrapCol('cl-p','中毒！每回合-5血');
  }
  if (m.special === 'steal' && Math.random() < 0.45) {
    const stolen = Math.min(state.gold, Math.floor(10 + Math.random()*25));
    state.gold = Math.max(0, state.gold - stolen);
    cbLog('cl-y', `${m.name}趁你分神，叼走了你的 ${wrapCol('cl-y',stolen)} 枚金幣！`);
  }
  if (m.special === 'slow' && Math.random() < 0.4 && !hasStatus('slow')) {
    addStatus('slow', 2);
    specialText = wrapCol('cl-p',`緩速！答題時間-2秒`);
  }
  if (m.special === 'stackslow') {
    combat.slowPenalty = Math.min(combat.slowPenalty + 0.5, combat.timeLimit - 2);
    if (combat.turn <= 3) specialText = wrapCol('cl-p','毒素侵蝕……思緒越來越遲鈍');
  }
  if (m.special === 'petrify' && Math.random() < 0.30 && !hasStatus('petrify')) {
    addStatus('petrify', 1);
    specialText = wrapCol('cl-s','石化！答案將延遲出現');
  }
  if (m.special === 'confuse' && Math.random() < 0.35 && !hasStatus('confuse')) {
    addStatus('confuse', 1);
    specialText = wrapCol('cl-p','混亂！部分答案看不清楚了');
  }
  if (m.special === 'weaken' && Math.random() < 0.35 && !hasStatus('weaken')) {
    addStatus('weaken', 3);
    specialText = wrapCol('cl-r','力弱！攻擊力-20%');
  }
  if (m.special === 'armorbrk' && Math.random() < 0.35 && !hasStatus('armorbrk')) {
    addStatus('armorbrk', 3);
    specialText = wrapCol('cl-r','破甲！防禦力-20%');
  }
  if (m.special === 'paralyze' && Math.random() < 0.25 && !hasStatus('paralyze')) {
    addStatus('paralyze', 2);
    specialText = wrapCol('cl-y','麻痺！可能無法行動');
  }
  if (m.special === 'blind' && Math.random() < 0.30 && !hasStatus('blind')) {
    addStatus('blind', 2);
    specialText = wrapCol('cl-s','致盲！暴擊率歸零');
  }
  if (m.special === 'regen') {
    const regen = 15;
    m.hp = Math.min(m.maxHp, m.hp + regen);
    cbLog('cl-g', `${m.name}的樹根吸收大地能量，回復 ${regen} HP`);
    updateMonsterHP(m.uid);
  }
  if (m.special === 'berserk' && m.hp < m.maxHp * 0.5) {
    dmg = Math.floor(dmg * 2);
    cbLog('cl-o', `${m.name}瀕死狂怒，攻擊力翻倍！`);
  }

  // 陷阱（獵人 Lv.5，預置後才觸發，只對第一個攻擊者生效一次）
  if (hasSkill('hunter_5') && skillUsedThisCombat('hunter_5') && !skillUsedThisCombat('hunter_5_trap')) {
    markSkillUsed('hunter_5_trap');
    cbLog('cl-g', `🏹 陷阱！${m.name}的攻擊被格擋！`);
    attackSequence(list, idx+1, cb);
    return;
  }
  if (combat.deathGaze) dmg = Math.floor(dmg * (1 - 0.3));
  let actualDmg = dmg;
  if (hasSkill('mage_5') && !skillOnCD('mage_5')) {
    actualDmg = Math.floor(dmg * (1 - getSkillEffect('mage_5').dmgAbsorb));
    setSkillCD('mage_5', 3);
    cbLog('cl-p', `🛡 魔法護盾！吸收20%傷害`);
  }
  if (hasSkill('paladin_1') && !skillOnCD('paladin_1') && !skillUsedThisCombat('paladin_shield')) {
    setSkillCD('paladin_1', 5);
    markSkillUsed('paladin_shield');
    cbLog('cl-g', `✨ 神聖護盾！完全格擋此次攻擊！`);
    showFloatingText('BLOCK!', '#f59e0b', 'player');
    attackSequence(list, idx+1, cb);
    return;
  }
  cbLog('cl-w', `${m.icon} ${m.name}發起攻擊，造成 ${wrapCol('cl-r',actualDmg)} 點傷害！${specialText?'　'+specialText:''}`);
  showFloatingDmg(actualDmg, false, true);
  applyDmgToPlayer(actualDmg);
  if (state.weapon?.subtype === 'spear' && Math.random() < 0.20) combat.spearCounterReady = true;

  if (checkPlayerDead()) return; // 死亡時中斷序列

  setTimeout(() => attackSequence(list, idx+1, cb), list.length > 1 ? 450 : 0);
}

function nextTurnOrEnd() {
  if (!combatActive) return;
  const m = combat.monster;

  // 破甲（戰士 Lv.1，每回合疊加）
  if (hasSkill('warrior_1')) {
    const stacks = Math.min((combat.armorBreakStacks||0)+1, 3);
    combat.armorBreakStacks = stacks;
  }

  // 燃燒（火法師）
  if (hasSkill('fire_1') && combat.burned) {
    const burn = getSkillEffect('fire_1').burnOnHit;
    m.hp = Math.max(1, m.hp - burn);
    cbLog('cl-r', `🔥 燃燒傷害：${wrapCol('cl-r', burn)}`);
    updateCombatHPDisplay();
  }

  // 吸血（死亡騎士）
  if (hasSkill('dk_1') && combat.lastPlayerDmg > 0) {
    const heal = Math.floor(combat.lastPlayerDmg * 0.1);
    if (heal > 0) {
      state.stats.hp = Math.min(state.stats.maxHp, state.stats.hp + heal);
      updateStatusBar();
    }
  }

  // 聖騎士額外回血
  if (hasSkill('paladin_5')) {
    const regen = getSkillEffect('paladin_5').regenBonus;
    state.stats.hp = Math.min(state.stats.maxHp, state.stats.hp + regen);
  }

  if (allMonstersDead()) { setTimeout(() => endCombatVictory(), 300); return; }
  setTimeout(() => showQuestion(), 600);
}

function applyDmgToPlayer(dmg) {
  // 無敵藥水：完全免疫
  if (hasBuff('invincible')) {
    showFloatingText('無敵!', '#f59e0b', 'player');
    cbLog('cl-g', `🛡️ 無敵狀態！傷害完全格擋！`);
    return;
  }
  const jp = getJobPassive();
  const pj = getPrevJobBonus();
  // 狂暴藥水：防禦歸零
  const pDef = hasBuff('berserk') ? 0 : totalStat('def');
  const pAgi = totalStat('agi');

  // 迴避判斷：敏捷×0.5% + 防禦×0.3% + 技能加成
  let dodgeBonus = 0;
  for (const s of getUnlockedSkills()) {
    if (s.effect?.dodgeBonus) dodgeBonus += s.effect.dodgeBonus;
  }
  for (const prev of (state.prevJobs||[])) {
    const pjd = JOB_DEFS[prev.job];
    for (const sk of (pjd?.skills||[]).filter(sk2 => prev.level >= sk2.lv)) {
      if (sk.effect?.dodgeBonus) dodgeBonus += sk.effect.dodgeBonus * 0.3;
    }
  }
  if (hasBuff('agi')) dodgeBonus += 0.05;
  const dodgeRate = Math.min(0.50, pAgi * 0.005 + pDef * 0.003 + dodgeBonus);
  if (Math.random() < dodgeRate) {
    cbLog('cl-g', `⚡ 閃避成功！你靈巧地躲開了攻擊！`);
    showFloatingText('DODGE!', '#4ade80', 'player');
    return;
  }

  // defDouble（礦工鐵壁）：防禦翻倍計算
  const defVal = hasSkill('miner_30') ? pDef * 2 : pDef;
  let reduction = Math.min(0.75, defVal / (defVal + 20));
  const setBonuses = getSetBonuses();
  for (const b of setBonuses) {
    if (b.defMult) reduction = Math.min(0.80, reduction * b.defMult);
  }
  // dmgReduce 技能（石皮/鐵甲術等）
  const dmgReduceSkills = getUnlockedSkills().filter(s => s.effect?.dmgReduce);
  for (const s of dmgReduceSkills) reduction = Math.min(0.80, reduction + s.effect.dmgReduce);
  // 前職業殘留 dmgReduce
  for (const prev of (state.prevJobs||[])) {
    const pjd = JOB_DEFS[prev.job];
    for (const sk of (pjd?.skills||[]).filter(sk2 => prev.level >= sk2.lv)) {
      if (sk.effect?.dmgReduce) reduction = Math.min(0.80, reduction + sk.effect.dmgReduce * 0.3);
    }
  }
  dmg = Math.max(1, Math.floor(dmg * (1 - reduction)));
  state.stats.hp = Math.max(0, state.stats.hp - dmg);
  document.getElementById('cb-player-hp').textContent = `❤️ ${state.stats.hp}/${state.stats.maxHp}`;
  showFloatingText(`-${dmg}`, '#f87171', 'player');
  updateStatusBar();
}

// 浮動傷害數字
function showFloatingText(text, color, target) {
  const combatEl = document.getElementById('combat-overlay');
  if (!combatEl || !combatEl.classList.contains('active')) return;
  const el = document.createElement('div');
  el.textContent = text;
  el.style.cssText = `
    position:absolute;
    ${target==='player' ? 'left:25%;' : 'right:25%;'}
    top:35%;
    color:${color};
    font-size:${text.includes('DODGE') || text.includes('MISS') ? '1.1rem' : '1.8rem'};
    font-weight:900;
    text-shadow:0 2px 8px ${color}88;
    pointer-events:none;
    z-index:10;
    animation:floatUp .9s ease-out forwards;
  `;
  combatEl.style.position = 'relative';
  combatEl.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

// 同時讓玩家攻擊也顯示浮動數字
function showFloatingDmg(atk, isCrit, isMonster) {
  const color = isCrit ? '#f59e0b' : isMonster ? '#f87171' : '#4ade80';
  const text = isCrit ? `💥${atk}` : `${atk}`;
  showFloatingText(text, color, isMonster ? 'player' : 'monster');
}

function checkPlayerDead() {
  if (state.stats.hp > 0) return false;
  combatActive = false;
  clearTimeout(cbTimer);
  tickBuffBattles();
  if (raidState) { toast('💀 副本挑戰失敗！'); raidState = null; }
  document.getElementById('combat-overlay').classList.remove('active');
    document.getElementById('map-dim').classList.remove('active');
  triggerDeath();
  return true;
}

function endCombatVictory() {
  combatActive = false;
  clearTimeout(cbTimer);
  tickBuffBattles();

  const victoryTexts = {
    毒牙蟲:'毒牙蟲發出最後的嘶鳴，癱倒在地。',
    憤怒蘑菇:'蘑菇精炸裂成一堆孢子，你撿起了掉落的裝備。',
    森林野狼:'野狼發出最後一聲嚎叫，倒下了。',
    藤蔓精靈:'藤蔓精靈的藤蔓瞬間枯萎，消散在空氣中。',
    狂蜂群:'最後一隻蜜蜂跌落，周圍終於安靜下來。',
    狡猾狐狸:'狐狸踉蹌逃竄，留下了金幣。',
    石頭哥布林:'石頭哥布林發出悶響，轟然倒塌。',
    毒沼蛙:'毒沼蛙發出臨死前的叫聲，沉入地面。',
    憤怒山豬王:'山豬王轟然倒地，震得地面微微顫抖。',
    古樹守衛:'古樹守衛發出低沉的呻吟，緩緩枯萎。',
    森林詛咒者:'詛咒者轟然倒地，整片森林陷入詭異的寂靜……',
  };

  let totalGold = 0, totalExp = 0;
  for (const m of combat.monsters) {
    cbLog('cl-g', victoryTexts[m.name] || `${m.icon} ${m.name}被擊敗了！`);
    totalGold += m.gold;
    totalExp += m.exp;
    if (!state.seenMonsters) state.seenMonsters = [];
    if (!state.seenMonsters.includes(m.name)) state.seenMonsters.push(m.name);
  }
  state.gold += totalGold;
  state.kills++; state.totalKills++;
  cbLog('cl-p', `✨ 獲得 ${wrapCol('cl-p', totalExp)} 經驗值 · 💰 ${wrapCol('cl-y', totalGold)} 金幣`);
  applyCurseEffects('combat_end');

  // 多樣掉落：每隻怪物各自掉落一次
  for (const m of combat.monsters) {
    const loots = generateLoot(m.name, m.lv);
    if (loots) {
      for (const loot of loots) {
        if (loot.type === 'gold') {
          state.gold += loot.amount;
          cbLog('cl-y', `💰 獲得 ${wrapCol('cl-y', loot.amount)} 金幣！`);
        } else {
          if (addToInventory(loot)) {
            const elemTag = loot.element && loot.element !== 'none'
              ? ` ${ELEMENTS[loot.element]?.icon || ''}` : '';
            const cursedTag = loot.cursed ? ' <span style="color:#f87171">【腐化】</span>' : '';
            cbLog('cl-y', `📦 掉落：${cursedTag}${wrapCol('rarity-'+loot.rarity, loot.name)}${elemTag}`);
          } else {
            cbLog('cl-s', `${loot.name} 因背包已滿而消失了……`);
          }
        }
      }
    }
    // 副本券：菁英/Boss怪 5% 機率掉落
    if (m.elite && Math.random() < 0.05) {
      const ticket = {name:'副本券', icon:'🎫', type:'scroll', subtype:'raid_ticket',
        desc:'每日免費挑戰次數用完後，可消耗此券額外挑戰一次Boss副本。',
        effect:{action:'none'}, rarity:'gold', id:Date.now()+Math.random()};
      if (addToInventory(ticket)) {
        cbLog('cl-y', `🎫 稀有掉落：${wrapCol('rarity-gold','副本券')}！`);
      }
    }
    // 職業經驗卷軸：菁英/Boss怪 0.5% 機率掉落
    if (m.elite && Math.random() < 0.005) {
      const jeScroll = {name:'職業經驗卷軸', icon:'📘', type:'scroll', subtype:'job_exp_up',
        desc:'立即提升目前職業等級+1級（無視所需經驗），若該等級有技能解鎖會直接獲得。',
        effect:{action:'job_exp_up'}, rarity:'gold', id:Date.now()+Math.random()};
      if (addToInventory(jeScroll)) {
        cbLog('cl-y', `📘 稀有掉落：${wrapCol('rarity-gold','職業經驗卷軸')}！`);
      }
    }
  }

  // Mark killed
  killedSet.add(`${combat.wx},${combat.wy}`);
  state.killedMonsters = [...killedSet];

  // 職業經驗
  gainJobExp();

  setTimeout(() => {
    document.getElementById('combat-overlay').classList.remove('active');
    document.getElementById('map-dim').classList.remove('active');
    gainExp(totalExp);
    updateUI(); save();
    updateBGMForContext();
    checkRaidProgress();
    if (dungeonState) renderDungeon(); // 地下城內戰鬥結束，刷新地下城畫面
  }, 1200);
}

// 死亡凝視、豪賭、陷阱、絕對零度 等「每場1次」主動技能
function useJobSkill(skillId) {
  if (!combatActive) return;
  if (skillUsedThisCombat(skillId)) { toast('此技能本場已使用'); return; }
  const m = combat.monster;
  switch(skillId) {
    case 'dk_5': // 死亡凝視
      combat.deathGaze = true;
      markSkillUsed('dk_5');
      cbLog('cl-p', `💀 死亡凝視！${m.name}攻擊-30%，持續3回合`);
      break;
    case 'ice_5': // 絕對零度
      combat.frozenTurns = 2;
      markSkillUsed('ice_5');
      cbLog('cl-p', `❄️ 絕對零度！${m.name}被凍結2回合！`);
      break;
    case 'fl_15': { // 冰霜新星（全體AOE，冰霜巫妖）
      markSkillUsed('fl_15');
      const dmg = Math.floor(calcAtk() * 4.0);
      attackAllMonsters(dmg, '❄️ 冰霜新星');
      combat.frozenTurns = 2;
      break;
    }
    case 'am_5': { // 烈焰新星（全體AOE，大魔導士）
      markSkillUsed('am_5');
      const dmg = Math.floor(calcAtk() * 3.5);
      attackAllMonsters(dmg, '🔥 烈焰新星');
      combat.monsters.forEach(mm => { if (mm.hp > 0) mm.burning = true; });
      break;
    }
    case 'sw_aoe': { // 劍域風暴（劍士系）
      markSkillUsed('sw_aoe');
      const dmg = Math.floor(calcAtk() * 2.5);
      attackAllMonsters(dmg, '⚔️ 劍域風暴');
      break;
    }
    case 'warrior_aoe': { // 橫掃千軍（戰士系）
      markSkillUsed('warrior_aoe');
      const dmg = Math.floor(calcAtk() * 2.2);
      attackAllMonsters(dmg, '🪓 橫掃千軍');
      break;
    }
    case 'hunter_aoe': { // 箭雨（獵人系）
      markSkillUsed('hunter_aoe');
      const dmg = Math.floor(calcAtk() * 2.0);
      attackAllMonsters(dmg, '🏹 箭雨');
      break;
    }
    case 'gambler_aoe': { // 死亡輪盤（賭徒系）
      markSkillUsed('gambler_aoe');
      const isCrit = Math.random() < 0.5;
      const dmg = Math.floor(calcAtk() * (isCrit ? 4.0 : 1.5));
      attackAllMonsters(dmg, isCrit ? '🎰 死亡輪盤・大獎！' : '🎰 死亡輪盤');
      break;
    }
    case 'bard_aoe': { // 戰歌震盪（吟遊詩人系）
      markSkillUsed('bard_aoe');
      const dmg = Math.floor(calcAtk() * 2.0);
      attackAllMonsters(dmg, '🎵 戰歌震盪');
      const healAmt = Math.floor(state.stats.maxHp * 0.15);
      state.stats.hp = Math.min(state.stats.maxHp, state.stats.hp + healAmt);
      cbLog('cl-g', `🎵 戰歌共鳴，回復 ${healAmt} HP`);
      break;
    }
    case 'dk2_aoe': { // 龍嘯（龍騎士系）
      markSkillUsed('dk2_aoe');
      const dmg = Math.floor(calcAtk() * 2.3);
      attackAllMonsters(dmg, '🐉 龍嘯震天');
      break;
    }
    case 'gambler_5': // 豪賭
      markSkillUsed('gambler_5');
      if (Math.random() < 0.5) {
        const bigDmg = Math.floor(calcAtk() * 4);
        m.hp = Math.max(0, m.hp - bigDmg);
        cbLog('cl-y', `🃏 豪賭大勝！造成 ${wrapCol('cl-y', bigDmg)} 傷害！`);
        showFloatingDmg(bigDmg, true, false);
        updateCombatHPDisplay();
        if (m.hp <= 0) { setTimeout(() => endCombatVictory(), 400); return; }
      } else {
        const selfDmg = Math.floor(state.stats.maxHp * 0.3);
        applyDmgToPlayer(selfDmg);
        cbLog('cl-r', `🃏 豪賭失敗！自傷 ${wrapCol('cl-r', selfDmg)}！`);
        if (checkPlayerDead()) return;
      }
      break;
    case 'hunter_5': // 陷阱（預置，下次攻擊時觸發）
      markSkillUsed('hunter_5');
      cbLog('cl-g', `🏹 陷阱設置！${m.name}下次攻擊將被格擋`);
      break;
  }
  updateUI(); save(true);
}

function tryEscape() {
  if (!answerActive || !combatActive) return;
  answerActive = false;
  clearTimeout(cbTimer);
  document.getElementById('cb-q').style.display = 'none';

  const m = combat.monster;
  const myAgi = totalStat('agi'), monAgi = m.agi;
  const escapeChance = Math.max(0.1, Math.min(0.85, (myAgi - monAgi*0.5) / (myAgi + monAgi)));

  if (Math.random() < escapeChance) {
    cbLog('cl-g', '你趁隙逃脫了！');
    tickBuffBattles();
    if (raidState) { toast('🏃 副本挑戰中斷！'); raidState = null; }
    setTimeout(() => {
      combatActive = false;
      document.getElementById('combat-overlay').classList.remove('active');
    document.getElementById('map-dim').classList.remove('active');
      updateUI();
      updateBGMForContext();
      if (dungeonState) renderDungeon();
    }, 700);
  } else {
    cbLog('cl-r', '逃跑失敗！怪物攔住了你！');
    setTimeout(() => doMonsterAttack(nextTurnOrEnd), 700);
  }
}

function genQuestion(lv) {
  const diff = Math.min(5, Math.ceil(lv / 10));
  const r = () => Math.floor(Math.random() * 1e9);
  let a, b, text, answer;

  if (diff === 1) {
    a = Math.floor(Math.random()*12)+1; b = Math.floor(Math.random()*12)+1;
    if (Math.random()<0.5) { text=`${a} + ${b} = ?`; answer=a+b; }
    else { const big=Math.max(a,b),sm=Math.min(a,b); text=`${big} - ${sm} = ?`; answer=big-sm; }
  } else if (diff === 2) {
    a=Math.floor(Math.random()*20)+10; b=Math.floor(Math.random()*15)+2;
    if (Math.random()<0.5) { text=`${a} + ${b} = ?`; answer=a+b; }
    else { text=`${a} - ${b} = ?`; answer=a-b; }
  } else if (diff === 3) {
    a=Math.floor(Math.random()*9)+2; b=Math.floor(Math.random()*9)+2;
    text=`${a} × ${b} = ?`; answer=a*b;
  } else if (diff === 4) {
    b=Math.floor(Math.random()*8)+2; a=b*(Math.floor(Math.random()*8)+2);
    if (Math.random()<0.5) { text=`${a} ÷ ${b} = ?`; answer=a/b; }
    else { const x=Math.floor(Math.random()*6)+2; const y=Math.floor(Math.random()*6)+2;
           text=`${x} × ${y} = ?`; answer=x*y; }
  } else {
    a=Math.floor(Math.random()*50)+50; b=Math.floor(Math.random()*30)+10;
    const ops=['+','-','×'];const op=ops[Math.floor(Math.random()*ops.length)];
    if (op==='+') { text=`${a} + ${b} = ?`; answer=a+b; }
    else if (op==='-') { text=`${a} - ${b} = ?`; answer=a-b; }
    else { const x=Math.floor(Math.random()*12)+2; const y=Math.floor(Math.random()*6)+2;
           text=`${x} × ${y} = ?`; answer=x*y; }
  }
  return { text, answer };
}

function shuffleAnswers(correct) {
  const wrong = new Set();
  const spread = Math.max(3, Math.floor(correct * 0.2) + 2);
  const attempts = 50;
  for (let i=0; i<attempts && wrong.size<3; i++) {
    const off = Math.floor(Math.random()*spread*2+1) * (Math.random()<0.5?1:-1);
    const v = correct + off;
    if (v !== correct && v >= 0 && !wrong.has(v)) wrong.add(v);
  }
  // Fallback
  let fallback = 1;
  while (wrong.size < 3) { if (correct+fallback!==correct) wrong.add(correct+fallback); fallback++; }
  const arr = [correct, ...[...wrong].slice(0,3)];
  for (let i=arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ════════════════════════════════════════════════════════════

function gainExp(amount) {
  state.exp += amount;
  while (state.exp >= state.expNext && state.level < 999) {
    state.exp -= state.expNext;
    state.level++;
    state.expNext = expForLevel(state.level);
    // 每升一級：+力量×1 + 敏捷×0.5 + 防禦×0.5 + 技能加成
    let hpPerLvBonus = 0;
    for (const s of getUnlockedSkills()) {
      if (s.effect?.hpPerLevel) hpPerLvBonus += s.effect.hpPerLevel;
    }
    for (const prev of (state.prevJobs||[])) {
      const pjd = JOB_DEFS[prev.job];
      for (const sk of (pjd?.skills||[]).filter(sk2 => prev.level >= sk2.lv)) {
        if (sk.effect?.hpPerLevel) hpPerLvBonus += Math.floor(sk.effect.hpPerLevel * 0.3);
      }
    }
    const hpGain = state.stats.str * 1
      + Math.floor(state.stats.agi * 0.5)
      + Math.floor(state.stats.def * 0.5)
      + hpPerLvBonus;
    state.stats.maxHp += hpGain;
    state.stats.hp = Math.min(state.stats.hp + hpGain, state.stats.maxHp);
    state.freePoints += state.level % 10 === 0 ? 4 : 1;
    toast(`✨ 升級！Lv.${state.level}　獲得屬性點 +${state.level%10===0?4:1}`);
    playSFX('levelup');
  }
  updateUI();
}

// ── 職業等級成長 ──
function gainJobExp() {
  if (!state.jobExp) state.jobExp = 0;
  state.jobExp++;
  const needed = jobExpForLevel(state.jobLevel || 1);
  if (state.jobExp >= needed) {
    state.jobExp -= needed;
    state.jobLevel = (state.jobLevel||1) + 1;
    const newSkill = JOB_DEFS[state.job]?.skills?.find(s => s.lv === state.jobLevel);
    if (newSkill) toast(`🌟 職業升級！Lv.${state.jobLevel} 解鎖技能：${newSkill.name}`);
    else toast(`⭐ 職業升級！${JOB_DEFS[state.job]?.name} Lv.${state.jobLevel}`);
  }
}

// ── 職業經驗卷軸：無視經驗，直接升職業等級+1 ──
function forceJobLevelUp() {
  state.jobLevel = (state.jobLevel || 1) + 1;
  state.jobExp = 0; // 升級後經驗歸零，避免重複累積造成連鎖跳級
  const newSkill = JOB_DEFS[state.job]?.skills?.find(s => s.lv === state.jobLevel);
  if (newSkill) toast(`📘 職業等級直升！Lv.${state.jobLevel} 解鎖技能：${newSkill.name}`);
  else toast(`📘 職業等級直升！${JOB_DEFS[state.job]?.name} Lv.${state.jobLevel}`);
  playSFX('levelup');
}

// ── 技能效果 getter ──
function getSkillEffect(skillId) {
  const skills = getUnlockedSkills();
  return skills.find(s => s.id === skillId)?.effect || null;
}

function hasSkill(skillId) {
  return getUnlockedSkills().some(s => s.id === skillId);
}

// ── 技能CD管理 ──
function skillOnCD(skillId) {
  return (state.skillCDs?.[skillId] || 0) > 0;
}

function setSkillCD(skillId, turns) {
  if (!state.skillCDs) state.skillCDs = {};
  state.skillCDs[skillId] = turns;
}

function tickSkillCDs() {
  if (!state.skillCDs) return;
  for (const k in state.skillCDs) {
    if (state.skillCDs[k] > 0) state.skillCDs[k]--;
  }
}

function resetCombatSkills() {
  // 重置每場戰鬥限用一次的技能
  state.skillUsed = {};
}

function skillUsedThisCombat(skillId) {
  return !!(state.skillUsed?.[skillId]);
}

function markSkillUsed(skillId) {
  if (!state.skillUsed) state.skillUsed = {};
  state.skillUsed[skillId] = true;
}

function getJobPassive() {
  return JOB_DEFS[state.job||'miner']?.passive || {};
}

// 統一寫入 prevJobs：同一職業只保留最高等級一筆，避免轉職複利疊加
function addPrevJob(jobKey, level) {
  if (!state.prevJobs) state.prevJobs = [];
  const jd = JOB_DEFS[jobKey];
  const existing = state.prevJobs.find(p => p.job === jobKey);
  if (existing) {
    if (level > existing.level) {
      existing.level = level;
      existing.skills = (jd?.skills||[]).filter(s => level >= s.lv);
    }
  } else {
    state.prevJobs.push({
      job: jobKey, level,
      passive: jd?.passive || {},
      skills: (jd?.skills||[]).filter(s => level >= s.lv),
    });
  }
}

function getPrevJobBonus() {
  if (!state.prevJobs?.length) return {};
  const combined = {};
  for (const prev of state.prevJobs) {
    for (const [k,v] of Object.entries(prev.passive||{})) {
      if (typeof v==='number' && v>0) {
        combined[k] = (combined[k]||1) * (1+(v-1)*0.3);
      }
    }
  }
  return combined;
}

// 計算職業累積總場數
function calcTotalJobExp(jobLv) {
  // Lv.N→N+1需N×10場，所以到達Lv.N累積了 Σi×10 for i=1 to N-1
  let total = 0;
  for (let i = 1; i < jobLv; i++) total += i * 10;
  total += (state.jobExp || 0); // 加上當前等級已累積的
  return total;
}

// 用場數反算職業等級
function calcJobLvFromExp(totalExp) {
  let lv = 1, remaining = totalExp;
  while (remaining >= lv * 10) {
    remaining -= lv * 10;
    lv++;
  }
  return {lv, exp: remaining};
}

  // 武器檢查：新職業若有武器限制，且目前裝備不符，禁止轉職

    return;
  }

  const oldJob = state.job;
  const oldJd = JOB_DEFS[oldJob];
  const oldLv = state.jobLevel || 1;
  const totalExp = calcTotalJobExp(oldLv);
  const transferExp = Math.floor(totalExp * 0.3);
  const {lv: newStartLv, exp: newStartExp} = calcJobLvFromExp(transferExp);
  const oldSkills = (oldJd?.skills||[]).filter(s => oldLv >= s.lv).map(s => s.name).join('、') || '無';

  const msg = `確定轉職為「${jd.name}」？\n\n` +

// ⚒️ ENHANCE SYSTEM — Scrolls, success rates, cursed items
// ════════════════════════════════════════════════════════════

function getEnhanceRate(enhance, scrollType) {
  const base = ENHANCE_RATES[enhance] || 0.0001;
  if (scrollType==='lucky')  return Math.min(1, base*1.5);
  if (scrollType==='holy')   return enhance<=6 ? 1.0 : base;
  if (scrollType==='cursed') return Math.max(0.01, base-0.3);
  return base;
}

function tryEnhance(item, scrollType, hasProtect) {
  const cur = item.enhance || 0;
  if (cur >= 15) { toast('已達最高強化等級 +15'); return 'done'; }
  const rate = getEnhanceRate(cur+1, scrollType);
  const roll = Math.random();
  if (roll < rate) {
    let jump = 1;
    if (scrollType==='lucky' && Math.random()<0.5) {
      const r2 = Math.random();
      jump = r2<0.15 ? 3 : r2<0.50 ? 2 : 1;
    }
    item.enhance = Math.min(15, cur+jump);
    const jumpText = jump>1 ? ` 🎊 跳級+${jump}！` : '';
    toast(`✨ 強化成功！${item.name} → +${item.enhance}${jumpText}`);
    showEnhanceResult('success', item.name, item.enhance, jump);
  } else if (cur >= 7 && !hasProtect) {
    removeItemFromGame(item);
    toast(`💥 強化失敗！${item.name} 已碎裂……`);
    showEnhanceResult('break', item.name, cur);
    return 'break';
  } else {
    toast(`❌ 強化失敗，${item.name} 維持 +${cur}`);
    showEnhanceResult('fail', item.name, cur);
  }
  return 'done';
}

function showEnhanceResult(type, name, enhance) {
  const colors = {success:'#4ade80', break:'#f87171', fail:'#9ca3af'};
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);
    font-size:2rem;font-weight:900;color:${colors[type]};
    text-shadow:0 0 20px ${colors[type]};pointer-events:none;z-index:9999;
    animation:popIn .5s ease-out forwards`;
  el.textContent = type==='break' ? '💥 碎裂！' : type==='success' ? `✨ +${enhance}` : '❌ 失敗';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

function removeItemFromGame(item) {
  const invIdx = state.inventory.findIndex(i=>i.id===item.id);
  if (invIdx>=0) { state.inventory.splice(invIdx,1); return; }
  if (state.weapon?.id===item.id) { state.weapon=null; return; }
  for (const slot of ARMOR_SLOTS) {
    if (state.equipment[slot]?.id===item.id) { state.equipment[slot]=null; return; }
  }
}

function doEnhance(itemId, fromInv, invIdx, slot) {
  // 保留舊函式相容性，不再用
}

function doEnhanceDirect(itemId, fromInv, invIdx, slot, scrollSubtype) {
  const item = fromInv ? state.inventory.find(i=>String(i.id)===String(itemId))
    : (slot==='weapon' ? state.weapon : state.equipment[slot]);
  if (!item) return;
  const scrollIdx = state.inventory.findIndex(i=>i.subtype===scrollSubtype&&i.type==='scroll');
  if (scrollIdx < 0) { toast('找不到卷軸'); return; }
  const scroll = state.inventory[scrollIdx];
  const hasProtect = !!item._protected;
  // 消耗卷軸
  state.inventory.splice(scrollIdx, 1);
  // 執行強化
  tryEnhance(item, scroll.effect?.type, hasProtect);
  // 保護卷軸用完後清除
  if (hasProtect) item._protected = false;
  closeModal('modal-item');
  refreshInventoryIfOpen();
  updateUI(); save(true);
}

function applyProtectToItem(itemId, fromInv, invIdx, slot) {
  const item = fromInv ? state.inventory.find(i=>String(i.id)===String(itemId))
    : (slot==='weapon' ? state.weapon : state.equipment[slot]);

  const protectIdx = state.inventory.findIndex(i=>i.subtype==='enhance_protect');

  item._protected = true;
  state.inventory.splice(protectIdx, 1);

  toast(`🛡 ${item.name} 已套上保護卷軸`);
  updateUI(); save(true);
}

// Ch4: 套件計算


// ════════════════════════════════════════════════════════════
// 🎯 SET BONUSES & CURSE EFFECTS
// ════════════════════════════════════════════════════════════

function getSetBonuses() {
  const setCounts = {};
  const allEquipped = [state.weapon, ...ARMOR_SLOTS.map(s=>state.equipment[s])].filter(Boolean);
  for (const item of allEquipped) {
    if (!item.setId) continue;
    setCounts[item.setId] = (setCounts[item.setId]||0)+1;
  }
  const bonuses = [];
  for (const [setId, count] of Object.entries(setCounts)) {
    const def = SET_DEFS[setId];
    if (!def) continue;
    for (const [req, bonus] of Object.entries(def.bonus)) {
      if (count>=parseInt(req)) bonuses.push({setId, setName:def.name, count, req:parseInt(req), ...bonus});
    }
  }
  return bonuses;
}

// Ch5: 職業被動

function applyCurseEffects(triggerType) {
  const allEquipped = [state.weapon, ...ARMOR_SLOTS.map(s=>state.equipment[s])].filter(Boolean);
  for (const item of allEquipped) {
    if (!item.cursed || item.purified) continue;
    const ef = CURSE_EFFECTS.find(e=>e.type===item.curseType);
    if (!ef) continue;
    if (triggerType==='move' && ef.type==='hp_drain') {
      state.stats.hp = Math.max(1, state.stats.hp-1);
      updateStatusBar();
    }
    if (triggerType==='combat_end' && ef.type==='gold_drain') {
      const drain = Math.floor(state.gold*0.05);
      if (drain>0) {
        state.gold = Math.max(0, state.gold-drain);
        toast(`☠️ 詛咒吸走了 $${drain} 金幣`);
      }
    }
  }
}

// 🎒 INVENTORY — Add, remove, equip, sell, use

function addToInventory(item) {
  if (state.inventory.length >= state.inventoryMax) return false;
  state.inventory.push(item);
  return true;
}

function removeFromInventory(idx) {
  state.inventory.splice(idx, 1);
  refreshInventoryIfOpen();
}

function refreshInventoryIfOpen() {
  if (document.getElementById('modal-inv')?.classList.contains('open')) openInventory(state._invFilter);
  if (document.getElementById('modal-eq')?.classList.contains('open')) openEquipment();
}

function equipItem(item, fromInv, invIdx) {
  if (item.reqLevel > state.level) {
    toast(`⚠️ 等級不足（需 Lv.${item.reqLevel}）`); return;
  }
  if (item.type === 'weapon' && !canUseWeapon(state.job, item.subtype)) {
    const required = getRequiredWeapon(state.job);
    toast(`🚫 目前職業（${JOB_DEFS[state.job]?.name}）只能裝備 ${WPN_ICON[required]||''} 類武器`);
    return;
  }
  let slot, oldItem;
  if (item.type === 'weapon') {
    oldItem = state.weapon;
    state.weapon = item;
    slot = 'weapon';
  } else {
    const s = item.subtype;
    oldItem = state.equipment[s];
    state.equipment[s] = item;
    slot = s;
  }
  if (fromInv) removeFromInventory(invIdx);
  if (oldItem) { if (!addToInventory(oldItem)) toast('背包已滿，舊裝備消失'); }
  playSFX('equip');
  toast(`✅ 裝備了 ${item.name}`);
  closeModal('modal-item');
  refreshInventoryIfOpen();
  updateUI();
}

function findItemById(id) {
  const invIdx = state.inventory.findIndex(i => String(i.id) === String(id));
  if (invIdx >= 0) return {item: state.inventory[invIdx], fromInv: true, invIdx, slot: null};
  if (state.weapon && String(state.weapon.id) === String(id))
    return {item: state.weapon, fromInv: false, invIdx: null, slot: 'weapon'};
  for (const slot of ARMOR_SLOTS) {
    if (state.equipment[slot] && String(state.equipment[slot].id) === String(id))
      return {item: state.equipment[slot], fromInv: false, invIdx: null, slot};
  }
  return null;
}

function sellItemById(id) {
  const found = findItemById(id);
  if (!found) {
    // debug：列出所有物品 id
    const ids = state.inventory.map(i => String(i.id)).join(', ');
    toast('找不到:' + id + ' 現有:' + ids.slice(0,40));
    return;
  }
  sellItem(found.fromInv, found.invIdx, found.slot);
}

function dropItemById(id) {
  const found = findItemById(id);
  if (!found) { toast('找不到物品'); return; }
  dropItem(found.item, found.fromInv, found.invIdx);
}

function usePotionById(id) {
  const invIdx = state.inventory.findIndex(i => String(i.id) === String(id));
  if (invIdx < 0) { toast('找不到物品'); return; }
  usePotion(state.inventory[invIdx], invIdx);
}

function equipItemById(id) {
  const invIdx = state.inventory.findIndex(i => String(i.id) === String(id));
  if (invIdx < 0) { toast('找不到物品'); return; }
  equipItem(state.inventory[invIdx], true, invIdx);
}

function dropItem(item, fromInv, invIdx) {
  if (!confirm(`確定丟棄「${item.name}」？`)) return;
  if (fromInv) {
    const realIdx = state.inventory.findIndex(i => i.id === item.id);
    if (realIdx >= 0) state.inventory.splice(realIdx, 1);
  } else {
    if (item.type === 'weapon') state.weapon = null;
    else state.equipment[item.subtype] = null;
  }
  closeModal('modal-item');
  refreshInventoryIfOpen();
  updateUI(); save(true);
  toast('🗑️ 已丟棄');
}

function sellItem(fromInv, invIdx, slot) {
  const item = fromInv ? state.inventory[invIdx]
    : (slot === 'weapon' ? state.weapon : state.equipment[slot]);
  if (!item) return;

  // 藥水/卷軸：偵測同 subtype 疊加數量，一次性全部賣出
  if (fromInv && (item.type === 'potion' || item.type === 'scroll')) {
    const sameStack = state.inventory.filter(i => i.type === item.type && i.subtype === item.subtype);
    const count = sameStack.length;
    const unitPrice = computeSellPrice(item);
    const totalPrice = unitPrice * count;
    const msg = count > 1
      ? `賣出「${item.name}」× ${count} 個，共獲得 $${totalPrice}？`
      : `賣出「${item.name}」獲得 $${unitPrice}？`;
    if (!confirm(msg)) return;
    playSFX('coin');
    state.gold += totalPrice;
    // 全部移除同 subtype 的堆疊
    state.inventory = state.inventory.filter(i => !(i.type === item.type && i.subtype === item.subtype));
    closeModal('modal-item');
    refreshInventoryIfOpen();
    updateUI(); save(true);
    toast(`💰 賣出 ${item.name} × ${count}，獲得 $${totalPrice}`);
    return;
  }

  // 裝備：強化過要二次警告
  const price = computeSellPrice(item);
  let msg = `賣出「${item.name}」獲得 $${price}？`;
  if ((item.enhance||0) > 0) {
    msg = `⚠️ 此裝備已強化 +${item.enhance}，賣出後強化值將永久消失！\n\n賣出「${item.name}」獲得 $${price}？`;
  }
  if (!confirm(msg)) return;
  playSFX('coin');
  state.gold += price;
  if (fromInv) {
    // 用 id 找，避免 index 跑掉
    const realIdx = state.inventory.findIndex(i => i.id === item.id);
    if (realIdx >= 0) state.inventory.splice(realIdx, 1);
  } else {
    if (slot === 'weapon') state.weapon = null;
    else state.equipment[slot] = null;
  }
  closeModal('modal-item');
  refreshInventoryIfOpen();
  updateUI(); save(true);
  toast(`💰 賣出 ${item.name}，獲得 $${price}`);
}

function usePotion(item, invIdx) {
  const ef = item.effect;

  // 回復類
  if (ef.heal) {
    const healAmt = ef.heal === 'full' ? state.stats.maxHp : ef.heal;
    const actual = Math.min(state.stats.maxHp - state.stats.hp, healAmt);
    state.stats.hp = Math.min(state.stats.maxHp, state.stats.hp + healAmt);
    toast(`${item.icon} ${item.name}：回復 ${actual} HP`);
    removeFromInventory(invIdx);
    closeModal('modal-item');
    refreshInventoryIfOpen();
    updateUI(); save(true);

  // 解毒
  } else if (ef.cure === 'poison') {
    state.statusEffects = (state.statusEffects||[]).filter(e=>e.type!=='poison');
    renderStatusBar();
    toast(`💚 解毒成功！中毒狀態已解除`);
    removeFromInventory(invIdx);
    closeModal('modal-item');
    refreshInventoryIfOpen();
    updateUI(); save(true);

  // 萬能解藥
  } else if (ef.cure === 'all') {
    clearAllStatus();
    playSFX('cure');
    toast(`🌈 萬能解藥！所有負面狀態已解除`);
    removeFromInventory(invIdx);
    closeModal('modal-item');
    refreshInventoryIfOpen();
    updateUI(); save(true);

  // Buff 類（str/agi/luk/int/berserk/invincible）
  } else if (ef.buff) {
    if (!state.buffEffects) state.buffEffects = [];
    state.buffEffects = state.buffEffects.filter(b => b.type !== ef.buff);
    const battles = ef.buff === 'invincible' ? 1 : 3;
    state.buffEffects.push({type: ef.buff, amt: ef.amt || 0, battles});
    const buffNames = {
      str:'攻擊+30%', agi:'敏捷+30%', luk:'幸運+50%',
      int:'智力+30%', berserk:'攻擊×2（防禦歸零）', invincible:'免疫傷害'
    };
    toast(`${item.icon} ${item.name}：${buffNames[ef.buff] || ef.buff}，持續 ${battles} 場戰鬥`);
    removeFromInventory(invIdx);
    closeModal('modal-item');
    refreshInventoryIfOpen();
    updateUI(); save(true);

  // 卷軸類
  } else if (ef.action === 'enhance') {
    showScrollTargetPicker(item, invIdx, 'enhance');
  } else if (ef.action === 'protect') {
    showScrollTargetPicker(item, invIdx, 'protect');
  } else if (ef.action === 'identify') {
    const unidItems = state.inventory.filter(i => i.unidentified);
    if (unidItems.length === 0) { toast(`🔍 背包中沒有待鑑定的裝備`); return; }
    showIdentifyPicker(invIdx);
  } else if (ef.action === 'purify') {
    const cursedItems = [
      ...(state.weapon?.cursed && !state.weapon?.purified ? [state.weapon] : []),
      ...ARMOR_SLOTS.map(s=>state.equipment[s]).filter(i=>i?.cursed && !i?.purified),
      ...state.inventory.filter(i=>i?.cursed && !i?.purified),
    ];
    if (cursedItems.length === 0) { toast(`🌟 沒有可解咒的裝備`); return; }
    showPurifyPicker(invIdx);
  } else if (ef.action === 'teleport_near') {
    // 回家卷軸：傳送到當前大陸的村莊；若該大陸沒有村莊（如隱藏大陸），改傳送到距離最近的村莊
    const curCont = getContinent(px, py);
    let vid = Object.keys(VILLAGE_DEFS).find(k => VILLAGE_DEFS[k].continent === curCont);
    if (!vid) {
      let minDist = Infinity;
      for (const [k, v] of Object.entries(VILLAGE_DEFS)) {
        const d = Math.abs(px-(START_X+v.dx)) + Math.abs(py-(START_Y+v.dy));
        if (d < minDist) { minDist = d; vid = k; }
      }
    }
    if (!vid) { toast('找不到任何村莊'); return; }
    removeFromInventory(invIdx);
    closeModal('modal-item');
    doTeleport(vid);
  } else if (ef.action === 'teleport_any') {
    // 定點傳送卷軸：選擇任意已抵達過的大陸村莊
    const visited = state.visitedContinents || ['forest'];
    const available = Object.keys(VILLAGE_DEFS).filter(vid => visited.includes(VILLAGE_DEFS[vid].continent));
    if (available.length === 0) { toast('尚未抵達任何村莊所在的大陸'); return; }
    removeFromInventory(invIdx);
    closeModal('modal-item');
    showTeleportMenu({vid:'__scroll__'});
  } else if (ef.action === 'job_reset') {
    if (state.job === 'miner') { toast('你目前是礦工，沒有可重置的轉職路線'); return; }
    closeModal('modal-item');
    showJobResetMenu(invIdx);
  } else if (ef.action === 'job_reincarnate') {
    closeModal('modal-item');
    showJobReincarnateMenu(invIdx);
  } else if (ef.action === 'none') {
    toast('🎫 此道具會在挑戰副本時自動使用，無需手動使用');
  } else if (ef.action === 'job_exp_up') {
    if (!confirm(`使用「職業經驗卷軸」將目前職業等級直接提升至 Lv.${(state.jobLevel||1)+1}（無視所需經驗），確定使用？`)) return;
    removeFromInventory(invIdx);
    closeModal('modal-item');
    forceJobLevelUp();
    refreshInventoryIfOpen();
    updateUI(); save(true);
  } else if (ef.action === 'fog') {
    for (let dy = -7; dy <= 7; dy++) {
      for (let dx = -7; dx <= 7; dx++) { explored.add(`${px+dx},${py+dy}`); }
    }
    state.totalExplored = explored.size;
    toast(`🌫️ 迷霧消散，周圍地形已揭露`);
    removeFromInventory(invIdx);
    closeModal('modal-item');
    refreshInventoryIfOpen();
    renderMap(); updateUI(); save(true);
  } else {
    toast(`使用了 ${item.name}`);
    removeFromInventory(invIdx);
    closeModal('modal-item');
    refreshInventoryIfOpen();
    updateUI(); save(true);
  }
}

function showScrollTargetPicker(scroll, scrollInvIdx, mode) {
  // 收集所有可用裝備（武器 + 裝備欄 + 背包裝備）
  const targets = [];
  if (state.weapon) targets.push({item:state.weapon, loc:'weapon', label:'武器（已裝備）'});
  ARMOR_SLOTS.forEach(s => {
    if (state.equipment[s]) targets.push({item:state.equipment[s], loc:s, label:`${SLOT_LABEL[s]}（已裝備）`});
  });
  state.inventory.forEach((item, i) => {
    if (item.type==='weapon'||item.type==='armor')
      targets.push({item, loc:'inv', invIdx:i, label:'背包'});
  });

  if (targets.length === 0) { toast('沒有可用的裝備'); return; }

  const isProtect = mode === 'protect';
  const titleColor = isProtect ? '#60a5fa' : '#f59e0b';
  const title = isProtect ? '🛡 選擇要保護的裝備' : `⚒️ 選擇要強化的裝備（${scroll.name}）`;

  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem';
  modal.innerHTML = `
    <div style="background:#0d0d22;border:1px solid ${titleColor};border-radius:16px;padding:1.2rem;width:100%;max-width:320px">
      <div style="color:${titleColor};font-weight:700;margin-bottom:.75rem">${title}</div>
      <div style="display:flex;flex-direction:column;gap:.4rem;max-height:320px;overflow-y:auto">
        ${targets.map((t,i) => `
          <div onclick="doScrollApply(${i},${scrollInvIdx},'${mode}',this.closest('[style*=fixed]'))"
            style="display:flex;align-items:center;gap:.5rem;padding:.5rem;
            border:.5px solid #2a2a4a;border-radius:8px;cursor:pointer;background:#12122a">
            <span style="font-size:1.2rem">${t.item.icon||'⚔️'}</span>
            <div style="flex:1">
              <div style="font-size:12px" class="rarity-${t.item.rarity}">${t.item.name}${t.item.enhance>0?' +'+t.item.enhance:''}</div>
              <div style="font-size:10px;color:#555">${t.label}${isProtect&&t.item._protected?' · 🛡已保護':''}</div>
            </div>
            ${!isProtect?`<div style="font-size:10px;color:#888">+${(t.item.enhance||0)+1}試驗</div>`:''}
          </div>`).join('')}
      </div>
      <button onclick="this.closest('[style*=fixed]').remove()"
        style="margin-top:.75rem;width:100%;padding:8px;border-radius:8px;border:.5px solid #333;background:transparent;color:#888;cursor:pointer">取消</button>
    </div>`;
  modal._targets = targets;
  document.body.appendChild(modal);
}

function doScrollApply(targetIdx, scrollInvIdx, mode, modal) {
  const targets = modal._targets;
  if (!targets || !targets[targetIdx]) return;
  const {item} = targets[targetIdx];
  const scroll = state.inventory[scrollInvIdx];
  if (!scroll) return;

  if (mode === 'protect') {
    item._protected = true;
    // 消耗卷軸
    state.inventory.splice(scrollInvIdx, 1);
    if (modal) modal.remove();
    closeModal('modal-item');
    refreshInventoryIfOpen();
    toast(`🛡 ${item.name} 已套上保護卷軸，下次強化失敗不會爆裝`);
    updateUI(); save(true);
  } else {
    // enhance mode
    if (modal) modal.remove();
    closeModal('modal-item');
    refreshInventoryIfOpen();
    const hasProtect = item._protected;
    const result = tryEnhance(item, scroll.effect?.type, hasProtect);
    // 消耗卷軸
    state.inventory.splice(scrollInvIdx, 1);
    if (hasProtect && result !== 'done') {
      item._protected = false;
    }
    if (item._protected && result === 'done') item._protected = false;
    updateUI(); save(true);
  }
}

function showIdentifyPicker(scrollInvIdx) {
  const unidItems = state.inventory.map((item, i) => ({item, i})).filter(({item}) => item.unidentified);
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem';
  modal.innerHTML = `
    <div style="background:#0d0d22;border:1px solid #60a5fa;border-radius:16px;padding:1.2rem;width:100%;max-width:320px">
      <div style="color:#60a5fa;font-weight:700;margin-bottom:.75rem">🔍 選擇要鑑定的裝備</div>
      <div id="identify-list" style="display:flex;flex-direction:column;gap:.4rem;max-height:300px;overflow-y:auto">
        ${unidItems.map(({item, i}) => `
          <div onclick="doIdentify(${i},${scrollInvIdx},this.closest('[style*=fixed]'))"
            style="display:flex;align-items:center;gap:.5rem;padding:.5rem;border:.5px solid #2a2a4a;border-radius:8px;cursor:pointer;background:#12122a">
            <span style="font-size:1.2rem">${item.icon}</span>
            <div>
              <div style="font-size:12px;color:var(--rarity-${item.rarity},#aaa)">${item.name}</div>
              <div style="font-size:10px;color:#555">${item.type==='weapon'?'武器':SLOT_LABEL[item.subtype]||'裝備'}</div>
            </div>
          </div>`).join('')}
      </div>
      <button onclick="this.closest('[style*=fixed]').remove()"
        style="margin-top:.75rem;width:100%;padding:8px;border-radius:8px;border:.5px solid #333;background:transparent;color:#888;cursor:pointer">取消</button>
    </div>`;
  document.body.appendChild(modal);
}

function doIdentify(invIdx, scrollInvIdx, modal) {
  const item = state.inventory[invIdx];
  if (!item || !item.unidentified) return;
  // 揭露真實資訊
  item.name = item.realName || item.name.replace('【待鑑定】','');
  item.icon = item.type === 'weapon' ? (WPN_ICON[item.subtype] || '⚔️') : (SLOT_ICON[item.subtype] || '🛡');
  item.stats = item.realStats || item.stats;
  item.unidentified = false;
  item.flavorText = item.type === 'weapon'
    ? (WPN_FLAVOR[item.name] || `一把${item.name}，散發著冒險的氣息`)
    : `一件${item.name}，防護著這一代勇者`;
  // 消耗鑑定卷軸
  const scrollIdx = state.inventory.findIndex((i,idx) => idx === scrollInvIdx);
  if (scrollIdx >= 0) state.inventory.splice(scrollIdx, 1);
  if (modal) modal.remove();
  closeModal('modal-item');
  refreshInventoryIfOpen();
  if (document.getElementById('modal-merchant')?.classList.contains('open')) renderMerchant();
  toast(`🔍 鑑定完成！【${item.name}】真面目揭曉！`);
  updateUI(); save(true);
  // 重新開啟鑑定後的裝備卡片
  const newIdx = state.inventory.findIndex(i => i.id === item.id);
  if (newIdx >= 0) setTimeout(() => openItemCard(item, true, newIdx, false), 300);
}

function showPurifyPicker(scrollInvIdx) {
  const cursedItems = [];
  if (state.weapon?.cursed && !state.weapon?.purified) cursedItems.push({item:state.weapon, slot:'weapon', fromInv:false});
  ARMOR_SLOTS.forEach(s => {
    if (state.equipment[s]?.cursed && !state.equipment[s]?.purified)
      cursedItems.push({item:state.equipment[s], slot:s, fromInv:false});
  });
  state.inventory.forEach((item, i) => {
    if (item?.cursed && !item?.purified) cursedItems.push({item, slot:null, fromInv:true, invIdx:i});
  });
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem';
  modal.innerHTML = `
    <div style="background:#0d0d22;border:1px solid #f87171;border-radius:16px;padding:1.2rem;width:100%;max-width:320px">
      <div style="color:#f87171;font-weight:700;margin-bottom:.75rem">🌟 選擇要解咒的裝備</div>
      <div style="display:flex;flex-direction:column;gap:.4rem;max-height:300px;overflow-y:auto">
        ${cursedItems.map((c, ci) => `
          <div onclick="doPurify(${ci},${scrollInvIdx},this.closest('[style*=fixed]'))"
            style="display:flex;align-items:center;gap:.5rem;padding:.5rem;border:.5px solid #f8717155;border-radius:8px;cursor:pointer;background:#1a0a0a">
            <span style="font-size:1.2rem">${c.item.icon}</span>
            <div>
              <div style="font-size:12px;color:#f87171">【腐化】${c.item.name}</div>
              <div style="font-size:10px;color:#555">解咒後數值+20%完全釋放</div>
            </div>
          </div>`).join('')}
      </div>
      <button onclick="this.closest('[style*=fixed]').remove()"
        style="margin-top:.75rem;width:100%;padding:8px;border-radius:8px;border:.5px solid #333;background:transparent;color:#888;cursor:pointer">取消</button>
    </div>`;
  // Store cursedItems for doIdentify
  modal._cursedItems = cursedItems;
  document.body.appendChild(modal);
  modal._cursedItems = cursedItems;
}

function doPurify(cursedIdx, scrollInvIdx, modal) {
  // Find the modal and cursedItems
  const cursedItems = modal._cursedItems;
  if (!cursedItems || !cursedItems[cursedIdx]) return;
  const {item} = cursedItems[cursedIdx];
  item.purified = true;
  item.cursed = false; // 完全解除
  // 消耗解咒卷軸
  const scrollIdx = state.inventory.findIndex((i,idx) => idx === scrollInvIdx);
  if (scrollIdx >= 0) state.inventory.splice(scrollIdx, 1);
  if (modal) modal.remove();
  closeModal('modal-item');
  refreshInventoryIfOpen();
  toast(`🌟 【${item.name}】詛咒已解除！裝備數值完全釋放！`);
  updateUI(); save(true);
}

function updateStatusBar() {
  const hp = state.stats.hp, mhp = state.stats.maxHp;
  const hpPct = Math.max(0, hp/mhp*100);
  // 原有狀態列
  document.getElementById('hp-txt').textContent = `❤️${hp}/${mhp}`;
  document.getElementById('hp-bar').style.width = hpPct + '%';
  document.getElementById('gold-txt').textContent = `💰${state.gold}`;
  const w = state.weapon;
  document.getElementById('wpn-txt').textContent = w
    ? `${w.icon} ${w.name}${w.enhance>0?'+'+w.enhance:''}` : '⚔️ 空手';
  // 地圖內 overlay 列
  const expPct = Math.min(100, Math.floor((state.exp / (state.expNext||100)) * 100));
  document.getElementById('mo-hp').textContent = `❤️ ${hp}/${mhp}`;
  document.getElementById('mo-hpbar').style.width = hpPct + '%';
  document.getElementById('mo-lv').textContent = `Lv.${state.level}`;
  document.getElementById('mo-expbar').style.width = expPct + '%';
  document.getElementById('mo-gold').textContent = `💰 ${state.gold}`;
  document.getElementById('mo-wpn').textContent = w
    ? `${w.icon} ${w.name}${w.enhance>0?'+'+w.enhance:''}` : '⚔️ 空手';
  const contEl = document.getElementById('mo-continent');
  if (contEl) {
    const ci = CONTINENT_INFO[getContinent(px,py)];
    contEl.textContent = ci?.name || '🌿 新手森林';
    contEl.style.color = ci?.color || '#888';
  }
}

function updateUI() {
  document.getElementById('lv-badge').textContent = `Lv.${state.level}`;
  document.getElementById('gen-badge').textContent = `第${state.generation}代`;
  updateStatusBar();
  updatePlayerSVG();
  updateQuickBar();
  checkNearMerchant();
}

function updatePlayerSVG() {
  const wrap = document.getElementById('player-svg-wrap');
  const svg  = document.getElementById('player-svg');
  if (!wrap || !svg || !TILE) return;

  // canvas 在 map-wrap 裡可能有偏移（justify-content:center）
  const mapWrap = document.getElementById('map-wrap');
  const canvasEl = document.getElementById('map-canvas');
  const wrapRect = mapWrap.getBoundingClientRect();
  const canvasRect = canvasEl.getBoundingClientRect();
  const offsetX = canvasRect.left - wrapRect.left;
  const offsetY = canvasRect.top  - wrapRect.top;

  // 定位到地圖中心格（第7格）
  wrap.style.left   = (offsetX + 7 * TILE) + 'px';
  wrap.style.top    = (offsetY + 7 * TILE) + 'px';
  wrap.style.width  = TILE + 'px';
  wrap.style.height = TILE + 'px';

  const eq = state.equipment;
  const w  = state.weapon;
  const rc = r => RARITY_COLOR[r] || '#9ca3af';

  // 頭盔
  const hEl = document.getElementById('svg-helmet');
  if (eq.helmet) { hEl.style.display=''; hEl.querySelector('rect').setAttribute('fill', rc(eq.helmet.rarity)); }
  else hEl.style.display = 'none';

  // 身體/鎧甲
  const bodyEl = document.getElementById('svg-body');
  const larmEl = document.getElementById('svg-larm');
  const rarmEl = document.getElementById('svg-rarm');
  const bodyColor = eq.armor ? rc(eq.armor.rarity) : '#6b7280';
  bodyEl.setAttribute('fill', bodyColor);
  larmEl.setAttribute('fill', bodyColor);
  rarmEl.setAttribute('fill', bodyColor);

  // 腿
  const legsEl = document.getElementById('svg-legs');
  legsEl.setAttribute('fill', eq.legs ? rc(eq.legs.rarity) : '#374151');
  legsEl.nextElementSibling.setAttribute('fill', eq.legs ? rc(eq.legs.rarity) : '#374151');

  // 靴子
  const bootsEl = document.getElementById('svg-boots');
  if (eq.boots) {
    bootsEl.style.display = '';
    bootsEl.querySelectorAll('rect').forEach(r => r.setAttribute('fill', rc(eq.boots.rarity)));
  } else bootsEl.style.display = 'none';

  // 武器
  const wpnEl = document.getElementById('svg-weapon');
  if (w) {
    wpnEl.style.display = '';
    wpnEl.innerHTML = WPN_SVG_SHAPES[w.subtype] || WPN_SVG_SHAPES.sword;
  } else wpnEl.style.display = 'none';
}

function updateQuickBar() {
  const bar = document.getElementById('quick-bar');
  if (!bar) return;

  const HEAL_SUBTYPES = ['heal_s','heal_m','heal_l','heal_xl','heal_full','antidote','cure_all'];
  const BUFF_SUBTYPES = ['str_boost','agi_boost','luk_boost','int_boost','berserk','invincible'];

  // 去重：同 subtype 只取第一個，並統計數量
  function buildGroup(subtypes) {
    const seen = {};
    state.inventory.forEach((item, i) => {
      if (item.type !== 'potion') return;
      if (!seen[item.subtype]) seen[item.subtype] = {item, invIdx:i, count:0};
      seen[item.subtype].count++;
    });
    return subtypes.filter(s => seen[s]).map(s => ({...seen[s]}));
  }

  const heals = buildGroup(HEAL_SUBTYPES);
  const buffs = buildGroup(BUFF_SUBTYPES);

  function slotHtml(p) {
    return `<div onclick="quickUsePotion(${p.invIdx})" style="
      position:relative;width:36px;height:36px;background:rgba(0,0,0,.7);
      border:.5px solid #444;border-radius:8px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      cursor:pointer;font-size:18px;gap:1px">
      <span>${p.item.icon}</span>
      <span style="font-size:8px;color:#aaa">${p.item.name.replace('藥水','').replace('卷軸','')}</span>
      ${p.count>1?`<span style="position:absolute;bottom:1px;right:3px;font-size:7px;color:#f59e0b;font-weight:700">x${p.count}</span>`:''}
    </div>`;
  }

  let html = heals.map(slotHtml).join('');
  if (heals.length && buffs.length) {
    html += `<div style="width:1px;height:28px;background:#333;margin:0 3px;align-self:center"></div>`;
  }
  html += buffs.map(slotHtml).join('');
  bar.innerHTML = html;

  // 戰鬥畫面同步
  const cbBar = document.getElementById('cb-quick-bar');
  if (cbBar) cbBar.innerHTML = bar.innerHTML;
}
