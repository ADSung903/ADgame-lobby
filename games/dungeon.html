function addToInventory(item) {
  if (state.inventory.length >= state.inventoryMax) return false;
  state.inventory.push(item);
  return true;
}

function removeFromInventory(idx) {
  state.inventory.splice(idx, 1);
}

function equipItem(item, fromInv, invIdx) {
  if (item.reqLevel > state.level) {
    toast(`⚠️ 等級不足（需 Lv.${item.reqLevel}）`); return;
  }
  let slot, oldItem;
  if (item.type === 'weapon') {
    oldItem = state.weapon;
    state.weapon = item;
    slot = 'weapon';
  } else {
    const s = item.subtype;
    oldItem = state.equipment[s];
    state.equipment[s] = item;
    slot = s;
  }
  if (fromInv) removeFromInventory(invIdx);
  if (oldItem) { if (!addToInventory(oldItem)) toast('背包已滿，舊裝備消失'); }
  toast(`✅ 裝備了 ${item.name}`);
  closeModal('modal-item'); openInventory();
  updateUI();
}

function dropItem(item, fromInv, invIdx) {
  if (!confirm(`確定丟棄「${item.name}」？`)) return;
  if (fromInv) removeFromInventory(invIdx);
  else {
    if (item.type === 'weapon') state.weapon = null;
    else state.equipment[item.subtype] = null;
  }
  closeModal('modal-item');
  updateUI(); save();
  toast('🗑️ 已丟棄');
}

function sellItem(fromInv, invIdx, slot) {
  const item = fromInv ? state.inventory[invIdx]
    : (slot === 'weapon' ? state.weapon : state.equipment[slot]);
  if (!item) return;
  const price = computeSellPrice(item);
  if (!confirm(`賣出「${item.name}」獲得 $${price}？`)) return;
  state.gold += price;
  if (fromInv) {
    // 用 id 找，避免 index 跑掉
    const realIdx = state.inventory.findIndex(i => i.id === item.id);
    if (realIdx >= 0) state.inventory.splice(realIdx, 1);
  } else {
    if (slot === 'weapon') state.weapon = null;
    else state.equipment[slot] = null;
  }
  closeModal('modal-item');
  // 強制重新渲染背包/裝備頁
  if (document.getElementById('modal-inv')?.classList.contains('open')) openInventory();
  if (document.getElementById('modal-eq')?.classList.contains('open')) openEquipment();
  updateUI(); save(true);
  toast(`💰 賣出 ${item.name}，獲得 $${price}`);
}

function usePotion(item, invIdx) {
  const ef = item.effect;
  if (ef.heal) {
    state.stats.hp = Math.min(state.stats.maxHp, state.stats.hp + ef.heal);
    toast(`💊 ${item.name}：回復 ${ef.heal} HP`);
    removeFromInventory(invIdx);
    closeModal('modal-item');
    updateUI(); save(true);
  } else if (ef.cure === 'poison') {
    state.statusEffects = state.statusEffects.filter(e=>e.type!=='poison');
    toast(`💚 解毒成功！中毒狀態已解除`);
    removeFromInventory(invIdx);
    closeModal('modal-item');
    updateUI(); save(true);
  } else if (ef.action === 'identify') {
    // 鑑定：需要選擇目標
    const unidItems = state.inventory.filter(i => i.unidentified);
    if (unidItems.length === 0) {
      toast(`🔍 背包中沒有待鑑定的裝備`);
      return;
    }
    // 顯示待鑑定選擇介面
    showIdentifyPicker(invIdx);
  } else if (ef.action === 'purify') {
    // 解咒：需要選擇目標
    const cursedItems = [
      ...(state.weapon?.cursed && !state.weapon?.purified ? [state.weapon] : []),
      ...ARMOR_SLOTS.map(s=>state.equipment[s]).filter(i=>i?.cursed && !i?.purified),
      ...state.inventory.filter(i=>i?.cursed && !i?.purified),
    ];
    if (cursedItems.length === 0) { toast(`🌟 沒有可解咒的裝備`); return; }
    showPurifyPicker(invIdx);
  } else if (ef.action === 'fog') {
    // 迷霧藥水：揭開周圍15格
    for (let dy = -7; dy <= 7; dy++) {
      for (let dx = -7; dx <= 7; dx++) {
        explored.add(`${px+dx},${py+dy}`);
      }
    }
    state.totalExplored = explored.size;
    toast(`🌫️ 迷霧消散，周圍地形已揭露`);
    removeFromInventory(invIdx);
    closeModal('modal-item');
    renderMap(); updateUI(); save(true);
  } else {
    toast(`使用了 ${item.name}`);
    removeFromInventory(invIdx);
    closeModal('modal-item');
    updateUI(); save(true);
  }
}

function showIdentifyPicker(scrollInvIdx) {
  const unidItems = state.inventory.map((item, i) => ({item, i})).filter(({item}) => item.unidentified);
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem';
  modal.innerHTML = `
    <div style="background:#0d0d22;border:1px solid #60a5fa;border-radius:16px;padding:1.2rem;width:100%;max-width:320px">
      <div style="color:#60a5fa;font-weight:700;margin-bottom:.75rem">🔍 選擇要鑑定的裝備</div>
      <div id="identify-list" style="display:flex;flex-direction:column;gap:.4rem;max-height:300px;overflow-y:auto">
        ${unidItems.map(({item, i}) => `
          <div onclick="doIdentify(${i},${scrollInvIdx},this.closest('[style*=fixed]'))"
            style="display:flex;align-items:center;gap:.5rem;padding:.5rem;border:.5px solid #2a2a4a;border-radius:8px;cursor:pointer;background:#12122a">
            <span style="font-size:1.2rem">${item.icon}</span>
            <div>
              <div style="font-size:12px;color:var(--rarity-${item.rarity},#aaa)">${item.name}</div>
              <div style="font-size:10px;color:#555">${item.type==='weapon'?'武器':SLOT_LABEL[item.subtype]||'裝備'}</div>
            </div>
          </div>`).join('')}
      </div>
      <button onclick="this.closest('[style*=fixed]').remove()"
        style="margin-top:.75rem;width:100%;padding:8px;border-radius:8px;border:.5px solid #333;background:transparent;color:#888;cursor:pointer">取消</button>
    </div>`;
  document.body.appendChild(modal);
}

function doIdentify(invIdx, scrollInvIdx, modal) {
  const item = state.inventory[invIdx];
  if (!item || !item.unidentified) return;
  // 揭露真實資訊
  item.name = item.realName || item.name.replace('【待鑑定】','');
  item.icon = item.type === 'weapon' ? (WPN_ICON[item.subtype] || '⚔️') : (SLOT_ICON[item.subtype] || '🛡');
  item.stats = item.realStats || item.stats;
  item.unidentified = false;
  item.flavorText = item.type === 'weapon'
    ? (WPN_FLAVOR[item.name] || `一把${item.name}，散發著冒險的氣息`)
    : `一件${item.name}，防護著這一代勇者`;
  // 消耗鑑定卷軸
  const scrollIdx = state.inventory.findIndex((i,idx) => idx === scrollInvIdx);
  if (scrollIdx >= 0) state.inventory.splice(scrollIdx, 1);
  if (modal) modal.remove();
  closeModal('modal-item');
  toast(`🔍 鑑定完成！【${item.name}】真面目揭曉！`);
  updateUI(); save(true);
  // 重新開啟鑑定後的裝備卡片
  const newIdx = state.inventory.findIndex(i => i.id === item.id);
  if (newIdx >= 0) setTimeout(() => openItemCard(item, true, newIdx, false), 300);
}

function showPurifyPicker(scrollInvIdx) {
  const cursedItems = [];
  if (state.weapon?.cursed && !state.weapon?.purified) cursedItems.push({item:state.weapon, slot:'weapon', fromInv:false});
  ARMOR_SLOTS.forEach(s => {
    if (state.equipment[s]?.cursed && !state.equipment[s]?.purified)
      cursedItems.push({item:state.equipment[s], slot:s, fromInv:false});
  });
  state.inventory.forEach((item, i) => {
    if (item?.cursed && !item?.purified) cursedItems.push({item, slot:null, fromInv:true, invIdx:i});
  });
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem';
  modal.innerHTML = `
    <div style="background:#0d0d22;border:1px solid #f87171;border-radius:16px;padding:1.2rem;width:100%;max-width:320px">
      <div style="color:#f87171;font-weight:700;margin-bottom:.75rem">🌟 選擇要解咒的裝備</div>
      <div style="display:flex;flex-direction:column;gap:.4rem;max-height:300px;overflow-y:auto">
        ${cursedItems.map((c, ci) => `
          <div onclick="doPurify(${ci},${scrollInvIdx},this.closest('[style*=fixed]'))"
            style="display:flex;align-items:center;gap:.5rem;padding:.5rem;border:.5px solid #f8717155;border-radius:8px;cursor:pointer;background:#1a0a0a">
            <span style="font-size:1.2rem">${c.item.icon}</span>
            <div>
              <div style="font-size:12px;color:#f87171">【腐化】${c.item.name}</div>
              <div style="font-size:10px;color:#555">解咒後數值+20%完全釋放</div>
            </div>
          </div>`).join('')}
      </div>
      <button onclick="this.closest('[style*=fixed]').remove()"
        style="margin-top:.75rem;width:100%;padding:8px;border-radius:8px;border:.5px solid #333;background:transparent;color:#888;cursor:pointer">取消</button>
    </div>`;
  // Store cursedItems for doIdentify
  modal._cursedItems = cursedItems;
  document.body.appendChild(modal);
  modal._cursedItems = cursedItems;
}

function doPurify(cursedIdx, scrollInvIdx, modal) {
  // Find the modal and cursedItems
  const cursedItems = modal._cursedItems;
  if (!cursedItems || !cursedItems[cursedIdx]) return;
  const {item} = cursedItems[cursedIdx];
  item.purified = true;
  item.cursed = false; // 完全解除
  // 消耗解咒卷軸
  const scrollIdx = state.inventory.findIndex((i,idx) => idx === scrollInvIdx);
  if (scrollIdx >= 0) state.inventory.splice(scrollIdx, 1);
  if (modal) modal.remove();
  closeModal('modal-item');
  toast(`🌟 【${item.name}】詛咒已解除！裝備數值完全釋放！`);
  updateUI(); save(true);
}

  wrap.style.left   = (offsetX + 7 * TILE) + 'px';
  wrap.style.top    = (offsetY + 7 * TILE) + 'px';

  // 頭盔
  const hEl = document.getElementById('svg-helmet');
  if (eq.helmet) { hEl.style.display=''; hEl.querySelector('rect').setAttribute('fill', rc(eq.helmet.rarity)); }
  else hEl.style.display = 'none';

  // 身體/鎧甲
  const bodyEl = document.getElementById('svg-body');
  const larmEl = document.getElementById('svg-larm');
  const rarmEl = document.getElementById('svg-rarm');
  const bodyColor = eq.armor ? rc(eq.armor.rarity) : '#6b7280';
  bodyEl.setAttribute('fill', bodyColor);
  larmEl.setAttribute('fill', bodyColor);
  rarmEl.setAttribute('fill', bodyColor);

  // 腿
  const legsEl = document.getElementById('svg-legs');
  legsEl.setAttribute('fill', eq.legs ? rc(eq.legs.rarity) : '#374151');
  legsEl.nextElementSibling.setAttribute('fill', eq.legs ? rc(eq.legs.rarity) : '#374151');

  // 靴子
  const bootsEl = document.getElementById('svg-boots');
  if (eq.boots) {
    bootsEl.style.display = '';
    bootsEl.querySelectorAll('rect').forEach(r => r.setAttribute('fill', rc(eq.boots.rarity)));
  } else bootsEl.style.display = 'none';

  // 武器
  const wpnEl = document.getElementById('svg-weapon');
  if (w) {
    wpnEl.style.display = '';
    wpnEl.innerHTML = WPN_SVG_SHAPES[w.subtype] || WPN_SVG_SHAPES.sword;
  } else wpnEl.style.display = 'none';
}

function updateQuickBar() {
  const bar = document.getElementById('quick-bar');
  if (!bar) return;
  // 只顯示背包裡的藥水（最多4格）
  const potions = state.inventory.filter(i => i.type === 'potion').slice(0, 4);
  bar.innerHTML = potions.map((p, idx) => {
    const invIdx = state.inventory.indexOf(p);
    return `<div onclick="quickUsePotion(${invIdx})" style="
      width:36px;height:36px;background:rgba(0,0,0,.7);
      border:.5px solid #444;border-radius:8px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      cursor:pointer;font-size:18px;gap:1px">
      <span>${p.icon}</span>
      <span style="font-size:8px;color:#aaa">${p.name.replace('藥水','').replace('卷軸','')}</span>
    </div>`;
  }).join('');
}

function openInventory() {
  const grid = document.getElementById('inv-grid');
  document.getElementById('inv-count').textContent = `${state.inventory.length}/${state.inventoryMax}`;
  grid.innerHTML = '';
  state.inventory.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = `inv-slot ${item.rarity}`;
    const icon = item.icon || (item.type==='weapon' ? WPN_ICON[item.subtype]||'⚔️' : SLOT_ICON[item.subtype]||'📦');
    const nameDisplay = item.unidentified
      ? `<span style="color:#818cf8">【待鑑定】</span>`
      : item.name;
    const uidBadge = item.unidentified
      ? `<div style="position:absolute;top:2px;right:2px;font-size:8px;background:#818cf8;color:#fff;border-radius:3px;padding:0 2px">?</div>` : '';
    el.style.position = 'relative';
    el.innerHTML = `<div class="s-icon">${icon}</div>
      <div class="s-name rarity-${item.rarity}">${nameDisplay}</div>
      ${item.enhance>0?`<div class="s-enh">+${item.enhance}</div>`:''}
      ${uidBadge}`;
    el.onclick = () => openItemCard(item, true, i, false);
    grid.appendChild(el);
  });
  // Empty slots
  for (let i = state.inventory.length; i < state.inventoryMax; i++) {
    const el = document.createElement('div');
    el.className = 'inv-slot empty';
    el.innerHTML = '<div class="s-icon" style="font-size:14px;color:#333">·</div>';
    grid.appendChild(el);
  }
  openModal('modal-inv');
}

function openEquipment() {
  const body = document.getElementById('eq-body');
  body.innerHTML = '';

  // Weapon row
  const w = state.weapon;
  const wRow = document.createElement('div');
  wRow.className = 'eq-weapon-row';
  wRow.innerHTML = `<div class="es-icon">${w?w.icon:'⚔️'}</div>
    <div class="es-info">
      <div class="es-label">武器</div>
      <div class="es-name rarity-${w?.rarity||'white'}">${w?(w.name+(w.enhance>0?'+'+w.enhance:'')):'── 未裝備'}</div>
    </div>`;
  if (w) wRow.onclick = () => openItemCard(w, false, null, false);
  body.appendChild(wRow);

  // Armor grid
  const grid = document.createElement('div');
  grid.className = 'eq-grid';
  ARMOR_SLOTS.forEach(slot => {
    const it = state.equipment[slot];
    const el = document.createElement('div');
    el.className = `eq-slot ${it?'':'empty'}`;
    const itIcon = it ? (it.icon || (it.type==='weapon' ? WPN_ICON[it.subtype]||'⚔️' : SLOT_ICON[it.subtype]||'📦')) : SLOT_ICON[slot];
    el.innerHTML = `<div class="es-icon">${itIcon}</div>
      <div class="es-info">
        <div class="es-label">${SLOT_LABEL[slot]}</div>
        <div class="es-name rarity-${it?.rarity||'white'}">${it?(it.name+(it.enhance>0?'+'+it.enhance:'')):'── 未裝備'}</div>
      </div>`;
    if (it) el.onclick = () => openItemCard(it, false, null, false);
    grid.appendChild(el);
  });
  body.appendChild(grid);
  openModal('modal-eq');
}

function openStats() {
  const body = document.getElementById('stats-body');
  const eq = eqStats();
  const pts = state.freePoints;

  let html = '';
  if (pts > 0) html += `<div class="points-badge">🌟 空閒屬性點：${pts}</div>`;

  const statDefs = [
    {k:'str',  n:'💪 力量', desc:'物理攻擊'},
    {k:'agi',  n:'⚡ 敏捷', desc:'閃避·先攻'},
    {k:'luk',  n:'🍀 幸運', desc:'暴擊·掉落'},
    {k:'int',  n:'🧠 智力', desc:'魔法·答題'},
    {k:'def',  n:'🛡️ 防禦', desc:'減傷'},
  ];

  html += '<div class="stat-section"><h3>屬性點分配</h3>';
  statDefs.forEach(({k,n,desc}) => {
    const base = state.stats[k]||0, bonus = eq[k]||0;
    const bonusTxt = bonus>0 ? ` <span style="color:var(--green)">(+${bonus})</span>` : '';
    html += `<div class="alloc-row">
      <span class="an">${n}<span style="font-size:10px;color:var(--sub)"> ${desc}</span></span>
      <span class="av">${base}${bonusTxt}</span>
      <button class="alloc-btn" ${pts<=0?'disabled':''} onclick="allocStat('${k}')">+</button>
    </div>`;
  });
  html += '</div>';

  const atk = Math.floor(calcAtk());
  const tl = timeLimit().toFixed(1);
  html += `<div class="stat-section"><h3>戰鬥數值</h3>
    <div class="stat-row"><span class="sn">攻擊力</span><span class="sv">${atk}</span></div>
    <div class="stat-row"><span class="sn">最大血量</span><span class="sv">${state.stats.maxHp}</span></div>
    <div class="stat-row"><span class="sn">答題時間</span><span class="sv">${tl}秒</span></div>
    <div class="stat-row"><span class="sn">暴擊率</span><span class="sv">${(totalStat('luk')*0.5).toFixed(1)}%</span></div>
  </div>`;

  html += `<div class="stat-section"><h3>冒險紀錄</h3>
    <div class="stat-row"><span class="sn">等級</span><span class="sv">Lv.${state.level}</span></div>
    <div class="stat-row"><span class="sn">代數</span><span class="sv">第${state.generation}代</span></div>
    <div class="stat-row"><span class="sn">本代擊殺</span><span class="sv">${state.kills}</span></div>
    <div class="stat-row"><span class="sn">歷代擊殺</span><span class="sv">${state.totalKills}</span></div>
    <div class="stat-row"><span class="sn">探索格數</span><span class="sv">${state.totalExplored}</span></div>
  </div>`;

  // Job section
  const curJobDef = JOB_DEFS[state.job || 'miner'];
  html += `<div class="stat-section"><h3>職業</h3>
    <div class="stat-row"><span class="sn">目前職業</span><span class="sv">${curJobDef?.name||'⛏️ 礦工'}</span></div>
    <div class="stat-row"><span class="sn">職業等級</span><span class="sv">${state.jobLevel||1}</span></div>
    ${state.prevJobs?.length?`<div class="stat-row"><span class="sn">前職業</span><span class="sv" style="font-size:11px">${state.prevJobs.map(p=>JOB_DEFS[p.job]?.name||p.job).join(' → ')}</span></div>`:''}
  </div>`;

  const canChangeTo = curJobDef?.canChangeTo || [];
  if (canChangeTo.length > 0) {
    html += `<div class="stat-section"><h3>⚔️ 可轉職</h3>`;
    for (const jobKey of canChangeTo) {
      const jd = JOB_DEFS[jobKey];
      if (!jd) continue;
      const reqMet = state.level >= (jd.reqLevel||0)
        && state.job === jd.reqJob
        && (state.jobLevel||1) >= (jd.reqJobLevel||0);
      html += `<div style="background:var(--bg3);border:.5px solid ${reqMet?'var(--accent)':'var(--border)'};
        border-radius:10px;padding:.6rem;margin-bottom:.4rem;
        display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:13px;font-weight:700">${jd.name}</div>
          <div style="font-size:10px;color:var(--sub)">${jd.desc}</div>
          <div style="font-size:10px;color:#555">需求：Lv.${jd.reqLevel}・${JOB_DEFS[jd.reqJob]?.name||''}職業Lv.${jd.reqJobLevel}</div>
        </div>
        <button onclick="changeJob('${jobKey}')"
          style="padding:6px 12px;border-radius:8px;border:none;cursor:${reqMet?'pointer':'default'};
          background:${reqMet?'var(--accent)':'#2a2a4a'};color:${reqMet?'#fff':'#555'};font-size:12px"
          ${reqMet?'':'disabled'}>轉職</button>
      </div>`;
    }
    html += `</div>`;
  }

  html += `<div style="margin-top:1.5rem;text-align:center">
    <button onclick="resetGame()"
      style="font-size:11px;color:#555;background:transparent;border:.5px solid #333;padding:6px 16px;border-radius:8px;cursor:pointer">
      🗑️ 重置遊戲存檔
    </button>
  </div>`;

  body.innerHTML = html;
  openModal('modal-stats');
}

function allocStat(k) {
  if (state.freePoints <= 0) return;
  state.freePoints--;
  state.stats[k] = (state.stats[k]||0) + 1;
  if (k === 'vit' || k === 'def') {
    state.stats.maxHp += 10;
    state.stats.hp = Math.min(state.stats.maxHp, state.stats.hp + 5);
  }
  openStats(); updateUI(); save();
}

function openItemCard(item, fromInv, invIdx, atMerchant, buyFn) {
  const rCol = `rarity-${item.rarity}`;
  const rarityLabel = RARITY_NAME[item.rarity] || '';
  const typeLabel = item.type==='weapon' ? `${WPN_ICON[item.subtype]} 武器·${item.subtype}` : `${SLOT_LABEL[item.subtype]||'裝備'}`;
  const reqOk = state.level >= (item.reqLevel||0);

  // Element
  const elemInfo = ELEMENTS[item.element || 'none'];
  const elemStr = (elemInfo && elemInfo.name !== '無')
    ? `・<span style="color:${elemInfo.color}">${elemInfo.icon} ${elemInfo.name}</span>` : '';

  // 任何情況都可以比較（從背包、裝備欄、商店都顯示差異）
  const canCompare = (item.type === 'weapon' || item.type === 'armor');
  const curItem = item.type === 'weapon'
    ? (fromInv || atMerchant ? state.weapon : null) // 從裝備欄看自己，不需要比較自己
    : (state.equipment[item.subtype] || null);
  // 從裝備欄看已穿著的武器，curItem 應該是 null（因為比的就是自己）
  const isEquipped = !fromInv && !atMerchant;
  const compareTarget = isEquipped ? null : curItem;

  // Compare header
  let compareHtml = '';
  if (!isEquipped && canCompare) {
    if (compareTarget) {
      const curEnh = compareTarget.enhance > 0 ? ` +${compareTarget.enhance}` : '';
      const curElemInfo = ELEMENTS[compareTarget.element || 'none'];
      const curElemIco = (curElemInfo && curElemInfo.name !== '無') ? ` ${curElemInfo.icon}` : '';
      compareHtml = `<div style="font-size:11px;color:var(--sub);background:var(--bg3);border:.5px solid var(--border);border-radius:8px;padding:.35rem .6rem;margin-bottom:.4rem">
        🔄 目前裝備：<span class="rarity-${compareTarget.rarity}">${compareTarget.name}${curEnh}</span>${curElemIco}
      </div>`;
    } else {
      compareHtml = `<div style="font-size:11px;color:#555;padding:.1rem 0;margin-bottom:.3rem">🔄 目前該部位未裝備</div>`;
    }
  }

  // Stats (with comparison diff if applicable)
  const statLabels = {str:'💪力量',agi:'⚡敏捷',luk:'🍀幸運',int:'🧠智力',def:'🛡️防禦'};
  let statHtml = '';

  // 武器永遠顯示「預估攻擊力」
  if (item.type === 'weapon') {
    const calcWpnAtk = (wpn) => {
      if (!wpn) return Math.floor(state.stats.str * 1.0 + state.level * 2);
      const str_ = totalStat('str'), agi_ = totalStat('agi');
      const int__ = totalStat('int'), luk_ = totalStat('luk'), def_ = totalStat('def');
      const base = state.stats.str * 1.0 + state.level * 2;
      let atk;
      const sub = wpn.subtype;
      if (sub==='sword')       atk = base + str_*1.0 + agi_*0.5;
      else if (sub==='axe')    atk = base + str_*1.5;
      else if (sub==='bow')    atk = base + agi_*1.5;
      else if (sub==='wand')   atk = base + int__*2.0;
      else if (sub==='dagger') atk = base + agi_*2.0 + luk_*0.5;
      else if (sub==='spear')  atk = base + str_*1.0 + def_*0.3;
      else atk = base + str_;
      atk *= (1 + (wpn.enhance||0) * 0.08);
      return Math.floor(atk);
    };
    const newAtk = calcWpnAtk(item);
    let diffStr = '';
    if (!isEquipped) {
      if (compareTarget) {
        const curAtk = calcWpnAtk(compareTarget);
        const diff = newAtk - curAtk;
        diffStr = diff > 0
          ? `<span style="color:#4ade80;font-size:10px;margin-left:4px">▲+${diff}</span>`
          : diff < 0
            ? `<span style="color:#f87171;font-size:10px;margin-left:4px">▼${diff}</span>`
            : `<span style="color:#888;font-size:10px;margin-left:4px">→ 相同</span>`;
      } else {
        diffStr = `<span style="color:#4ade80;font-size:10px;margin-left:4px">▲ 新裝備</span>`;
      }
    }
    statHtml += `<div class="ic-stat"><span>⚔️ 預估攻擊</span><span class="ics-pos">${newAtk}${diffStr}</span></div>`;
  }

  {
    const allKeys = new Set([
      ...Object.keys(item.stats || {}),
      ...Object.keys(compareTarget?.stats || {}),
    ]);
    for (const k of allKeys) {
      const newV = item.stats?.[k] || 0;
      const curV = compareTarget?.stats?.[k] || 0;
      if (newV === 0 && curV === 0) continue;
      const diff = isEquipped ? 0 : newV - curV;
      const diffStr = !isEquipped && diff !== 0
        ? diff > 0
          ? `<span style="color:#4ade80;font-size:10px;margin-left:4px">▲+${diff}</span>`
          : `<span style="color:#f87171;font-size:10px;margin-left:4px">▼${diff}</span>`
        : '';
      statHtml += `<div class="ic-stat"><span>${statLabels[k]||k}</span><span class="${newV>0?'ics-pos':'ics-neg'}">${newV>0?'+':''}${newV}${diffStr}</span></div>`;
    }
  }

  // Curse warning
  let curseHtml = '';
  if (item.cursed && !item.purified && item.curseType) {
    const ef = CURSE_EFFECTS.find(e=>e.type===item.curseType);
    curseHtml = `<div style="font-size:11px;color:#f87171;background:#1a0a0a;border:.5px solid #f87171;border-radius:8px;padding:.4rem .6rem;margin-bottom:.6rem">
      ☠️ 詛咒：${ef?.desc||item.curseType}<br>
      <span style="font-size:10px;color:#888">使用淨化卷軸可解除詛咒</span>
    </div>`;
  } else if (item.purified) {
    curseHtml = `<div style="font-size:10px;color:#f59e0b;margin-bottom:.3rem">✨ 已淨化（詛咒解除）</div>`;
  }

  // Heirloom
  const heirloomHtml = item.fromGeneration
    ? `<div class="ic-heirloom">📜 第${item.fromGeneration}代遺物<br>於 ${item.deathLocation} 力戰而亡・擊殺 ${item.deathKills} 隻</div>` : '';

  // Set progress
  let setHtml = '';
  if (item.setId && SET_DEFS[item.setId]) {
    const def = SET_DEFS[item.setId];
    const allEquipped = [state.weapon, ...ARMOR_SLOTS.map(s=>state.equipment[s])].filter(Boolean);
    const owned = allEquipped.filter(i=>i.setId===item.setId).length;
    const total = def.pieces.length;
    setHtml = `<div style="margin:.4rem 0;padding:.5rem;background:#0a0a1a;border-radius:8px;border:.5px solid ${def.color}33">
      <div style="color:${def.color};font-size:11px;font-weight:700;margin-bottom:4px">${def.name} ${owned}/${total}</div>
      ${Object.entries(def.bonus).map(([req,b])=>
        `<div style="font-size:10px;color:${owned>=parseInt(req)?def.color:'#444'}">${owned>=parseInt(req)?'✅':'○'} ${req}件：${b.desc}</div>`
      ).join('')}
    </div>`;
  }

  // Enhance UI (weapons/armor only, not at merchant)
  let enhHtml = '';
  if (!atMerchant && (item.type==='weapon' || item.type==='armor')) {
    const scrolls = state.inventory.filter(i=>i.type==='scroll'&&i.effect?.action==='enhance');
    const protectScroll = state.inventory.find(i=>i.subtype==='enhance_protect');
    if (scrolls.length > 0) {
      const opts = scrolls.map((s,idx)=>
        `<option value="${idx}">${s.icon} ${s.name}（剩${state.inventory.filter(x=>x.subtype===s.subtype).length}）</option>`
      ).join('');
      enhHtml = `<div style="margin:.4rem 0;border:.5px solid #333;border-radius:8px;padding:.5rem">
        <div style="font-size:11px;color:var(--sub);margin-bottom:4px">⚒️ 強化裝備　目前 +${item.enhance||0}</div>
        <div style="display:flex;gap:6px;align-items:center">
          <select id="enh-scroll-sel" style="flex:1;padding:4px;border-radius:6px;background:#12122a;color:#eee;border:.5px solid #333;font-size:11px">${opts}</select>
          <button class="ic-btn ic-btn-use" style="white-space:nowrap;flex:none;min-width:60px;padding:6px 8px"
            onclick="doEnhance('${item.id}',${fromInv},${fromInv?invIdx:'null'},'${item.type==='weapon'?'weapon':item.subtype}')">⚒️ 強化</button>
        </div>
        ${protectScroll?`<div style="font-size:10px;color:#60a5fa;margin-top:2px">🛡 保護卷軸可用（失敗不爆裝）</div>`:''}
      </div>`;
    }
  }

  // Buttons
  const cursedPrefix = (item.cursed && !item.purified) ? '<span style="color:#f87171">【腐化】</span>' : (item.purified?'<span style="color:#f59e0b">【淨化】</span>':'');
  let btns = '';
  if (atMerchant && buyFn) {
    btns = `<button class="ic-btn ic-btn-equip" onclick="(${buyFn.toString()})()">🛒 購買</button>
            <button class="ic-btn ic-btn-close" onclick="closeModal('modal-item')">關閉</button>`;
  } else if (item.type === 'potion' || item.type === 'scroll') {
    const potSellPrice = Math.floor((item.price || 30) * 0.4); // 40% 回收價
    const potSellBtn = nearMerchant
      ? `<button class="ic-btn ic-btn-sell" onclick="sellItem(true,${invIdx},'potion')">💰 賣出 $${potSellPrice}</button>`
      : '';
    btns = `<button class="ic-btn ic-btn-use" onclick="usePotion(state.inventory[${invIdx}],${invIdx})">使用</button>
            ${potSellBtn}
            <button class="ic-btn ic-btn-drop" onclick="dropItem(state.inventory[${invIdx}],true,${invIdx})">丟棄</button>
            <button class="ic-btn ic-btn-close" onclick="closeModal('modal-item')">關閉</button>`;
  } else {
    const equipBtn = fromInv
      ? `<button class="ic-btn ic-btn-equip" onclick="equipItem(state.inventory[${invIdx}],true,${invIdx})">⚔️ 裝備</button>`
      : `<button class="ic-btn ic-btn-equip" onclick="unequipItem('${item.type==='weapon'?'weapon':item.subtype}')">↩️ 卸下</button>`;
    const sellPrice = computeSellPrice(item);
    const sellBtn = nearMerchant
      ? `<button class="ic-btn ic-btn-sell" onclick="sellItem(${fromInv},${fromInv?invIdx:'null'},'${item.type==='weapon'?'weapon':item.subtype}')">💰 賣出 $${sellPrice}</button>`
      : '';
    btns = `${equipBtn}${sellBtn}
            <button class="ic-btn ic-btn-drop" onclick="dropItem(${fromInv?`state.inventory[${invIdx}]`:`state.${item.type==='weapon'?'weapon':'equipment.'+item.subtype}`},${fromInv},${fromInv?invIdx:'null'})">🗑️ 丟棄</button>
            <button class="ic-btn ic-btn-close" onclick="closeModal('modal-item')">關閉</button>`;
  }

  document.getElementById('item-card-content').innerHTML = `
    <div class="ic-name ${rCol}">${item.icon} ${cursedPrefix}${item.name}${item.enhance>0?' +'+item.enhance:''}</div>
    <div class="ic-sub">${rarityLabel}・${typeLabel}${elemStr}</div>
    ${curseHtml}
    <div class="ic-flavor">${item.flavorText||'一件普通的裝備'}</div>
    ${compareHtml}
    ${statHtml?`<div class="ic-stats">${statHtml}</div>`:''}
    ${item.reqLevel>0?`<div class="ic-req">需求等級：<span class="${reqOk?'':'req-fail'}">Lv.${item.reqLevel}${reqOk?'':'（不足）'}</span></div>`:''}
    ${heirloomHtml}${setHtml}${enhHtml}
    <div class="ic-btns">${btns}</div>`;
  openModal('modal-item');
}

function unequipItem(slot) {
  const item = slot==='weapon' ? state.weapon : state.equipment[slot];
  if (!item) return;
  if (!addToInventory(item)) { toast('背包已滿！'); return; }
  if (slot==='weapon') state.weapon=null; else state.equipment[slot]=null;
  toast(`↩️ 卸下 ${item.name}`);
  closeModal('modal-item');
  // 強制重新渲染裝備欄
  if (document.getElementById('modal-eq')?.classList.contains('open')) openEquipment();
  if (document.getElementById('modal-inv')?.classList.contains('open')) openInventory();
  updateUI(); save(true);
}

// MERCHANT
// ═══════════════════════════════════════════════
let merchantStock = [];

function openMerchant() {
  // Generate stock based on player level and position seed
  const seedM = posH(px*37+3, py*41+7, WORLD_SEED+500) * 1000 | 0;
  const rngM = (() => { let s=seedM; return () => { s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; }; })();

  merchantStock = [];
  // Weapons
  for (let i=0; i<2; i++) {
    const sub = WPN_SUBTYPES[Math.floor(rngM()*WPN_SUBTYPES.length)];
    const rar = state.level>=10 && rngM()<0.3 ? 'green' : 'white';
    const item = generateWeapon(rar, Math.max(1, state.level-2));
    merchantStock.push({item, price: computeSellPrice(item)*3});
  }
  // Armor
  for (let i=0; i<2; i++) {
    const slot = ARMOR_SLOTS[Math.floor(rngM()*ARMOR_SLOTS.length)];
    const rar = state.level>=10 && rngM()<0.3 ? 'green' : 'white';
    const item = generateArmor(slot, rar, Math.max(1, state.level-2));
    merchantStock.push({item, price: computeSellPrice(item)*3});
  }
  // Potions / scrolls (skip price:0 drop-only items like holy scroll)
  SHOP_ITEMS.forEach(si => {
    if (si.price > 0) merchantStock.push({item:{...si, id:Date.now()+Math.random()}, price:si.price});
  });

  renderMerchant();
  openModal('modal-merchant');
}

function computeSellPrice(item) {
  if (item.type === 'potion' || item.type === 'scroll') {
    return Math.floor((item.price || 30) * 0.4);
  }
  const basePrice = {white:30, green:80, blue:200, gold:500, red:1200, rainbow:5000}[item.rarity] || 30;
  return basePrice + (item.enhance||0)*50;
}

function renderMerchant() {
  const body = document.getElementById('merchant-body');
  let html = `<div style="font-size:11px;color:var(--sub);margin-bottom:.6rem">💰 你的金幣：${state.gold}</div>`;
  merchantStock.forEach((stock, i) => {
    const it = stock.item;
    const canBuy = state.gold >= stock.price;
    html += `<div class="merchant-item">
      <div class="mi-icon">${it.icon}</div>
      <div class="mi-info">
        <div class="mi-name rarity-${it.rarity||'white'}">${it.name}</div>
        <div class="mi-desc">${it.type==='potion'||it.type==='scroll' ? it.desc||'' : (SLOT_LABEL[it.subtype]||it.subtype)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="mi-price">💰${stock.price}</div>
        <button class="mi-buy" ${canBuy?'':'disabled'} onclick="merchantBuy(${i})">購買</button>
      </div>
    </div>`;
  });
  body.innerHTML = html;
}

function merchantBuy(idx) {
  const stock = merchantStock[idx];
  if (!stock || state.gold < stock.price) return;
  if (state.inventory.length >= state.inventoryMax) { toast('背包已滿！'); return; }
  state.gold -= stock.price;
  const item = {...stock.item, id: Date.now()+Math.random()};
  addToInventory(item);
  toast(`✅ 購買了 ${item.name}`);
  renderMerchant();
  updateUI(); save();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function toast(msg) {
  const el = document.getElementById('toast');

  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity='0', 2400);

function triggerDeath() {
  deathActive = true;
  const overlay = document.getElementById('death-overlay');
  overlay.classList.add('active');
  const txtEl = document.getElementById('death-text');
  const terrain = getTerrain(px, py);
  const terrainName = TERRAIN_INFO[terrain]?.emoji || '🌿';

  txtEl.textContent = '';
  const sequence = [
    [0, '你的視線漸漸模糊……', '#555'],
    [1200, `世界變成了灰色。`, '#444'],
    [2400, '你倒下了。', '#333'],
    [4000, '但勇者的意志不滅。', '#c9a000'],
    [5200, '在最後的時刻，你想將什麼留給下一位繼承者？', '#f59e0b'],
  ];
  sequence.forEach(([delay, text, col]) => {
    setTimeout(() => { txtEl.textContent = text; txtEl.style.color = col; }, delay);
  });
  setTimeout(() => showInheritance(), 7200);
}

function inheritanceMax() {
  if (state.level >= 31) return 3;
  if (state.level >= 11) return 2;
  return 1;
}

let inheritanceSelected = new Set();

function showInheritance() {
  document.getElementById('death-overlay').classList.remove('active');
  inheritanceSelected = new Set();

  const maxPick = inheritanceMax();
  document.getElementById('inherit-sub').textContent = `選擇最多 ${maxPick} 件傳給下一代（Lv.${state.level}）`;
  document.getElementById('inherit-confirm').disabled = true;

  // Build pool: all inventory + equipped items
  const pool = [];
  if (state.weapon) pool.push({item:state.weapon, label:'武器'});
  ARMOR_SLOTS.forEach(slot => {
    const it = state.equipment[slot];
    if (it) pool.push({item:it, label:SLOT_LABEL[slot]});
  });
  state.inventory.forEach(it => pool.push({item:it, label:'背包'}));

  const container = document.getElementById('inherit-pool');
  container.innerHTML = '';

  if (pool.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--sub);font-size:13px;padding:1rem">沒有物品可以傳承……</div>';
    document.getElementById('inherit-confirm').disabled = false;
    document.getElementById('inherit-confirm').textContent = '開始新的冒險 ✨';
  } else {
    pool.forEach((entry, i) => {
      const it = entry.item;
      const el = document.createElement('div');
      el.className = `inherit-slot ${it.rarity||'white'}`;
      el.innerHTML = `<div class="is-icon">${it.icon}</div>
        <div class="is-name rarity-${it.rarity||'white'}">${it.name}</div>
        <div style="font-size:9px;color:var(--sub)">${entry.label}</div>`;
      el.onclick = () => toggleInherit(i, el, maxPick, pool);
      container.appendChild(el);
    });
  }

  document.getElementById('inherit-overlay').classList.add('open');
  window._inheritPool = pool;
}

function toggleInherit(idx, el, maxPick, pool) {
  if (inheritanceSelected.has(idx)) {
    inheritanceSelected.delete(idx);
    el.classList.remove('selected');
  } else {
    if (inheritanceSelected.size >= maxPick) {
      toast(`最多選 ${maxPick} 件`); return;
    }
    inheritanceSelected.add(idx);
    el.classList.add('selected');
  }
  document.getElementById('inherit-confirm').disabled = inheritanceSelected.size === 0 && window._inheritPool.length > 0;
}

function confirmInherit() {
  const pool = window._inheritPool || [];
  const heirlooms = [];
  const deathTerrain = getTerrain(px, py);
  const terrainEmoji = TERRAIN_INFO[deathTerrain]?.emoji || '🌿';
  const terrainName = terrainEmoji + ' 探索途中';

  inheritanceSelected.forEach(idx => {
    const entry = pool[idx];
    if (!entry) return;
    const item = {...entry.item};
    item.fromGeneration = state.generation;
    item.deathLocation = terrainName;
    item.deathKills = state.kills;
    item.flavorText = `前代勇者用鮮血換來的教訓，凝結在這件裝備裡`;
    heirlooms.push(item);
  });

  const newGen = state.generation + 1;
  const totalKills = state.totalKills;
  const totalExplored = state.totalExplored;
  const totalGenerations = state.totalGenerations + 1;

  document.getElementById('inherit-overlay').classList.remove('open');

  // Start new generation
  setTimeout(() => {
    state = initState();
    state.generation = newGen;
    state.totalKills = totalKills;
    state.totalExplored = totalExplored;
    state.totalGenerations = totalGenerations;
    state.heirlooms = heirlooms;

    // Add heirlooms to inventory
    heirlooms.forEach(it => addToInventory(it));

    killedSet = new Set();
    const sp = findStart();
    px = sp.x; py = sp.y;
    explored = new Set([`${sp.x},${sp.y}`]);

    deathActive = false;
    toast(`✨ 第${newGen}代勇者踏上旅途！`);
    renderMap(); updateUI(); save(true);
  }, 500);
}

function save(silent=false) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      saveVersion: SAVE_VERSION,
      ...state, killedMonsters: [...killedSet],
      px, py, explored: [...explored],
    }));
    if (!silent) showSaveToast();
  } catch(e) {}
}

function showSaveToast() {
  let t = document.getElementById('save-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'save-toast';
    t.style.cssText = 'position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 180px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:.5px solid #4ade80;color:#4ade80;font-size:11px;padding:4px 12px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999';
    document.body.appendChild(t);
  }
  t.textContent = '💾 已存檔';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 1500);
}

const SAVE_VERSION = 3; // 升版本號會自動捨棄舊存檔

function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    // 版本不符，捨棄舊存檔，使用新預設值
    if (!d.saveVersion || d.saveVersion < SAVE_VERSION) {
      localStorage.removeItem(LS_KEY);
      return;
    }
    Object.assign(state, d);
    killedSet = new Set(state.killedMonsters || []);
    if (d.px !== undefined) px = d.px;
    if (d.py !== undefined) py = d.py;
    if (Array.isArray(d.explored)) {
      explored = new Set(d.explored);
    } else if (d.explored && typeof d.explored === 'object') {
      explored = new Set(Object.keys(d.explored));
    }
    if (!state.statusEffects) state.statusEffects = [];
    if (!state.heirlooms) state.heirlooms = [];
    if (!state.inventory) state.inventory = [];
    if (!state.equipment) state.equipment = {
      helmet:null,armor:null,legs:null,gloves:null,boots:null,
      necklace:null,ring1:null,ring2:null,earring1:null,earring2:null,
    };
    if (!state.kills) state.kills = 0;
    if (!state.totalKills) state.totalKills = 0;
    if (!state.generation) state.generation = 1;
    if (!state.totalExplored) state.totalExplored = 0;
    if (!state.freePoints) state.freePoints = 0;
    if (state.expNext === undefined) state.expNext = expForLevel(state.level);
    if (!state.prevJobs) state.prevJobs = [];
    if (!state.job) state.job = 'miner';
    if (!state.jobLevel) state.jobLevel = 1;
  } catch(e) {}
}

function resetGame() {
  // 跳出確認視窗，需要輸入「確認重置」才能清除
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem';
  modal.innerHTML = `
    <div style="background:#0d0d22;border:1px solid #f87171;border-radius:16px;padding:1.5rem;width:100%;max-width:320px;text-align:center">
      <div style="font-size:2rem;margin-bottom:.5rem">⚠️</div>
      <div style="color:#f87171;font-weight:700;font-size:16px;margin-bottom:.5rem">確認重置遊戲？</div>
      <div style="color:#888;font-size:12px;margin-bottom:1rem">所有進度、裝備、探索紀錄將永久清除<br>請輸入「確認重置」繼續</div>
      <input id="reset-input" type="text" placeholder="輸入：確認重置"
        style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid #333;background:#12122a;color:#fff;font-size:14px;text-align:center;margin-bottom:.75rem;outline:none">
      <div style="display:flex;gap:.5rem">
        <button onclick="this.closest('div[style]').remove()"
          style="flex:1;padding:10px;border-radius:8px;border:1px solid #333;background:transparent;color:#888;cursor:pointer">取消</button>
        <button id="reset-confirm-btn"
          style="flex:1;padding:10px;border-radius:8px;border:none;background:#7f1d1d;color:#f87171;cursor:pointer;font-weight:700"
          onclick="doReset(this)">重置</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  document.getElementById('reset-input').focus();
}

function doReset(btn) {
  const val = document.getElementById('reset-input').value.trim();
  if (val !== '確認重置') {
    document.getElementById('reset-input').style.borderColor = '#f87171';
    document.getElementById('reset-input').placeholder = '❌ 請輸入「確認重置」';
    return;
  }
  localStorage.removeItem(LS_KEY);
  location.reload();
}

// KEYBOARD
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const map = {
    'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right',
    'w':'up','s':'down','a':'left','d':'right',
  };
  const dir = map[e.key];
  if (!dir) return;
  e.preventDefault();
  if (dir==='up')    move(0,-1);
  if (dir==='down')  move(0,1);
  if (dir==='left')  move(-1,0);
  if (dir==='right') move(1,0);
});

      detail: `第${state.generation}代・擊殺${state.totalKills}隻・探索${state.totalExplored}格`,

  }
  window.location.href = '../';
}
