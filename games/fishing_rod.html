<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎣 深海釣魚</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#000a14;color:#eee;display:flex;justify-content:center;overflow:hidden;height:100vh}
.app{width:100%;max-width:480px;position:relative;height:100vh;overflow:hidden}
.screen{visibility:hidden;position:absolute;inset:0;pointer-events:none}
.screen.active{visibility:visible;pointer-events:auto}

#screen-title{background:linear-gradient(180deg,#000a14 0%,#001428 60%,#002040 100%);display:flex;align-items:center;justify-content:center;flex-direction:column}
.title-card{background:rgba(0,15,30,.9);border:1px solid #1e4a7a;border-radius:20px;padding:2rem 1.5rem;text-align:center;z-index:10;width:88%;max-width:340px}
.title-card h1{font-size:26px;font-weight:700;margin-bottom:.3rem}
.title-card p{font-size:13px;color:#7ab;line-height:1.7;margin-bottom:1.2rem}
.big-btn{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#0c4a6e,#0ea5e9);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.big-btn:active{transform:scale(.98)}
.best-lbl{font-size:12px;color:#4a7a9a;margin-top:.5rem}

#screen-game{background:#000a14}
canvas{display:block;width:100%;height:100%}

.hud{position:absolute;top:0;left:0;right:0;z-index:20;padding:.5rem .75rem;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;background:linear-gradient(180deg,rgba(0,5,15,.85) 0%,transparent 100%)}
.cast-info{font-size:13px;color:#7ab}
.score-info{font-size:16px;font-weight:700;color:#ffd700;text-shadow:0 0 8px #f90}
.weather-tag{font-size:11px;padding:2px 9px;border-radius:12px;background:rgba(0,20,40,.75);border:0.5px solid #1e4a6a;color:#7ab;margin-top:3px}

.w-alert{position:absolute;top:56px;left:50%;transform:translateX(-50%);z-index:25;background:rgba(0,10,25,.93);border:1px solid #1e5a7a;border-radius:12px;padding:.55rem .9rem;font-size:12px;color:#7de;text-align:center;max-width:88%;opacity:0;transition:opacity .4s;pointer-events:none;line-height:1.6;white-space:pre-line}
.w-alert.show{opacity:1}

.cast-hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:20;font-size:13px;color:rgba(100,180,255,.7);pointer-events:none;text-align:center;transition:opacity .3s;white-space:nowrap}

.cast-area{position:absolute;top:0;right:0;z-index:20;padding:.4rem .5rem}
#cast-btn{padding:7px 14px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:rgba(12,110,158,.85);color:#fff;backdrop-filter:blur(4px);border:0.5px solid rgba(14,165,233,.5)}
#cast-btn:disabled{background:rgba(20,40,60,.7);color:#445;cursor:default;border-color:rgba(50,80,100,.3)}
#cast-btn:active:not(:disabled){transform:scale(.97)}

.catch-pop{position:absolute;z-index:30;font-size:15px;font-weight:700;color:#ffd700;pointer-events:none;text-shadow:0 0 8px #f90;animation:floatUp .9s ease forwards}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-50px);opacity:0}}

#screen-result{background:linear-gradient(180deg,#000a14,#001428);display:flex;align-items:center;justify-content:center}
.result-card{background:rgba(0,15,30,.95);border:1px solid #1e4a7a;border-radius:20px;padding:1.5rem;width:88%;max-width:340px;text-align:center;max-height:90vh;overflow-y:auto}
.result-card h2{font-size:20px;margin-bottom:.3rem}
.final-score{font-size:52px;font-weight:800;color:#ffd700;margin:.3rem 0}
.best-badge{font-size:12px;color:#4ade80;margin-bottom:.75rem}
.catch-list{text-align:left;margin:.75rem 0;max-height:200px;overflow-y:auto}
.catch-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:.5px solid #0a2030;font-size:13px}
.catch-row:last-child{border:none}
.cr-fish{font-size:20px;width:28px}
.cr-name{flex:1;color:#9ab}
.cr-pts{font-weight:600;color:#ffd700}
.btn-sm{font-size:13px;padding:7px 16px;border-radius:8px;border:.5px solid #444;background:transparent;color:#eee;cursor:pointer;width:100%;margin-top:.4rem}
.btn-sm:hover{background:#0a1a2a}
</style></head><body>
<div class="app">

<!-- TITLE -->
<div class="screen active" id="screen-title">
  <div class="title-card">
    <div style="font-size:52px;margin-bottom:.3rem">🎣</div>
    <h1>深海釣魚</h1>
    <p>點擊海面下方決定下竿位置<br>勾到魚才算釣獲！共20次機會<br>天氣影響魚群與能見度</p>
    <button class="big-btn" id="start-btn">開始釣魚 🚢</button>
    <div class="best-lbl" id="title-best"></div>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="screen-game">
  <canvas id="gc"></canvas>
  <div class="hud">
    <div>
      <div class="cast-info">下竿 <span id="cast-num">0</span>/20</div>
      <div class="weather-tag" id="wtag">☀️ 晴朗</div>
    </div>
    <div class="score-info">🏆 <span id="score-disp">0</span></div>
  </div>
  <div class="w-alert" id="w-alert"></div>
  <div class="cast-hint" id="cast-hint">👆 點擊海面任意位置下竿</div>
  <div class="cast-area">
    <button id="cast-btn" disabled>開始後可下竿</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div class="result-card">
    <h2 id="res-title"></h2>
    <div class="final-score" id="res-score"></div>
    <div class="best-badge" id="res-best"></div>
    <div class="catch-list" id="catch-list"></div>
    <button class="big-btn" id="again-btn">再釣一次 🎣</button>
    <button class="btn-sm" onclick="window.location.href='/'">← 大廳</button>
  </div>
</div>

<script>
const FISH_TYPES=[
  {id:'sardine',  name:'沙丁魚',  e:'🐟',pts:10, sz:18,spd:1.4,depthMin:.04,depthMax:.35,rarity:1.0, weather:null},
  {id:'mackerel', name:'鯖魚',    e:'🐠',pts:15, sz:20,spd:1.1,depthMin:.05,depthMax:.42,rarity:0.95,weather:null},
  {id:'herring',  name:'鯡魚',    e:'🐡',pts:20, sz:18,spd:1.0,depthMin:.08,depthMax:.45,rarity:0.9, weather:null},
  {id:'carp',     name:'鯉魚',    e:'🎏',pts:25, sz:22,spd:0.8,depthMin:.05,depthMax:.35,rarity:0.85,weather:null},
  {id:'bass',     name:'鱸魚',    e:'🐟',pts:30, sz:24,spd:0.9,depthMin:.10,depthMax:.50,rarity:0.8, weather:null},
  {id:'squid',    name:'魷魚',    e:'🦑',pts:40, sz:22,spd:1.3,depthMin:.30,depthMax:.62,rarity:0.7, weather:null},
  {id:'octopus',  name:'章魚',    e:'🐙',pts:50, sz:26,spd:0.5,depthMin:.35,depthMax:.68,rarity:0.65,weather:null},
  {id:'shrimp',   name:'大蝦',    e:'🦐',pts:35, sz:14,spd:1.5,depthMin:.25,depthMax:.55,rarity:0.7, weather:null},
  {id:'crab',     name:'螃蟹',    e:'🦀',pts:45, sz:22,spd:0.4,depthMin:.40,depthMax:.72,rarity:0.65,weather:null},
  {id:'lobster',  name:'龍蝦',    e:'🦞',pts:80, sz:26,spd:0.6,depthMin:.45,depthMax:.75,rarity:0.45,weather:null},
  {id:'blowfish', name:'河豚',    e:'🐡',pts:60, sz:24,spd:0.7,depthMin:.50,depthMax:.78,rarity:0.5, weather:null},
  {id:'shark',    name:'鯊魚',    e:'🦈',pts:100,sz:34,spd:1.6,depthMin:.40,depthMax:.82,rarity:0.28,weather:null},
  {id:'dolphin',  name:'海豚',    e:'🐬',pts:120,sz:32,spd:2.2,depthMin:.18,depthMax:.60,rarity:0.22,weather:null},
  {id:'turtle',   name:'海龜',    e:'🐢',pts:90, sz:28,spd:0.5,depthMin:.50,depthMax:.82,rarity:0.33,weather:null},
  {id:'seal',     name:'海豹',    e:'🦭',pts:85, sz:28,spd:0.85,depthMin:.30,depthMax:.65,rarity:0.38,weather:null},
  {id:'jellyfish',name:'水母',    e:'🪼',pts:70, sz:22,spd:0.25,depthMin:.28,depthMax:.70,rarity:0.4, weather:['foggy','rainy']},
  {id:'seahorse', name:'海馬',    e:'🐠',pts:150,sz:14,spd:0.18,depthMin:.18,depthMax:.50,rarity:0.14,weather:['sunny','cloudy']},
  {id:'whale',    name:'鯨魚',    e:'🐳',pts:200,sz:46,spd:0.55,depthMin:.60,depthMax:.88,rarity:0.09,weather:['wavy','storm']},
  {id:'oarfish',  name:'皇帶魚',  e:'__oarfish__', pts:500,sz:16,spd:0.28,depthMin:.72,depthMax:.94,rarity:0.035,weather:['storm','wavy'],glow:true,glowColor:'#ffd700',custom:true},
  {id:'angler',   name:'燈籠魚',  e:'__angler__',  pts:400,sz:18,spd:1.9, depthMin:.75,depthMax:.96,rarity:0.04, weather:['storm','foggy'],glow:true,glowColor:'#00ffff',custom:true},
];

const WEATHERS=[
  {id:'sunny', label:'☀️ 晴朗',  skyTop:'#001020',skyBot:'#002848',seaTop:'#003a6a',seaBot:'#001a3a',speedMult:1.0,visibility:1.0,  rainAmt:0,  fog:false,alert:'🌙 夜空晴朗，海面平靜，魚群正常活動！'},
  {id:'cloudy',label:'🌥️ 多雲',  skyTop:'#080e18',skyBot:'#121c28',seaTop:'#002858',seaBot:'#001230',speedMult:0.82,visibility:0.75,rainAmt:0,  fog:false,alert:'☁️ 雲層遮月，魚兒游速變慢，更容易瞄準！'},
  {id:'rainy', label:'🌧️ 下雨',  skyTop:'#040810',skyBot:'#080e18',seaTop:'#001e3a',seaBot:'#000c1e',speedMult:0.68,visibility:0.52,rainAmt:50, fog:false,alert:'🌧️ 雨點打在海面！魚兒潛入深處！'},
  {id:'storm', label:'⛈️ 雷雨',  skyTop:'#020408',skyBot:'#040810',seaTop:'#000e1e',seaBot:'#000508',speedMult:1.85,visibility:0.28,rainAmt:90, fog:false,alert:'⛈️ 雷雨來襲！\n皇帶魚和燈籠魚可能出沒！'},
  {id:'foggy', label:'🌫️ 大霧',  skyTop:'#101820',skyBot:'#182030',seaTop:'#001e3a',seaBot:'#000e20',speedMult:0.9, visibility:0.30,rainAmt:0,  fog:true, alert:'🌫️ 大霧瀰漫！\n燈籠魚最愛霧天，注意深層！'},
  {id:'wavy',  label:'🌊 大浪',  skyTop:'#000c1e',skyBot:'#001830',seaTop:'#002050',seaBot:'#000e28',speedMult:1.32,visibility:0.80,rainAmt:18, fog:false,alert:'🌊 湧浪警報！\n皇帶魚與鯨魚被推到淺層！'},
];

// ── 狀態 ─────────────────────────────────────────────────────
let W=0,H=0,SEA_TOP=0;
const BOAT_Y_RATIO=0.28;
const SEA_RATIO=0.30;
const BOUNDARY_PAD=20;
const WEATHER_INTERVAL=45000;
const MAX_CASTS=20;

let fish=[],castCount=0,score=0,catches=[];
let curWeather=WEATHERS[0];
let lastWeatherTime=0,sinceLastWeather=0,nextCheck=3;
let linePhase='idle'; // 'cast'=去程, 'reel'=收竿回程, 'idle'=停止
let lineX=0,lineY=0,lineTargetX=0,lineTargetY=0,lineProgress=0;
let hookX=0,hookY=0;
let maxScore=0,animId=null,rainDrops=[],waveOffset=0;
let clickHandler=null,lastCaughtCheck=0;

const LS='fishing_rod_best2';
function loadBest(){try{return parseInt(localStorage.getItem(LS))||0;}catch{return 0;}}
function saveBest(s){localStorage.setItem(LS,String(s));}
maxScore=loadBest();

// ── DOM ──────────────────────────────────────────────────────
const cv=document.getElementById('gc');
const ctx=cv.getContext('2d');

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function getBtn(){return document.getElementById('cast-btn');}

// ── RESIZE ────────────────────────────────────────────────────
function resize(){
  const app=document.querySelector('.app');
  W=app.offsetWidth||window.innerWidth;
  H=app.offsetHeight||window.innerHeight;
  cv.width=W;cv.height=H;
  SEA_TOP=H*SEA_RATIO;
}
window.addEventListener('resize',()=>{resize();if(fish.length)repositionFish();});

// ── INIT ──────────────────────────────────────────────────────
function initGame(){
  resize();
  castCount=0;score=0;catches=[];
  casting=false;lineActive=false;linePhase='idle';
  lastWeatherTime=Date.now();
  sinceLastWeather=0;nextCheck=3;
  rainDrops=[];waveOffset=0;
  document.getElementById('cast-num').textContent=0;
  document.getElementById('score-disp').textContent=0;
  const btn=getBtn();
  if(btn){btn.disabled=false;btn.textContent='🎣 下竿！（'+MAX_CASTS+'次）';}
  setWeather(WEATHERS[0],false);
  spawnAllFish();
  setupClick();
  showCastHint(true);
  if(animId)cancelAnimationFrame(animId);
  loop();
}

document.getElementById('start-btn').addEventListener('click',()=>{
  showScreen('screen-game');
  initGame();
});
document.getElementById('again-btn').addEventListener('click',()=>{
  showScreen('screen-game');
  initGame();
});
document.getElementById('title-best').textContent=maxScore?'🏆 個人最高：'+maxScore+'分':'';

// ── FISH ─────────────────────────────────────────────────────
function getPool(){
  return FISH_TYPES.filter(f=>!f.weather||f.weather.includes(curWeather.id));
}
function pickWeighted(pool){
  const tot=pool.reduce((a,b)=>a+b.rarity,0);
  let r=Math.random()*tot;
  for(const f of pool){r-=f.rarity;if(r<=0)return f;}
  return pool[0];
}
function spawnOne(pool){
  const data=pool?pickWeighted(pool):FISH_TYPES[0];
  const seaH=H-SEA_TOP;
  const y=SEA_TOP+data.depthMin*seaH+Math.random()*(data.depthMax-data.depthMin)*seaH;
  const goRight=Math.random()<.5;
  const x=goRight?-data.sz:W+data.sz;
  const baseSpd=(0.4+Math.random()*0.6)*data.spd;
  return{data,x,y,dir:goRight?1:-1,baseSpd,spd:baseSpd*curWeather.speedMult,
    driftPhase:Math.random()*Math.PI*2,caught:false,caughtAt:0,
    opacity:Math.min(1,0.4+curWeather.visibility*0.65)};
}
function spawnAllFish(){
  fish=[];
  const pool=getPool();
  for(let i=0;i<12;i++)fish.push(spawnOne(pool));
  ensureRare();
}
function ensureRare(){
  const rareMap={storm:['oarfish','angler'],wavy:['oarfish','whale'],foggy:['angler','jellyfish']};
  const targets=rareMap[curWeather.id];
  if(!targets)return;
  targets.forEach(rid=>{
    if(!fish.some(f=>!f.caught&&f.data.id===rid)){
      const data=FISH_TYPES.find(f=>f.id===rid);
      if(data)fish.push(spawnOne([data]));
    }
  });
}
function repositionFish(){
  const seaH=H-SEA_TOP;
  fish.forEach(f=>{
    const rel=Math.max(0,Math.min(1,(f.y-SEA_TOP)/(H*0.7||1)));
    f.y=SEA_TOP+rel*seaH;
  });
}

// ── WEATHER ───────────────────────────────────────────────────
function setWeather(w,showAlert=true){
  curWeather=w;
  document.getElementById('wtag').textContent=w.label;
  fish.forEach(f=>{
    f.spd=f.baseSpd*w.speedMult;
    f.opacity=Math.min(1,0.4+w.visibility*0.65);
  });
  rainDrops=[];
  if(w.rainAmt>0){
    for(let i=0;i<w.rainAmt;i++){
      rainDrops.push({x:Math.random()*W,y:Math.random()*H,len:8+Math.random()*12,spd:8+Math.random()*8});
    }
  }
  if(showAlert){
    const el=document.getElementById('w-alert');
    el.textContent=w.alert;el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),3600);
  }
  if(showAlert)ensureRare();
}
function tryWeatherChange(){
  const now=Date.now();
  sinceLastWeather++;
  const byTime=now-lastWeatherTime>=WEATHER_INTERVAL;
  const byCast=sinceLastWeather>=nextCheck;
  if(byTime||byCast){
    if(Math.random()<0.7||byTime){
      const opts=WEATHERS.filter(w=>w.id!==curWeather.id);
      setWeather(opts[Math.floor(Math.random()*opts.length)]);
      lastWeatherTime=now;sinceLastWeather=0;nextCheck=3;
    } else {
      nextCheck=1;
    }
  }
}

// ── CLICK / CAST ─────────────────────────────────────────────
function setupClick(){
  if(clickHandler)cv.removeEventListener('click',clickHandler);
  clickHandler=function(e){
    if(casting||castCount>=MAX_CASTS)return;
    const rect=cv.getBoundingClientRect();
    const cx=(e.clientX-rect.left)*(W/rect.width);
    const cy=(e.clientY-rect.top)*(H/rect.height);
    if(cy<SEA_TOP+5)return;
    startCast(cx,cy);
  };
  cv.addEventListener('click',clickHandler);
}

function startCast(tx,ty){
  casting=true;lineActive=true;linePhase='cast';
  showCastHint(false);
  const btn=getBtn();
  if(btn){btn.disabled=true;btn.textContent='🎣 收竿中...';}
  tryWeatherChange();
  castCount++;
  document.getElementById('cast-num').textContent=castCount;
  if(castCount%3===0)ensureRare();
  const tip=getRodTip();
  lineX=tip.x;lineY=tip.y;
  lineTargetX=Math.max(BOUNDARY_PAD,Math.min(W-BOUNDARY_PAD,tx));
  lineTargetY=Math.min(H-BOUNDARY_PAD,Math.max(SEA_TOP+5,ty));
  lineProgress=0;
  hookX=lineX;hookY=lineY;
}

function getRodTip(){return{x:W*.5+28,y:H*BOAT_Y_RATIO-10};}

function endCast(){
  casting=false;lineActive=false;linePhase='idle';
  const tip=getRodTip();
  hookX=tip.x;hookY=tip.y;
  lineProgress=0;
  if(castCount>=MAX_CASTS){
    setTimeout(showResult,700);
    return;
  }
  const btn=getBtn();
  if(btn){btn.disabled=false;btn.textContent='🎣 下竿！（'+(MAX_CASTS-castCount)+'次）';}
  showCastHint(true);
}

function showCastHint(show){
  const el=document.getElementById('cast-hint');
  if(el)el.style.opacity=show?'1':'0';
}

// ── GAME LOOP ─────────────────────────────────────────────────
function loop(){animId=requestAnimationFrame(loop);update();draw();}

function update(){
  // 時間天氣觸發
  if(Date.now()-lastWeatherTime>=WEATHER_INTERVAL&&!casting){
    const opts=WEATHERS.filter(w=>w.id!==curWeather.id);
    setWeather(opts[Math.floor(Math.random()*opts.length)]);
    lastWeatherTime=Date.now();sinceLastWeather=0;nextCheck=3;
  }
  waveOffset+=0.4;
  // fish move
  const pool=getPool();
  fish.forEach(f=>{
    if(f.caught)return;
    f.x+=f.spd*f.dir;
    f.y+=Math.sin(Date.now()/1800+f.driftPhase)*0.25;
    if(f.x>W+60){f.x=-f.data.sz;f.dir=1;}
    if(f.x<-60){f.x=W+f.data.sz;f.dir=-1;}
    const seaH=H-SEA_TOP;
    f.y=Math.max(SEA_TOP+f.data.depthMin*seaH,Math.min(SEA_TOP+f.data.depthMax*seaH,f.y));
  });
  fish=fish.filter(f=>!f.caught||(Date.now()-f.caughtAt<400));
  while(fish.filter(f=>!f.caught).length<8)fish.push(spawnOne(pool));
  // line 去程 & 收竿回程
  if(lineActive&&casting){
    if(linePhase==='cast'){
      // 去程：往目標點
      lineProgress=Math.min(1,lineProgress+0.045);
      hookX=lineX+(lineTargetX-lineX)*lineProgress;
      hookY=lineY+(lineTargetY-lineY)*lineProgress;
      // 偵測碰魚
      if(Date.now()-lastCaughtCheck>40){
        lastCaughtCheck=Date.now();
        const hit=checkHit();
        if(hit){doCatch(hit);return;}
      }
      // 到達目標點 → 轉為收竿
      if(lineProgress>=1){
        linePhase='reel';
        lineProgress=0;
        // 收竿起點 = 目前鉤子位置，終點 = 船桿
        lineX=hookX;lineY=hookY;
        const tip=getRodTip();
        lineTargetX=tip.x;lineTargetY=tip.y;
        const btn=getBtn();
        if(btn)btn.textContent='↩️ 收竿中...';
      }
    } else if(linePhase==='reel'){
      // 收竿回程：往船桿縮回（比去程快一點）
      lineProgress=Math.min(1,lineProgress+0.065);
      hookX=lineX+(lineTargetX-lineX)*lineProgress;
      hookY=lineY+(lineTargetY-lineY)*lineProgress;
      // 回程也偵測碰魚
      if(Date.now()-lastCaughtCheck>40){
        lastCaughtCheck=Date.now();
        const hit=checkHit();
        if(hit){doCatch(hit);return;}
      }
      // 縮回完畢
      if(lineProgress>=1){
        showMiss();
        endCast();
      }
    }
  }
  // rain
  rainDrops.forEach(d=>{d.y+=d.spd;if(d.y>H){d.y=-20;d.x=Math.random()*W;}});
}

function checkHit(){
  let best=null,bd=999;
  fish.forEach(f=>{
    if(f.caught)return;
    const dx=hookX-f.x,dy=hookY-f.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<f.data.sz*.9&&d<bd){bd=d;best=f;}
  });
  return best;
}

function doCatch(f){
  f.caught=true;f.caughtAt=Date.now();
  score+=f.data.pts;
  catches.push({...f.data});
  document.getElementById('score-disp').textContent=score;
  const pop=document.createElement('div');
  pop.className='catch-pop';
  pop.style.left=hookX+'px';pop.style.top=(hookY-20)+'px';
  pop.textContent=fishEmoji(f.data)+' +'+f.data.pts;
  document.getElementById('screen-game').appendChild(pop);
  setTimeout(()=>{if(pop.parentNode)pop.remove();},950);
  endCast();
}

function showMiss(){
  const pop=document.createElement('div');
  pop.className='catch-pop';
  pop.style.cssText='left:'+(W/2-20)+'px;top:'+(H*.4)+'px;color:#7ab;text-shadow:none;font-size:13px;';
  pop.textContent='空鉤...';
  document.getElementById('screen-game').appendChild(pop);
  setTimeout(()=>{if(pop.parentNode)pop.remove();},800);
}

function fishEmoji(f){
  if(f.id==='oarfish') return '🐠'; // 用細長魚代替
  if(f.id==='angler')  return '🐟'; // 用深色魚代替
  return f.e;
}
function drawCustomFish(ctx, id, x, y, dir, sz, glowColor, opacity){
  ctx.save();
  ctx.globalAlpha=opacity;
  ctx.translate(x, y);
  if(dir<0) ctx.scale(-1,1);

  if(id==='oarfish'){
    // 皇帶魚：細長銀色發光帶狀魚
    const len=sz*5;
    // 發光效果
    ctx.shadowColor='#ffd700';
    ctx.shadowBlur=16+Math.sin(Date.now()/400)*6;
    // 身體（細長波浪形）
    ctx.strokeStyle='rgba(220,230,255,0.9)';
    ctx.lineWidth=sz*0.28;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(-len/2, 0);
    for(let i=0;i<=20;i++){
      const px=-len/2+i*(len/20);
      const py=Math.sin(i*0.5+Date.now()/400)*sz*0.4;
      ctx.lineTo(px, py);
    }
    ctx.stroke();
    // 銀色光澤線
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,255,255,0.6)';
    ctx.lineWidth=sz*0.08;
    ctx.beginPath();
    ctx.moveTo(-len/2, -sz*0.05);
    for(let i=0;i<=20;i++){
      const px=-len/2+i*(len/20);
      const py=Math.sin(i*0.5+Date.now()/400)*sz*0.4-sz*0.05;
      ctx.lineTo(px, py);
    }
    ctx.stroke();
    // 頭部
    ctx.shadowColor='#ffd700';ctx.shadowBlur=12;
    ctx.fillStyle='rgba(200,210,255,0.95)';
    ctx.beginPath();ctx.ellipse(-len/2, 0, sz*0.35, sz*0.22, 0, 0, Math.PI*2);ctx.fill();
    // 背鰭（紅色）
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(220,60,60,0.85)';
    for(let i=0;i<6;i++){
      const px=-len/2+20+i*(len/7);
      const py=Math.sin(i*0.5+Date.now()/400)*sz*0.4;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px-sz*0.2, py-sz*0.7);
      ctx.lineTo(px+sz*0.2, py-sz*0.1);
      ctx.closePath();ctx.fill();
    }
    // 眼睛
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-len/2-sz*0.05,sz*0.05,sz*0.12,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-len/2-sz*0.05,sz*0.05,sz*0.07,0,Math.PI*2);ctx.fill();

  } else if(id==='angler'){
    // 燈籠魚：深黑圓身、頭頂發光燈籠
    const r=sz*0.55;
    // 燈籠（頭頂）
    const lampX=-r*0.3;
    const lampY=-r*1.4;
    const lampGlow=10+Math.sin(Date.now()/300)*5;
    // 燈籠線
    ctx.shadowColor='#00ffff';ctx.shadowBlur=lampGlow;
    ctx.strokeStyle='rgba(150,255,200,0.7)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-r*0.2,-r*0.5);ctx.bezierCurveTo(-r*0.1,-r,lampX+r*0.1,lampY+r*0.3,lampX,lampY);ctx.stroke();
    // 燈籠發光球
    ctx.shadowColor='#00ffff';ctx.shadowBlur=lampGlow*2;
    const lgrd=ctx.createRadialGradient(lampX,lampY,0,lampX,lampY,sz*0.28);
    lgrd.addColorStop(0,'rgba(200,255,255,1)');
    lgrd.addColorStop(0.4,'rgba(0,220,255,0.8)');
    lgrd.addColorStop(1,'rgba(0,100,255,0)');
    ctx.fillStyle=lgrd;
    ctx.beginPath();ctx.arc(lampX,lampY,sz*0.32,0,Math.PI*2);ctx.fill();
    // 白色核心
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.beginPath();ctx.arc(lampX,lampY,sz*0.1,0,Math.PI*2);ctx.fill();
    // 身體
    ctx.shadowColor='#004466';ctx.shadowBlur=8;
    const bgrd=ctx.createRadialGradient(-r*0.2,0,0,0,0,r);
    bgrd.addColorStop(0,'#1a3a3a');bgrd.addColorStop(1,'#050f10');
    ctx.fillStyle=bgrd;
    ctx.beginPath();ctx.ellipse(0,0,r,r*0.85,0,0,Math.PI*2);ctx.fill();
    // 牙齒
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(200,220,200,0.9)';
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.moveTo(-r*0.5+i*r*0.25, r*0.3);
      ctx.lineTo(-r*0.38+i*r*0.25, r*0.6);
      ctx.lineTo(-r*0.25+i*r*0.25, r*0.3);
      ctx.closePath();ctx.fill();
    }
    // 眼睛（發光）
    ctx.shadowColor='#00ffff';ctx.shadowBlur=8;
    ctx.fillStyle='rgba(0,200,255,0.9)';
    ctx.beginPath();ctx.arc(-r*0.35,-r*0.15,r*0.22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#001a1a';
    ctx.beginPath();ctx.arc(-r*0.35,-r*0.15,r*0.13,0,Math.PI*2);ctx.fill();
    // 尾鰭
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(30,60,60,0.8)';
    ctx.beginPath();ctx.moveTo(r*0.7,0);ctx.lineTo(r*1.3,-r*0.5);ctx.lineTo(r*1.3,r*0.5);ctx.closePath();ctx.fill();
    // 胸鰭
    ctx.fillStyle='rgba(20,50,50,0.7)';
    ctx.beginPath();ctx.ellipse(r*0.1,r*0.4,r*0.4,r*0.15,-0.4,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}


function draw(){
  const w=curWeather;
  ctx.clearRect(0,0,W,H);
  // sky
  const sg=ctx.createLinearGradient(0,0,0,SEA_TOP);
  sg.addColorStop(0,w.skyTop);sg.addColorStop(1,w.skyBot);
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,SEA_TOP);
  // stars
  if(w.id==='sunny'||w.id==='cloudy'){
    ctx.fillStyle='rgba(255,255,255,.5)';
    for(let i=0;i<25;i++){ctx.beginPath();ctx.arc((i*137.5)%W,(i*73.1)%(SEA_TOP*.9),.8,0,Math.PI*2);ctx.fill();}
  }
  // moon
  if(w.id!=='storm'){
    ctx.fillStyle='rgba(255,255,220,.9)';ctx.beginPath();ctx.arc(W*.82,SEA_TOP*.25,12,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=w.skyTop;ctx.beginPath();ctx.arc(W*.82+7,SEA_TOP*.25,10,0,Math.PI*2);ctx.fill();
  }
  if(w.id==='storm'&&Math.random()<.003){ctx.fillStyle='rgba(200,200,255,.12)';ctx.fillRect(0,0,W,SEA_TOP);}
  // sea
  const seag=ctx.createLinearGradient(0,SEA_TOP,0,H);
  seag.addColorStop(0,w.seaTop);seag.addColorStop(1,w.seaBot);
  ctx.fillStyle=seag;ctx.fillRect(0,SEA_TOP,W,H-SEA_TOP);
  // depth shading
  const seaH=H-SEA_TOP;
  for(let i=1;i<=3;i++){ctx.fillStyle='rgba(0,0,0,'+(.05*i)+')';ctx.fillRect(0,SEA_TOP+seaH*(i*.25),W,seaH*.25);}
  // depth labels
  ctx.fillStyle='rgba(80,140,200,.22)';ctx.font='10px sans-serif';ctx.textAlign='left';
  ctx.fillText('— 淺層',4,SEA_TOP+seaH*.08);
  ctx.fillText('— 中層',4,SEA_TOP+seaH*.42);
  ctx.fillText('— 深層',4,SEA_TOP+seaH*.75);
  // fog
  if(w.fog){const fg=ctx.createLinearGradient(0,0,0,H*.7);fg.addColorStop(0,'rgba(140,160,180,.22)');fg.addColorStop(1,'transparent');ctx.fillStyle=fg;ctx.fillRect(0,0,W,H*.7);}
  // rain
  ctx.strokeStyle='rgba(140,190,255,.5)';ctx.lineWidth=1;
  rainDrops.forEach(d=>{ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x+2,d.y+d.len);ctx.stroke();});
  // waves
  const wAmp=w.id==='storm'?8:w.id==='wavy'?5:2;
  ctx.fillStyle='rgba(0,100,180,.45)';
  ctx.beginPath();ctx.moveTo(0,SEA_TOP);
  for(let x=0;x<=W;x+=4){ctx.lineTo(x,SEA_TOP+Math.sin(x*.018+waveOffset*.06)*wAmp+Math.sin(x*.03+waveOffset*.04)*wAmp*.5);}
  ctx.lineTo(W,SEA_TOP-10);ctx.lineTo(0,SEA_TOP-10);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(180,220,255,.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,SEA_TOP);
  for(let x=0;x<=W;x+=4){ctx.lineTo(x,SEA_TOP+Math.sin(x*.018+waveOffset*.06)*wAmp+Math.sin(x*.03+waveOffset*.04)*wAmp*.5);}
  ctx.stroke();
  // fish
  ctx.textAlign='center';ctx.textBaseline='middle';
  fish.forEach(f=>{
    if(f.caught)return;
    if(f.data.id==='oarfish'||f.data.id==='angler'){
      drawCustomFish(ctx,f.data.id,f.x,f.y,f.dir,f.data.sz,f.data.glowColor,f.opacity);
    } else {
      ctx.save();ctx.globalAlpha=f.opacity;
      if(f.data.glow){ctx.shadowColor=f.data.glowColor||'gold';ctx.shadowBlur=12+Math.sin(Date.now()/500)*5;}
      ctx.font=f.data.sz+'px sans-serif';
      ctx.scale(f.dir>0?-1:1,1);
      ctx.fillText(f.data.e,f.dir>0?-f.x:f.x,f.y);
      ctx.restore();
    }
  });
  // visibility overlay
  if(w.visibility<1){ctx.fillStyle='rgba(0,5,12,'+(1-w.visibility)*.75+')';ctx.fillRect(0,SEA_TOP,W,H-SEA_TOP);}
  // boat
  drawBoat();
  // line & hook
  if(lineActive){
    const tip=getRodTip();
    ctx.strokeStyle='rgba(255,255,180,.7)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(tip.x,tip.y);ctx.lineTo(hookX,hookY);ctx.stroke();
    ctx.save();ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=.9;
    ctx.fillText('🪝',hookX,hookY);ctx.restore();
    // ripple
    ctx.strokeStyle='rgba(100,200,255,.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(hookX,hookY,4+Math.sin(Date.now()/200)*2,0,Math.PI*2);ctx.stroke();
  }
}

function drawBoat(){
  const bx=W*.5,by=H*BOAT_Y_RATIO;
  const wave=Math.sin(Date.now()/1200)*2;
  ctx.save();ctx.translate(bx,by+wave);
  ctx.fillStyle='#5a3010';ctx.beginPath();ctx.ellipse(0,18,46,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#7a4820';ctx.beginPath();ctx.roundRect(-42,4,84,18,4);ctx.fill();
  ctx.fillStyle='#8a5828';ctx.beginPath();ctx.roundRect(-32,-6,64,14,3);ctx.fill();
  ctx.fillStyle='#6a3810';ctx.beginPath();ctx.roundRect(-22,-14,44,12,2);ctx.fill();
  ctx.fillStyle='#4a3820';ctx.beginPath();ctx.roundRect(-14,-26,28,15,3);ctx.fill();
  ctx.fillStyle='rgba(100,170,210,.4)';ctx.fillRect(-11,-23,9,8);ctx.fillRect(2,-23,9,8);
  ctx.fillStyle='#3a2810';ctx.fillRect(-2,-34,5,10);
  ctx.strokeStyle='#c8a060';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(28,-8);ctx.lineTo(44,-22);ctx.stroke();
  ctx.restore();
}

// ── RESULT ────────────────────────────────────────────────────
function showResult(){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  showScreen('screen-result');
  document.getElementById('res-score').textContent=score;
  const isNew=score>maxScore;
  if(isNew){maxScore=score;saveBest(score);document.getElementById('title-best').textContent='🏆 個人最高：'+maxScore+'分';}
  document.getElementById('res-best').textContent=isNew?'🏆 新紀錄！':'個人最高：'+maxScore+'分';
  // 稱號（10層級）
  const titles=[
    [3000,'🌊⚡ 皇帶魚傳說'],
    [1800,'👑 傳奇漁夫'],
    [1200,'🐳 鯨海霸主'],
    [800, '🐬 深海獵人'],
    [500, '🦈 海上老手'],
    [300, '🦑 漁獲豐收'],
    [150, '🐠 小有斬獲'],
    [50,  '🐟 初出茅廬'],
    [1,   '🎣 新手漁夫'],
    [0,   '🪣 空桶而歸'],
  ];
  const title=titles.find(t=>score>=t[0])[1];
  document.getElementById('res-title').textContent=title;
  const cl=document.getElementById('catch-list');
  if(!catches.length){cl.innerHTML='<div style="text-align:center;color:#446;padding:1rem">一條都沒釣到...😢</div>';return;}
  cl.innerHTML='<div style="font-size:11px;color:#446;margin-bottom:4px">釣獲清單</div>'+
    [...catches].sort((a,b)=>b.pts-a.pts).map(f=>`<div class="catch-row">
      <span class="cr-fish">${fishEmoji(f)}</span>
      <span class="cr-name">${f.name}${f.glow?' ✨':''}</span>
      <span class="cr-pts">+${f.pts}</span>
    </div>`).join('');
  try{
    const d=JSON.parse(localStorage.getItem('game_lobby_v2')||'{}');
    if(d.name)localStorage.setItem('game_pending_score',JSON.stringify({game:'fishing_rod',score,detail:catches.length+'隻，最高'+score+'分'}));
  }catch(e){}
}
