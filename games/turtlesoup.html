<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>海龜湯 | ADgame Lobby</title>
<style>
  :root {
    --bg: #0d0d0f;
    --bg-panel: #17171a;
    --bg-card: #1e1e22;
    --line: #2c2c31;
    --text: #e8e4da;
    --text-dim: #8c8a84;
    --amber: #e0a34e;
    --amber-dim: #7a5b2c;
    --red: #b0483f;
    --green: #5b8a6b;
    --grey: #6b6b70;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Sans TC", "PingFang TC", sans-serif;
    height: 100%;
    overscroll-behavior: none;
  }
  .app {
    max-width: 720px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  header {
    padding: 28px 20px 18px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--amber-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 {
    font-family: "Noto Serif TC", serif;
    font-size: 26px;
    font-weight: 700;
    margin: 0 0 10px;
    letter-spacing: 1px;
  }
  .story {
    font-size: 14.5px;
    line-height: 1.9;
    color: var(--text-dim);
    font-family: "Noto Serif TC", serif;
    white-space: pre-line;
  }

  .mute-btn {
    position: absolute;
    top: 26px; right: 20px;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--bg-card);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
  }
  .mute-btn.muted { color: var(--text-dim); }
  .mute-btn:not(.muted) { color: var(--amber); border-color: var(--amber-dim); }

  .progress-wrap {
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
  }
  .progress-label {
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 8px;
    display: flex; justify-content: space-between;
  }
  .progress-track {
    height: 4px; background: var(--line); border-radius: 2px; overflow: hidden;
    margin-bottom: 10px;
  }
  .progress-fill {
    height: 100%; background: var(--amber); width: 0%;
    transition: width .4s ease;
  }
  .tier-track { display: flex; gap: 4px; }
  .tier-dot { flex: 1; height: 3px; border-radius: 2px; background: var(--line); }
  .tier-dot.reached { background: var(--amber-dim); }
  .tier-dot.current { background: var(--amber); }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 100px;
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin: 18px 0 8px;
    text-transform: uppercase;
  }
  .section-label:first-child { margin-top: 0; }

  .tier-banner {
    background: rgba(224,163,78,0.1);
    border: 1px solid var(--amber-dim);
    color: var(--amber);
    font-size: 12.5px;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: 1px;
    animation: bannerFade 2.6s ease forwards;
  }
  @keyframes bannerFade {
    0% { opacity: 0; transform: translateY(-6px); }
    12% { opacity: 1; transform: translateY(0); }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }

  .q-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color .15s, transform .15s;
    position: relative;
  }
  .q-card:active { transform: scale(0.98); }
  .q-card.answered { opacity: 0.7; cursor: default; }
  .q-card.answered:active { transform: none; }
  .q-card.key.answered { opacity: 1; border-color: var(--amber-dim); }
  .q-text { font-size: 14.5px; line-height: 1.6; }
  .q-answer {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 4px;
  }
  .ans-yes { background: rgba(91,138,107,0.15); color: var(--green); }
  .ans-no { background: rgba(176,72,63,0.15); color: var(--red); }
  .ans-irrelevant { background: rgba(107,107,112,0.15); color: var(--grey); }

  @keyframes unlockPulse {
    0% { box-shadow: 0 0 0 0 rgba(224,163,78,0.5); border-color: var(--amber); }
    100% { box-shadow: 0 0 0 8px rgba(224,163,78,0); border-color: var(--line); }
  }
  .q-card.newly-unlocked { animation: unlockPulse 1.1s ease-out; }

  .log-hint {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding: 10px 0 16px;
  }

  footer {
    position: sticky;
    bottom: 0;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    padding: 18px 20px calc(18px + env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
  }
  button.action {
    flex: 1;
    padding: 13px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .btn-reveal { background: var(--amber); color: #1a1408; }
  .btn-restart { background: transparent; border: 1px solid var(--line); color: var(--text-dim); }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-panel);
    border-top: 1px solid var(--amber-dim);
    border-radius: 16px 16px 0 0;
    max-width: 720px;
    width: 100%;
    max-height: 82vh;
    overflow-y: auto;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
  }
  .modal h2 {
    font-family: "Noto Serif TC", serif;
    font-size: 20px;
    color: var(--amber);
    margin: 0 0 14px;
  }
  .modal p {
    font-size: 14px;
    line-height: 2;
    color: var(--text);
    font-family: "Noto Serif TC", serif;
    white-space: pre-line;
  }
  .modal-close {
    display: block;
    margin: 20px auto 0;
    background: none;
    border: 1px solid var(--line);
    color: var(--text-dim);
    padding: 10px 24px;
    border-radius: 8px;
  }

  /* 選湯底列表（多故事時顯示） */
  .lobby-list { padding: 20px; }
  .lobby-item {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
  }
  .lobby-item h3 {
    font-family: "Noto Serif TC", serif;
    margin: 0 0 6px;
    color: var(--amber);
    font-size: 16px;
  }
  .lobby-item p {
    margin: 0;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>🐢 湯底揭曉</h2>
    <p id="solutionText"></p>
    <button class="modal-close" id="modalClose">關閉</button>
  </div>
</div>

<audio id="bgmAudio" loop preload="auto"></audio>

<!-- 每個湯底一支資料檔，之後新增故事只要在這裡多加一行 <script> -->
<script src="assets/data/turtlesoup/deep-night-radio.js"></script>
<script src="assets/data/turtlesoup/birthday-gift.js"></script>
<script src="assets/data/turtlesoup/vanishing-reflection.js"></script>

<script>
/* =========================================================
   海龜湯通用引擎 —— 不含任何特定湯底的內容
   新增湯底：新增一支 assets/data/turtlesoup/{id}.js
   （格式參考 deep-night-radio.js），並在上面補一行 <script src>
   ========================================================= */

const STORIES = window.TURTLESOUP_STORIES || [];
const MAX_TIER = 5;
const MUTE_KEY = 'turtlesoup_mute';

let muted = false;
try { muted = localStorage.getItem(MUTE_KEY) === '1'; } catch(e) {}

/* ---------- 合成音效（是/否/無關/解鎖/完成，跨湯底共用）---------- */
let actx = null;
function getCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}
function tone(freq, start, dur, type, gainPeak) {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, ctx.currentTime + start);
  gain.gain.linearRampToValueAtTime(gainPeak, ctx.currentTime + start + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime + start);
  osc.stop(ctx.currentTime + start + dur + 0.02);
}
function playSound(kind) {
  if (muted) return;
  try {
    if (kind === 'yes') {
      tone(523, 0, 0.14, 'sine', 0.12);
      tone(659, 0.09, 0.16, 'sine', 0.12);
    } else if (kind === 'no') {
      tone(196, 0, 0.22, 'sawtooth', 0.08);
    } else if (kind === 'irrelevant') {
      tone(392, 0, 0.1, 'triangle', 0.06);
    } else if (kind === 'unlock') {
      tone(440, 0, 0.1, 'sine', 0.09);
      tone(554, 0.08, 0.1, 'sine', 0.09);
      tone(659, 0.16, 0.18, 'sine', 0.1);
    } else if (kind === 'complete') {
      tone(392, 0, 0.14, 'sine', 0.1);
      tone(523, 0.12, 0.14, 'sine', 0.1);
      tone(659, 0.24, 0.14, 'sine', 0.1);
      tone(784, 0.36, 0.3, 'sine', 0.12);
    }
  } catch(e) {}
}

/* ---------- BGM ---------- */
const bgmAudio = document.getElementById('bgmAudio');
bgmAudio.volume = 0.35;
let bgmStarted = false;

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

/* ---------- 湯底彈窗（全域共用，只綁一次）---------- */
document.getElementById('modalClose').onclick = () => {
  document.getElementById('modalOverlay').classList.remove('open');
};
document.getElementById('modalOverlay').onclick = (e) => {
  if (e.target.id === 'modalOverlay') e.currentTarget.classList.remove('open');
};

/* ---------- 單一湯底 Runner ---------- */
function runStory(story) {
  const QMAP = {};
  story.questions.forEach(q => QMAP[q.id] = q);

  const STORAGE_KEY = `turtlesoup_${story.id}_progress`;
  const ORDER_KEY = `turtlesoup_${story.id}_order`;
  const BGMCHOICE_KEY = `turtlesoup_${story.id}_bgmchoice`;

  let answered = {};
  let answerOrder = [];
  let bgmChoice = {};

  function loadProgress() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) answered = JSON.parse(raw);
      const raw2 = localStorage.getItem(ORDER_KEY);
      if (raw2) answerOrder = JSON.parse(raw2);
      const raw3 = localStorage.getItem(BGMCHOICE_KEY);
      if (raw3) bgmChoice = JSON.parse(raw3);
    } catch(e) { answered = {}; answerOrder = []; bgmChoice = {}; }
  }
  function saveProgress() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(answered));
      localStorage.setItem(ORDER_KEY, JSON.stringify(answerOrder));
    } catch(e) {}
  }
  function rollBgmChoices() {
    bgmChoice = {};
    for (let t = 1; t <= MAX_TIER; t++) {
      const options = (story.bgmTiers && story.bgmTiers[t]) || [];
      if (options.length) bgmChoice[t] = pickRandom(options);
    }
    try { localStorage.setItem(BGMCHOICE_KEY, JSON.stringify(bgmChoice)); } catch(e) {}
  }

  function tierKeyTotal(t) {
    return story.questions.filter(q => q.tier === t && q.key).length;
  }
  function tierKeyAnsweredCount(t) {
    return answerOrder.filter(id => QMAP[id] && QMAP[id].tier === t && QMAP[id].key).length;
  }
  function currentMaxTier() {
    let t = 1;
    while (t < MAX_TIER && tierKeyAnsweredCount(t) >= tierKeyTotal(t)) t++;
    return t;
  }
  function keyTotal() { return story.questions.filter(q => q.key).length; }
  function keyAnswered() { return story.questions.filter(q => q.key && answered[q.id]).length; }
  function hitCount() { return answerOrder.filter(id => QMAP[id] && QMAP[id].key).length; }
  function missCount() { return answerOrder.filter(id => QMAP[id] && !QMAP[id].key).length; }

  let lastUnlocked = new Set();
  let autoRevealed = false;
  let pendingBanner = null;
  let currentBgmTier = 1;

  function bgmFileFor(tier) {
    const chosen = bgmChoice[tier];
    if (chosen) return story.bgmPath + chosen;
    const opts = (story.bgmTiers && story.bgmTiers[tier]) || [];
    return opts.length ? story.bgmPath + opts[0] : null;
  }
  function loadBgmTrack(tier) {
    currentBgmTier = tier;
    const file = bgmFileFor(tier);
    if (file) bgmAudio.src = file;
  }
  function switchBgm(tier) {
    if (tier === currentBgmTier) return;
    loadBgmTrack(tier);
    if (!muted) bgmAudio.play().catch(() => {});
  }
  function startBgmIfNeeded() {
    if (bgmStarted || muted) return;
    bgmAudio.play().catch(() => {});
    bgmStarted = true;
  }

  function ansLabel(ans) {
    if (ans === 'yes') return { text: '是', cls: 'ans-yes' };
    if (ans === 'no') return { text: '否', cls: 'ans-no' };
    return { text: '與此無關', cls: 'ans-irrelevant' };
  }

  const app = document.getElementById('app');
  app.innerHTML = `
    <header>
      <div class="mute-btn" id="muteBtn">♪</div>
      <div class="eyebrow">${story.eyebrow || '海龜湯 · 情境推理'}</div>
      <h1>${story.title}</h1>
      <div class="story">${story.story}</div>
    </header>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressLabel"></span>
        <span id="statsLabel"></span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="tier-track" id="tierTrack"></div>
    </div>
    <main id="questionList"></main>
    <footer>
      <button class="action btn-restart" id="restartBtn">重新開始</button>
      <button class="action btn-reveal" id="revealBtn">查看湯底</button>
    </footer>
  `;

  function render() {
    const list = document.getElementById('questionList');
    list.innerHTML = '';

    if (pendingBanner) {
      const banner = document.createElement('div');
      banner.className = 'tier-banner';
      banner.textContent = pendingBanner;
      list.appendChild(banner);
      pendingBanner = null;
    }

    const maxTier = currentMaxTier();
    const unanswered = story.questions.filter(q => q.tier === maxTier && !answered[q.id]);
    const answeredQs = answerOrder.map(id => QMAP[id]).filter(Boolean).reverse();

    if (unanswered.length) {
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = '可以追問的線索';
      list.appendChild(label);
      unanswered.forEach(q => list.appendChild(renderCard(q)));
    }

    if (answeredQs.length) {
      const label2 = document.createElement('div');
      label2.className = 'section-label';
      label2.textContent = '偵訊紀錄（最新在上）';
      list.appendChild(label2);
      answeredQs.forEach(q => list.appendChild(renderCard(q)));
    }

    const hint = document.createElement('div');
    hint.className = 'log-hint';
    hint.textContent = '把這一層能問的都問過一輪，挖出所有關鍵線索，才能深入下一層';
    list.appendChild(hint);

    renderProgress();
  }

  function renderCard(q) {
    const card = document.createElement('div');
    card.className = 'q-card' + (answered[q.id] ? ' answered' : '') + (q.key ? ' key' : '');
    if (lastUnlocked.has(q.id) && !answered[q.id]) {
      card.classList.add('newly-unlocked');
    }

    const textRow = document.createElement('div');
    textRow.className = 'q-text';
    textRow.textContent = q.text;
    card.appendChild(textRow);


    if (answered[q.id]) {
      const a = ansLabel(q.ans);
      const tag = document.createElement('div');
      tag.className = 'q-answer ' + a.cls;
      tag.textContent = a.text;
      card.appendChild(tag);
    } else {
      card.onclick = () => {
        const beforeTier = currentMaxTier();
        answered[q.id] = true;
        answerOrder.push(q.id);
        saveProgress();
        playSound(q.ans);

        const afterTier = currentMaxTier();
        if (afterTier > beforeTier) {
          lastUnlocked = new Set(story.questions.filter(qq => qq.tier === afterTier).map(qq => qq.id));
          pendingBanner = `🔓 已深入第 ${afterTier} 層線索`;
          setTimeout(() => playSound('unlock'), 180);
          switchBgm(afterTier);
        } else {
          lastUnlocked = new Set();
        }
        render();

        if (!autoRevealed && keyAnswered() === keyTotal()) {
          autoRevealed = true;
          setTimeout(() => {
            playSound('complete');
            document.getElementById('solutionText').textContent = story.solution;
            document.getElementById('modalOverlay').classList.add('open');
          }, 550);
        }
      };
    }
    return card;
  }

  function renderProgress() {
    const total = keyTotal();
    const got = keyAnswered();
    document.getElementById('progressLabel').textContent = `關鍵線索 ${got} / ${total}`;
    document.getElementById('statsLabel').textContent = `問對 ${hitCount()}　問錯 ${missCount()}`;
    document.getElementById('progressFill').style.width = (got / total * 100) + '%';

    const maxTier = currentMaxTier();
    const track = document.getElementById('tierTrack');
    track.innerHTML = '';
    for (let t = 1; t <= MAX_TIER; t++) {
      const dot = document.createElement('div');
      dot.className = 'tier-dot' + (t < maxTier ? ' reached' : '') + (t === maxTier ? ' current' : '');
      track.appendChild(dot);
    }
  }

  document.getElementById('revealBtn').onclick = () => {
    document.getElementById('solutionText').textContent = story.solution;
    document.getElementById('modalOverlay').classList.add('open');
  };
  document.getElementById('restartBtn').onclick = () => {
    if (confirm('確定要重新開始嗎？所有已回答的問題將被清除。')) {
      answered = {};
      answerOrder = [];
      lastUnlocked = new Set();
      autoRevealed = false;
      saveProgress();
      rollBgmChoices();
      loadBgmTrack(1);
      if (!muted && bgmStarted) bgmAudio.play().catch(() => {});
      render();
    }
  };

  const muteBtn = document.getElementById('muteBtn');
  function updateMuteBtn() {
    muteBtn.textContent = muted ? '✕' : '♪';
    muteBtn.classList.toggle('muted', muted);
    if (muted) { bgmAudio.pause(); } else { startBgmIfNeeded(); }
  }
  muteBtn.onclick = () => {
    muted = !muted;
    try { localStorage.setItem(MUTE_KEY, muted ? '1' : '0'); } catch(e) {}
    updateMuteBtn();
    if (!muted) playSound('yes');
  };

  document.getElementById('questionList').addEventListener('click', startBgmIfNeeded, { once: true });

  loadProgress();
  // 全新一局（沒有任何已存進度）才重新擲骰選開場曲；延續進度中的局，沿用上次選的曲目
  const isFreshGame = Object.keys(answered).length === 0;
  if (isFreshGame || Object.keys(bgmChoice).length === 0) rollBgmChoices();
  loadBgmTrack(currentMaxTier());
  autoRevealed = keyAnswered() === keyTotal();
  updateMuteBtn();
  render();
}

/* ---------- 入口：只有一個湯底就直接開始，多個湯底顯示清單 ---------- */
function boot() {
  if (STORIES.length === 0) {
    document.getElementById('app').innerHTML = '<div style="padding:40px;text-align:center;color:#8c8a84;">找不到湯底資料，請確認 assets/data/turtlesoup/ 底下有正確載入資料檔。</div>';
    return;
  }
  if (STORIES.length === 1) {
    runStory(STORIES[0]);
    return;
  }
  const app = document.getElementById('app');
  app.innerHTML = `
    <header>
      <div class="eyebrow">海龜湯 · 情境推理</div>
      <h1>選一個湯底</h1>
    </header>
    <div class="lobby-list" id="lobbyList"></div>
  `;
  const list = document.getElementById('lobbyList');
  STORIES.forEach(story => {
    const item = document.createElement('div');
    item.className = 'lobby-item';
    item.innerHTML = `<h3>${story.title}</h3><p>${(story.story || '').split('\n')[0]}</p>`;
    item.onclick = () => runStory(story);
    list.appendChild(item);
  });
}

boot();
</script>
</body>
</html>
