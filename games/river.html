<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0a1628;color:#eee;display:flex;justify-content:center;padding:1rem;min-height:100vh}
.app{width:100%;max-width:520px}
h1{font-size:21px;font-weight:500;text-align:center;margin-bottom:.75rem}
.screen{display:none}.screen.active{display:block}
.btn{font-size:13px;padding:6px 16px;border-radius:8px;border:0.5px solid #555;background:transparent;color:#eee;cursor:pointer}
.btn:hover{background:#1a2a3a}.btn:active{transform:scale(0.97)}
.big-btn{width:100%;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;font-size:15px;font-weight:500;cursor:pointer;margin-top:.5rem}
.big-btn:active{transform:scale(0.98)}
.lvl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.75rem}
.lvl-card{background:#0d1f35;border:0.5px solid #1e3a5a;border-radius:12px;padding:.9rem;cursor:pointer;transition:all .15s}
.lvl-card:hover{border-color:#1e88e5;background:#0f2540}
.lvl-card h3{font-size:14px;font-weight:500;margin-bottom:4px}
.lvl-card p{font-size:12px;color:#7ab;line-height:1.5}
.lvl-card .diff{font-size:11px;margin-top:6px;color:#f90}
.lvl-card .best{font-size:11px;margin-top:2px;color:#4ade80}
.info-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.info-bar h2{font-size:15px;font-weight:500}
.steps-pill{font-size:12px;padding:3px 10px;border-radius:20px;background:#0d1f35;border:0.5px solid #1e3a5a;color:#7ab}
.scene{position:relative;height:200px;border-radius:14px;overflow:hidden;margin-bottom:.75rem;border:0.5px solid #1e3a5a}
.bank{position:absolute;top:0;bottom:0;width:38%;background:#1a3a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.bank-left{left:0;border-right:2px solid #0a1628}
.bank-right{right:0;border-left:2px solid #0a1628}
.river{position:absolute;left:38%;right:38%;top:0;bottom:0;background:linear-gradient(180deg,#0d2d5a,#1565c0 40%,#0d2d5a)}
.wave{position:absolute;left:0;right:0;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;animation:wave 2s infinite linear}
.wave:nth-child(1){top:30%;animation-delay:0s}
.wave:nth-child(2){top:55%;animation-delay:.7s}
.wave:nth-child(3){top:75%;animation-delay:1.4s}
@keyframes wave{0%{transform:translateX(-10px)}50%{transform:translateX(10px)}100%{transform:translateX(-10px)}}
.boat{position:absolute;bottom:18%;width:64px;height:38px;background:#8b5e3c;border-radius:6px 6px 14px 14px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:1px;transition:left .6s ease;border:1.5px solid #5a3a1a}
.boat-left{left:calc(38% - 32px)}
.boat-right{left:calc(62% - 32px)}
.character{font-size:24px;cursor:pointer;transition:all .2s;user-select:none;line-height:1}
.character:hover{transform:scale(1.15)}
.character.on-boat{font-size:18px}
.bank-label{font-size:10px;color:#4a8;position:absolute;top:6px}
.ctrl-panel{background:#0d1f35;border:0.5px solid #1e3a5a;border-radius:12px;padding:.9rem;margin-bottom:.6rem}
.ctrl-panel h3{font-size:13px;color:#7ab;margin-bottom:.6rem}
.ctrl-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.msg-box{text-align:center;font-size:14px;min-height:24px;margin-bottom:.5rem;color:#ddd}
.err-msg{color:#f66;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.win-box{display:none;text-align:center;padding:.75rem;background:#0a2a0a;border:0.5px solid #2a6a2a;border-radius:12px;color:#6c6;font-size:15px;font-weight:500;margin-bottom:.6rem}
.hint-box{background:#0d2a1a;border:0.5px solid #1e5a3a;border-radius:10px;padding:.6rem .8rem;margin-bottom:.5rem;font-size:12px;color:#5ab;display:none;line-height:1.8}
.controls-bot{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.history{max-height:80px;overflow-y:auto;font-size:11px;color:#567;line-height:1.8;text-align:center;margin-bottom:.5rem}


  /* 防長按選單 */
  canvas, img {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  /* iOS 安全區域：避免被工具列或 Home 條遮住 */
  body {
    padding-bottom: env(safe-area-inset-bottom, 16px);
    min-height: 100dvh;
  }
</style></head><body>
<div class="app">
<button class="btn" style="margin-bottom:.5rem" onclick="window.location.href='/'">← 大廳</button>
<h1>🚣 過河難題</h1>

<div class="screen active" id="screen-levels">
  <div class="lvl-grid" id="lvl-grid"></div>
</div>

<div class="screen" id="screen-game">
  <div class="info-bar">
    <h2 id="game-title"></h2>
    <div style="display:flex;gap:6px;align-items:center">
      <span class="steps-pill">步數：<span id="step-count">0</span></span>
      <span class="steps-pill" id="time-display" style="display:none">⏱ <span id="time-used">0</span>/<span id="time-limit">15</span>分</span>
    </div>
  </div>
  <div class="scene">
    <div class="bank bank-left" id="bank-left"><span class="bank-label">出發岸</span></div>
    <div class="river"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
    <div class="bank bank-right" id="bank-right"><span class="bank-label">目標岸</span></div>
    <div class="boat boat-left" id="boat"></div>
  </div>
  <div class="msg-box" id="msg-box"></div>
  <div class="hint-box" id="hint-box"></div>
  <div class="win-box" id="win-box"></div>
  <button class="big-btn" onclick="rowBoat()">🚣 划過去！</button>
  <div class="ctrl-panel" style="margin-top:.6rem">
    <h3>🎮 點角色上下船</h3>
    <div class="ctrl-row" id="ctrl-row"></div>
  </div>
  <div class="history" id="history"></div>
  <div class="controls-bot">
    <button class="btn" id="back-lvl-btn">← 關卡選擇</button>
    <button class="btn" id="restart-btn">重新開始</button>
    <button class="btn" id="hint-btn">💡 提示</button>
    <button class="btn" id="next-lvl-btn" style="display:none">下一關 ➜</button>
  </div>
</div>

<script>
const LEVELS=[
  {
    title:'🌾 農夫渡河',
    desc:'狼、羊、白菜要渡河，船只能載一樣',
    diff:'⭐ 入門',capacity:1,
    cast:[{e:'👨‍🌾',name:'農夫',isFarmer:true},{e:'🐺',name:'狼'},{e:'🐑',name:'羊'},{e:'🥬',name:'白菜'}],
    forbidden:[[1,2],[2,3]], // 岸上不能單獨相處
    minSteps:7,
    hint:'先把羊送過去，再送狼（或白菜），記得把羊帶回來！',
  },
  {
    title:'👨‍👩‍👧 三口之家',
    desc:'爸媽和兩個孩子，大人船才能划，每次載一人',
    diff:'⭐⭐ 簡單',capacity:1,
    cast:[
      {e:'👨',name:'爸爸',isFarmer:true},
      {e:'👩',name:'媽媽'},
      {e:'👧',name:'女兒'},
      {e:'👦',name:'兒子'},
    ],
    forbidden:[],minSteps:7,
    note:'大人才能划船！',
    hint:'爸爸先送孩子，再回來接媽媽，輪流運送即可。',
  },
  {
    title:'🕯️ 夜渡橋',
    desc:'四人過橋，只有一支火把，橋最多2人，需在15分鐘內通過',
    diff:'⭐⭐ 中等',capacity:2,
    cast:[
      {e:'🏃',name:'快(1分)',speed:1},
      {e:'🚶',name:'速(2分)',speed:2},
      {e:'🧓',name:'慢(5分)',speed:5},
      {e:'🐢',name:'最慢(8分)',speed:8},
    ],
    forbidden:[],minSteps:5,isBridge:true,timeLimit:15,
    note:'過橋速度取最慢者，回程必須1人帶火把',
    hint:'最佳解：快+速→(2分)、快回(1分)、慢+最慢→(8分)、速回(2分)、快+速→(2分)，共15分！',
  },
  {
    title:'⚔️ 三對夫妻',
    desc:'三對夫妻過河，船載2人，妻子不能在丈夫不在時與其他男人同岸',
    diff:'⭐⭐⭐ 困難',capacity:2,
    cast:[
      {e:'👨',name:'夫A',couple:0,isFarmer:true},
      {e:'👩',name:'妻A',couple:0},
      {e:'🧔',name:'夫B',couple:1},
      {e:'💁‍♀️',name:'妻B',couple:1},
      {e:'👴',name:'夫C',couple:2},
      {e:'👵',name:'妻C',couple:2},
    ],
    forbidden:[],isCouples:true,minSteps:11,
    hint:'先送兩位妻子過去，一位妻子回來帶船，再送兩位丈夫...',
  },
  {
    title:'🏺 五寶渡河',
    desc:'法師帶5樣寶物，每次最多帶2樣，同船的組合不能衝突',
    diff:'⭐⭐⭐ 困難',capacity:2,
    cast:[
      {e:'🧙',name:'法師',isFarmer:true},
      {e:'🔥',name:'火'},{e:'💧',name:'水'},
      {e:'⚡',name:'雷'},{e:'🌿',name:'草'},{e:'🪨',name:'石'},
    ],
    // ✅ 關鍵：boatForbiddenOnly=true 表示只檢查「同船」衝突，不檢查岸上
    forbidden:[[1,2],[2,3],[3,4],[4,5],[5,1]],
    boatForbiddenOnly:true,
    minSteps:5,
    hint:'帶火+石→、法師回←、帶水+草→、法師回←、帶雷→，共5步！',
  },
];

const LS_KEY='river_best_v2';
function loadBest(){try{return JSON.parse(localStorage.getItem(LS_KEY))||{};}catch{return{};}}
function saveBest(d){localStorage.setItem(LS_KEY,JSON.stringify(d));}
let bestScores=loadBest();

let curLvl=0,state={},steps=0,boatSide='left',boatPass=[],won=false,histLog=[],timeUsed=0;

// build level select
const lgrid=document.getElementById('lvl-grid');
LEVELS.forEach((lv,i)=>{
  const best=bestScores[i];
  const c=document.createElement('div');c.className='lvl-card';
  c.innerHTML='<h3>'+lv.title+'</h3><p>'+lv.desc+'</p><div class="diff">'+lv.diff+' · 最少'+lv.minSteps+'步</div>'+(best?'<div class="best">✅ 最佳：'+best+'步</div>':'');
  c.addEventListener('click',()=>loadLevel(i));
  lgrid.appendChild(c);
});

function loadLevel(idx){
  curLvl=idx;const lv=LEVELS[idx];
  steps=0;boatSide='left';boatPass=[];won=false;histLog=[];timeUsed=0;
  state={};lv.cast.forEach((_,i)=>state[i]='left');
  showScreen('screen-game');
  document.getElementById('game-title').textContent=lv.title;
  document.getElementById('step-count').textContent=0;
  document.getElementById('win-box').style.display='none';
  document.getElementById('next-lvl-btn').style.display='none';
  document.getElementById('hint-box').style.display='none';
  setMsg(lv.note||'選擇要上船的角色，然後點船划過去！');
  document.getElementById('history').textContent='';
  const td=document.getElementById('time-display');
  if(lv.isBridge){td.style.display='inline-block';document.getElementById('time-used').textContent=0;document.getElementById('time-limit').textContent=lv.timeLimit;}
  else td.style.display='none';
  updateBoat();buildControls();renderScene();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function buildControls(){
  const lv=LEVELS[curLvl],row=document.getElementById('ctrl-row');row.innerHTML='';
  lv.cast.forEach((c,i)=>{
    const b=document.createElement('button');b.className='btn';b.id='ctrl-'+i;
    b.textContent=c.e+' '+c.name;
    b.addEventListener('click',()=>toggleBoard(i));
    row.appendChild(b);
  });
}

function toggleBoard(ci){
  if(won)return;
  const lv=LEVELS[curLvl];const side=state[ci];
  if(side!==boatSide&&side!=='boat')return;
  if(side==='boat'){
    boatPass=boatPass.filter(x=>x!==ci);state[ci]=boatSide;
  } else if(lv.isBridge){
    const max=boatSide==='right'?1:2;
    if(boatPass.length>=max){setMsg(boatSide==='right'?'回程只能1人帶火把！':'橋上最多2人！',true);return;}
    boatPass.push(ci);state[ci]='boat';
  } else if(lv.isCouples){
    if(boatPass.length>=2){setMsg('船最多載2人！',true);return;}
    boatPass.push(ci);state[ci]='boat';
  } else {
    const fi=lv.cast.findIndex(c=>c.isFarmer);
    const fob=boatPass.includes(fi);
    if(ci===fi){
      if(boatPass.includes(ci))return;
      boatPass.push(ci);state[ci]='boat';
    } else {
      if(!fob){setMsg(lv.cast[fi].name+'必須先上船！',true);return;}
      if(boatPass.length-1>=lv.capacity){setMsg('船已滿！',true);return;}
      // ✅ 五寶：檢查同船衝突
      if(lv.boatForbiddenOnly){
        const others=boatPass.filter(x=>x!==fi); // 已在船上的寶物
        for(const[a,b]of lv.forbidden){
          if((a===ci&&others.includes(b))||(b===ci&&others.includes(a))){
            setMsg(lv.cast[a].name+'和'+lv.cast[b].name+'不能同船！',true);return;
          }
        }
      }
      boatPass.push(ci);state[ci]='boat';
    }
  }
  renderScene();
}

function rowBoat(){
  if(won)return;
  const lv=LEVELS[curLvl];
  if(lv.isBridge){
    if(boatPass.length===0){setMsg('沒有人在橋上！',true);return;}
    if(boatSide==='right'&&boatPass.length!==1){setMsg('回程只能1人帶火把！',true);return;}
  } else if(lv.isCouples){
    if(boatPass.length===0){setMsg('沒有人在船上！',true);return;}
  } else {
    const fi=lv.cast.findIndex(c=>c.isFarmer);
    if(!boatPass.includes(fi)){setMsg(lv.cast[fi].name+'不在船上！',true);return;}
  }

  const from=boatSide;
  boatSide=boatSide==='left'?'right':'left';
  steps++;document.getElementById('step-count').textContent=steps;

  const names=boatPass.map(i=>lv.cast[i].e+lv.cast[i].name);
  let logSuffix='';
  if(lv.isBridge){
    const t=Math.max(...boatPass.map(i=>lv.cast[i].speed));
    timeUsed+=t;document.getElementById('time-used').textContent=timeUsed;logSuffix=' ('+t+'分)';
  }
  boatPass.forEach(i=>state[i]=boatSide);boatPass=[];
  histLog.push('步'+steps+(from==='left'?' → ':' ← ')+names.join('+')+logSuffix);
  document.getElementById('history').textContent=histLog.join('　');
  updateBoat();

  if(lv.isBridge&&timeUsed>lv.timeLimit){
    renderScene();setMsg('⏰ 超時！共'+timeUsed+'分，限'+lv.timeLimit+'分！',true);
    setTimeout(()=>loadLevel(curLvl),1800);return;
  }

  // ✅ 五寶只檢查船上，其他關卡檢查岸上
  const viol=checkForbidden();
  if(viol){setMsg('❌ '+viol+'！重來！',true);setTimeout(()=>loadLevel(curLvl),1300);return;}

  renderScene();
  const allRight=lv.cast.every((_,i)=>state[i]==='right');
  if(allRight){
    won=true;
    if(!bestScores[curLvl]||steps<bestScores[curLvl]){bestScores[curLvl]=steps;saveBest(bestScores);}
    const wb=document.getElementById('win-box');wb.style.display='block';
    let msg='🎉 全部渡河成功！共'+steps+'步';
    if(lv.isBridge)msg+=' · 用時'+timeUsed+'分'+(timeUsed<=lv.timeLimit?' ✅':'');
    else msg+=steps<=lv.minSteps?' 🏆 最佳解！':'（最少'+lv.minSteps+'步）';
    wb.textContent=msg;
    document.getElementById('next-lvl-btn').style.display=curLvl<LEVELS.length-1?'inline-block':'none';
    setMsg('');
    // 更新關卡卡片
    const cards=lgrid.children;
    if(cards[curLvl]){
      let el=cards[curLvl].querySelector('.best');
      if(!el){el=document.createElement('div');el.className='best';cards[curLvl].appendChild(el);}
      el.textContent='✅ 最佳：'+bestScores[curLvl]+'步';
    }
    try{
      const d=JSON.parse(localStorage.getItem('game_lobby_v2')||'{}');
      if(d.name)localStorage.setItem('game_pending_score',JSON.stringify({game:'river',score:steps,detail:lv.title+'，'+steps+'步'}));
    }catch(e){}
  } else {
    setMsg(lv.note||'繼續！');
  }
}

function checkForbidden(){
  const lv=LEVELS[curLvl];
  // boatForbiddenOnly：只在上船時檢查（toggleBoard已處理），渡河後不檢查岸上
  if(lv.boatForbiddenOnly) return null;

  if(lv.isCouples){
    for(const side of['left','right']){
      const here=Object.keys(state).map(Number).filter(i=>state[i]===side);
      for(const wi of here){
        const wc=lv.cast[wi];if(wc.couple===undefined)continue;
        const cm=lv.cast.map((c,i)=>({...c,i})).filter(c=>c.couple===wc.couple);
        if(cm[0].i===wi)continue; // 是丈夫，跳過
        const husbI=cm[0].i;
        if(state[husbI]===side)continue;
        const otherHub=here.find(i=>{
          const c=lv.cast[i];if(c.couple===undefined)return false;
          const m=lv.cast.map((x,j)=>({...x,j})).filter(x=>x.couple===c.couple);
          return m[0].j===i&&c.couple!==wc.couple;
        });
        if(otherHub!==undefined)return wc.name+'不能和其他男人同岸';
      }
    }
    return null;
  }

  const fi=lv.cast.findIndex(c=>c.isFarmer);
  for(const side of['left','right']){
    const here=Object.keys(state).map(Number).filter(i=>state[i]===side);
    if(here.includes(fi))continue;
    for(const[a,b]of lv.forbidden){
      if(here.includes(a)&&here.includes(b))return lv.cast[a].name+'和'+lv.cast[b].name+'不能單獨在一起';
    }
  }
  return null;
}

function updateBoat(){
  document.getElementById('boat').className='boat '+(boatSide==='left'?'boat-left':'boat-right');
}

function renderScene(){
  const lv=LEVELS[curLvl];
  const lb=document.getElementById('bank-left'),rb=document.getElementById('bank-right'),be=document.getElementById('boat');
  lb.querySelectorAll('.character').forEach(e=>e.remove());
  rb.querySelectorAll('.character').forEach(e=>e.remove());
  be.querySelectorAll('.character').forEach(e=>e.remove());
  lv.cast.forEach((c,i)=>{
    const el=document.createElement('div');el.className='character';el.title=c.name;el.textContent=c.e;
    el.addEventListener('click',e=>{e.stopPropagation();toggleBoard(i);});
    const s=state[i];
    if(s==='left')lb.appendChild(el);
    else if(s==='right')rb.appendChild(el);
    else{el.classList.add('on-boat');be.appendChild(el);}
  });
  lv.cast.forEach((_,i)=>{
    const b=document.getElementById('ctrl-'+i);if(!b)return;
    const s=state[i];
    b.style.borderColor=s==='boat'?'#f90':s===boatSide?'#555':'#1a2a3a';
    b.style.opacity=s===boatSide||s==='boat'?'1':'0.38';
  });
}

function setMsg(txt,isErr=false){
  const el=document.getElementById('msg-box');
  el.textContent=txt;el.className='msg-box'+(isErr?' err-msg':'');
  if(isErr)setTimeout(()=>el.classList.remove('err-msg'),400);
}

document.getElementById('back-lvl-btn').addEventListener('click',()=>showScreen('screen-levels'));
document.getElementById('restart-btn').addEventListener('click',()=>loadLevel(curLvl));
document.getElementById('next-lvl-btn').addEventListener('click',()=>loadLevel(curLvl+1));
document.getElementById('hint-btn').addEventListener('click',()=>{
  const h=document.getElementById('hint-box'),lv=LEVELS[curLvl];
  if(lv.hint){h.textContent='💡 '+lv.hint;h.style.display=h.style.display==='block'?'none':'block';}
});
</script>
<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body></html>
