<!DOCTYPE html>
<html lang="zh-TW"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>🌈 彩虹連連看</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Segoe UI",sans-serif;background:radial-gradient(circle at 50% -10%,#1a1a36 0%,#0a0a1a 55%);color:#eee;display:flex;justify-content:center;padding:1rem;min-height:100vh}
.app{width:100%;max-width:500px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding-top:env(safe-area-inset-top,44px);margin-bottom:.85rem}
.topbar h1{font-size:21px;font-weight:700;letter-spacing:.3px;
  background:linear-gradient(90deg,#FF6B6B,#FFB84D,#6FCF6F,#4DA8FF,#C76FE0);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
.meta{display:flex;gap:8px;align-items:center}
.pill{font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;letter-spacing:.5px;
  background:linear-gradient(160deg,#23233f,#15152a);border:1px solid rgba(255,255,255,.08);color:#d6d6ea;
  box-shadow:0 3px 8px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06)}
.btn{font-size:13px;font-weight:600;padding:8px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(160deg,#23233f,#16162c);color:#eee;cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.07);
  transition:transform .12s ease,box-shadow .12s ease}
.btn:active{transform:translateY(1px) scale(.96);box-shadow:0 1px 3px rgba(0,0,0,.5) inset}
.grid-wrap{display:flex;justify-content:center;margin-bottom:.85rem}
.grid-card{padding:10px;border-radius:22px;background:linear-gradient(160deg,#16162e,#0d0d1c);
  box-shadow:0 14px 36px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.05),inset 0 0 0 1px rgba(255,255,255,.04)}
canvas{display:block;border-radius:14px;background:transparent;touch-action:none}
.msg{text-align:center;font-size:14px;font-weight:500;color:#8a8ab8;min-height:22px;margin-bottom:6px}
.win{display:none;text-align:center;padding:.7rem;border-radius:16px;color:#5eeb98;font-size:15px;font-weight:700;margin-bottom:10px;
  background:linear-gradient(160deg,#16401f,#0c2a12);border:1px solid rgba(94,235,152,.25);
  box-shadow:0 6px 22px rgba(34,197,94,.25),inset 0 1px 0 rgba(255,255,255,.06)}
.controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
#next-btn{background:linear-gradient(135deg,#1d9e75,#2fd98a);border-color:#2fd98a;color:#06241a;
  box-shadow:0 4px 14px rgba(47,217,138,.4),inset 0 1px 0 rgba(255,255,255,.25)}

  /* 防長按選單 */
  canvas, img {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  /* iOS 安全區域：避免被工具列或 Home 條遮住 */
  body {
    padding-bottom: env(safe-area-inset-bottom, 16px);
    min-height: 100dvh;
  }
</style>
</head><body>
<div class="app">
  <div class="topbar">
    <button class="btn" onclick="window.location.href='/'">← 大廳</button>
    <h1>🌈 彩虹連連看</h1>
    <div class="meta">
      <span class="pill" id="lvl-pill">LV 1</span>
      <button class="btn" id="undo-btn">↩ 復原</button>
    </div>
  </div>
  <div class="grid-wrap"><div class="grid-card"><canvas id="gc"></canvas></div></div>
  <div class="msg" id="msg">從白點出發，把所有格子連起來，每格只能經過一次！</div>
  <div class="win" id="win"></div>
  <div class="controls">
    <button class="btn" id="retry-btn">重新開始</button>
    <button class="btn" id="next-btn" style="display:none">下一關 ➜</button>
  </div>
</div>

<script>
const RAINBOW=['#FF6B6B','#FFB84D','#FFE066','#6FCF6F','#4DA8FF','#9B6BFF','#FF6BC7'];
const SEG=3; // 每幾格換一次顏色
const DIRS=[[0,1],[0,-1],[1,0],[-1,0]];
const LV_KEY='rainbow_level';

const PAD=10;let CELL=60;
let board=null;          // {rows,cols,cellSet,start}
let playerPath=[],pathSet=new Set();
let drawing=false;
let lvl=parseInt(localStorage.getItem(LV_KEY)||'1',10);
let t0=0;

const cv=document.getElementById('gc');
const ctx=cv.getContext('2d');

function key(r,c){return r+','+c;}

function unvisitedNeighborCount(r,c,visited,rows,cols){
  let n=0;
  for(const[dr,dc] of DIRS){
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&!visited.has(key(nr,nc)))n++;
  }
  return n;
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// Warnsdorff 啟發式隨機自避走訪，並混入一定機率的隨機亂走，
// 讓路徑長度多數很長、但會自然產生不規則孔洞(而非每次都填滿整個矩形)
function warnsdorffWalk(rows,cols,randomChance){
  const visited=new Set();
  let r=Math.floor(Math.random()*rows),c=Math.floor(Math.random()*cols);
  const path=[[r,c]];visited.add(key(r,c));
  while(true){
    let cands=[];
    for(const[dr,dc] of shuffle(DIRS.slice())){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&!visited.has(key(nr,nc))){
        cands.push([nr,nc,unvisitedNeighborCount(nr,nc,visited,rows,cols)]);
      }
    }
    if(!cands.length)break;
    let pick;
    if(Math.random()<randomChance){
      pick=cands[Math.floor(Math.random()*cands.length)];
    }else{
      cands.sort((a,b)=>a[2]-b[2]);
      const min=cands[0][2];
      const best=cands.filter(x=>x[2]===min);
      pick=best[Math.floor(Math.random()*best.length)];
    }
    r=pick[0];c=pick[1];path.push([r,c]);visited.add(key(r,c));
  }
  return path;
}

function dimsForLevel(n){
  const grow=Math.min(5,Math.floor((n-1)/2));
  const rows=Math.min(4+grow,9);
  const cols=Math.min(4+grow+(n%2),9);
  return{rows,cols};
}

function generateBoard(n){
  const{rows,cols}=dimsForLevel(n);
  const minCover=Math.floor(rows*cols*0.7);
  let best=null;
  for(let i=0;i<8;i++){
    const p=warnsdorffWalk(rows,cols,0.15);
    if(!best||p.length>best.length)best=p;
    if(p.length>=minCover){best=p;break;}
  }
  // 收緊邊界框，避免大片空白
  let minR=Infinity,maxR=-Infinity,minC=Infinity,maxC=-Infinity;
  best.forEach(([r,c])=>{minR=Math.min(minR,r);maxR=Math.max(maxR,r);minC=Math.min(minC,c);maxC=Math.max(maxC,c);});
  const norm=best.map(([r,c])=>[r-minR,c-minC]);
  const cellSet=new Set(norm.map(([r,c])=>key(r,c)));
  return{rows:maxR-minR+1,cols:maxC-minC+1,cellSet,start:norm[0]};
}

function sizeCanvas(){
  const maxW=Math.min(window.innerWidth-52,460);
  const maxH=Math.min(window.innerHeight*0.55,560);
  CELL=Math.floor(Math.min(maxW/board.cols,maxH/board.rows));
  CELL=Math.max(24,Math.min(CELL,80));
  cv.width=board.cols*CELL+PAD*2;
  cv.height=board.rows*CELL+PAD*2;
}

function loadLevel(n,reuseBoard){
  lvl=n;localStorage.setItem(LV_KEY,String(lvl));
  board=reuseBoard||generateBoard(lvl);
  sizeCanvas();
  playerPath=[];pathSet=new Set();drawing=false;
  t0=Date.now();
  document.getElementById('lvl-pill').textContent='LV '+lvl;
  document.getElementById('win').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('msg').textContent='從白點出發，把所有格子連起來，每格只能經過一次！';
  render();
}

function cellAt(x,y){
  const r=Math.floor((y-PAD)/CELL),c=Math.floor((x-PAD)/CELL);
  if(r<0||r>=board.rows||c<0||c>=board.cols)return null;
  if(!board.cellSet.has(key(r,c)))return null;
  return[r,c];
}

function getXY(e){
  const rect=cv.getBoundingClientRect();
  const sx=cv.width/rect.width,sy=cv.height/rect.height;
  if(e.touches)return[(e.touches[0].clientX-rect.left)*sx,(e.touches[0].clientY-rect.top)*sy];
  return[(e.clientX-rect.left)*sx,(e.clientY-rect.top)*sy];
}

function pushCell(r,c){playerPath.push([r,c]);pathSet.add(key(r,c));}
function popCell(){const[r,c]=playerPath.pop();pathSet.delete(key(r,c));}

cv.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const[x,y]=getXY(e);
  const cell=cellAt(x,y);if(!cell)return;
  const[r,c]=cell;

  if(playerPath.length===0){
    if(r===board.start[0]&&c===board.start[1]){
      pushCell(r,c);drawing=true;render();
    }
    return;
  }
  const idx=playerPath.findIndex(([pr,pc])=>pr===r&&pc===c);
  if(idx>=0){
    while(playerPath.length>idx+1)popCell();
    drawing=true;render();
  }
},{passive:false});

cv.addEventListener('pointermove',e=>{
  if(!drawing)return;e.preventDefault();
  const[x,y]=getXY(e);
  const cell=cellAt(x,y);if(!cell)return;
  const[r,c]=cell;
  const[lr,lc]=playerPath[playerPath.length-1];
  if(r===lr&&c===lc)return;
  if(Math.abs(r-lr)+Math.abs(c-lc)!==1)return;

  if(playerPath.length>=2){
    const[pr,pc]=playerPath[playerPath.length-2];
    if(r===pr&&c===pc){popCell();render();return;}
  }
  if(pathSet.has(key(r,c)))return; // 不可走回已用過的格子(除了上面的後退)
  pushCell(r,c);render();
  checkWin();
},{passive:false});

cv.addEventListener('pointerup',()=>{drawing=false;});
cv.addEventListener('pointercancel',()=>{drawing=false;});

function checkWin(){
  if(playerPath.length!==board.cellSet.size)return;
  drawing=false;
  const elapsed=Math.round((Date.now()-t0)/1000);
  document.getElementById('win').style.display='block';
  document.getElementById('win').textContent='🎉 過關！LV '+lvl+'，'+elapsed+'秒完成！';
  document.getElementById('next-btn').style.display='inline-block';
  document.getElementById('msg').textContent='';
  localStorage.setItem('game_pending_score',JSON.stringify({game:'rainbow',score:lvl,detail:'闖到 LV '+lvl+'，'+elapsed+'秒'}));
}

function lighten(hex,amt){
  hex=hex.replace('#','');
  const num=parseInt(hex,16);
  let r=(num>>16)+amt,g=((num>>8)&0xFF)+amt,b=(num&0xFF)+amt;
  r=Math.min(255,Math.max(0,r));g=Math.min(255,Math.max(0,g));b=Math.min(255,Math.max(0,b));
  return `rgb(${r},${g},${b})`;
}

function colorForIndex(i){return RAINBOW[Math.floor(i/SEG)%RAINBOW.length];}

function render(){
  ctx.clearRect(0,0,cv.width,cv.height);
  const r2=Math.max(6,CELL*0.22);
  const idxMap={};playerPath.forEach(([r,c],i)=>idxMap[key(r,c)]=i);

  // 1. 立體方塊底層
  board.cellSet.forEach(k=>{
    const[r,c]=k.split(',').map(Number);
    const filledIdx=idxMap[k];
    const x=PAD+c*CELL+3,y=PAD+r*CELL+3,w=CELL-6,h=CELL-6;
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=5;ctx.shadowOffsetY=2;
    const grad=ctx.createLinearGradient(x,y,x,y+h);
    if(filledIdx!==undefined){
      const col=colorForIndex(filledIdx);
      grad.addColorStop(0,lighten(col,22));grad.addColorStop(1,col);
    }else{
      grad.addColorStop(0,'#2c2c46');grad.addColorStop(1,'#1a1a2c');
    }
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.roundRect(x,y,w,h,r2);ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.beginPath();ctx.roundRect(x+2,y+2,w-4,h*0.42,r2*0.7);
    ctx.fillStyle=filledIdx!==undefined?'rgba(255,255,255,.16)':'rgba(255,255,255,.04)';
    ctx.fill();
    ctx.restore();
  });

  // 2. 路徑線條(逐段彩虹色)
  for(let i=1;i<playerPath.length;i++){
    const[r0,c0]=playerPath[i-1],[r1,c1]=playerPath[i];
    const x0=PAD+c0*CELL+CELL/2,y0=PAD+r0*CELL+CELL/2;
    const x1=PAD+c1*CELL+CELL/2,y1=PAD+r1*CELL+CELL/2;
    const col=colorForIndex(i);
    ctx.strokeStyle=col;ctx.lineWidth=CELL*.36;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
    ctx.strokeStyle=lighten(col,55);ctx.lineWidth=CELL*.1;ctx.globalAlpha=.5;
    ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();ctx.globalAlpha=1;
  }

  // 3. 起點標記
  const[sr,sc]=board.start;
  const sx=PAD+sc*CELL+CELL/2,sy=PAD+sr*CELL+CELL/2;
  ctx.save();
  ctx.beginPath();ctx.arc(sx,sy,CELL*.18,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=3;
  ctx.fill();
  ctx.restore();
}

document.getElementById('undo-btn').addEventListener('click',()=>{
  if(!playerPath.length)return;
  popCell();drawing=false;render();
  document.getElementById('win').style.display='none';
  document.getElementById('next-btn').style.display='none';
});
document.getElementById('retry-btn').addEventListener('click',()=>loadLevel(lvl,board));
document.getElementById('next-btn').addEventListener('click',()=>loadLevel(lvl+1));
window.addEventListener('resize',()=>{sizeCanvas();render();});

loadLevel(lvl);
</script>
<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body></html>
